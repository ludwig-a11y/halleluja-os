<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Halleluja OS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --text:#1a1a1a;--t2:#6b6b6b;--t3:#a0a0a0;
  --bg:#f1f0ef;--sf:#fff;--bd:#e5e5e3;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--blue-bd:#bfdbfe;
  --green:#15803d;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --red:#b91c1c;--red-bg:#fef2f2;--red-bd:#fecaca;
  --amber:#a16207;--amber-bg:#fefce8;--amber-bd:#fde68a;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-bd:#ddd6fe;
  --gray-bg:#f8f8f7;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column}

@media(max-width:768px){
  .bar{padding:0 12px;height:50px}
  .logo{font-size:14px;border:none;padding:0;margin:0}
  .nt:not(.ai-btn):not(.new-btn){display:none}
  .nt.ai-btn,.nt.new-btn{display:none}
  .sb{display:none}
  .main{padding:14px 14px 90px}
  .modal{border-radius:20px 20px 0 0;width:100%;max-width:100%;position:fixed;bottom:0;left:0;right:0;max-height:90vh;padding:20px 18px 32px}
  .ovl{align-items:flex-end;padding:0}
  .f2{grid-template-columns:1fr}
  #mob-tabs{display:flex}
  #mob-add{display:flex}
}
@media(min-width:769px){
  #mob-tabs{display:none}
  #mob-add{display:none}
}
#mob-tabs{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--sf);border-top:1px solid var(--bd);z-index:50;align-items:center;justify-content:space-around;padding:0 8px}
.mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;font-family:inherit;padding:8px 4px;color:var(--t3);font-size:9px;font-weight:500}
.mob-tab.on{color:var(--text)}
.mob-tab svg{width:20px;height:20px}
#mob-add{position:fixed;bottom:72px;right:18px;z-index:51;width:52px;height:52px;border-radius:50%;background:var(--text);color:#fff;border:none;font-size:26px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.25);font-family:inherit}

#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.login-box{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:32px 36px;width:340px;max-width:95vw}
.login-title{font-size:17px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--t3);margin-bottom:20px}
.person-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.person-btn{padding:10px 8px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.person-btn:hover{border-color:var(--text)}
.person-btn.selected{border:2px solid var(--text);background:var(--gray-bg)}
.pin-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--bd);transition:background .15s}
.pin-dot.filled{background:var(--text)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-key{padding:14px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.pin-key:hover{background:var(--gray-bg)}
.login-err{font-size:12px;color:var(--red);text-align:center;min-height:18px;margin-top:8px}

.bar{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;height:46px;flex-shrink:0;gap:2px}
.logo{font-size:13px;font-weight:700;padding-right:12px;border-right:1px solid var(--bd);margin-right:6px;white-space:nowrap}
.nt{font-size:12px;padding:0 10px;height:46px;border:none;border-bottom:2px solid transparent;cursor:pointer;background:transparent;color:var(--t2);font-family:inherit;font-weight:400;white-space:nowrap}
.nt.on{color:var(--text);font-weight:600;border-bottom-color:var(--text)}
.nt.ai-btn{color:var(--purple);font-weight:600;border:1px solid var(--purple-bd);background:var(--purple-bg);border-radius:8px;height:30px;margin-left:4px;padding:0 10px}
.nt.new-btn{color:var(--blue);font-weight:600;border:1px solid var(--blue-bd);background:var(--blue-bg);border-radius:8px;height:30px;padding:0 10px}
.shell{display:flex;flex:1;overflow:hidden}
.sb{width:168px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);overflow-y:auto;padding:10px 8px}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.gl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:0 8px;margin:12px 0 5px}
.sbn{width:100%;text-align:left;padding:7px 8px;border-radius:9px;border:none;cursor:pointer;background:transparent;font-family:inherit;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.sbn.on,.sbn:hover{background:var(--bg)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:13px 15px;margin-bottom:8px}
.tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap;display:inline-block}
.btn{font-size:11px;padding:5px 12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:500}
.btn-dk{background:var(--text);color:#fff}
.btn-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.btn-gr{background:var(--gray-bg);color:var(--t2);border:1px solid var(--bd)}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--red-bd)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.lock{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.timer{background:var(--gray-bg);border-radius:9px;padding:7px 11px;text-align:center;flex-shrink:0;min-width:80px}
.tn{font-size:17px;font-weight:700;font-family:monospace;letter-spacing:-.5px}
.tbar{height:3px;border-radius:99px;background:var(--bd);margin-top:4px;overflow:hidden}
.tf{height:100%;border-radius:99px;background:var(--blue)}
.sw{padding-left:8px;border-left:2px solid var(--blue-bd);margin:8px 0}
.sr{display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;user-select:none}
.sc{width:13px;height:13px;border-radius:3px;border:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sc.dn{background:var(--text);border-color:var(--text)}
.sl{font-size:11px}.sl.dn{text-decoration:line-through;color:var(--t3)}
.asi{flex:1;font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--text);font-family:inherit;outline:none}
.zcard{border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid}
.pbar{height:5px;border-radius:99px;background:rgba(0,0,0,.08);overflow:hidden;flex:1}
.pbar-fill{height:100%;border-radius:99px;transition:width .3s}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:100;align-items:center;justify-content:center;padding:16px}
.ovl.open{display:flex}
.modal{background:var(--sf);border-radius:16px;padding:24px;width:520px;max-width:100%;max-height:92vh;overflow-y:auto}
.mt{font-size:15px;font-weight:700;margin-bottom:16px}
.fl{margin-bottom:13px}
.fl label{display:block;font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fl input,.fl select,.fl textarea{width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(0,0,0,.12);background:var(--sf);color:var(--text);font-family:inherit;font-size:13px;outline:none}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--blue)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.tz-block{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:11px;padding:12px 14px;margin-bottom:8px}
.tz-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tz-title{font-size:13px;font-weight:600;color:var(--purple);flex:1}
.tz-done{text-decoration:line-through;opacity:.5}
.tz-add-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:9px;border:1.5px dashed var(--purple-bd);background:transparent;color:var(--purple);font-size:11px;font-family:inherit;cursor:pointer;width:100%;margin-top:6px;opacity:.7}
.tz-add-btn:hover{opacity:1;background:rgba(124,58,237,.06)}
.team-block{background:var(--sf);border:1px solid var(--bd);border-radius:14px;margin-bottom:14px;overflow:hidden}
.team-block-head{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;background:var(--gray-bg)}
.team-h-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--bd)}
.team-h-row:last-child{border:none}
.team-h-row:hover{background:var(--gray-bg)}
.empty-state{text-align:center;color:var(--t3);padding:60px 20px;font-size:13px;line-height:1.8}
.settings-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.settings-row:last-child{border:none}
.ai-result{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:10px;padding:12px;margin:10px 0;font-size:12px;line-height:1.6}

#quote-overlay{position:fixed;inset:0;background:#0d0d0d;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;opacity:0;pointer-events:none;transition:opacity .5s}
#quote-overlay.show{opacity:1;pointer-events:all}
#quote-text{color:#fff;font-size:20px;font-weight:400;line-height:1.7;max-width:580px;text-align:center;letter-spacing:.01em}
#quote-author{color:#555;font-size:12px;margin-top:20px;letter-spacing:.1em;text-transform:uppercase}
#quote-skip{margin-top:32px;background:transparent;border:1px solid #333;color:#444;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit}
#quote-skip:hover{border-color:#555;color:#666}

.kpi-block{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.kpi-block-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.kpi-item{border:1px solid var(--bd);border-radius:10px;padding:10px 12px;position:relative}
.kpi-item.fällig{border-color:var(--text)}
.kpi-item.inaktiv{opacity:.5}
.kpi-name{font-size:10px;color:var(--t3);margin-bottom:2px}
.kpi-goal-ref{font-size:9px;color:var(--blue);margin-bottom:6px}
.kpi-val{font-size:20px;font-weight:700;line-height:1}
.kpi-val.ok{color:var(--green)}
.kpi-val.nok{color:var(--red)}
.kpi-soll{font-size:11px;color:var(--t3)}
.kpi-freq-label{font-size:9px;color:var(--t3);margin-top:3px}
.kpi-entry{display:flex;gap:5px;margin-top:7px}
.kpi-entry input{flex:1;padding:4px 7px;border:1px solid var(--bd);border-radius:6px;font-size:13px;font-family:inherit;background:var(--gray-bg);color:var(--text);outline:none}
.kpi-entry button{padding:4px 9px;border-radius:6px;background:var(--text);color:#fff;border:none;font-size:11px;cursor:pointer;font-family:inherit}

.deleg-block{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-top:16px}
.deleg-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.deleg-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--bd)}
.deleg-row:last-child{border:none}

.prio-wrap{position:relative;display:inline-block}
.prio-dd{position:absolute;top:24px;left:0;background:var(--sf);border:1px solid var(--bd);border-radius:10px;z-index:50;min-width:130px;box-shadow:0 4px 16px rgba(0,0,0,.1);display:none}
.prio-dd.open{display:block}
.prio-dd-item{padding:8px 12px;font-size:11px;cursor:pointer;font-weight:500}
.prio-dd-item:hover{background:var(--gray-bg)}
.prio-dd-item:first-child{border-radius:10px 10px 0 0}
.prio-dd-item:last-child{border-radius:0 0 10px 10px}
@keyframes bell-shake{0%,100%{transform:rotate(0)}15%{transform:rotate(18deg)}30%{transform:rotate(-16deg)}45%{transform:rotate(12deg)}60%{transform:rotate(-10deg)}75%{transform:rotate(6deg)}90%{transform:rotate(-4deg)}}
@keyframes sonder-pulse{0%,100%{box-shadow:0 0 0 0 rgba(161,98,7,.4)}50%{box-shadow:0 0 0 8px rgba(161,98,7,0)}}
.kpi-item.sonder{border-color:var(--amber);background:var(--amber-bg)}
</style>
</head>
<body>

<div id="quote-overlay">
  <div id="quote-text"></div>
  <div id="quote-author"></div>
  <button id="quote-skip" onclick="hideQuote()">weiter</button>
</div>

<div id="login-screen">
  <div style="font-size:13px;color:var(--t3);text-align:center">Lädt…</div>
</div>

<div id="app" style="display:none;flex-direction:column;flex:1;overflow:hidden">
  <div class="bar">
    <div class="logo">Halleluja OS</div>
    <button class="nt on" onclick="nav('tag',this)">Mein Tag</button>
    <button class="nt" id="nav-ziele" onclick="nav('ziele',this)">Ziele</button>
    <button class="nt" id="nav-team" onclick="nav('team',this)">Team</button>
    <div style="flex:1"></div>
    <div id="fokus-banner" style="display:none;align-items:center;gap:6px;padding:4px 12px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:8px;font-size:11px;font-weight:600;color:var(--red)">🎯 <span id="fokus-label"></span></div>
    <div id="live-clock" style="font-size:12px;font-weight:600;color:var(--t2);font-family:monospace;padding:0 8px"></div>
    <button class="nt ai-btn" onclick="openAI()">✦ mit KI</button>
    <button class="nt new-btn" onclick="openNeu()">+ Aufgabe</button>
    <div style="margin-left:8px;display:flex;align-items:center;gap:6px">
      <div id="kap-pill" style="display:none;cursor:pointer" onclick="openMeinProfil()"></div>
      <div id="me-badge" style="display:flex;align-items:center;gap:6px;padding:0 6px;cursor:pointer;border-radius:8px" onclick="openMeinProfil()"></div>
      <button id="btn-settings" style="display:none;font-size:11px;padding:4px 10px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit" onclick="openSettings()">⚙</button>
    </div>
  </div>
  <div class="shell">
    <div class="sb" id="sb"></div>
    <div class="main" id="main"></div>
  </div>
  <div id="mob-tabs">
    <button class="mob-tab on" id="mobt-tag" onclick="nav('tag',null);updMobTabs('tag')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Mein Tag
    </button>
    <button class="mob-tab" id="mobt-ziele" onclick="nav('ziele',null);updMobTabs('ziele')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>
      Ziele
    </button>
    <div style="width:52px"></div>
    <button class="mob-tab" id="mobt-team" onclick="nav('team',null);updMobTabs('team')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="3"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.87"/></svg>
      Team
    </button>
    <button class="mob-tab" onclick="isGF()?openSettings():openMeinProfil()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Ich
    </button>
  </div>
  <button id="mob-add" onclick="openNeu()">+</button>
</div>

<div class="ovl" id="ovl" onclick="if(event.target===this)cm()">
  <div class="modal" id="mb"></div>
</div>

<script>
const SUPA_URL='https://zkxeuphsbufdvskkuahk.supabase.co';
const SUPA_KEY='sb_publishable_41EMxtYZYsYL5KR1KS_RrA_1mV1SRAL';

async function supa(path,opts={}){
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/'+path,{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation',...(opts.headers||{})},
      method:opts.method||'GET',
      body:opts.body?JSON.stringify(opts.body):undefined
    });
    if(!r.ok){console.error('Supabase',path,await r.text());return null;}
    const t=await r.text();return t?JSON.parse(t):null;
  }catch(e){console.error('supa',e);return null;}
}
const dbGet=(t,q='')=>supa(t+(q?'?'+q:'?select=*'));
const dbPatch=(t,id,b)=>supa(t+'?id=eq.'+id,{method:'PATCH',body:b,prefer:'return=minimal'});
const dbInsert=(t,b)=>supa(t,{method:'POST',body:b});
const dbDelete=(t,id)=>supa(t+'?id=eq.'+id,{method:'DELETE',prefer:'return=minimal'});

const FARBEN=[
  {bg:'#f0fdf4',tc:'#15803d',bd:'#86efac'},{bg:'#eff6ff',tc:'#1d4ed8',bd:'#93c5fd'},
  {bg:'#fff7ed',tc:'#c2410c',bd:'#fed7aa'},{bg:'#faf5ff',tc:'#7c3aed',bd:'#ddd6fe'},
  {bg:'#f1f0ef',tc:'#44403c',bd:'#d4d0cb'},{bg:'#fdf2f8',tc:'#9d174d',bd:'#fbcfe8'}
];
const CL=[
  {bg:'#f0fdf4',tc:'#15803d'},{bg:'#eff6ff',tc:'#1d4ed8'},{bg:'#faf5ff',tc:'#7c3aed'},
  {bg:'#fff7ed',tc:'#c2410c'},{bg:'#f1f0ef',tc:'#44403c'},{bg:'#fdf2f8',tc:'#9d174d'}
];
const TODAY=new Date().toISOString().slice(0,10);
const FREQ=['täglich','wöchentlich','monatlich'];
const SH=[['0.08','5min'],['0.25','15min'],['0.5','30min'],['0.75','45min'],['1','1h'],['1.5','1h30'],['2','2h'],['3','3h'],['4','4h'],['5','5h'],['8','8h']];
const TYP_INFO={
  strategisch:{label:'Strategisch',bg:'var(--blue-bg)',tc:'var(--blue)'},
  operativ:{label:'Operativ',bg:'var(--gray-bg)',tc:'var(--t2)'},
  random:{label:'Random',bg:'var(--amber-bg)',tc:'var(--amber)'}
};
const QUOTES=[
  {text:'Wirksamkeit bedeutet nicht, viel zu tun. Sie bedeutet, das Richtige zu tun — konsequent, jeden Tag.',author:'Peter Drucker'},
  {text:'Dafür wirst du bezahlt — nicht dafür, beschäftigt zu sein. Sondern dafür, die wichtigsten Aufgaben konsequent abzuarbeiten. Die, die auf unsere Ziele einzahlen.',author:'Halleluja OS'},
];
let lastQuoteIdx=-1;
let quoteTimer=null;

function showQuote(){
  lastQuoteIdx=(lastQuoteIdx+1)%QUOTES.length;
  const q=QUOTES[lastQuoteIdx];
  document.getElementById('quote-text').textContent=q.text;
  document.getElementById('quote-author').textContent='— '+q.author;
  const ov=document.getElementById('quote-overlay');
  ov.classList.add('show');
  if(quoteTimer)clearTimeout(quoteTimer);
  quoteTimer=setTimeout(hideQuote,8000);
}
function hideQuote(){
  document.getElementById('quote-overlay').classList.remove('show');
  if(quoteTimer)clearTimeout(quoteTimer);
}
function checkP1Done(pid){
  const p1=S.aufgaben.filter(a=>a.pid===pid&&a.prio==='P1');
  if(p1.length>0&&p1.every(a=>a.status==='erledigt'))setTimeout(showQuote,400);
}

let S={personen:[],teams:[],ziele:[],aufgaben:[],kpiVals:{},checkins:{},kpiToday:{},signale:[]};
let aP=null,realMe=null,aV='tag',timIv=null,_selPrio=null;
let _kid=Date.now();
const nid=p=>p+(++_kid);

function normalizeAufgabe(a){
  return{...a,zielId:a.ziel_id||null,teilzielId:a.teilziel_id||null,
    aktSeit:a.akt_seit?new Date(a.akt_seit).getTime():null,

function fmt(s){

  if(h>0)return h+':'+('0'+m).slice(-2)+':'+('0'+sc).slice(-2);

function showSonderCelebration(pid,label,val,ziel){
  const p=person(pid);

    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0],[660,.15],[440,.35],[550,.6],[440,.9]].forEach(([freq,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=freq;

function startSonderPoller(){
  if(_sonderPoll)return;
  const sonderKpis=S.ziele.flatMap(z=>z.kpis||[]).filter(k=>k.sonder);
  sonderKpis.forEach(k=>{const v=S.kpiVals[aP+'-'+k.id];_sonderSeen[k.id]=v?.datum===TODAY?v.val:0;});
  _sonderPoll=setInterval(async()=>{
    if(!isGF())return;
    const sk=S.ziele.flatMap(z=>z.kpis||[]).filter(k=>k.sonder);
    if(!sk.length)return;
    const ids='('+sk.map(k=>'\''+k.id+'\'').join(',')+')';
    const rows=await dbGet('kpi_vals','kpi_id=in.'+ids+'&datum=eq.'+TODAY);
    if(!rows)return;
    rows.forEach(row=>{
      const prev=_sonderSeen[row.kpi_id]??0;
      if(row.val>prev&&row.pid!==aP){
        _sonderSeen[row.kpi_id]=row.val;
        const k=sk.find(x=>x.id===row.kpi_id);
        showSonderCelebration(row.pid,k?.label||'Verkauf',row.val,k?.ziel||'?');
      } else if(row.val>prev){
        _sonderSeen[row.kpi_id]=row.val;
      }
    });
  },5000);
}

  if(freq==='wöchentlich')return now.getDay()===5;
  if(freq==='monatlich'){const last=new Date(now.getFullYear(),now.getMonth()+1,0);return now.getDate()===last.getDate();}
  return false;
}

function getKapazitaet(pid){
  const p=person(pid);if(!p)return null;
  const sw=p.stunden_woche||40;
  let fh=0;
  if(p.fokus_start&&p.fokus_end){
    const [sh,sm]=p.fokus_start.split(':').map(Number);
    const [eh,em]=p.fokus_end.split(':').map(Number);
    fh=Math.max(0,((eh*60+em)-(sh*60+sm))/60)*5;
  }
  const rh=Math.max(0,sw-fh);
  const now=new Date();
  const daysToSun=now.getDay()===0?0:7-now.getDay();
  const weekEndStr=new Date(now.getFullYear(),now.getMonth(),now.getDate()+daysToSun).toISOString().slice(0,10);
  let p1h=0,p23h=0,rnd=0;
  S.aufgaben.forEach(a=>{
    if(a.pid!==pid||a.status==='erledigt'||a.status==='idee')return;
    if(a.typ==='random'){rnd++;return;}
    const thisWeek=a.status==='aktiv'||(a.dl&&a.dl<=weekEndStr);
    if(!thisWeek)return;
    const h=a.geplant||1;
    if(a.prio==='P1')p1h+=h;
    else if(a.prio==='P2'||a.prio==='P3')p23h+=h;
  });
  return{fh,rh,p1h,p23h,rnd,sw};
}

function showKonfetti(){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;inset:0;z-index:999;pointer-events:none;width:100%;height:100%';
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const pieces=Array.from({length:80},()=>({
    x:Math.random()*canvas.width,y:-20,w:8+Math.random()*8,h:8+Math.random()*8,
    r:Math.random()*Math.PI*2,vx:(Math.random()-0.5)*6,vy:3+Math.random()*4,
    vr:(Math.random()-0.5)*0.2,
    color:['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD'][Math.floor(Math.random()*7)]
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.vy+=0.1;
    });
    frame++;
    if(frame<120)requestAnimationFrame(draw);else canvas.remove();
  }
  draw();
}

    +'</div>'
    +'<div class="fl"><label>Fokuszeit</label>'

    +'<span style="color:var(--t2)">–</span>'
    +'<input type="time" id="mp-fe" value="'+(p.fokus_end||'11:00')+'" style="flex:1" onchange="saveMeinFokus()">'
    +'</div></div>'
    +'<div class="fl"><label>Wochenstunden</label>'
    +'<input type="number" id="mp-sw" value="'+(p.stunden_woche||40)+'" min="1" max="80" style="width:80px" onchange="saveMeinFokus()">'

    +rKapazitaetBlock(aP)
    +'<div class="fl"><label>PIN ändern</label>'
    +'<div style="display:flex;gap:8px">'
    +'<input type="password" id="mp-pin" maxlength="4" placeholder="Neue PIN (4 Ziffern)" inputmode="numeric" pattern="[0-9]*" style="flex:1" onkeydown="if(event.key===\'Enter\')saveMeinPin()">'
    +'<button class="btn btn-dk" onclick="saveMeinPin()">Speichern</button>'
    +'</div>'
    +'<div id="mp-pin-msg" style="font-size:11px;margin-top:4px;min-height:16px"></div>'
    +'</div>'
    +'<div class="mf"><button class="btn btn-red" onclick="logout()">Abmelden</button><button class="btn btn-gr" onclick="cm()">Schließen</button></div>';

}
async function saveMeinFokus(){
  const p=me();if(!p)return;
  const fs=document.getElementById('mp-fs')?.value||'09:00';
  const fe=document.getElementById('mp-fe')?.value||'11:00';
  const sw=parseInt(document.getElementById('mp-sw')?.value)||40;
  p.fokus_start=fs;p.fokus_end=fe;p.stunden_woche=sw;
  await dbPatch('personen',aP,{fokus_start:fs,fokus_end:fe,stunden_woche:sw});
}
async function saveMeinPin(){
  const p=me();if(!p)return;
  const inp=document.getElementById('mp-pin');
  const msg=document.getElementById('mp-pin-msg');
  const val=inp?.value?.trim()||'';
  if(!val||val.length!==4||!/^\d{4}$/.test(val)){if(msg)msg.style.color='var(--red)',msg.textContent='Bitte genau 4 Ziffern eingeben.';return;}
  p.pin=val;
  await dbPatch('personen',aP,{pin:val});
  if(inp)inp.value='';
  if(msg)msg.style.color='var(--green)',msg.textContent='✓ PIN gespeichert.';
}
function logout(){
  aP=null;realMe=null;pinIn='';loginSel=null;
  try{localStorage.removeItem('h_session');}catch(e){}
  removeBackBtn();
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.querySelectorAll('.person-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('pin-section').style.display='none';
}
function showBackBtn(){
  removeBackBtn();
  if(!realMe||aP===realMe)return;
  const p=person(realMe),c=cl(p);
  const btn=document.createElement('button');
  btn.id='back-to-me';
  btn.textContent='← Zurück zu '+p.name;
  btn.style.cssText='position:fixed;bottom:20px;right:20px;z-index:99;padding:10px 16px;border-radius:10px;background:'+c.tc+';color:#fff;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2)';
  btn.onclick=()=>{aP=realMe;updateBadge();render();removeBackBtn();};
  document.body.appendChild(btn);
}
function removeBackBtn(){document.getElementById('back-to-me')?.remove();}

function updMobTabs(v){
  ['tag','ziele','team'].forEach(t=>{
    const el=document.getElementById('mobt-'+t);
    if(el)el.className='mob-tab'+(t===v?' on':'');
  });
}
function nav(v,btn){
  aV=v;
  document.querySelectorAll('.nt:not(.ai-btn):not(.new-btn)').forEach(b=>b.classList.remove('on'));
  btn?.classList.add('on');
  updMobTabs(v);render();
}
function render(){
  document.getElementById('nav-team').style.display=canSeeTeam()?'':'none';
  updateKapPill();
  rSB();
  if(aV==='tag')rTag();
  else if(aV==='ziele')rZiele();
  else if(aV==='team')rTeam();
}

function rSB(){
  const sorted=[...S.teams].sort((a,b)=>a.id==='gf'?-1:b.id==='gf'?1:0);
  let h='';
  sorted.forEach(t=>{
    const vis=t.members.filter(id=>{
      const p=person(id);if(!p)return false;
      if(isGF())return true;
      if(isLead())return visiblePersonIds(aP).includes(id);
      return id===aP;
    });
    if(!vis.length)return;
    h+='<div class="gl">'+t.name+'</div>';
    vis.forEach(id=>{
      const p=person(id);if(!p)return;
      const c=cl(p),isMe=id===aP;
      const pA=S.aufgaben.filter(x=>x.pid===id&&canSee(x));
      const nC=pA.filter(x=>x.status==='neu').length,aC=pA.filter(x=>x.status==='aktiv').length;
      const paddel=getPaddelCount(id);
      h+='<button class="sbn'+(isMe?' on':'')+'" onclick="switchPerson(\''+id+'\')">'+av(p,22,8)
        +'<span style="flex:1;font-size:11px;font-weight:'+(isMe?600:400)+';color:'+(isMe?c.tc:'var(--text)')+'">'+p.name+'</span>'
        +'<div style="display:flex;gap:3px;align-items:center">'
        +(paddel?'<span style="font-size:9px;color:var(--amber)">🏅'+paddel+'</span>':'')
        +(nC?'<span style="font-size:8px;background:var(--red-bg);color:var(--red);border-radius:99px;padding:1px 4px;font-weight:700">'+nC+'</span>':'')
        +(aC?'<span style="font-size:8px;background:'+c.bg+';color:'+c.tc+';border-radius:99px;padding:1px 4px;font-weight:700">'+aC+'</span>':'')
        +'</div></button>';
    });
  });
  document.getElementById('sb').innerHTML=h;
}
function switchPerson(id){
  if(isGF()||visiblePersonIds(aP).includes(id)||id===aP){
    aP=id;updateBadge();render();showBackBtn();
  }
}

function stepsHtml(a,ed){
  let out='';
  if(a.ua&&a.ua.length){
    out+='<div class="sw">';
    a.ua.forEach((u,i)=>{
      out+='<div class="sr" onclick="toggleStep(\''+a.id+'\','+i+')">'
        +'<div class="sc'+(u.d?' dn':'')+'">'+( u.d?'<span style="color:#fff;font-size:8px">✓</span>':'')+  '</div>'
        +'<span class="sl'+(u.d?' dn':'')+'">'+u.t+'</span>'
        +(ed?'<button onclick="event.stopPropagation();delStep(\''+a.id+'\','+i+')" style="margin-left:auto;font-size:10px;background:none;border:none;color:var(--t3);cursor:pointer">✕</button>':'')
        +'</div>';
    });
    out+='</div>';
  }
  if(ed)out+='<div style="display:flex;gap:6px;margin-top:6px"><input class="asi" id="si-'+a.id+'" placeholder="+ Schritt…" onkeydown="if(event.key===\'Enter\')addStep(\''+a.id+'\')"><button onclick="addStep(\''+a.id+'\')" style="font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--t2);cursor:pointer">+</button></div>';
  return out;
}

function rTag(){
  const zugewiesenA=S.aufgaben.filter(a=>a.pid===aP&&a.status==='zugewiesen');
  const myA=S.aufgaben.filter(a=>a.pid===aP&&canSee(a)&&a.status!=='zugewiesen');
  const aktiv=myA.filter(a=>a.status==='aktiv');
  const neu=myA.filter(a=>a.status==='neu');
  const bl=myA.filter(a=>a.status==='backlog').sort((a,b)=>{
    const pd={'P1':0,'P2':1,'P3':2};
    const pp=(pd[a.prio]??3)-(pd[b.prio]??3);
    if(pp!==0)return pp;
    if(a.dl&&b.dl)return a.dl.localeCompare(b.dl);
    return a.dl?-1:b.dl?1:0;
  });
  const erl=myA.filter(a=>a.status==='erledigt');
  const offene=[...neu,...bl].sort((a,b)=>{const po={'P1':0,'P2':1,'P3':2};return(po[a.prio]??3)-(po[b.prio]??3);});
  const naechste=aktiv.length?null:(offene[0]||null);
  const alleGeschafft=!aktiv.length&&!neu.length&&!bl.length;
  let out='';
  out+=rKpiBlock(aP);

  if(aktiv.length){
    const a=aktiv[0];
    const s=elapsedSec(a),pct=Math.min(100,Math.round(s/((a.geplant||1)*3600)*100));
    out+='<div style="background:var(--text);border-radius:18px;padding:24px;margin-bottom:16px;color:#fff">';
    out+='<div style="font-size:10px;font-weight:700;opacity:.5;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px">🔥 Läuft gerade</div>';
    out+='<div style="font-size:20px;font-weight:700;margin-bottom:4px;line-height:1.3">'+a.titel+'</div>';
    const zN=getZielName(a);
    if(zN)out+='<div style="font-size:12px;opacity:.6;margin-bottom:16px">'+zN+'</div>';
    else out+='<div style="font-size:12px;opacity:.6;margin-bottom:16px">'+typInfo(a).label+'</div>';
    out+='<div data-tid="'+a.id+'" style="margin-bottom:16px">';
    out+='<div style="display:flex;align-items:baseline;gap:6px;margin-bottom:8px">';
    out+='<div class="tn" style="font-size:36px;color:#fff">'+fmt(s)+'</div>';
    out+='<div style="font-size:13px;opacity:.5">/ '+fmtH(a.geplant)+'</div></div>';
    out+='<div style="height:4px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden"><div class="tf" style="height:100%;background:#fff;width:'+pct+'%"></div></div></div>';
    if(a.ua&&a.ua.length){
      const uD=a.ua.filter(u=>u.d).length;
      out+='<div style="margin-bottom:16px;font-size:12px;opacity:.7">'+uD+'/'+a.ua.length+' Schritte erledigt</div>';
    }
    out+='<div style="display:flex;gap:10px">';
    out+='<button onclick="fertig(\''+a.id+'\')" style="flex:1;padding:13px;border-radius:12px;background:#fff;color:var(--text);border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">✓ Erledigt</button>';
    out+='<button onclick="pauseA(\''+a.id+'\')" style="padding:13px 16px;border-radius:12px;background:rgba(255,255,255,.15);color:#fff;border:none;font-family:inherit;font-size:14px;cursor:pointer">⏸</button>';
    out+='<button onclick="openDetail(\''+a.id+'\')" style="padding:13px 16px;border-radius:12px;background:rgba(255,255,255,.15);color:#fff;border:none;font-family:inherit;font-size:14px;cursor:pointer">···</button>';
    out+='</div>';
    out+='<div style="margin-top:12px;border-top:1px solid rgba(255,255,255,.15);padding-top:12px">';
    out+=stepsHtml(a,true);
    out+='</div></div>';
    if(aktiv.length>1){
      aktiv.slice(1).forEach(a2=>{
        out+='<div onclick="openDetail(\''+a2.id+'\')" style="background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px">';
        out+='<div class="dot" style="background:var(--blue)"></div>';
        out+='<div style="flex:1;font-size:13px;font-weight:500">'+a2.titel+'</div>';
        out+='<div data-tid="'+a2.id+'" style="font-family:monospace;font-size:12px;color:var(--t2)">'+fmt(elapsedSec(a2))+'</div>';
        out+='</div>';
      });
    }
  } else if(naechste){
    const zN=getZielName(naechste),tzN=getTZName(naechste);
    const editable=canChangePrio(naechste);
    const from=naechste.erstelltVon&&naechste.erstelltVon!==aP?person(naechste.erstelltVon):null;
    out+='<div style="background:var(--sf);border:1.5px solid var(--bd);border-radius:18px;padding:24px;margin-bottom:16px;">';
    out+='<div style="font-size:13px;font-weight:700;color:var(--text);letter-spacing:.01em;margin-bottom:12px">Fang hier an.</div>';
    out+='<div style="font-size:22px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.3;cursor:pointer" onclick="openDetail(\''+naechste.id+'\')">'+naechste.titel+'</div>';
    out+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">';
    if(naechste.prio)out+=prioTag(naechste.prio,naechste.id,editable);
    if(zN)out+='<span style="font-size:12px;color:var(--t2)">'+zN+'</span>';
    if(tzN)out+='<span style="font-size:12px;color:var(--purple)">'+tzN+'</span>';
    if(naechste.dl){const d=dli(naechste.dl);if(d)out+='<span style="font-size:11px;color:'+d.c+'">'+d.l+'</span>';}
    if(naechste.geplant)out+='<span style="font-size:11px;color:var(--t3)">'+fmtH(naechste.geplant)+'</span>';
    if(from)out+='<span style="font-size:10px;color:var(--t3)">von '+from.name+'</span>';
    out+='</div>';

    if(naechste.ua&&naechste.ua.length){
      out+='<div style="margin-bottom:14px;padding:10px 12px;background:var(--gray-bg);border-radius:10px">';
      naechste.ua.forEach((u,i)=>{
        out+='<div class="sr" onclick="toggleStep(\''+naechste.id+'\','+i+')" style="padding:5px 0">'
          +'<div class="sc'+(u.d?' dn':'')+'">'+( u.d?'<span style="color:#fff;font-size:8px">✓</span>':'')+  '</div>'
          +'<span class="sl'+(u.d?' dn':'')+'" style="font-size:12px">'+u.t+'</span>'
          +'</div>';
      });
      out+='</div>';
    }
    out+='<div style="display:flex;gap:6px;margin-bottom:16px">'

      +'<button onclick="addStep(\''+naechste.id+'\')" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--t2);cursor:pointer">+</button>'

    out+='<div style="display:flex;gap:10px">';
    out+='<button onclick="startenA(\''+naechste.id+'\')" style="flex:1;padding:14px;border-radius:12px;background:var(--text);color:#fff;border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer">▶ Starten</button>';
    out+='<button onclick="openDetail(\''+naechste.id+'\')" style="padding:14px 18px;border-radius:12px;background:var(--gray-bg);color:var(--t2);border:1px solid var(--bd);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer">···</button>';
    out+='</div></div>';
  } else if(alleGeschafft||!myA.length){
    out+='<div style="background:var(--green);border-radius:18px;padding:32px 24px;margin-bottom:16px;color:#fff;text-align:center">';
    out+='<div style="font-size:36px;margin-bottom:12px">🎉</div>';
    out+='<div style="font-size:20px;font-weight:700;margin-bottom:6px">Alles erledigt!</div>';
    out+='<div style="font-size:13px;opacity:.8;margin-bottom:20px">Keine offenen Aufgaben — gut gemacht.</div>';
    out+='<button onclick="openNeu()" style="padding:12px 24px;border-radius:12px;background:#fff;color:var(--green);border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">+ Neue Aufgabe</button>';
    out+='</div>';
  }

  if(neu.length){
    out+='<div style="background:var(--red-bg);border:1.5px solid var(--red-bd);border-radius:14px;padding:14px 16px;margin-bottom:12px">';
    out+='<div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:10px">⚡ '+neu.length+' neue Aufgabe'+(neu.length>1?'n':'')+' — Priorität setzen</div>';
    neu.forEach(a=>{
      const from=a.erstelltVon&&a.erstelltVon!==aP?person(a.erstelltVon):null;
      out+='<div style="background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:8px">';
      out+='<div style="font-size:13px;font-weight:600;margin-bottom:4px">'+a.titel+'</div>';
      if(from)out+='<div style="font-size:10px;color:var(--t3);margin-bottom:8px">von '+from.name+'</div>';
      out+='<div style="display:flex;gap:6px">';
      ['P1','P2','P3'].forEach(pr=>{
        const bg=pr==='P1'?'var(--red)':pr==='P2'?'#c2410c':'var(--t2)';

      });
      out+='<button onclick="openDetail(\''+a.id+'\')" style="padding:7px 10px;border-radius:8px;background:var(--gray-bg);color:var(--t2);border:1px solid var(--bd);font-family:inherit;font-size:12px;cursor:pointer">···</button>';

        +'</div>'
        +'<div style="display:flex;gap:6px;align-items:center">'
        +'<span style="font-size:10px;color:var(--t3)">oder:</span>'
        +'<button onclick="klassifiziereAlsIdee(\''+a.id+'\')" style="font-size:11px;padding:4px 11px;border-radius:8px;border:1px solid var(--blue-bd);background:var(--blue-bg);color:var(--blue);cursor:pointer;font-family:inherit">💡 Idee</button>'
        +'<button onclick="klassifiziereAlsRandom(\''+a.id+'\')" style="font-size:11px;padding:4px 11px;border-radius:8px;border:1px solid var(--bd);background:var(--gray-bg);color:var(--t2);cursor:pointer;font-family:inherit">🎲 Random</button>'
        +'</div></div>';
    });
    out+='</div>';
  }

  const weitere=bl.filter(a=>a.id!==naechste?.id);
  if(weitere.length){
    out+='<details style="margin-bottom:12px"><summary style="list-style:none;cursor:pointer;padding:12px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;display:flex;align-items:center;justify-content:space-between">';
    out+='<span style="font-size:13px;font-weight:600">Weitere Aufgaben</span>';
    out+='<span style="font-size:12px;color:var(--t3)">'+weitere.length+' · anzeigen</span></summary>';
    out+='<div style="margin-top:8px">';
    weitere.forEach(a=>{
      const zN=getZielName(a),editable=canChangePrio(a);
      out+='<div style="background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;margin-bottom:6px;cursor:pointer" onclick="openDetail(\''+a.id+'\')" onmouseenter="this.style.background=\'var(--gray-bg)\'" onmouseleave="this.style.background=\'var(--sf)\'">';
      out+='<div style="display:flex;align-items:center;gap:10px">';
      out+='<div style="flex:1"><div style="font-size:12px;font-weight:500">'+a.titel+'</div>';
      out+='<div style="display:flex;gap:5px;margin-top:3px;align-items:center" onclick="event.stopPropagation()">'+prioTag(a.prio,a.id,editable)+(zN?'<span style="font-size:10px;color:var(--t3)">'+zN+'</span>':'')+' '+dlTag(a.dl)+'</div></div>';
      out+='<button onclick="event.stopPropagation();startenA(\''+a.id+'\')" style="font-size:11px;padding:5px 10px;border-radius:8px;background:var(--text);color:#fff;border:none;font-family:inherit;cursor:pointer;flex-shrink:0">▶</button>';
      out+='</div></div>';
    });
    out+='</div></details>';
  }

  if(erl.length){
    out+='<details style="margin-bottom:12px"><summary style="list-style:none;cursor:pointer;padding:12px 16px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:12px;display:flex;align-items:center;justify-content:space-between">';

    out+='<span style="font-size:12px;color:var(--green);opacity:.7">'+erl.length+' Aufgabe'+(erl.length>1?'n':'')+'</span></summary>';

      out+='<div onclick="openDetail(\''+a.id+'\')" style="background:var(--green-bg);border:1px solid var(--green-bd);border-radius:10px;padding:9px 14px;margin-bottom:5px;display:flex;align-items:center;gap:8px;cursor:pointer">'
        +'<span style="flex:1;font-size:12px;text-decoration:line-through;color:var(--t2)">'+a.titel+'</span>'
        +(a.gebucht?'<span style="font-size:11px;color:var(--green);font-weight:600">'+fmt(a.gebucht*3600)+'</span>':'')
        +'</div>';
    });
    out+='</div></details>';
  }

  out+=rDelegBlock(aP);
  out+=rSignalBlock(aP);

  document.getElementById('main').innerHTML=out;
  startTimers();
}

async function setPrio(id,pr){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.prio=pr;a.status='backlog';
  await dbPatch('aufgaben',id,{prio:pr,status:'backlog'});render();
}
async function startenA(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.status='aktiv';a.aktSeit=Date.now();
  await dbPatch('aufgaben',id,{status:'aktiv',akt_seit:new Date().toISOString()});render();
}
async function pauseA(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a.status!=='aktiv')return;
  const gebucht=Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100;
  a.gebucht=gebucht;a.aktSeit=null;a.status='backlog';
  await dbPatch('aufgaben',id,{gebucht,akt_seit:null,status:'backlog'});render();
}
async function fertig(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  const gebucht=a.status==='aktiv'?Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100:a.gebucht;
  const pid=a.pid;
  a.gebucht=gebucht;a.aktSeit=null;a.status='erledigt';a.updated_at=new Date().toISOString();
  await dbPatch('aufgaben',id,{gebucht,akt_seit:null,status:'erledigt',updated_at:new Date().toISOString()});
  showPaddelCelebration(pid);
  checkP1Done(pid);
  render();
}
async function toggleStep(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.ua[i].d=!a.ua[i].d;
  if(a.ua.every(u=>u.d)&&a.ua.length){a.status='erledigt';a.aktSeit=null;showPaddelCelebration(a.pid);checkP1Done(a.pid);}
  await dbPatch('aufgaben',id,{ua:a.ua,status:a.status,akt_seit:null});render();
}
async function addStep(id){
  const inp=document.getElementById('si-'+id);if(!inp)return;
  const t=inp.value.trim();if(!t)return;
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.ua.push({t,d:false});inp.value='';
  await dbPatch('aufgaben',id,{ua:a.ua});render();
}
async function delStep(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.ua.splice(i,1);
  await dbPatch('aufgaben',id,{ua:a.ua});render();
}

async function saveDetailField(id,field,val){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  if(field==='titel'){if(!val||!val.trim())return;a.titel=val.trim();}
  else if(field==='notiz'){a.notiz=val.trim()||null;}
  else if(field==='dl'){a.dl=val||null;}
  else if(field==='geplant'){a.geplant=val;}
  else if(field==='ziel_id'){a.zielId=val||null;a.teilzielId=null;}
  else if(field==='vertraulich'){a.vertraulich=val;}
  const patch={[field]:field==='titel'?a.titel:field==='notiz'?a.notiz:field==='dl'?a.dl:field==='geplant'?a.geplant:field==='vertraulich'?val:val||null};
  if(field==='ziel_id')patch.teilziel_id=null;
  await dbPatch('aufgaben',id,patch);
  render();
}
async function setStatusModal(id,st){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  let patch={status:st};
  if(st==='aktiv')patch.akt_seit=new Date().toISOString();
  else if(a.status==='aktiv'){patch.gebucht=Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100;patch.akt_seit=null;}
  Object.assign(a,{status:st,aktSeit:st==='aktiv'?Date.now():null,...(patch.gebucht!==undefined?{gebucht:patch.gebucht}:{})});
  if(st==='erledigt')checkP1Done(a.pid);
  await dbPatch('aufgaben',id,patch);openDetail(id);render();
}
async function setTeilziel(id,tzid){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.teilzielId=tzid||null;
  await dbPatch('aufgaben',id,{teilziel_id:tzid||null});
}
async function delAufgabe(id){
  if(!confirm('Aufgabe löschen?'))return;
  S.aufgaben=S.aufgaben.filter(x=>x.id!==id);
  await dbDelete('aufgaben',id);cm();render();
}

      +'<div style="font-size:13px;font-weight:600;margin-bottom:8px">'+parsed.titel+'</div>'
      +'<div style="display:flex;gap:5px;flex-wrap:wrap">'

  }catch(e){out.innerHTML='<div class="ai-result" style="background:var(--red-bg);border-color:var(--red-bd)">Fehler: '+e.message+'</div>';}
}

async function saveTeam(tid){
  const name=document.getElementById('tn').value.trim();if(!name)return;
  const checked=[...document.querySelectorAll('#mb input[type=checkbox]:checked')].map(c=>c.value);
  if(tid){
    const t=S.teams.find(x=>x.id===tid);if(!t)return;
    const old=[...t.members];t.name=name;t.members=checked;
    S.personen.forEach(p=>{
      const was=old.includes(p.id),is=checked.includes(p.id);
      if(was&&!is)p.teams=(p.teams||[]).filter(x=>x!==tid);
      if(!was&&is){p.teams=p.teams||[];if(!p.teams.includes(tid))p.teams.push(tid);}
    });
    await dbPatch('teams',tid,{name,members:checked});
  } else {
    const id=nid('t'),rec={id,name,members:checked};
    S.teams.push(rec);await dbInsert('teams',rec);
    checked.forEach(pid=>{const p=person(pid);if(p&&!(p.teams||[]).includes(id)){p.teams=p.teams||[];p.teams.push(id);}});
  }
  await Promise.all(S.personen.map(p=>dbPatch('personen',p.id,{teams:p.teams})));
  openSettings();render();
}

function startTimers(){
  if(timIv)clearInterval(timIv);
  timIv=setInterval(()=>{
    document.querySelectorAll('[data-tid]').forEach(el=>{
      const a=S.aufgaben.find(x=>x.id===el.dataset.tid);if(!a)return;
      const s=elapsedSec(a),pct=Math.min(100,Math.round(s/((a.geplant||1)*3600)*100));
      const n=el.querySelector('.tn'),f=el.querySelector('.tf');
      if(n)n.textContent=fmt(s);if(f)f.style.width=pct+'%';
    });
    const now=new Date();
    const clock=document.getElementById('live-clock');
    if(clock)clock.textContent=('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
    if(aP){
      const p=me();if(p){
        const fs=p.fokus_start||'09:00',fe=p.fokus_end||'11:00';
        const [fsh,fsm]=fs.split(':').map(Number),[feh,fem]=fe.split(':').map(Number);
        const nowMin=now.getHours()*60+now.getMinutes();
        const inFokus=nowMin>=fsh*60+fsm&&nowMin<feh*60+fem;
        const banner=document.getElementById('fokus-banner'),label=document.getElementById('fokus-label');
        if(banner&&label){banner.style.display=inFokus?'flex':'none';if(inFokus)label.textContent='Fokuszeit bis '+fe+' — bitte nicht stören';}
      }
    }
  },1000);
}

// Block anhängen. ok=true → +1; bei KPI-Kopplung wird kpi_val++ geschrieben.
async function winPushBlock({ok,label,hits,manuell}){
  const w=winHeute(aP); if(!w){toast('Kein WIN für heute');return;}
  // Bonus-Markierung: wenn WIN bereits erreicht, ist der neue Block "Bonus" (Kür, nicht Pflicht).
  // Daten dürfen nicht lügen — Bonus wird klar separiert in Logbuch und Auswertung.
  const wasErreicht=winErreicht(w);
  const block={ts:new Date().toISOString(), ok:!!ok, label:label||'', hits:hits||[]};
  if(manuell)block.manuell=true;
  if(wasErreicht&&ok)block.bonus=true;
  w.blocks=w.blocks||[]; w.blocks.push(block);
  // KPI-Hit: bei Kopplung jeder ok-Block schreibt +1 in den KPI (oder bei mehreren hits: +hits.length)
  if(ok&&w.einheit==='kpi'&&w.kpiId){
    const inc=Math.max(1,(hits||[]).length||1);
    try{
      const cur=getKpiTodayVal(w.kpiId,w.pid)??(()=>{const e=S.kpiVals[w.pid+'-'+w.kpiId];return (e&&e.datum===TODAY)?e.val:0;})();
      await _saveKpi(w.kpiId,w.pid,(cur||0)+inc);
    }catch(e){console.error('winKpiWrite',e);}
  }
  // Erreicht-Markierung
  if(!w.erreichtAt&&winErreicht(w)){
    w.erreichtAt=new Date().toISOString();
    setTimeout(()=>{try{toast('✓ WIN erreicht.');}catch(_){}},250);
  }
  try{render();}catch(_){}
  try{await dbPatch('win_tage',w.id,{blocks:w.blocks,erreicht_at:w.erreichtAt});}catch(e){console.error('winPushBlock',e);}
}

// Sammel-Tick: N produktive Blöcke rückwirkend (Flow-Auftauchen)
async function winSammelTick(count,label){
  const w=winHeute(aP); if(!w||count<=0)return;
  const ts=new Date().toISOString();
  for(let i=0;i<count;i++){
    w.blocks.push({ts,ok:true,label:i===0?(label||'Flow'):'',hits:[]});

    }catch(e){console.error('winSammelKpi',e);}

  try{render();}catch(_){}

// Undo: letzten Block entfernen (wenn Versehen).
async function winUndoLastBlock(){
  const w=winHeute(aP); if(!w||!w.blocks.length)return;
  const last=w.blocks.pop();
  // KPI rückgängig
  if(last.ok&&w.einheit==='kpi'&&w.kpiId){
    try{
      const cur=getKpiTodayVal(w.kpiId,w.pid)??(()=>{const e=S.kpiVals[w.pid+'-'+w.kpiId];return (e&&e.datum===TODAY)?e.val:0;})();
      const dec=Math.max(1,(last.hits||[]).length||1);
      await _saveKpi(w.kpiId,w.pid,Math.max(0,(cur||0)-dec));
    }catch(e){}
  }
  // Aufgaben-Hits rückgängig (status zurück auf neu)
  if(last.hits&&last.hits.length){
    for(const h of last.hits){
      const a=S.aufgaben.find(x=>x.id===h.tid);
      if(a&&a.status==='erledigt'){
        a.status='neu';
        try{await dbPatch('aufgaben',a.id,{status:'neu'});}catch(_){}
      }
    }
  }
  if(w.erreichtAt&&!winErreicht(w))w.erreichtAt=null;
  try{render();}catch(_){}
  try{await dbPatch('win_tage',w.id,{blocks:w.blocks,erreicht_at:w.erreichtAt});}catch(_){}
  toast('Block zurückgenommen');
}

// ── Block-Aufteilung pro Aufgabe (Stufe 2) ──────────────────────────
// 1 Block = 25 min Heartbeat. Geplante Stunden → ceil(min/25) Blöcke.
// Verbrauchte Blöcke = floor(gebucht*60 / 25). "○" = offen, "●" = verbraucht.
function taskPlannedBlocks(a){
  if(!a||!a.geplant)return 0;
  return Math.max(1, Math.ceil(a.geplant*60/WIN_BLOCK_MIN));
}
function taskConsumedBlocks(a){
  if(!a)return 0;
  // gebucht ist in Stunden; bei aktiver Task elapsed dazu
  let h=a.gebucht||0;
  if(a.status==='aktiv'&&a.aktSeit)h+=(Date.now()-a.aktSeit)/3600000;
  return Math.floor(h*60/WIN_BLOCK_MIN);
}
function taskBlocksDots(a){
  const p=taskPlannedBlocks(a); if(!p)return '';
  const c=Math.min(taskConsumedBlocks(a),p);
  let s=''; for(let i=0;i<p;i++)s+=(i<c?'●':'○');
  return s;
}

  });
  out+='</div></details>';

}

function kapTier(ratio){
  if(ratio<0.5) return{label:'Luft nach oben',short:'Luft',color:'var(--blue)',bar:'var(--blue)',bg:'var(--blue-bg)',bd:'var(--blue-bd)'};
  if(ratio<=1.1) return{label:'Stretch ↑',short:'Stretch',color:'var(--amber)',bar:'var(--amber)',bg:'var(--amber-bg)',bd:'var(--amber-bd)'};
  return{label:'Sehr ambitioniert',short:'Voll',color:'var(--t2)',bar:'#9ca3af',bg:'var(--gray-bg)',bd:'var(--bd)'};
}
function getKapazitaet(pid){
  const p=person(pid);if(!p)return null;
  const sw=p.stunden_woche||40;
  let fh=0;
  if(p.fokus_start&&p.fokus_end){
    const [sh,sm]=p.fokus_start.split(':').map(Number);
    const [eh,em]=p.fokus_end.split(':').map(Number);
    fh=Math.max(0,((eh*60+em)-(sh*60+sm))/60)*5;
  }
  const rh=Math.max(0,sw-fh);
  const now=new Date();
  const daysToSun=now.getDay()===0?0:7-now.getDay();
  const weekEndStr=localDate(new Date(now.getFullYear(),now.getMonth(),now.getDate()+daysToSun));
  let p1h=0,p23h=0,rnd=0;
  S.aufgaben.forEach(a=>{
    if(a.pid!==pid||a.status==='erledigt'||a.status==='idee')return;
    if(a.typ==='random'){rnd++;return;}
    const thisWeek=a.status==='aktiv'||(a.dl&&a.dl<=weekEndStr);
    if(!thisWeek)return;
    const h=a.geplant||1;
    if(a.prio==='P1')p1h+=h;
    else if(a.prio==='P2'||a.prio==='P3')p23h+=h;
  });
  return{fh,rh,p1h,p23h,rnd,sw};
}
// ─── Tages-Spange (v172.1) — horizontaler Zeit-Strip ─────────────────
const _SPANGE_WEEKDAY=['so','mo','di','mi','do','fr','sa'];
let _spangeTickIv=null;
function _hhmmToMin(t){if(!t||!/^\d{2}:\d{2}$/.test(t))return null;const[h,m]=t.split(':').map(Number);return h*60+m;}
function _minToHHMM(m){const h=Math.floor(m/60),mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');}
function spangeHeutFenster(pid,dateStr){
  // gibt {von, bis, mittag, abwesend, grund, frei} zurück
  dateStr=dateStr||TODAY;
  const az=_azGet(pid);
  const abw=_abwGet(pid);
  // Abwesenheit prüfen
  for(const a of abw){
    if(a.von<=dateStr && dateStr<=a.bis)return{abwesend:true,grund:a.grund||'Abwesend'};
  }
  const d=new Date(dateStr+'T12:00:00');
  const wdKey=_SPANGE_WEEKDAY[d.getDay()];
  const cfg=az[wdKey];
  if(!cfg)return{frei:true};
  return{von:cfg.von,bis:cfg.bis,mittag:cfg.mittag};
}
let _spangeDate=null; // null = TODAY, sonst 'YYYY-MM-DD'
function _spangeGetDate(){return _spangeDate||TODAY;}
function spangeNavDay(delta){
  const cur=_spangeGetDate();
  const d=new Date(cur+'T12:00:00');
  d.setDate(d.getDate()+delta);
  const nd=localDate(d);
  _spangeDate=(nd===TODAY)?null:nd;
  if(typeof render==='function')render();
}
function spangeToToday(){_spangeDate=null;if(typeof render==='function')render();}
function _spangeCollapsed(){return localStorage.getItem('spange_collapsed')!=='0';} // default: collapsed
function spangeToggleCollapsed(){
  const cur=_spangeCollapsed();
  localStorage.setItem('spange_collapsed',cur?'0':'1');
  if(typeof rTag==='function')rTag();
}
function spangeTick(){
  try{
    const el=document.querySelector('.spange-now');
    if(!el)return;
    const pid=typeof aP!=='undefined'?aP:null;
    if(!pid)return;
    const fenster=spangeHeutFenster(pid);
    if(!fenster||fenster.abwesend||fenster.frei)return;
    const workVon=_hhmmToMin(fenster.von),workBis=_hhmmToMin(fenster.bis);
    if(workVon==null||workBis==null||workBis<=workVon)return;
    const vonMin=Math.max(0,workVon-120),bisMin=Math.min(1440,workBis+120);
    const now=new Date();
    if(localDate(now)!==TODAY){el.style.display='none';return;}
    const nowMin=now.getHours()*60+now.getMinutes();
    if(nowMin<vonMin||nowMin>bisMin){el.style.display='none';return;}
    el.style.display='';
    el.style.left=(((nowMin-vonMin)/(bisMin-vonMin))*100).toFixed(2)+'%';
  }catch(e){console.warn('spangeTick',e);}
}
function spangeStartTick(){
  if(_spangeTickIv)clearInterval(_spangeTickIv);
  _spangeTickIv=setInterval(spangeTick,60000);
}
// Tag-Order: manuelle Reihenfolge der offenen Aufgaben für heute (per pid, per date)
function _tagOrderKey(pid){return 'tag_order_'+pid+'_'+TODAY;}
function _tagOrderGet(pid){try{return JSON.parse(localStorage.getItem(_tagOrderKey(pid))||'[]');}catch(e){return [];}}
function _tagOrderSet(pid,arr){localStorage.setItem(_tagOrderKey(pid),JSON.stringify(arr));}
function spangeApplyTagOrder(pid,list){
  // sortiert [list] so: erst alle IDs aus tag_order in deren Reihenfolge, dann Rest nach prio
  const order=_tagOrderGet(pid);
  const idx=new Map(order.map((id,i)=>[String(id),i]));
  const po={'P1':0,'P2':1,'P3':2};
  return [...list].sort((a,b)=>{
    const ia=idx.has(String(a.id))?idx.get(String(a.id)):Infinity;
    const ib=idx.has(String(b.id))?idx.get(String(b.id)):Infinity;
    if(ia!==ib)return ia-ib;
    return(po[a.prio]??3)-(po[b.prio]??3);
  });
}
function spangeReorderChip(pid,srcId,dstId,before){
  // verschiebt srcId vor/nach dstId
  const mineToday=(S.aufgaben||[]).filter(a=>
    String(a.pid)===String(pid)&&
    !['erledigt','zurueckgegeben','archiviert','backlog'].includes(a.status)
  );
  const sorted=spangeApplyTagOrder(pid,mineToday);
  const ids=sorted.map(a=>String(a.id));
  const src=String(srcId),dst=String(dstId);
  const sIdx=ids.indexOf(src);if(sIdx<0)return;
  ids.splice(sIdx,1);
  let dIdx=ids.indexOf(dst);
  if(dIdx<0)dIdx=ids.length;
  ids.splice(before?dIdx:dIdx+1,0,src);
  _tagOrderSet(pid,ids);
  if(typeof rTag==='function')render();
}

function _fmtDayShort(dateStr){

// ── Drag-Reorder (Agenda-Chips) ──────────────────────────────
function spangeDragStart(e){
  try{
    const t=e.currentTarget;
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',t.dataset.tid);
    t.classList.add('dragging');
    window._spangeDragSrc=t.dataset.tid;
  }catch(err){console.warn('spangeDragStart',err);}
}
function spangeDragEnd(e){
  try{
    e.currentTarget.classList.remove('dragging');
    document.querySelectorAll('.spange-chip.drag-over').forEach(el=>el.classList.remove('drag-over'));
    window._spangeDragSrc=null;
  }catch(err){console.warn('spangeDragEnd',err);}
}
function spangeDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const t=e.currentTarget;
  if(t.dataset.tid===window._spangeDragSrc)return;
  t.classList.add('drag-over');
}
function spangeDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function spangeDrop(e){
  try{
    e.preventDefault();
    e.stopPropagation();
    const t=e.currentTarget;
    t.classList.remove('drag-over');
    const src=window._spangeDragSrc||e.dataTransfer.getData('text/plain');
    const dst=t.dataset.tid;
    if(!src||!dst||src===dst)return;
    const pid=t.dataset.pid;
    // Drop-Seite bestimmen: vor Mitte = before, nach Mitte = after
    const rect=t.getBoundingClientRect();
    const before=(e.clientX-rect.left)<(rect.width/2);
    spangeReorderChip(pid,src,dst,before);
  }catch(err){console.warn('spangeDrop',err);}
}

// ─── Arbeitszeiten & Abwesenheiten (per-device, localStorage) ───────
// Gespeichert analog zu anderen Per-User-Settings (Fokus, Inbox, …)
const _AZ_DEFAULT={
  mo:{von:'09:00',bis:'17:00',mittag:{von:'12:30',bis:'13:00'}},
  di:{von:'09:00',bis:'17:00',mittag:{von:'12:30',bis:'13:00'}},
  mi:{von:'09:00',bis:'17:00',mittag:{von:'12:30',bis:'13:00'}},
  do:{von:'09:00',bis:'17:00',mittag:{von:'12:30',bis:'13:00'}},
  fr:{von:'09:00',bis:'14:00',mittag:null},
  sa:null,so:null
};
function _azGet(pid){
  try{
    const raw=localStorage.getItem('arbeitszeiten_'+pid);
    if(!raw)return JSON.parse(JSON.stringify(_AZ_DEFAULT));
    const parsed=JSON.parse(raw);
    // shallow merge mit default, damit fehlende Keys nicht crashen
    return {..._AZ_DEFAULT,...parsed};
  }catch(e){console.error('_azGet',e);return JSON.parse(JSON.stringify(_AZ_DEFAULT));}
}
function _azSet(pid,obj){
  try{localStorage.setItem('arbeitszeiten_'+pid,JSON.stringify(obj));}
  catch(e){console.error('_azSet',e);toast('⚠ Arbeitszeiten speichern fehlgeschlagen');}
}
function _abwGet(pid){
  try{const raw=localStorage.getItem('abwesenheiten_'+pid);return raw?JSON.parse(raw):[];}
  catch(e){console.error('_abwGet',e);return[];}
}
function _abwSet(pid,arr){
  try{localStorage.setItem('abwesenheiten_'+pid,JSON.stringify(arr));}
  catch(e){console.error('_abwSet',e);toast('⚠ Abwesenheiten speichern fehlgeschlagen');}
}
function _azValidate(t){
  // erwartet HH:MM
  return /^\d{2}:\d{2}$/.test(t);
}
function azSaveTag(pid,tag){
  try{
    const az=_azGet(pid);
    const vEl=document.getElementById('az-'+tag+'-v');
    const bEl=document.getElementById('az-'+tag+'-b');
    const mvEl=document.getElementById('az-'+tag+'-mv');
    const mbEl=document.getElementById('az-'+tag+'-mb');
    if(!vEl||!bEl)return;
    const v=vEl.value,b=bEl.value;
    if(!_azValidate(v)||!_azValidate(b)||v>=b){toast('⚠ Ungültige Arbeitszeit für '+tag.toUpperCase());return;}
    let mittag=null;
    if(mvEl&&mbEl&&mvEl.value&&mbEl.value){
      if(!_azValidate(mvEl.value)||!_azValidate(mbEl.value)||mvEl.value>=mbEl.value||mvEl.value<v||mbEl.value>b){
        toast('⚠ Mittag muss innerhalb der Arbeitszeit liegen');return;
      }
      mittag={von:mvEl.value,bis:mbEl.value};
    }
    az[tag]={von:v,bis:b,mittag};
    _azSet(pid,az);
  }catch(e){console.error('azSaveTag',e);toast('⚠ Speichern fehlgeschlagen');}
}
function azToggleFrei(pid,tag,checked){
  try{
    const az=_azGet(pid);
    if(checked){az[tag]=null;}
    else{az[tag]=JSON.parse(JSON.stringify(_AZ_DEFAULT[tag]||_AZ_DEFAULT.mo));}
    _azSet(pid,az);
    openMeinProfil(); // rerender
  }catch(e){console.error('azToggleFrei',e);}
}
function azAddAbw(pid){
  try{
    const vEl=document.getElementById('abw-new-von');
    const bEl=document.getElementById('abw-new-bis');
    const gEl=document.getElementById('abw-new-grund');
    if(!vEl||!bEl)return;
    const v=vEl.value,b=bEl.value,g=(gEl?.value||'').trim();
    if(!v||!b){toast('⚠ Bitte Datum von und bis eintragen');return;}
    if(v>b){toast('⚠ Von-Datum muss vor Bis-Datum liegen');return;}
    const arr=_abwGet(pid);
    arr.push({von:v,bis:b,grund:g});
    arr.sort((a,b)=>a.von.localeCompare(b.von));
    _abwSet(pid,arr);
    openMeinProfil();
  }catch(e){console.error('azAddAbw',e);toast('⚠ Hinzufügen fehlgeschlagen');}
}
function azDelAbw(pid,idx){
  try{
    const arr=_abwGet(pid);
    arr.splice(idx,1);
    _abwSet(pid,arr);
    openMeinProfil();
  }catch(e){console.error('azDelAbw',e);}
}

function rKapazitaetBlock(pid){
  const k=getKapazitaet(pid);if(!k||!k.fh)return'';
  const fPct=Math.min(k.p1h/k.fh,1.4)*100/1.4;
  const rPct=k.rh>0?Math.min(k.p23h/k.rh,1.4)*100/1.4:0;
  const ft=kapTier(k.fh>0?k.p1h/k.fh:0);
  const rt=kapTier(k.rh>0?k.p23h/k.rh:0);

  // Tages-Verteilung: Stunden pro Wochentag Mo–Fr
  const TAGE=['Mo','Di','Mi','Do','Fr'];
  const now=new Date();
  // Montag dieser Woche
  const dow=now.getDay()||7; // 1=Mo…7=So
  const monTag=new Date(now.getFullYear(),now.getMonth(),now.getDate()-(dow-1));
  // p1 und p23 Stunden pro Tag (index 0=Mo … 4=Fr)
  const p1Days=[0,0,0,0,0],p23Days=[0,0,0,0,0];
  S.aufgaben.forEach(a=>{
    if(a.pid!==pid||a.status==='erledigt'||a.status==='idee'||a.typ==='random')return;
    if(!a.dl)return;
    const d=new Date(a.dl+'T12:00:00');
    const diff=Math.round((d-monTag)/(86400000));
    if(diff<0||diff>4)return;
    const h=a.geplant||1;
    if(a.prio==='P1')p1Days[diff]+=h;
    else p23Days[diff]+=h;
  });
  const todayIdx=Math.min(Math.max(dow-1,0),4);
  // Meeting-Stunden heute aus GCal (nur externe Events, nicht unsere eigenen P1-Einträge)
  let meetH=0;
  (S.kalender||[]).forEach(ev=>{
    if(!ev.start||!ev.end)return;
    if(localDate(ev.start)!==TODAY)return; // nur heute (seit 7-Tage-Scope)
    if(ev.titel&&ev.titel.startsWith('⚡ P1'))return; // eigene Power Activities überspringen
    meetH+=Math.max(0,(ev.end.getTime()-ev.start.getTime())/3600000);
  });
  meetH=Math.round(meetH*10)/10;
  const maxH=Math.max(...p1Days.map((h,i)=>h+p23Days[i]),...(meetH?[meetH]:[]),k.fh/5||4,1);

  // Tages-Bars rendern — horizontal, links→rechts wie die anderen Bars
  let dagBar='<div style="display:flex;flex-direction:column;gap:3px;margin-top:8px">';
  TAGE.forEach((tag,i)=>{
    const p1h=p1Days[i],p23h=p23Days[i];
    const mh=i===todayIdx?meetH:0;
    const tot=p1h+p23h+mh;
    const isToday=i===todayIdx;
    const isPast=i<todayIdx;
    const p1Pct=Math.min(p1h/maxH,1)*100;
    const p23Pct=Math.min(p23h/maxH,1)*100;
    const mPct=Math.min(mh/maxH,1)*100;
    const alpha=isPast?'0.35':'1';
    dagBar+='<div style="display:flex;align-items:center;gap:6px;opacity:'+alpha+'">';
    // Tag-Label links
    dagBar+='<div style="font-size:9px;font-weight:'+(isToday?'700':'400')+';color:'+(isToday?'var(--text)':'var(--t3)')+';width:18px;text-align:right;flex-shrink:0">'+tag+'</div>';
    // Horizontaler Bar
    dagBar+='<div style="flex:1;height:10px;background:var(--bd);border-radius:3px;overflow:hidden;display:flex">';
    if(tot>0){
      if(mPct>0)dagBar+='<div style="width:'+mPct+'%;height:100%;background:var(--t3)"></div>';
      dagBar+='<div style="width:'+p1Pct+'%;height:100%;background:var(--red)"></div>';
      dagBar+='<div style="width:'+p23Pct+'%;height:100%;background:var(--blue)"></div>';
    }
    dagBar+='</div>';
    // Stunden-Label rechts
    dagBar+='<div style="font-size:9px;color:'+(tot>0?(isPast?'var(--t3)':'var(--t2)'):'var(--t3)')+';font-weight:'+(tot>0?'600':'400')+';width:24px;text-align:right;flex-shrink:0">'+(tot>0?tot.toFixed(tot%1?1:0)+'h':'·')+'</div>';
    dagBar+='</div>';
  });
  dagBar+='</div>';

  let out='<div style="background:var(--gray-bg);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:12px">';
  out+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:10px">Kapazität diese Woche</div>';
  // P1
  out+='<div style="margin-bottom:8px">';
  out+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
  out+='<div style="font-size:11px;font-weight:600;color:var(--t2);display:flex;gap:5px;align-items:center">Fokuszeit <span style="font-size:10px;padding:1px 6px;border-radius:99px;background:var(--red-bg);color:var(--red);font-weight:700">P1</span></div>';
  out+='<div style="font-size:11px;color:'+ft.color+'"><span style="font-weight:700">'+k.p1h.toFixed(1)+'h</span> / '+k.fh+'h · <span style="font-weight:600">'+ft.label+'</span></div></div>';
  out+='<div style="height:7px;background:var(--red-bg);border-radius:99px;overflow:hidden"><div style="height:100%;border-radius:99px;background:var(--red);width:'+fPct+'%;transition:width .4s"></div></div>';
  out+='</div>';
  // P2/P3
  out+='<div style="margin-bottom:6px">';
  out+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
  out+='<div style="font-size:11px;font-weight:600;color:var(--t2);display:flex;gap:5px;align-items:center">Restzeit <span style="font-size:10px;padding:1px 6px;border-radius:99px;background:var(--blue-bg);color:var(--blue);font-weight:700">P2</span><span style="font-size:10px;padding:1px 6px;border-radius:99px;background:var(--sf);color:var(--t2);border:1px solid var(--bd);font-weight:600">P3</span></div>';

  out+='<div style="height:7px;background:var(--blue-bg);border-radius:99px;overflow:hidden"><div style="height:100%;border-radius:99px;background:var(--blue);width:'+rPct+'%;transition:width .4s"></div></div>';

  // Tages-Verteilung
  out+=dagBar;
  // Legende
  out+='<div style="display:flex;gap:10px;margin-top:6px">';
  out+='<div style="display:flex;gap:4px;align-items:center"><div style="width:8px;height:8px;border-radius:2px;background:var(--red)"></div><span style="font-size:9px;color:var(--t3)">P1</span></div>';
  out+='<div style="display:flex;gap:4px;align-items:center"><div style="width:8px;height:8px;border-radius:2px;background:var(--blue)"></div><span style="font-size:9px;color:var(--t3)">P2/P3</span></div>';
  if(meetH>0)out+='<div style="display:flex;gap:4px;align-items:center"><div style="width:8px;height:8px;border-radius:2px;background:var(--t3)"></div><span style="font-size:9px;color:var(--t3)">Meetings '+meetH.toFixed(1)+'h</span></div>';
  out+='</div>';
  // Schätzgenauigkeit: erledigte Aufgaben diese Woche — geplant vs. gebucht
  {
    const monTagStr=localDate(new Date(now.getFullYear(),now.getMonth(),now.getDate()-(dow-1)));
    const erlDieseWoche=S.aufgaben.filter(a=>
      a.pid===pid&&a.status==='erledigt'&&a.updated_at&&
      localDate(new Date(a.updated_at))>=monTagStr&&
      (a.geplant||a.gebucht)
    );
    if(erlDieseWoche.length>=2){
      const totGeplant=erlDieseWoche.reduce((s,a)=>s+(a.geplant||0),0);
      const totGebucht=erlDieseWoche.reduce((s,a)=>s+(a.gebucht||a.geplant||0),0);
      if(totGeplant>0&&totGebucht>0){
        const diff=totGebucht-totGeplant;
        const pctOff=Math.round(Math.abs(diff)/totGeplant*100);
        const sign=diff>0?'+':diff<0?'–':'';
        const col=pctOff<=10?'var(--green)':pctOff<=25?'var(--orange)':'var(--red)';

        out+='<div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;margin-top:6px;border-top:1px solid var(--bd)">';
        out+='<div style="font-size:11px;color:var(--t3)">Schätzgenauigkeit <span style="color:var(--t2)">('+erlDieseWoche.length+' Tasks)</span></div>';
        out+='<div style="font-size:11px;font-weight:700;color:'+col+'">'+(pctOff<=10?'✓ Triff genau':sign+pctOff+'% '+(diff>0?'zu lang':'zu kurz'))+'</div>';
        out+='</div>';
        // Mini-Balken: geplant vs gebucht

function wrItemName(wr,n){
  // Wochenziel-Text (big3_N) ist primär. Nur wenn leer: Fallback auf Monatsziel-Name.
  let txt=wr['big3_'+n];
  // Defensiv: alte Bug-Daten wo Objekt statt String gespeichert wurde → Titel extrahieren
  if(typeof txt==='string'&&txt.trim().startsWith('{')){
    try{const p=JSON.parse(txt);if(p&&typeof p.titel==='string')txt=p.titel;}catch(_){}
  } else if(txt&&typeof txt==='object'&&typeof txt.titel==='string'){
    txt=txt.titel;
  }
  if(txt&&String(txt).trim())return String(txt);
  const tzId=wr['big3_'+n+'_tz_id'];
  if(tzId){const tz=S.ziele.flatMap(z=>z.teilziele||[]).find(t=>t.id===tzId);if(tz)return tz.name;}
  return null;
}
// Brian Johnson "Heroic" Score: Commitment-Integrität messbar machen
// 1 Pt pro Big-3 · +2 Bonus bei Perfect Week (3/3) · Streak zählt aufeinanderfolgende Perfect Weeks
function getWochenScore(wr){
  if(!wr)return{done:0,total:0,perfect:false,points:0};
  let done=0,total=0;
  [1,2,3].forEach(n=>{
    const txt=wrItemName(wr,n);if(!txt)return;
    total++;if(wr['big3_'+n+'_done'])done++;
  });
  // Perfect = alle committeten erledigt (egal ob 1, 2 oder 3 Big 3)
  const perfect=total>0&&done===total;
  const points=done+(perfect?2:0);
  return{done,total,perfect,points};
}
function getPerfectStreak(pid){
  // Zähle Perfect Weeks rückwärts ab aktueller Woche (oder letzter abgeschlossener Woche)
  const {kw,jahr}=getKW();
  let streak=0,curKw=kw,curJahr=jahr;
  for(let i=0;i<52;i++){
    const r=(S.wochenresets||[]).find(r=>String(r.pid)===String(pid)&&r.kw===curKw&&r.jahr===curJahr);
    if(!r)break;
    const s=getWochenScore(r);
    if(!s.perfect)break;
    streak++;
    curKw--;if(curKw<1){curKw=52;curJahr--;}
  }
  return streak;
}
// Momentum-Score: 50er-Floor-Formel (Brian-Johnson-inspiriert)
// score = 50 + (done - missed_big3) / 12 × 50
// → Neutral startet bei 50, 4 Perfect Weeks in Folge = 100, 4 verfehlte Wochen = 0
// Verfehlte Wochen (ohne wochenreset) zählen als 3 missed, aber erst ab erstem Commitment.
function getMomentumScore(pid){
  const {kw,jahr}=getKW();
  const eigeneWr=(S.wochenresets||[]).filter(r=>String(r.pid)===String(pid));
  if(!eigeneWr.length)return{score:null,weeks:0,done:0,missedBig3:0,missedWeeks:0};
  const wkNum=(k,j)=>j*53+k;
  const firstWk=Math.min(...eigeneWr.map(r=>wkNum(r.kw,r.jahr)));
  let done=0,weeks=0,missedBig3=0,missedWeeks=0,committedBig3=0;
  let curKw=kw,curJahr=jahr;
  for(let i=0;i<4;i++){
    if(wkNum(curKw,curJahr)<firstWk)break;
    const r=eigeneWr.find(r=>r.kw===curKw&&r.jahr===curJahr);
    if(r){
      const s=getWochenScore(r);
      if(s.total>0){done+=s.done;committedBig3+=s.total;missedBig3+=(s.total-s.done);weeks++;}
    } else {
      missedWeeks++;missedBig3+=3;
    }
    curKw--;if(curKw<1){curKw=52;curJahr--;}
  }
  if(weeks===0&&missedWeeks===0)return{score:null,weeks:0,done:0,missedBig3:0,missedWeeks:0};
  // Floor-Formel: 50 + (done - missed)/12 × 50, geclamped auf 0-100
  const raw=50+(done-missedBig3)/12*50;
  const score=Math.max(0,Math.min(100,Math.round(raw)));
  return{score,weeks,done,committedBig3,missedBig3,missedWeeks};
}
function momentumFarbe(score){
  if(score==null)return{bg:'var(--gray-bg)',tc:'var(--t2)',bd:'var(--bd)',label:'—'};
  if(score>=90)return{bg:'var(--green-bg)',tc:'var(--green)',bd:'var(--green-bd)',label:'Elite'};
  if(score>=75)return{bg:'var(--blue-bg)',tc:'var(--blue)',bd:'var(--blue-bd)',label:'Stark'};
  if(score>=60)return{bg:'var(--amber-bg)',tc:'var(--amber)',bd:'var(--amber-bd)',label:'Okay'};
  return{bg:'var(--red-bg)',tc:'var(--red)',bd:'var(--red-bd)',label:'Warnung'};
}
// Kompaktes Ring-Badge (Woche-Tab) — klein, klickbar, öffnet Info-Modal
function momentumRingHtml(pid){
  // Huberman-Pass v172.10: Ring neutral-grau, Rot nur bei Warnung (score<60).
  // Gründe: ein konkurrierender Rot-Signal-Punkt im Screen zerstreut die Aufmerksamkeit
  // („Dopamin-Splitter"). Rot behält Signalwirkung nur, wenn es selten auftritt.
  const m=getMomentumScore(pid);
  const streak=getPerfectStreak(pid);
  const scoreTxt=m.score==null?'—':m.score;
  const pct=m.score==null?0:Math.max(0,Math.min(100,m.score));
  const deg=Math.round(pct/100*360);
  const isWarn=m.score!=null&&m.score<60;
  const ringColor=isWarn?'var(--red)':'var(--t3)';
  const textColor=isWarn?'var(--red)':'var(--t2)';
  const ringBg=m.score==null?'var(--gray-bg)':'conic-gradient('+ringColor+' 0deg '+deg+'deg, var(--gray-bg) '+deg+'deg 360deg)';
  let h='<button onclick="openMomentumInfo()" title="Momentum-Score" style="position:relative;width:72px;height:72px;border-radius:50%;border:none;padding:0;background:'+ringBg+';cursor:pointer;flex-shrink:0;font-family:inherit">';
  h+='<span style="position:absolute;inset:6px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0">';
  h+='<span style="font-size:20px;font-weight:800;color:'+textColor+';line-height:1">'+scoreTxt+'</span>';
  h+='<span style="font-size:8px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px">Momentum</span>';
  h+='</span>';
  if(streak>=1){
    h+='<span style="position:absolute;top:-4px;right:-4px;background:'+ringColor+';color:#fff;font-size:10px;font-weight:800;border-radius:99px;padding:2px 6px;line-height:1;border:2px solid var(--bg)">🔥'+streak+'</span>';
  }
  h+='</button>';
  return h;
}
// ─── MISS-PATTERN KARTE (Leading Indicator #2, neben Momentum) ───
function getMissPatternData(pid){
  const tasks=S.aufgaben.filter(a=>String(a.pid)===String(pid)&&a.lastMissAction);
  const breakdown={neu_schaetzen:0,splitten:0,los:0,irrelevant:0};
  tasks.forEach(a=>{if(breakdown[a.lastMissAction]!==undefined)breakdown[a.lastMissAction]++;});
  const total=tasks.length;
  if(total<3)return{total,breakdown,dominant:null,interpretation:null};
  const entries=Object.entries(breakdown);
  const max=entries.reduce((m,e)=>e[1]>m[1]?e:m);
  const dominantRatio=max[1]/total;
  const dominant=dominantRatio>=0.6?max[0]:null;
  const interpretations={
    neu_schaetzen:'Du schätzt strukturell zu eng. Plane kleinere Schritte statt steilerer Deadlines.',
    splitten:'Du planst zu groß. Zerlege Tasks früher in 2-Stunden-Häppchen.',
    los:'Prokrastinations-Muster. Das Problem ist Start-Reibung, nicht Scope.',
    irrelevant:'Plan-Qualität niedrig. Zu viel auf die Liste ohne Filter.'
  };
  const interpretation=dominant?interpretations[dominant]:'Mischbild — noch kein klares Muster.';
  return{total,breakdown,dominant,interpretation};
}

      +'<span style="width:22px;text-align:right;font-weight:700;color:'+(isDominant?'var(--orange)':'var(--t2)')+'">'+count+'</span>'
      +'</div>';
  });
  const interpBg=d.dominant?'var(--orange-bg)':'var(--gray-bg)';
  const interpBd=d.dominant?'var(--orange-bd)':'var(--bd)';
  const interpColor=d.dominant?'var(--orange)':'var(--t2)';

  h+='<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)">🔍 Ausführungs-Muster · Leading Indicator</div><div style="font-size:10px;color:var(--t3);margin-top:2px;font-weight:500">Ergänzt Momentum: wie du mit Deadlines umgehst.</div></div>';
  h+='<div style="font-size:10px;color:var(--t3);white-space:nowrap">'+d.total+' Aufgabe'+(d.total!==1?'n':'')+' mit Miss-Historie</div>';
  h+='</div>';

  h+='</div>';

// Volle Karte (Rückblick-Modal): mehr Detail
function momentumCardHtml(pid){
  const m=getMomentumScore(pid);
  const streak=getPerfectStreak(pid);
  const f=momentumFarbe(m.score);
  const scoreTxt=m.score==null?'—':m.score;
  // Kompakte Zeile statt voller Karte — nur als dezente Meta-Info im Rückblick
  let meta='';
  if(m.score!=null){
    meta=m.done+' erledigt · '+m.weeks+' '+(m.weeks===1?'Woche':'Wochen');

async function saveWrPhaseA(){

// UX-Guardrails: Heuristische Big-3-Qualitätsprüfung (Bezos "high standards via system")
// Debounced: erst 800ms nach letztem Tastendruck zeigen, sonst nervt's
const _big3ValidateTimers={};
function validateBig3Input(n){
  clearTimeout(_big3ValidateTimers[n]);
  const hintEarly=document.getElementById('wr-b'+n+'-hint');
  if(hintEarly)hintEarly.style.display='none';
  _big3ValidateTimers[n]=setTimeout(()=>_validateBig3Now(n),800);
}
function _validateBig3Now(n){
  const el=document.getElementById('wr-b'+n);
  const hint=document.getElementById('wr-b'+n+'-hint');
  if(!el||!hint)return;
  const val=(el.value||'').trim();
  if(!val){hint.style.display='none';return;}
  let msg='',typ='warn';
  const low=val.toLowerCase();
  // Check 1: zu kurz
  if(val.length<15){msg='Zu kurz — was soll am Freitag konkret fertig sein?';}
  // Check 2: nur ein Verb / Aufgabe-Sprache
  else if(/^(anrufen|schreiben|mailen|erstellen|machen|checken|überlegen|planen|klären|besprechen|vorbereiten|durchgehen)$/i.test(val)||val.split(/\s+/).length<=2){
    msg='Klingt nach Aufgabe — formuliere als Ergebnis: „…ist fertig/versendet/live".';
  }
  // Check 3: Meeting als Big 3
  else if(/^(meeting|call|termin|besprechung|gespräch)\b/i.test(low)){
    msg='Ein Meeting ist kein Ergebnis. Was soll danach anders sein?';
  }
  // Check 4: vages Aktivitätswort ohne Ergebnis
  else if(/^(an|bei|zu|mit)\b/i.test(low)&&val.length<40&&!/\b(fertig|final|live|versendet|abgeschickt|veröffentlicht|signiert|unterschrieben|eingereicht|bestätigt|abgeschlossen)\b/i.test(low)){
    msg='Hinweis: Nennst du einen Endzustand (fertig / versendet / live)?';
    typ='info';
  }
  if(msg){
    hint.textContent=(typ==='info'?'💡 ':'⚠ ')+msg;
    hint.style.color=typ==='info'?'var(--t2)':'var(--orange)';
    hint.style.display='block';
  } else {
    hint.textContent='✓ Gut formuliert.';
    hint.style.color='var(--green)';
    hint.style.display='block';
  }
}

async function b3SaveMs(wrId,slot){
  const sel=document.getElementById('b3-ms-select');if(!sel)return;

  const wr=S.wochenresets.find(r=>r.id===wrId);if(!wr)return;
  const tzField='big3_'+slot+'_tz_id';
  // Fokus-Ziel: aus neuem Monatsziel ableiten
  let newZielId=wr.focus_ziel_id||null;
  if(newTzId){for(const z of S.ziele){if((z.teilziele||[]).some(t=>t.id===newTzId)){newZielId=z.id;break;}}}
  wr[tzField]=newTzId;
  if(newZielId)wr.focus_ziel_id=newZielId;
  const patch={};patch[tzField]=newTzId;if(newZielId)patch.focus_ziel_id=newZielId;
  const ok=await dbPatch('wochenresets',wrId,patch);
  if(!ok){toast('⚠️ Speichern fehlgeschlagen','var(--red)');return;}
  // Kaskade: alle Tasks dieses Slots bekommen neue teilziel_id + ziel_id
  const slotTasks=S.aufgaben.filter(a=>a.wochenresetId===wrId&&a.big3Slot===slot);
  for(const a of slotTasks){

function getPaddelCount(pid){
  // Nur diese Woche (Mo–So)
  const{monday,sunday}=getWeekRange();
  // Aufgaben dieser Woche: P1=3, P2=1, P3=0
  // WICHTIG: nur Ziel-alignte Tasks zählen (teilzielId gesetzt = über Monatsziel ans Ziel gebunden).
  // Leading Indicator = Ausführung von Taktik, die zum Ziel führt. Busywork ohne Ziel-Bezug gibt 0 Punkte.
  const aufgabenPts=S.aufgaben.filter(a=>{
    if(a.pid!==pid||a.status!=='erledigt'||!a.updated_at)return false;
    if(!a.teilzielId)return false; // Kein Monatsziel-Bezug → 0 Punkte
    const dt=new Date(a.updated_at);
    if(isNaN(dt.getTime()))return false;
    const d=localDate(dt);
    return d>=monday&&d<=sunday;
  }).reduce((sum,a)=>sum+(a.prio==='P1'?3:a.prio==='P2'?1:0),0);
  // Sonder-KPIs dieser Woche: Verkauf/Sauna=5pts, Termin/andere=3pts
  // täglich → Wochensumme; kumulativ → aktueller Wert
  const kpiPts=S.ziele.flatMap(z=>z.kpis||[]).filter(k=>String(k.pid)===String(pid)&&k.sonder).reduce((sum,k)=>{
    const isTaeglich=k.typ==='täglich';
    const v=Math.max(0,isTaeglich?(S.kpiValsWeek[pid+'-'+k.id]||0):(kpiVal(k)||0));
    const lbl=(k.label||'').toLowerCase();
    const pts=(lbl.includes('verkauf')||lbl.includes('sauna'))?5:3;
    return sum+v*pts;
  },0);
  // P1-KPIs (nicht-Sonder) mit Monatsziel: 1 Paddel pro Increment diese Woche
  const p1KpiPts=S.ziele.flatMap(z=>z.kpis||[]).filter(k=>
    String(k.pid)===String(pid)&&!k.sonder&&k.prio==='P1'&&k.teilzielId
  ).reduce((sum,k)=>{
    const isTaeglich=k.typ==='täglich';
    const v=Math.max(0,isTaeglich?(S.kpiValsWeek[pid+'-'+k.id]||0):(kpiVal(k)||0));
    return sum+v;
  },0);
  // Wochenziele (big3_N_done=true): 3 Pts pro erledigtem Wochenziel diese Woche.
  // Modell B: Wochenziel IST der Outcome; sein Check ist P1-äquivalent.
  // Doppelzählung wird verhindert: wenn ein Task exakten Titel-Match zum big3_N hat
  // und schon als P1 gezählt wurde, reduzieren wir hier um 3.
  const {kw:_curKw,jahr:_curJahr}=getKW();
  const wrThis=(S.wochenresets||[]).find(r=>String(r.pid)===String(pid)&&r.kw===_curKw&&r.jahr===_curJahr);
  let big3Pts=0;
  if(wrThis){
    [1,2,3].forEach(n=>{
      if(!wrThis['big3_'+n+'_done'])return;
      big3Pts+=3;
      const txt=(wrThis['big3_'+n]||'').toLowerCase().trim();
      const tz=wrThis['big3_'+n+'_tz_id'];
      if(!txt||!tz)return;
      // Check ob ein Task exakt gespiegelt existiert (Legacy-Duplikat) und in aufgabenPts schon gezählt wurde
      const dupe=S.aufgaben.find(a=>a.pid===pid&&a.status==='erledigt'&&a.prio==='P1'&&String(a.teilzielId)===String(tz)&&(a.titel||'').toLowerCase().trim()===txt);
      if(dupe&&dupe.updated_at){
        const dt=new Date(dupe.updated_at);
        if(!isNaN(dt.getTime())){
          const d=localDate(dt);
          if(d>=monday&&d<=sunday)big3Pts-=3; // Doppelzählung korrigieren
        }
      }
    });
  }
  return aufgabenPts+kpiPts+p1KpiPts+big3Pts;
}
function showKonfetti(){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;inset:0;z-index:999;pointer-events:none;width:100%;height:100%';
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const pieces=Array.from({length:80},()=>({
    x:Math.random()*canvas.width,y:-20,w:8+Math.random()*8,h:8+Math.random()*8,
    r:Math.random()*Math.PI*2,vx:(Math.random()-0.5)*6,vy:3+Math.random()*4,
    vr:(Math.random()-0.5)*0.2,
    color:['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD'][Math.floor(Math.random()*7)]
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.vy+=0.1;
    });
    frame++;
    if(frame<120)requestAnimationFrame(draw);else canvas.remove();
  }
  draw();
}

  if(snoozeUntil&&snoozeUntil>=TODAY)return;

// ─── MISSED-DEADLINE FEEDBACK (MVP) ──────────────────────────────
// Trigger: P1 verpasst um ≥1 Tag, P2 verpasst um ≥2 Tage. P3/ohne dl → nie.
// Batch: ein Stack-Modal das alle verpassten Tasks nacheinander zeigt.
// Pro Tag nur 1× pro Task (last_miss_at < heute als Guard).
function getMissedTasks(){
  const p=me();if(!p)return[];
  return S.aufgaben.filter(a=>{
    if(String(a.pid)!==String(aP))return false;
    if(a.status==='erledigt'||a.status==='archiviert'||a.status==='zurueckgegeben'||a.status==='backlog')return false;
    // Delegation noch nicht angenommen → gehört in Inbox, nicht in Missed-Stack
    if(a.status==='zugewiesen')return false;
    if(a.parentId)return false; // Unteraufgaben überspringen, Parent trägt Deadline
    if(!a.dl)return false;
    if(a.prio!=='P1'&&a.prio!=='P2')return false;
    const threshold=a.prio==='P1'?1:2;
    // dl + threshold Tage <= TODAY bedeutet: die Deadline ist um threshold Tage überschritten
    const dlDate=new Date(a.dl+'T00:00:00');
    const diffDays=Math.floor((new Date(TODAY+'T00:00:00')-dlDate)/86400000);
    if(diffDays<threshold)return false;
    // Guard: schon heute behandelt?
    if(a.lastMissAt){
      const lastDate=(a.lastMissAt||'').slice(0,10);
      if(lastDate===TODAY)return false;
    }
    return true;
  });
}
function checkMissedDeadlines(){
  // Nicht triggern während Onboarding, Monatsziel-Review oder Wochenreset-Zwang aktiv sind
  if(window._onb)return;
  if(document.getElementById('mr-ovl'))return;
  if(_resetZwang)return;
  const missed=getMissedTasks();
  if(!missed.length)return;
  // Nach Priorität + Verzug sortieren (P1 zuerst, dann älteste DL)
  missed.sort((x,y)=>{
    if(x.prio!==y.prio)return x.prio==='P1'?-1:1;
    return (x.dl||'').localeCompare(y.dl||'');
  });
  window._missStack={tasks:missed,idx:0,note:''};
  openMissedStack();
}

  a.missCount=missPatch.miss_count;a.lastMissAction=action;a.lastMissAt=nowIso;a.lastMissNote=note;

async function saveSplit(aid){
  const a=S.aufgaben.find(x=>x.id===aid);if(!a)return;
  const parts=[1,2,3].map(n=>document.getElementById('split-'+n)?.value.trim()).filter(Boolean);
  if(parts.length<2){toast('Mindestens 2 Teile bitte');return;}
  const nowIso=new Date().toISOString();
  // Ursprungs-Aufgabe archivieren
  a.status='archiviert';
  await dbPatch('aufgaben',aid,{status:'archiviert',updated_at:nowIso});
  // Neue Teile anlegen
  for(const titel of parts){
    const id=nid('a');
    const rec={id,titel,pid:aP,prio:'P1',status:'neu',
      ziel_id:a.zielId||null,teilziel_id:a.teilzielId||null,
      geplant:a.geplant||1,dl:null,dl_type:'bis',
      notiz:'Gesplittet aus: '+a.titel,erstellt_von:aP};
    S.aufgaben.push(normalizeAufgabe(rec));
    await dbInsert('aufgaben',rec);
  }

function continueMissStack(){

function mrNext(tzId){
  const st=window._mrState&&window._mrState[tzId];if(!st)return;

  else if(st.step===2){st.step=3;}
  openMonatszielReview(tzId);
}
async function saveMonatszielReview(tzId){
  const st=window._mrState&&window._mrState[tzId];if(!st)return;
  const learning=document.getElementById('mr-learning')?.value.trim()||'';
  if(learning.length<10){toast('⚠️ Learning-Satz zu kurz (min. 10 Zeichen)');return;}
  const patch={review_done:true,review_erreicht:st.erreicht,review_grund:st.grund||null,review_learning:learning,review_at:new Date().toISOString()};
  const tz=S.ziele.flatMap(z=>z.teilziele||[]).find(t=>t.id===tzId);
  if(tz)Object.assign(tz,patch);
  await dbPatch('teilziele',tzId,patch);
  delete window._mrState[tzId]; // State bereinigen — verhindert pre-filled Modal bei erneutem Öffnen
  const ov=document.getElementById('mr-ovl');if(ov)ov.remove();
  toast('✓ Review gespeichert');
  setTimeout(()=>checkMonatszielReviews(),600); // Check if more overdue
}
function checkDiagnosePattern(){
  // Returns 'plan' | 'ausfuehrung' | null based on last 3 "nein" reviews
  const allTZ=S.ziele.flatMap(z=>z.teilziele||[]);
  const meineTZ=allTZ.filter(t=>String(t.verantwortlichId)===String(aP)&&t.review_done&&t.review_erreicht==='nein')
    .sort((a,b)=>(b.review_at||'').localeCompare(a.review_at||''));
  if(meineTZ.length<3)return null;
  const last3=meineTZ.slice(0,3);
  const planC=last3.filter(t=>t.review_grund==='plan').length;
  const ausfC=last3.filter(t=>t.review_grund==='ausfuehrung').length;
  if(planC>=2)return'plan';
  if(ausfC>=2)return'ausfuehrung';
  return null;
}
function getDiagnoseHint(){
  const pat=checkDiagnosePattern();if(!pat)return'';
  if(pat==='plan')return'<div style="font-size:11px;padding:8px 10px;background:var(--amber-bg);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;margin:-4px 0 12px">💡 Deine letzten 3 Monatsziele waren zu steil trotz guter Ausführung. Skaliere den Umfang runter.</div>';

  return'';
}

  if(_dataPoll){clearInterval(_dataPoll);_dataPoll=null;}
  if(_sonderPoll){clearInterval(_sonderPoll);_sonderPoll=null;}
  if(timIv){clearInterval(timIv);timIv=null;}

}

function render(){
  // v178: Auto-Resume pausierter Aufgaben (einmalig pro Render-Zyklus, idempotent).
  try{if(!window._resumeChecked){window._resumeChecked=true;autoResumePausedTasks().then(()=>showResumeToastIfAny());}}catch(e){console.error('render:autoResume',e);}
  // v183: Drag&Drop nach jedem Render reattachen (idempotent via _dragSetup-Flag pro Element).
  try{setTimeout(dragSortAttach,0);}catch(e){console.error('render:dragAttach',e);}
  // v180: Verfehlt-Review-Modal Auto-Trigger (einmalig, snooze-bar pro Tag).
  try{if(!window._verfehltChecked){window._verfehltChecked=true;_checkVerfehltReview();}}catch(e){console.error('render:checkVerfehlt',e);}
  // Jede rView ist ein eigener Sandbox-Block: eine einzelne kaputte Aufgabe/KPI darf nicht die
  // komplette App weiß-screenen. Bei Fehler: Konsole + Fallback-Hinweis im Haupt-Container.
  const _safe=(label,fn)=>{try{fn();}catch(e){
    console.error('render:'+label,e);
    const m=document.getElementById('main');
    if(m&&(aV===label))m.innerHTML='<div style="padding:40px 20px;text-align:center;color:var(--t2)"><div style="font-size:28px;margin-bottom:8px">⚠️</div><div style="font-size:14px;font-weight:600;margin-bottom:6px">Anzeige-Fehler im Tab "'+label+'"</div><div style="font-size:11px;color:var(--t3);margin-bottom:14px">Details in der Browser-Konsole. Die App läuft weiter.</div><button onclick="render()" style="font-size:12px;padding:7px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--t2);cursor:pointer;font-family:inherit">Erneut versuchen</button></div>';
  }};
  // Ovens-Pass v172.11: Focus-Active body-class blendet Distraktoren aus,
  // solange aktuell eine eigene Aufgabe läuft. "Make the wrong thing invisible."
  try{
    const inFocus=!!(S.aufgaben||[]).some(a=>String(a.pid)===String(aP)&&a.status==='aktiv');
    document.body.classList.toggle('focus-active',inFocus);
  }catch(e){console.error('render:focusActive',e);}
  // v173.1 Gap B: Delegierer-Receipt — Header-Badge bei überzogenen eigenen Delegationen.
  try{
    const oc=getOverdueDelegationCount(aP);
    const badge=document.getElementById('deleg-overdue-badge');
    const cnt=document.getElementById('deleg-overdue-count');
    if(badge){
      if(oc>0){badge.style.display='inline-flex';if(cnt)cnt.textContent=oc;}
      else{badge.style.display='none';}
    }
  }catch(e){console.error('render:delegOverdue',e);}
  try{
    const navTeam=document.getElementById('nav-team');
    if(navTeam)navTeam.style.display=canSeeTeam()?'':'none';
  }catch(e){console.error('render:navTeam',e);}
  try{updateKapPill();}catch(e){console.error('render:kapPill',e);}
  try{rSB();}catch(e){console.error('render:rSB',e);}
  if(aV==='tag')_safe('tag',rTag);
  else if(aV==='woche')_safe('woche',rWoche);
  else if(aV==='monat')_safe('monat',rMonat);
  else if(aV==='ziele')_safe('ziele',rZiele);
  else if(aV==='team')_safe('team',rTeam);
  // Freitags-Pflicht: modal erst nach render() prüfen (DOM ready)
  try{
    if(!document.getElementById('ovl')?.classList.contains('open')){
      checkResetZwang();
    }
  }catch(e){console.error('render:resetZwang',e);}
}
function checkResetZwang(){
  if(!aP||_resetZwang)return;
  if(realMe&&aP!==realMe)return; // Fremd-Ansicht (z.B. GF schaut bei Dominik rein) → nie Zwang
  if(!isResetZeit()||dieseWocheReset(aP))return;
  if(Date.now()<_resetSnoozeUntil)return;
  openWochenresetZwang();
}
function snoozeReset(){
  const gut='';const blockiert='';
  const isFriday=new Date().getDay()===5;
  if(isFriday){
    // Smooth snooze: proportional zur verbleibenden Fenster-Zeit
    const snoozeMins=getResetSnoozeMins();
    if(snoozeMins<=0){toast('⏱ Fenster fast geschlossen — jetzt kurz durchziehen.');return;}
    _resetSnoozeUntil=Date.now()+snoozeMins*60*1000;
    _snoozePersist(gut,blockiert);_resetZwang=false;window._noOverlayClose=false;cm();
    toast('⏱ In ~'+snoozeMins+' Min erneut.');
    if(_resetSnoozeTimer)clearTimeout(_resetSnoozeTimer);
    _resetSnoozeTimer=setTimeout(()=>{if(aP&&!dieseWocheReset(aP))openWochenresetZwang();},snoozeMins*60*1000);
  }else{
    // Sa/So: klassisch 30 Min, max 3×
    if(_resetSnoozeCount>=_RESET_SNOOZE_MAX)return;
    _resetSnoozeCount++;_resetSnoozeUntil=Date.now()+30*60*1000;
    _snoozePersist(gut,blockiert);_resetZwang=false;window._noOverlayClose=false;cm();
    const rest=_RESET_SNOOZE_MAX-_resetSnoozeCount;
    toast(rest>0?'⏱ In 30 Min erneut — noch '+rest+'× verschiebbar.':'⏱ In 30 Min — danach kein Aufschub mehr.');
    if(_resetSnoozeTimer)clearTimeout(_resetSnoozeTimer);
    _resetSnoozeTimer=setTimeout(()=>{if(aP&&!dieseWocheReset(aP))openWochenresetZwang();},30*60*1000);
  }
  render();
}

function rSB(){
  const sorted=[...S.teams].sort((a,b)=>a.id==='gf'?-1:b.id==='gf'?1:0);
  // Pre-compute per-person counts
  const counts={};
  S.aufgaben.forEach(a=>{
    if(!canSee(a))return;
    if(!counts[a.pid])counts[a.pid]={neu:0,aktiv:0};
    if(a.status==='neu')counts[a.pid].neu++;
    else if(a.status==='aktiv')counts[a.pid].aktiv++;
  });
  // Build sets: myTeam, goalPartners, others
  const myTeamIds=new Set();
  const myGoalPartnerIds=new Set();
  const shownIds=new Set();
  // My teams
  const visIds=isGF()?null:isLead()?visiblePersonIds(aP):null;
  sorted.forEach(t=>{
    t.members.forEach(id=>{
      if(isGF()||id===aP||(visIds&&visIds.includes(id)))myTeamIds.add(id);
    });
  });
  // Goal partners: people working on same goals as me
  const myGoalIds=new Set(S.aufgaben.filter(a=>a.pid===aP&&a.zielId).map(a=>a.zielId));
  S.ziele.forEach(z=>{if(z.verantwortlich_id===aP)myGoalIds.add(z.id);});
  if(myGoalIds.size){
    S.aufgaben.forEach(a=>{if(myGoalIds.has(a.zielId)&&a.pid!==aP&&!myTeamIds.has(a.pid))myGoalPartnerIds.add(a.pid);});
    S.ziele.forEach(z=>{if(myGoalIds.has(z.id)&&z.verantwortlich_id&&z.verantwortlich_id!==aP&&!myTeamIds.has(z.verantwortlich_id))myGoalPartnerIds.add(z.verantwortlich_id);});
  }

  let h='';
  // Pre-compute streaks
  const streaks={};
  S.personen.forEach(p=>{
    const doneByDay={};
    S.aufgaben.forEach(a=>{if(a.pid===p.id&&a.status==='erledigt'&&a.updated_at){const d=localDate(new Date(a.updated_at));doneByDay[d]=true;}});
    let streak=0,d=new Date(TODAY+'T12:00:00');
    // If nothing done today, check if yesterday still counts (streak not broken yet today)
    if(!doneByDay[TODAY]){d.setDate(d.getDate()-1);}
    while(true){const ds=localDate(d);if(!doneByDay[ds])break;streak++;d.setDate(d.getDate()-1);}
    streaks[p.id]=streak;
  });

  // Helper to render a person row
  const renderPerson=(id,dim,clickOverride)=>{
    const p=person(id);if(!p)return'';
    const c=cl(p),isMe=id===aP;
    const ct=counts[id]||{neu:0,aktiv:0};
    const paddel=getPaddelCount(id);
    const opacity=dim?'opacity:.45;':'';
    const hasActive=ct.aktiv>0;
    const onclick=clickOverride||('switchPerson(\''+id+'\')');
    return '<button class="sbn'+(isMe?' on':'')+'" onclick="'+onclick+'" style="'+opacity+'position:relative;">'
      +'<div style="position:relative">'+av(p,22,8)
      +(hasActive?'<div style="position:absolute;bottom:-1px;right:-1px;width:7px;height:7px;border-radius:50%;background:var(--green);border:1.5px solid var(--sf)"></div>':'')
      +'</div>'
      +'<span style="flex:1;font-size:11px;font-weight:'+(isMe?600:400)+';color:'+(isMe?c.tc:'var(--text)')+'">'+esc(p.name)+'</span>'
      +'<div style="display:flex;gap:3px;align-items:center">'
      +((streaks[id]||0)>=2?'<span style="font-size:9px;color:#ef4444" title="'+streaks[id]+' Tage Streak">🔥'+streaks[id]+'</span>':'')
      +(ct.neu?'<span style="font-size:8px;background:var(--red-bg);color:var(--red);border-radius:99px;padding:1px 4px;font-weight:700">'+ct.neu+'</span>':'')
      +(ct.aktiv?'<span style="font-size:8px;background:'+c.bg+';color:'+c.tc+';border-radius:99px;padding:1px 4px;font-weight:700">'+ct.aktiv+'</span>':'')
      +'</div></button>';
  };

  // 1) My teams (full visibility)
  sorted.forEach(t=>{
    const vis=t.members.filter(id=>myTeamIds.has(id)&&person(id));
    if(!vis.length)return;
    h+='<div class="gl">'+esc(t.name)+'</div>';
    vis.forEach(id=>{shownIds.add(id);h+=renderPerson(id,false);});
  });

  // 2) Goal partners (shared goals, different team) — click opens shared goals view
  const goalPartners=[...myGoalPartnerIds].filter(id=>!shownIds.has(id)&&person(id));
  if(goalPartners.length){
    h+='<div class="gl" style="margin-top:14px">Gemeinsame Ziele</div>';
    goalPartners.forEach(id=>{
      shownIds.add(id);
      h+=renderPerson(id,false,'openSharedGoals(\''+id+'\')');
    });
  }

  // 3) Other teams (dimmed) — only if not GF (GF already sees all)
  if(!isGF()){
    sorted.forEach(t=>{
      const others=t.members.filter(id=>!shownIds.has(id)&&person(id));
      if(!others.length)return;
      h+='<div class="gl" style="margin-top:14px;opacity:.4">'+esc(t.name)+'</div>';
      others.forEach(id=>{shownIds.add(id);h+=renderPerson(id,true);});
    });
    // Anyone not in any team
    const noTeam=S.personen.filter(p=>!shownIds.has(p.id));
    if(noTeam.length){
      h+='<div class="gl" style="margin-top:14px;opacity:.4">Weitere</div>';
      noTeam.forEach(p=>{h+=renderPerson(p.id,true);});
    }
  }

  // 4) Firmen-Ticker: Heute-Überblick
  const todayDone=S.aufgaben.filter(a=>a.status==='erledigt'&&a.updated_at&&localDate(new Date(a.updated_at))===TODAY);
  const activeNow=S.aufgaben.filter(a=>a.status==='aktiv');
  const todayByPerson={};
  todayDone.forEach(a=>{const p=person(a.pid);if(p){if(!todayByPerson[a.pid])todayByPerson[a.pid]={name:p.name,count:0};todayByPerson[a.pid].count++;}});
  const topToday=Object.values(todayByPerson).sort((a,b)=>b.count-a.count).slice(0,3);

  h+='<div style="margin-top:auto;padding-top:14px;border-top:1px solid var(--bd)">';
  h+='<div class="gl">Heute im Team</div>';
  h+='<div style="display:flex;gap:12px;padding:6px 8px;margin-bottom:4px">';
  h+='<div style="text-align:center"><div style="font-size:16px;font-weight:700;color:var(--green)">'+todayDone.length+'</div><div style="font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px">erledigt</div></div>';
  h+='<div style="text-align:center"><div style="font-size:16px;font-weight:700;color:var(--blue)">'+activeNow.length+'</div><div style="font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px">aktiv</div></div>';
  h+='</div>';
  if(topToday.length){
    topToday.forEach(t=>{
      h+='<div style="font-size:10px;color:var(--t2);padding:1px 8px">'+esc(t.name)+' <span style="color:var(--green);font-weight:600">✓'+t.count+'</span></div>';
    });
  }
  h+='</div>';

  const sb=document.getElementById('sb');
  if(sb)sb.innerHTML=h;
}
function switchPerson(id){
  // Permissions immer vom echt-eingeloggten User ableiten, nicht vom aktuell angeschauten (aP).
  // Sonst bleibt GF in Fremd-Ansicht stecken, weil me()=aP=Dominik und isGF() dann false.
  const _real=realMe?person(realMe):null;
  const _realIsGF=!!(_real&&_real.stufe==='gf');
  const _visible=visiblePersonIds(realMe||aP);
  if(_realIsGF||_visible.includes(id)||id===aP||id===realMe){
    // Snooze-State pro Person: Timer clearen + für neue Person laden
    if(_resetSnoozeTimer){clearTimeout(_resetSnoozeTimer);_resetSnoozeTimer=null;}
    _resetSnoozeUntil=0;_resetSnoozeCount=0;
    window._wrGutSnooze='';window._wrBlockiertSnooze='';
    aP=id;
    _snoozeLoad();
    updateBadge();render();showBackBtn();
  } else {
    // Can't view this person → open "assign task" modal for them
    const p=person(id);if(!p)return;
    openNeu({pid:id});
  }
}

async function cycleStepPid(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||!a.ua[i])return;
  const pids=S.personen.map(p=>p.id);
  const cur=a.ua[i].pid||a.pid;
  const idx=pids.indexOf(cur);
  const next=pids[(idx+1)%pids.length];
  a.ua[i].pid=next===a.pid?null:next;
  await dbPatch('aufgaben',id,{ua:a.ua});
  if(document.getElementById('ovl')?.classList.contains('open')){openDetail(id);}else{render();}
}
async function assignStepPid(id,i,newPid){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||!a.ua[i])return;
  a.ua[i].pid=newPid===a.pid?null:newPid;
  await dbPatch('aufgaben',id,{ua:a.ua});
  if(document.getElementById('ovl')?.classList.contains('open')){openDetail(id);}else{render();}
}

// Delegate a checklist step: convert inline step → real Unteraufgabe with parent_id
function delegateStep(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||!a.ua||!a.ua[i])return;
  const step=a.ua[i];
  const others=S.personen.filter(p=>String(p.id)!==String(a.pid));
  const prev=document.getElementById('mb')?.innerHTML||'';
  const wasOpen=document.getElementById('ovl')?.classList.contains('open');
  document.getElementById('mb').innerHTML=
    '<div class="mt">Schritt delegieren</div>'
    +'<div style="font-size:12px;color:var(--t2);margin-bottom:4px;line-height:1.4">Dieser Schritt wird in eine eigenständige <b>Unteraufgabe</b> umgewandelt und dieser Person zugewiesen:</div>'
    +'<div style="font-size:13px;font-weight:600;color:var(--text);padding:8px 12px;background:var(--gray-bg);border:1px solid var(--bd);border-radius:8px;margin-bottom:14px">'+esc(step.t)+'</div>'
    +'<div class="fl"><label>An wen?</label><select id="delstep-pid">'
    +others.map(p=>'<option value="'+p.id+'">'+esc(p.name)+'</option>').join('')
    +'</select></div>'
    +'<div class="mf"><button class="btn btn-gr" onclick="cm()">Abbrechen</button>'
    +'<button class="btn btn-dk" onclick="confirmDelegateStep(\''+id+'\','+i+')">Delegieren</button></div>';
  document.getElementById('ovl').classList.add('open');
  // Falls wir aus einem offenen Detail kamen: Zurück-Pfad merken
  window._delStepReturn=wasOpen?{id,prev}:null;
}
async function confirmDelegateStep(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||!a.ua||!a.ua[i])return;
  const pid=document.getElementById('delstep-pid')?.value;
  if(!pid){toast('⚠ Person wählen');return;}
  const step=a.ua[i];
  const newId=nid('a');
  const rec={id:newId,pid,titel:step.t,typ:a.typ||'operativ',status:'zugewiesen',prio:a.prio||null,
    ziel_id:a.zielId||null,teilziel_id:a.teilzielId||null,parent_id:a.id,
    geplant:0.5,gebucht:0,dl:a.dl||null,ua:[],notiz:null,akt_seit:null,
    vertraulich:!!a.vertraulich,erstellt_von:aP};
  S.aufgaben.push(normalizeAufgabe(rec));
  await dbInsert('aufgaben',rec);
  // Schritt aus Parent entfernen
  a.ua.splice(i,1);
  await dbPatch('aufgaben',a.id,{ua:a.ua});
  const tp=person(pid);
  if(tp)notify('aufgabe_zugewiesen',{aufgabe:step.t,fuer:{id:pid,name:tp.name,slack_id:tp.slack_id||''},prio:rec.prio,dl:rec.dl});
  cm();
  if(window._delStepReturn){window._delStepReturn=null;openDetail(id);}else{render();}
  toast('✓ Schritt delegiert an '+(tp?tp.name.split(' ')[0]:'?'));
}

async function toggleBig3(wrId,field){
  const wr=S.wochenresets.find(r=>r.id===wrId);if(!wr||wr._busy)return;
  wr._busy=true;
  const prev=wr[field];
  wr[field]=!prev;
  if(aV==='woche')rWoche();else rTag();
  const ok=await dbPatch('wochenresets',wrId,{[field]:wr[field]});
  if(!ok){wr[field]=prev;toast('⚠ Fehler beim Speichern');}
  else if(wr[field]){
    const n=field.replace('_done','');const txt=wrItemName(wr,parseInt(n.slice(-1)));
    if(txt)notify('big3_erledigt',{big3:txt,kw:getKW().kw});
  }
  wr._busy=false;
  if(aV==='woche')rWoche();else rTag();
}
function rWoche(){
  const{kw}=getKW();
  const wr=dieseWocheReset(aP);
  const tage=wochenTage();
  const tagN=['Mo','Di','Mi','Do','Fr','Sa'];
  const myA=S.aufgaben.filter(a=>String(a.pid)===String(aP)&&canSee(a));
  let out='<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px"><div style="font-size:16px;font-weight:700">Meine Woche · KW '+kw+'</div><div>'+momentumRingHtml(aP)+'</div></div>';

  // ── v182 (Ovens): Weekly-Leading-Block ──

  if(wr&&wr.blockiert){

  {

async function setPrio(id,pr){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  // P1: Empfänger managed seine Kapazität — warnen, nicht blockieren
  if(pr==='P1'){
    if(p1Count(a.pid)>=3){
      if(!confirm('Du hast bereits '+p1Count(a.pid)+' offene P1-Aufgaben. Trotzdem als P1 annehmen?'))return;
    }
    const zSel=document.getElementById('inbox-ziel-'+id);
    const tzid=zSel?zSel.value:'';
    if(!tzid){
      if(!confirm('P1 ohne Monatsziel – sicher? Ohne Monatsziel-Zuordnung gibt es keinen Paddel-Punkt.')){
        if(zSel){zSel.style.outline='2px solid var(--red)';zSel.focus();}
        return;
      }
    }
  }
  const prev={prio:a.prio,status:a.status,zielId:a.zielId,teilzielId:a.teilzielId};a._busy=true;
  const p=(!pr||pr==='null')?null:pr;
  try{
    const zielSel=document.getElementById('inbox-ziel-'+id);
    const tzid=zielSel?zielSel.value:'';
    let zid='';
    if(tzid && zielSel){
      const opt=zielSel.options[zielSel.selectedIndex];
      zid=opt?.dataset?.zielId||'';
    }
    a.prio=p;a.status=p?'backlog':'neu';
    if(tzid){a.zielId=zid||null;a.teilzielId=tzid;}
    try{render();}catch(e){console.error('render@setPrio',e);}
    const patch={prio:p,status:a.status};
    if(tzid){patch.ziel_id=zid||null;patch.teilziel_id=tzid;}
    const ok=await dbPatch('aufgaben',id,patch);
    if(!ok){a.prio=prev.prio;a.status=prev.status;a.zielId=prev.zielId;a.teilzielId=prev.teilzielId;toast('⚠️ Prio-Speichern fehlgeschlagen','var(--red)');}

  }catch(e){console.error('setPrio',e);a.prio=prev.prio;a.status=prev.status;a.zielId=prev.zielId;a.teilzielId=prev.teilzielId;}
  finally{a._busy=false;try{render();}catch(e){console.error('render@setPrio2',e);}}

// ── Maker-Modus (v224): Pomodoro-Fullscreen-Fokus ──
// 25-min Countdown (zählt runter), wenn 00:00 → automatisch nächster Block
// (kein Unterbrechen des Flows). Punkte zeigen verbrauchte vs. geplante Blöcke.
// Schwarzer Vollbild-Hintergrund, nur die Aufgabe + Timer.
function _makerSave(taskId){try{localStorage.setItem('maker_state_'+aP,JSON.stringify({taskId,t:Date.now()}));}catch(_){}}
function _makerLoad(){
  try{
    const s=JSON.parse(localStorage.getItem('maker_state_'+aP)||'null');
    if(!s||!s.taskId)return null;
    const a=S.aufgaben.find(x=>x.id===s.taskId);
    if(!a||a.status!=='aktiv')return null;
    return s;
  }catch(_){return null;}
}
function _makerClear(){try{localStorage.removeItem('maker_state_'+aP);}catch(_){}}

async function makerModus(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  if(a.status!=='aktiv')await startenA(id);
  _makerSave(id);
  _makerRender();
}

function _makerKey(e){if(e.key==='Escape')_makerClose();}

function _makerRender(){
  const st=_makerLoad();if(!st){_makerClose();return;}
  const a=S.aufgaben.find(x=>x.id===st.taskId);
  if(!a||a.status!=='aktiv'){_makerClose();return;}

  let ov=document.getElementById('maker-ov');
  const fresh=!ov;
  if(fresh){
    ov=document.createElement('div');
    ov.id='maker-ov';
    ov.style.cssText='position:fixed;inset:0;z-index:9995;background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;font-family:inherit';
    document.body.appendChild(ov);
    document.body.classList.add('focus-active');
    if(window._makerIv)clearInterval(window._makerIv);
    window._makerIv=setInterval(_makerRender,1000);
    document.addEventListener('keydown',_makerKey);
  }

  // Pomodoro-Countdown: total elapsed (int sec) modulo 25-min Block.
  // Wenn ein Block durch ist, beginnt automatisch der nächste. Kein State-Reset nötig.
  const BLOCK_SEC=WIN_BLOCK_MIN*60;
  const total=Math.floor(elapsedSec(a));
  const intoBlock=total%BLOCK_SEC;
  const remaining=BLOCK_SEC-intoBlock;
  const m=Math.floor(remaining/60),sec=remaining%60;
  const timeFmt=String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');

  const planned=taskPlannedBlocks(a);
  const consumed=Math.floor(total/BLOCK_SEC);
  const currentBlock=consumed+1;
  // Punkte: ● verbraucht, ◐ aktuell, ○ offen. Über-geplant zeigt nur ●●●●◐.
  let dots='';
  if(planned){
    const total_dots=Math.max(planned,currentBlock);
    for(let i=0;i<total_dots;i++){
      if(i<consumed)dots+='●';
      else if(i===consumed)dots+='◐';
      else dots+='○';
    }
  } else {
    for(let i=0;i<consumed;i++)dots+='●';
    dots+='◐';
  }

  const zNa=getZielName(a);
  const tznName=a.teilzielId?(_tzById(a.teilzielId)?.name||''):'';

  let html='';
  html+='<button onclick="_makerClose()" title="Esc minimiert" style="position:absolute;top:18px;right:24px;background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.55);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;padding:8px 14px;border-radius:8px">⤓ Minimieren</button>';
  html+='<div style="font-size:11px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,.38);margin-bottom:18px">🔥 Im Fokus · Block '+currentBlock+(planned?' / '+planned:'')+'</div>';
  if(zNa)html+='<div style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:12px;text-align:center;max-width:700px;line-height:1.4">'+esc(zNa)+(tznName?' › '+esc(tznName):'')+'</div>';
  html+='<div style="font-size:30px;font-weight:600;color:#fff;margin-bottom:42px;text-align:center;max-width:800px;line-height:1.25;padding:0 16px">'+esc(a.titel)+'</div>';
  html+='<div style="font-size:160px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:2px;line-height:1;margin-bottom:18px">'+timeFmt+'</div>';
  if(dots)html+='<div style="font-size:20px;color:rgba(255,255,255,.45);margin-bottom:42px;letter-spacing:8px;font-variant-numeric:tabular-nums">'+dots+'</div>';
  else html+='<div style="margin-bottom:42px"></div>';
  html+='<div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">';
  html+='<button onclick="_makerFinish()" style="padding:14px 32px;border-radius:12px;background:#7ad08a;color:#000;border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer">✓ Erledigt</button>';
  html+='<button onclick="_makerPause()" style="padding:14px 28px;border-radius:12px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.2);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer">⏸ Pause</button>';
  html+='</div>';
  ov.innerHTML=html;
}

function _makerClose(){
  const ov=document.getElementById('maker-ov');
  if(ov)ov.remove();
  if(window._makerIv){clearInterval(window._makerIv);window._makerIv=null;}
  document.body.classList.remove('focus-active');
  document.removeEventListener('keydown',_makerKey);
}

async function _makerFinish(){
  const st=_makerLoad();if(!st){_makerClose();return;}
  const id=st.taskId;_makerClear();_makerClose();
  await fertig(id);
}
async function _makerPause(){
  const st=_makerLoad();if(!st){_makerClose();return;}
  const id=st.taskId;_makerClear();_makerClose();
  await pauseA(id);
}

async function pauseA(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a.status!=='aktiv'||a._busy)return;
  const prev={gebucht:a.gebucht,aktSeit:a.aktSeit,status:a.status};a._busy=true;
  try{
    const gebucht=Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100;
    a.gebucht=gebucht;a.aktSeit=null;a.status='backlog';try{render();}catch(e){console.error('render@pauseA',e);}
    const ok=await dbPatch('aufgaben',id,{gebucht,akt_seit:null,status:'backlog'});
    if(!ok){a.gebucht=prev.gebucht;a.aktSeit=prev.aktSeit;a.status=prev.status;try{toast('⚠ Pause konnte nicht gespeichert werden.');}catch(_){}}
  }catch(e){console.error('pauseA',e);a.gebucht=prev.gebucht;a.aktSeit=prev.aktSeit;a.status=prev.status;try{toast('⚠ Fehler beim Pausieren.');}catch(_){}}
  finally{a._busy=false;try{render();}catch(e){console.error('render@pauseA2',e);}}
}
async function fertig(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  const prev={gebucht:a.gebucht,aktSeit:a.aktSeit,status:a.status,updated_at:a.updated_at};a._busy=true;
  try{
    const gebucht=a.status==='aktiv'?Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100:a.gebucht;
    const pid=a.pid;

      const rec={id:nid('a'),pid:a.pid,titel:a.titel,typ:a.typ,status:'neu',prio:a.prio,
        ziel_id:a.zielId,teilziel_id:a.teilzielId,geplant:a.geplant,gebucht:0,

      S.aufgaben.push(normalizeAufgabe(rec));
      await dbInsert('aufgaben',rec);
    }
    // Fokus aufräumen wenn diese Aufgabe der aktive Fokus war
    if(localStorage.getItem('fokus_id_'+aP)===id)localStorage.removeItem('fokus_id_'+aP);
    if(a.teilzielId){

      toast('✓ Erledigt · ohne Monatsziel-Zuordnung kein Paddel-Punkt');
    }
    checkP1Done(pid);
    const restOffen=S.aufgaben.filter(x=>String(x.pid)===String(aP)&&x.status!=='erledigt');
    if(!restOffen.length)setTimeout(()=>celebrate('🏆','Alle Aufgaben erledigt! 🎉'),1500);
  }catch(e){console.error('fertig',e);a.gebucht=prev.gebucht;a.aktSeit=prev.aktSeit;a.status=prev.status;a.updated_at=prev.updated_at;try{toast('⚠ Fehler beim Abschließen.');}catch(_){}}

}
function nextRecurringDate(fromDate,freq){
  const d=new Date(fromDate+'T12:00:00');
  if(freq==='daily')d.setDate(d.getDate()+1);
  else if(freq==='weekly')d.setDate(d.getDate()+7);
  else if(freq==='monthly')d.setMonth(d.getMonth()+1);
  else d.setDate(d.getDate()+1);
  return localDate(d);
}
async function toggleStep(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy||!a.ua||!a.ua[i])return;
  a._busy=true;
  const wasDone=a.ua[i].d;
  const prevStatus=a.status;const prevAktSeit=a.aktSeit;const prevGebucht=a.gebucht;
  try{
    a.ua[i].d=!a.ua[i].d;
    const patch={ua:a.ua};
    // mini celebration for single step check-off (Checkliste = Gedankenstütze, never auto-completes task)
    if(!wasDone&&a.ua[i].d){
      const row=document.getElementById('sr-'+id+'-'+i);
      if(row){row.classList.add('done-flash');const cb=row.querySelector('.sc');if(cb)cb.classList.add('pop');}
    }
    const ok=await dbPatch('aufgaben',id,patch);
    if(!ok){a.ua[i].d=wasDone;toast('⚠ Fehler beim Speichern');}
  }catch(e){console.error('toggleStep',e);a.ua[i].d=wasDone;a.status=prevStatus;a.aktSeit=prevAktSeit;a.gebucht=prevGebucht;}
  finally{
    a._busy=false;
    if(a.status==='erledigt'&&prevStatus!=='erledigt'){msOnTaskDone(a,'task:'+a.id);cm();render();}
    else if(document.getElementById('ovl')?.classList.contains('open')){openDetail(id);}
    else{render();}
  }
}
async function addStep(id){
  const inp=document.getElementById('si-'+id);if(!inp)return;
  const t=inp.value.trim();if(!t)return;
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.ua.push({t,d:false});
  await dbPatch('aufgaben',id,{ua:a.ua});
  // re-render modal if open, otherwise main view
  if(document.getElementById('ovl')?.classList.contains('open')){openDetail(id);}else{render();}
}
async function delStep(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||!a.ua||i<0||i>=a.ua.length)return;
  a.ua.splice(i,1);
  await dbPatch('aufgaben',id,{ua:a.ua});
  if(document.getElementById('ovl')?.classList.contains('open')){openDetail(id);}else{render();}
}

function tpReorder(fromIdx,toIdx){
  if(fromIdx===toIdx)return;
  const myA=S.aufgaben.filter(a=>String(a.pid)===String(aP)&&['aktiv','neu','backlog'].includes(a.status));
  const aktiv=myA.filter(a=>a.status==='aktiv');
  const offene=myA.filter(a=>['neu','backlog'].includes(a.status)).sort((a,b)=>{const po={P1:0,P2:1,P3:2};return(po[a.prio]??3)-(po[b.prio]??3)||(a.aktSeit||0)-(b.aktSeit||0);});
  const arr=[...aktiv,...offene].slice(0,10);
  const orderKey='tagesplan-order-'+aP+'-'+TODAY;
  const saved=JSON.parse(localStorage.getItem(orderKey)||'[]');
  if(saved.length)arr.sort((a,b)=>{const ai=saved.indexOf(a.id),bi=saved.indexOf(b.id);return(ai<0?999:ai)-(bi<0?999:bi);});
  const [item]=arr.splice(fromIdx,1);
  arr.splice(toIdx,0,item);
  localStorage.setItem(orderKey,JSON.stringify(arr.map(a=>a.id)));
  render();
}

async function saveDetailField(id,field,val){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  let prevDl=null;
  if(field==='titel'){if(!val||!val.trim())return;a.titel=val.trim();}
  else if(field==='notiz'){a.notiz=val.trim()||null;}
  else if(field==='dl'){prevDl=a.dl||null;a.dl=val||null;}
  else if(field==='geplant'){a.geplant=val;}
  else if(field==='ziel_id'){a.zielId=val||null;a.teilzielId=null;}
  else if(field==='vertraulich'){a.vertraulich=val;}
  const patch={[field]:field==='titel'?a.titel:field==='notiz'?a.notiz:field==='dl'?a.dl:field==='geplant'?a.geplant:field==='vertraulich'?val:val||null};
  if(field==='ziel_id')patch.teilziel_id=null;
  // Deadline-Shift zählen: nur wenn schon eine dl existierte und der neue Wert anders ist
  if(field==='dl'&&prevDl&&val&&prevDl!==val){
    a.shiftCount=(a.shiftCount||0)+1;
    patch.shift_count=a.shiftCount;
  }
  await dbPatch('aufgaben',id,patch);
  if(field==='dl'&&val&&!gcalGetEvtId(id))gcalCreateEvent(a);
  render();
}
async function setStatusModal(id,st){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  a._busy=true;
  const prev={status:a.status,aktSeit:a.aktSeit,gebucht:a.gebucht,updated_at:a.updated_at};
  try{
    const now=new Date().toISOString();
    let patch={status:st,updated_at:now};
    if(st==='aktiv')patch.akt_seit=now;
    else if(a.status==='aktiv'){patch.gebucht=Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100;patch.akt_seit=null;}
    Object.assign(a,{status:st,aktSeit:st==='aktiv'?Date.now():null,updated_at:now,...(patch.gebucht!==undefined?{gebucht:patch.gebucht}:{})});
    try{render();}catch(e){console.error('render@setStatusModal',e);}
    const ok=await dbPatch('aufgaben',id,patch);
    if(!ok){a.status=prev.status;a.aktSeit=prev.aktSeit;a.gebucht=prev.gebucht;a.updated_at=prev.updated_at;toast('⚠️ Speichern fehlgeschlagen','var(--red)');}
    else{
      const _teamSlack=S.personen.filter(p=>p.id!==aP&&p.slack_id).map(p=>p.slack_id);
      if(st==='erledigt'){
        // v179: Auto-Resolve — wartende Aufgaben dieser Aufgabe freigeben
        try{await resolveWartendeAufAufgabe(a.id);}catch(e){console.error('resolveWartende',e);}
        // v174 §14: Leading-Input pushen (nur wenn MS eine Metrik hat — intern gegated).
        msOnTaskDone(a,'task:'+a.id);
        // #4: Paddel-Gate — nur Feier wenn Monatsziel zugeordnet (Ovens: no fake rewards)
        if(a.teilzielId){celebrateErl(a);}
        else{toast('✓ Erledigt · ohne Monatsziel-Zuordnung kein Paddel-Punkt');}
        checkP1Done(a.pid);
        const restOffen=S.aufgaben.filter(x=>String(x.pid)===String(aP)&&x.status!=='erledigt');
        if(!restOffen.length)setTimeout(()=>celebrate('🏆','Alle Aufgaben erledigt! 🎉'),1500);
      }
      if(st==='aktiv')notify('aufgabe_gestartet',{prio:a.prio||null,team_slack_ids:_teamSlack,actor_slack_id:me()?.slack_id||''});
    }
  }catch(e){console.error('setStatusModal',e);a.status=prev.status;a.aktSeit=prev.aktSeit;a.gebucht=prev.gebucht;a.updated_at=prev.updated_at;toast('⚠️ Fehler beim Statuswechsel','var(--red)');}
  finally{a._busy=false;cm();try{render();}catch(e){console.error('render@setStatusModal2',e);}}

async function setTeilziel(id,tzid){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  a._busy=true;
  const prev={teilzielId:a.teilzielId,zielId:a.zielId};
  a.teilzielId=tzid||null;
  const patch={teilziel_id:tzid||null};
  // Wenn neuer MS zu anderem Ziel gehört → Ziel mitziehen
  if(tzid){
    for(const z of S.ziele){
      if((z.teilziele||[]).some(t=>t.id===tzid)){
        if(String(a.zielId)!==String(z.id)){a.zielId=z.id;patch.ziel_id=z.id;}
        break;
      }
    }
  }
  const ok=await dbPatch('aufgaben',id,patch);
  if(!ok){a.teilzielId=prev.teilzielId;a.zielId=prev.zielId;toast('⚠ Fehler beim Speichern','var(--red)');}
  a._busy=false;
  render();
}
async function reassignAufgabe(id,newPid){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy||String(a.pid)===String(newPid))return;
  a._busy=true;
  const prev={pid:a.pid,status:a.status,erstelltVon:a.erstelltVon,inboxStatus:a.inboxStatus};
  try{
    const istFremdPid=String(newPid)!==String(aP);
    const neuePerson=person(newPid);
    a.pid=newPid;a.status='zugewiesen';a.erstelltVon=a.erstelltVon||aP;
    if(istFremdPid)a.inboxStatus='neu';
    const patch={pid:newPid,status:'zugewiesen',erstellt_von:a.erstelltVon};
    if(istFremdPid)patch.inbox_status='neu';
    cm();render();
    const ok=await dbPatch('aufgaben',id,patch);
    if(!ok){a.pid=prev.pid;a.status=prev.status;a.erstelltVon=prev.erstelltVon;a.inboxStatus=prev.inboxStatus;toast('⚠ Fehler beim Zuweisen');}
    else if(istFremdPid){
      notify('aufgabe_zugewiesen',{aufgabe:a.titel,prio:a.prio,dl:a.dl,fuer:neuePerson?{id:neuePerson.id,name:neuePerson.name,slack_id:neuePerson.slack_id}:null});
    }
  }catch(e){console.error('reassignAufgabe',e);a.pid=prev.pid;a.status=prev.status;a.erstelltVon=prev.erstelltVon;a.inboxStatus=prev.inboxStatus;toast('⚠ Fehler beim Zuweisen');}
  finally{a._busy=false;render();}
}
async function delAufgabe(id){

}

window._monZielDragId=null;
function _monZielDropOn(toId){
  const fromId=window._monZielDragId;window._monZielDragId=null;
  if(!fromId||String(fromId)===String(toId))return;
  const order=[...(window._monZielRenderOrder||[])].map(String);
  const fi=order.indexOf(String(fromId)),ti=order.indexOf(String(toId));
  if(fi<0||ti<0)return;
  order.splice(fi,1);order.splice(ti,0,String(fromId));
  localStorage.setItem('mz_ziel_order_'+aP,JSON.stringify(order));
  window._mzOrder=order;
  rMonat();
}
// v192: Ziele-Matrix Helper — MZ in Monat einplanen / aus Plan entfernen / Pool-Inline-Add.
async function _zgSetMonth(tzId,yyyymm){
  const tz=_tzById(tzId);if(!tz)return;
  const y=parseInt(yyyymm.slice(0,4),10),m=parseInt(yyyymm.slice(5,7),10);
  const last=new Date(y,m,0); // letzter Tag des Monats
  const newDatum=last.toISOString().slice(0,10);
  if(tz.datum===newDatum)return;
  tz.datum=newDatum;
  await dbPatch('teilziele',tzId,{datum:newDatum}).catch(()=>{});
  toast('🗓 → '+newDatum.slice(8)+'.'+newDatum.slice(5,7)+'.');
  render();
}

  if(!confirm('Monatsziel "'+tz.name+'" zurück in den Pool (ohne Datum)?'))return;

}

      out+='<div onclick="event.stopPropagation();editZiel(\''+z.id+'\')" style="width:'+COL_ZIEL+'px;flex-shrink:0;background:'+(z.isBottleneck?'var(--red-bg)':f.bg)+';border:1.5px solid '+(z.isBottleneck?'var(--red-bd)':f.bd)+';border-left:4px solid '+_bnBd+';border-radius:0 8px 8px 0;padding:10px 12px;cursor:pointer;display:flex;flex-direction:column;gap:3px">';

      } else {
        out+='<div style="display:flex;align-items:center;gap:5px"><span style="font-size:11px">🏁</span><span style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.3px">Ziel</span>'+(z.isBottleneck?'<span style="font-size:9px;font-weight:700;color:var(--red);margin-left:auto">🚧</span>':'')+'</div>';

      out+='<div style="font-size:13px;font-weight:700;color:var(--text);line-height:1.25;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+esc(z.name)+'</div>';

        out+='<div style="display:flex;align-items:baseline;gap:6px"><span style="font-size:18px;font-weight:800;color:'+f.tc+';line-height:1;font-variant-numeric:tabular-nums">'+_ankerLbl+'</span><span style="font-size:10px;color:var(--t3)">'+esc(z.metrik)+(_zAgg.anker?'':' · '+(z.leadingCount||'?')+'/'+_freqLbl)+'</span></div>';
        out+='</div>';
      } else if(z.metrik){
        out+='<div style="font-size:10px;color:var(--t2);margin-top:auto">📋 '+esc(z.metrik)+(z.leadingCount?' · '+z.leadingCount+'/'+(z.leadingFreq==='weekly'?'wöch':z.leadingFreq==='monthly'?'mtl':'tag'):'')+(z.zielWert?' · Anker '+z.zielWert:'')+'</div>';
      }
      out+='</div>';

      out+='</div>'; // row close
    };

              out+=prioTag(a.prio,null,false);

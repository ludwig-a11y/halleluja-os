<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Halleluja OS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="H'OS">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --text:#1a1a1a;--t2:#6b6b6b;--t3:#a0a0a0;
  --bg:#f1f0ef;--sf:#fff;--bd:#e5e5e3;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--blue-bd:#bfdbfe;
  --green:#15803d;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --red:#b91c1c;--red-bg:#fef2f2;--red-bd:#fecaca;
  --amber:#a16207;--amber-bg:#fefce8;--amber-bd:#fde68a;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-bd:#ddd6fe;
  --gray-bg:#f8f8f7;
  --orange:#c2410c;--orange-bg:#fff7ed;--orange-bd:#fed7aa;
  --pink:#9d174d;--pink-bg:#fdf2f8;--pink-bd:#fbcfe8;
  --inv:#1a1a1a;--inv-t:#fff;--hero:#1a1a1a;--hero-t:#fff;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;--r-full:99px;
}
html.dark{
  --text:#e0ded9;--t2:#908d88;--t3:#8a8782;
  --bg:#131211;--sf:#1b1a18;--bd:#282624;
  --blue:#7da8e8;--blue-bg:#161a21;--blue-bd:#253550;
  --green:#6ec98b;--green-bg:#151c17;--green-bd:#1e3d28;
  --red:#e88a8a;--red-bg:#1c1515;--red-bd:#3a2424;
  --amber:#d4a94d;--amber-bg:#1b1912;--amber-bd:#3a3118;
  --purple:#a98ee0;--purple-bg:#18151f;--purple-bd:#2e2445;
  --gray-bg:#161514;
  --orange:#d49262;--orange-bg:#1b1812;--orange-bd:#3a2d18;
  --pink:#f472b6;--pink-bg:#1c1318;--pink-bd:#452035;
  --inv:#f0efed;--inv-t:#1a1a1a;--hero:#252422;--hero-t:#f0efed;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column}

@media(max-width:768px){
  .bar{padding:0 12px;height:50px}
  .logo{font-size:14px;border:none;padding:0;margin:0}
  .nt:not(.new-btn){display:none!important}
  .nt.new-btn{display:none!important}
  .sb{display:none!important}
  .main{padding:14px 14px 90px}
  .modal{border-radius:20px 20px 0 0;width:100%;max-width:100%;position:fixed;bottom:0;left:0;right:0;max-height:90vh;padding:20px 14px 32px}
  .ovl{align-items:flex-end;padding:0}
  .f2{grid-template-columns:1fr}
  #mob-tabs{display:flex!important}
  #mob-add{display:flex!important}
  #mob-memo{display:flex!important}
  input,textarea,select{font-size:16px!important}
  .btn{min-height:44px;font-size:13px!important}
  .card{padding:12px 14px}
}
@media(min-width:769px){
  #mob-tabs{display:none}
  #mob-add{display:none}
  #mob-memo{display:none}
}
#mob-tabs{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--sf);border-top:1px solid var(--bd);z-index:50;align-items:center;justify-content:space-around;padding:0 8px}
.mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;font-family:inherit;padding:8px 4px;color:var(--t3);font-size:9px;font-weight:500;transition:color .15s}
.mob-tab:hover{color:var(--t2)}
.mob-tab.on{color:var(--text);font-weight:600}
.mob-tab svg{width:20px;height:20px}
#mob-add{position:fixed;bottom:72px;right:18px;z-index:51;width:52px;height:52px;border-radius:50%;background:var(--inv);color:var(--inv-t);border:none;font-size:26px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.25);font-family:inherit;transition:transform .15s,box-shadow .15s}
#mob-add:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(0,0,0,.3)}
#mob-add:active{transform:scale(.97)}
#mob-memo{position:fixed;bottom:132px;right:18px;z-index:51;width:44px;height:44px;border-radius:50%;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);font-size:18px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.15);font-family:inherit;transition:transform .15s}
#mob-memo:active{transform:scale(.93)}

#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.login-box{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-xl);padding:32px 36px;width:340px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.login-title{font-size:17px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--t3);margin-bottom:20px}
.person-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.person-btn{padding:10px 8px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.person-btn:hover{border-color:var(--text)}
.person-btn.selected{border:2px solid var(--text);background:var(--gray-bg)}
.pin-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--bd);transition:background .15s}
.pin-dot.filled{background:var(--inv)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-key{padding:14px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.pin-key:hover{background:var(--gray-bg)}
.login-err{font-size:12px;color:var(--red);text-align:center;min-height:18px;margin-top:8px}

.bar{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;height:46px;flex-shrink:0;gap:6px}
.logo{font-size:13px;font-weight:700;padding-right:12px;border-right:1px solid var(--bd);margin-right:6px;white-space:nowrap}
.nt{font-size:13px;padding:0 14px;height:46px;border:none;border-bottom:2px solid transparent;cursor:pointer;background:transparent;color:var(--t2);font-family:inherit;font-weight:500;white-space:nowrap;transition:color .15s,border-color .15s}
.nt:hover{color:var(--text)}
.nt.on{color:var(--text);font-weight:600;border-bottom-color:var(--text)}
.nt.new-btn{color:var(--blue);font-weight:600;border:1px solid var(--blue-bd);background:var(--blue-bg);border-radius:8px;height:32px;padding:0 14px;font-size:13px}
.nt.meet-btn{color:var(--amber);font-weight:600;border:1px solid var(--amber-bd);background:var(--amber-bg);border-radius:8px;height:32px;padding:0 14px;margin-left:8px;font-size:13px}
.shell{display:flex;flex:1;overflow:hidden}
.sb{width:168px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.gl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:0 8px;margin:12px 0 5px}
.sbn{width:100%;text-align:left;padding:7px 8px;border-radius:9px;border:none;cursor:pointer;background:transparent;font-family:inherit;margin-bottom:2px;display:flex;align-items:center;gap:8px;transition:background .12s}
.sbn.on,.sbn:hover{background:var(--bg)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:8px;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:#d0d0ce}
.card[onclick]:hover,.card[style*="cursor:pointer"]:hover{border-color:var(--t3);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tag{font-size:10px;padding:2px 8px;border-radius:var(--r-full);font-weight:500;white-space:nowrap;display:inline-block;transition:opacity .15s}
.btn{font-size:11px;padding:5px 12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s ease}
.btn:hover{opacity:.85;transform:translateY(-0.5px)}
.btn:active{transform:translateY(0);opacity:1}
.btn-dk{background:var(--inv);color:var(--inv-t)}
.btn-dk:hover{opacity:.85}
.btn-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.btn-ok:hover{background:var(--green-bd);color:var(--green)}
.btn-gr{background:var(--gray-bg);color:var(--t2);border:1px solid var(--bd)}
.btn-gr:hover{background:var(--bd);border-color:var(--t3)}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--red-bd)}
.btn-red:hover{background:var(--red-bg)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.btn-purple:hover{background:var(--purple-bd)}
.btn-toggle{font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid var(--bd);background:var(--gray-bg);color:var(--t2);cursor:pointer;font-family:inherit;font-weight:400;transition:all .15s}
.btn-toggle.on{background:var(--inv);color:var(--inv-t);font-weight:700}
.hoverable{transition:background .12s}
.hoverable:hover{background:var(--gray-bg)}
.hover-lift{transition:border-color .15s}
.hover-lift:hover{border-color:var(--t3)}
.hover-dim{transition:opacity .15s}
.hover-dim:hover{opacity:.85}
.lock{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.timer{background:var(--gray-bg);border-radius:9px;padding:7px 11px;text-align:center;flex-shrink:0;min-width:80px}
.tn{font-size:17px;font-weight:700;font-family:monospace;letter-spacing:-.5px}
.tbar{height:3px;border-radius:99px;background:var(--bd);margin-top:4px;overflow:hidden}
.tf{height:100%;border-radius:99px;background:var(--blue)}
.sw{padding-left:8px;border-left:2px solid var(--blue-bd);margin:8px 0}
.sr{display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;user-select:none}
.sc{width:13px;height:13px;border-radius:3px;border:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.sc:hover{border-color:var(--t2)}
.sc.dn{background:var(--inv);border-color:var(--inv)}
.sc.pop{animation:stepPop .4s ease}
@keyframes stepPop{0%{transform:scale(1)}30%{transform:scale(1.6)}60%{transform:scale(.9)}100%{transform:scale(1)}}
.sr.done-flash{animation:rowFlash .5s ease}
@keyframes rowFlash{0%{background:transparent}30%{background:var(--green-bg)}100%{background:transparent}}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--inv);color:var(--inv-t);padding:12px 24px;border-radius:var(--r-full);font-size:15px;font-weight:600;z-index:9999;pointer-events:none;opacity:0;transition:transform .4s cubic-bezier(.2,1,.3,1),opacity .4s ease}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.hide{transform:translateX(-50%) translateY(-40px);opacity:0}
.focus-takeover{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-100%);z-index:9990;display:flex;align-items:center;gap:12px;background:var(--hero);padding:14px 28px;border-radius:0 0 16px 16px;box-shadow:0 4px 24px rgba(0,0,0,.15);transition:transform .4s cubic-bezier(.22,1,.36,1);pointer-events:none}
.focus-takeover.show{transform:translateX(-50%) translateY(0);pointer-events:auto}
.focus-takeover.hide{transform:translateX(-50%) translateY(-100%)}
.ft-emoji{font-size:28px}
.ft-text{font-size:16px;font-weight:700;color:var(--hero-t);letter-spacing:-.3px}
.ft-sub{font-size:13px;font-weight:500;color:var(--hero-t);opacity:.7}
.cele-wrap{position:fixed;inset:0;z-index:9998;pointer-events:none;overflow:hidden}
.cele-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:9999;text-align:center;pointer-events:none;opacity:0;transition:transform .5s cubic-bezier(.2,1.2,.3,1),opacity .4s ease}
.cele-msg.show{transform:translate(-50%,-50%) scale(1);opacity:1}
.cele-msg.hide{transform:translate(-50%,-50%) scale(.8);opacity:0}
.cele-emoji{font-size:64px;display:block;margin-bottom:8px}
.cele-text{font-size:22px;font-weight:800;color:var(--text);background:var(--sf);padding:16px 32px;border-radius:var(--r-xl);box-shadow:0 8px 32px rgba(0,0,0,.15)}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg) translateX(0)}40%{opacity:1}100%{opacity:0;transform:translateY(85vh) rotate(1080deg) translateX(var(--cx))}}
.sl{font-size:11px}.sl.dn{text-decoration:line-through;color:var(--t3)}
.asi{flex:1;font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--text);font-family:inherit;outline:none}
.zcard{border-radius:var(--r-lg);padding:18px;margin-bottom:14px;border:1px solid;transition:box-shadow .15s,transform .15s}
.zcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.05)}
.pbar{height:5px;border-radius:99px;background:rgba(0,0,0,.08);overflow:hidden;flex:1}
.pbar-fill{height:100%;border-radius:99px;transition:width .3s}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:100;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.ovl.open{display:flex}
.modal{background:var(--sf);border-radius:var(--r-xl);padding:24px;width:520px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.mt{font-size:15px;font-weight:700;margin-bottom:16px}
.fl{margin-bottom:13px}
.fl label{display:block;font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fl input,.fl select,.fl textarea{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-bg)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.tz-block{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:11px;padding:12px 14px;margin-bottom:8px}
.tz-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tz-title{font-size:13px;font-weight:600;color:var(--purple);flex:1}
.tz-done{text-decoration:line-through;opacity:.5}
.tz-add-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:9px;border:1.5px dashed var(--purple-bd);background:transparent;color:var(--purple);font-size:11px;font-family:inherit;cursor:pointer;width:100%;margin-top:6px;opacity:.7}
.tz-add-btn:hover{opacity:1;background:rgba(124,58,237,.06)}
.team-block{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.team-block:hover{border-color:#d0d0ce;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.team-block-head{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;background:var(--gray-bg)}
.team-h-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--bd)}
.team-h-row:last-child{border:none}
.team-h-row:hover{background:var(--gray-bg)}
.empty-state{text-align:center;color:var(--t3);padding:60px 20px;font-size:13px;line-height:1.8}
.settings-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.settings-row:last-child{border:none}
.ai-result{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:10px;padding:12px;margin:10px 0;font-size:12px;line-height:1.6}

#quote-overlay{position:fixed;inset:0;background:#0d0d0d;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;opacity:0;pointer-events:none;transition:opacity .5s}
#quote-overlay.show{opacity:1;pointer-events:all}
#quote-text{color:#fff;font-size:20px;font-weight:400;line-height:1.7;max-width:min(580px,90vw);text-align:center;letter-spacing:.01em}
#quote-author{color:#555;font-size:12px;margin-top:20px;letter-spacing:.1em;text-transform:uppercase}
#quote-skip{margin-top:32px;background:transparent;border:1px solid #333;color:#444;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit}
#quote-skip:hover{border-color:#555;color:#666}

.kpi-block{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:12px;transition:border-color .15s}
.kpi-block-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.kpi-item{border:1px solid var(--bd);border-radius:10px;padding:10px 12px;position:relative}
.kpi-item.fällig{border-color:var(--text)}
.kpi-item.inaktiv{opacity:.5}
.kpi-name{font-size:10px;color:var(--t3);margin-bottom:2px}
.kpi-goal-ref{font-size:9px;color:var(--blue);margin-bottom:6px}
.kpi-val{font-size:20px;font-weight:700;line-height:1}
.kpi-val.ok{color:var(--green)}
.kpi-val.nok{color:var(--red)}
.kpi-soll{font-size:11px;color:var(--t3)}
.kpi-freq-label{font-size:9px;color:var(--t3);margin-top:3px}
.kpi-entry{display:flex;gap:5px;margin-top:7px}
.kpi-entry input{flex:1;padding:4px 7px;border:1px solid var(--bd);border-radius:6px;font-size:13px;font-family:inherit;background:var(--gray-bg);color:var(--text);outline:none}
.kpi-entry button{padding:4px 9px;border-radius:6px;background:var(--inv);color:var(--inv-t);border:none;font-size:11px;cursor:pointer;font-family:inherit}

.deleg-block{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-top:16px}
.deleg-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.deleg-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--bd)}
.deleg-row:last-child{border:none}

.prio-wrap{position:relative;display:inline-block}
.prio-dd{position:absolute;top:24px;left:0;background:var(--sf);border:1px solid var(--bd);border-radius:10px;z-index:50;min-width:130px;box-shadow:0 4px 16px rgba(0,0,0,.1);display:none}
.prio-dd.open{display:block}
.prio-dd-item{padding:8px 12px;font-size:11px;cursor:pointer;font-weight:500}
.prio-dd-item:hover{background:var(--gray-bg)}
.prio-dd-item:first-child{border-radius:10px 10px 0 0}
.prio-dd-item:last-child{border-radius:0 0 10px 10px}
.main::-webkit-scrollbar,.modal::-webkit-scrollbar,.sb::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-track,.modal::-webkit-scrollbar-track,.sb::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb,.modal::-webkit-scrollbar-thumb,.sb::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px}
.main::-webkit-scrollbar-thumb:hover,.modal::-webkit-scrollbar-thumb:hover{background:var(--t3)}
@keyframes bell-shake{0%,100%{transform:rotate(0)}15%{transform:rotate(18deg)}30%{transform:rotate(-16deg)}45%{transform:rotate(12deg)}60%{transform:rotate(-10deg)}75%{transform:rotate(6deg)}90%{transform:rotate(-4deg)}}
@keyframes sonder-pulse{0%,100%{box-shadow:0 0 0 0 rgba(161,98,7,.4)}50%{box-shadow:0 0 0 8px rgba(161,98,7,0)}}
.kpi-item.sonder{border-color:var(--amber);background:var(--amber-bg)}
</style>
</head>
<body>

<div id="quote-overlay">
  <div id="quote-text"></div>
  <div id="quote-author"></div>
  <button id="quote-skip" onclick="hideQuote()">weiter</button>
</div>

<div id="login-screen">

async function supa(path,opts={}){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),5000);
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/'+path,{
      signal:ctrl.signal,
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation',...(opts.headers||{})},
      method:opts.method||'GET',
      body:opts.body?JSON.stringify(opts.body):undefined
    });
    clearTimeout(tid);
    if(!r.ok){console.error('Supabase',path,await r.text());return null;}
    const t=await r.text();return t?JSON.parse(t):true;
  }catch(e){clearTimeout(tid);console.error('supa',e);return null;}
}

async function loadData(){
  const [personen,teams,ziele,kpis,teilziele,aufgaben,kpiVals,checkins,signale,wochenresets,beobachtungen,kontextFeed,decisionRequests]=await Promise.all([
    dbGet('personen','select=*&order=ci'),dbGet('teams','select=*'),
    dbGet('ziele','select=*&order=created_at'),dbGet('kpis','select=*'),
    dbGet('teilziele','select=*&order=created_at'),dbGet('aufgaben','select=*&order=created_at'),
    dbGet('kpi_vals','select=*'),dbGet('checkins','select=*'),
    dbGet('signale','select=*&order=created_at.desc'),
    dbGet('wochenresets','select=*&order=created_at.desc'),
    dbGet('beobachtungen','select=*&order=created_at.desc'),
    dbGet('kontext_feed','select=*&order=created_at.desc&limit=50'),
    dbGet('decision_requests','select=*&order=created_at.desc'),
  ]);
  S.personen=personen||[];
  S.teams=(teams||[]).map(t=>({...t,members:t.members||[]}));
  S.ziele=(ziele||[]).map(z=>({
    ...z,verantwortlichId:z.verantwortlich_id,
    kpis:(kpis||[]).filter(k=>k.ziel_id===z.id).map(k=>({...k,zielId:k.ziel_id})),
    teilziele:(teilziele||[]).filter(t=>t.ziel_id===z.id).map(t=>({...t,zielId:t.ziel_id,verantwortlichId:t.verantwortlich_id,datum:t.datum||''}))
  }));
  S.aufgaben=(aufgaben||[]).map(normalizeAufgabe);
  // Auto-reassign: @mention in Titel → Person zuweisen
  S.aufgaben.forEach(a=>{
    if(a.status!=='neu'&&a.status!=='zugewiesen')return;
    const m=a.titel.match(/@(\w+)/i);if(!m)return;
    const mName=m[1].toLowerCase();
    const matched=S.personen.find(p=>p.name.toLowerCase().startsWith(mName)||p.name.split(' ')[0].toLowerCase()===mName);
    if(matched&&matched.id!==a.pid){
      a.pid=matched.id;a.status='zugewiesen';a.erstelltVon=a.erstelltVon||a.pid;
      dbPatch('aufgaben',a.id,{pid:matched.id,status:'zugewiesen',erstellt_von:a.erstelltVon});
    }
  });
  S.kpiVals={};
  (kpiVals||[]).forEach(v=>{const k=v.pid+'-'+v.kpi_id;if(!S.kpiVals[k]||v.datum>S.kpiVals[k].datum)S.kpiVals[k]={val:v.val,datum:v.datum};});
  S.checkins={};

  S.signale=(signale||[]);
  S.wochenresets=(wochenresets||[]);
  S.beobachtungen=(beobachtungen||[]);
  S.kontext=(kontextFeed||[]);
  S.decisionRequests=(decisionRequests||[]);
  try{S.kpiToday=JSON.parse(localStorage.getItem('kpiToday_'+TODAY)||'{}');}catch(e){S.kpiToday={};}
}

  if(df<0)return{l:Math.abs(df)+'d überfällig',bg:'var(--red-bg)',c:'var(--red)'};

  if(df===1)return{l:'Morgen',bg:'#fff7ed',c:'#c2410c'};
  if(df<=4)return{l:'in '+df+' Tagen',bg:'var(--amber-bg)',c:'var(--amber)'};
  return{l:d.slice(8)+'.'+d.slice(5,7)+'.',bg:'var(--gray-bg)',c:'var(--t3)'};
}

async function incrementKpi(kpiId,pid){

function showSonderCelebration(pid,label,val,ziel){
  const p=person(pid);
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0],[660,.15],[440,.35],[550,.6],[440,.9]].forEach(([freq,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(.5,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+1.2);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+1.5);
    });
  }catch(e){}
  const el=document.createElement('div');
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;text-align:center;padding:24px';
  el.onclick=()=>el.remove();
  el.innerHTML='<div style="font-size:90px;animation:bell-shake .6s ease infinite">🔔</div>'
    +'<div style="font-size:11px;font-weight:700;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin:16px 0 8px">Verkauf abgeschlossen</div>'
    +'<div style="font-size:36px;font-weight:900;color:#fff;margin-bottom:8px">'+(p?p.name:'')+'</div>'
    +'<div style="font-size:18px;color:rgba(255,255,255,.7);margin-bottom:32px">'+esc(label)+' · '+val+' / '+ziel+'</div>'
    +'<div style="font-size:12px;color:rgba(255,255,255,.35)">Tippen zum Schließen</div>';
  document.body.appendChild(el);
  showKonfetti();
  setTimeout(()=>el.remove(),10000);
}
let _dataPoll=null,_dataHash='',_kpiHash='',_dataPending=false;
function _aufgabenHash(arr){return arr.map(a=>a.id+a.status+(a.updated_at||'')).join('|');}
function _kpiHashFn(arr){return arr.map(k=>k.id+(k.sonder?'1':'0')+(k.pid||'')+k.label).join('|');}
function startDataPoller(){
  if(_dataPoll){clearInterval(_dataPoll);_dataPoll=null;}
  _dataHash=_aufgabenHash(S.aufgaben);
  _kpiHash=_kpiHashFn(S.ziele.flatMap(z=>z.kpis||[]));
  _dataPoll=setInterval(async()=>{
    const [aufgaben,signale,kpis,wochenresets,beobachtungen,kontextFeed,decisionRequests]=await Promise.all([
      dbGet('aufgaben','select=*&order=created_at'),
      dbGet('signale','select=*&order=created_at.desc'),
      dbGet('kpis','select=*'),
      dbGet('wochenresets','select=*&order=created_at.desc'),
      dbGet('beobachtungen','select=*&order=created_at.desc'),
      dbGet('kontext_feed','select=*&order=created_at.desc&limit=50'),
      dbGet('decision_requests','select=*&order=created_at.desc')
    ]);
    if(decisionRequests)S.decisionRequests=decisionRequests;
    if(kontextFeed)S.kontext=kontextFeed;
    let changed=false;
    if(aufgaben){
      const newHash=_aufgabenHash(aufgaben);
      if(newHash!==_dataHash){
        S.aufgaben=aufgaben.map(normalizeAufgabe);
        if(signale)S.signale=signale;
        _dataHash=newHash;
        changed=true;
      }
    }
    if(kpis){
      const newKpiHash=_kpiHashFn(kpis);
      if(newKpiHash!==_kpiHash){
        S.ziele.forEach(z=>{z.kpis=kpis.filter(k=>k.ziel_id===z.id).map(k=>({...k,zielId:k.ziel_id}));});
        _kpiHash=newKpiHash;
        changed=true;
      }
    }
    if(wochenresets)S.wochenresets=wochenresets;
    if(beobachtungen)S.beobachtungen=beobachtungen;
    if(!changed)return;
    const modalOpen=document.getElementById('ovl')?.classList.contains('open');
    if(modalOpen){_dataPending=true;}
    else{render();}
  },60000);
}

let _sonderSeen={},_sonderPoll=null;
function startSonderPoller(){
  if(_sonderPoll){clearInterval(_sonderPoll);_sonderPoll=null;}
  const sonderKpis=S.ziele.flatMap(z=>z.kpis||[]).filter(k=>k.sonder);
  // Baseline = max aller Personen heute, nicht nur aP
  sonderKpis.forEach(k=>{
    let maxVal=0;
    Object.entries(S.kpiVals).forEach(([key,v])=>{if(key.endsWith('-'+k.id)&&v.datum===TODAY)maxVal=Math.max(maxVal,v.val);});
    _sonderSeen[k.id]=maxVal;
  });
  _sonderPoll=setInterval(async()=>{
    if(!isGF())return;
    const sk=S.ziele.flatMap(z=>z.kpis||[]).filter(k=>k.sonder);
    if(!sk.length)return;
    const ids='('+sk.map(k=>'\''+k.id+'\'').join(',')+')';
    const rows=await dbGet('kpi_vals','kpi_id=in.'+ids+'&datum=eq.'+TODAY);
    if(!rows)return;
    rows.forEach(row=>{
      const prev=_sonderSeen[row.kpi_id]??0;
      if(row.val>prev&&row.pid!==aP){
        _sonderSeen[row.kpi_id]=row.val;
        const k=sk.find(x=>x.id===row.kpi_id);
        showSonderCelebration(row.pid,k?.label||'Verkauf',row.val,k?.ziel||'?');
      } else if(row.val>prev){
        _sonderSeen[row.kpi_id]=row.val;
      }
    });
  },5000);
}
function isFällig(freq){
  const now=new Date();
  if(freq==='täglich')return true;
  if(freq==='wöchentlich')return now.getDay()===5;
  if(freq==='monatlich'){const last=new Date(now.getFullYear(),now.getMonth()+1,0);return now.getDate()===last.getDate();}
  return false;
}
function freqLabel(freq){return{täglich:'Täglich',wöchentlich:'Wöchentlich (Freitag)',monatlich:'Monatlich (Monatsletzter)'}[freq]||freq;}

function rKpiBlock(pid){
  const myKpis=[];

    out+='<div style="height:3px;border-radius:99px;background:rgba(0,0,0,.07);overflow:hidden;margin:5px 0">'
      +'<div style="height:100%;border-radius:99px;background:'+(ok?'var(--green)':'var(--red)')+';width:'+pct+'%"></div></div>';

      }else{

        out+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)">';
        out+='<div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Tagesabschluss</div>';
        out+='<div class="kpi-entry">'

          +'<button onclick="submitKpi(\''+k.id+'\',\''+pid+'\')">✓</button>'
          +'</div></div>';
      }
    }
    out+='</div>';
  });
  out+='</div></div>';
  return out;

function kapTier(ratio){
  if(ratio<0.5) return{label:'Luft nach oben',short:'Luft',color:'var(--blue)',bar:'var(--blue)',bg:'var(--blue-bg)',bd:'var(--blue-bd)'};
  if(ratio<=1.1) return{label:'Stretch ↑',short:'Stretch',color:'var(--amber)',bar:'var(--amber)',bg:'var(--amber-bg)',bd:'var(--amber-bd)'};
  return{label:'Sehr ambitioniert',short:'Voll',color:'var(--t2)',bar:'#9ca3af',bg:'var(--gray-bg)',bd:'var(--bd)'};
}
function getKapazitaet(pid){
  const p=person(pid);if(!p)return null;
  const sw=p.stunden_woche||40;
  let fh=0;
  if(p.fokus_start&&p.fokus_end){
    const [sh,sm]=p.fokus_start.split(':').map(Number);
    const [eh,em]=p.fokus_end.split(':').map(Number);
    fh=Math.max(0,((eh*60+em)-(sh*60+sm))/60)*5;
  }
  const rh=Math.max(0,sw-fh);
  const now=new Date();
  const daysToSun=now.getDay()===0?0:7-now.getDay();
  const weekEndStr=localDate(new Date(now.getFullYear(),now.getMonth(),now.getDate()+daysToSun));
  let p1h=0,p23h=0,rnd=0;
  S.aufgaben.forEach(a=>{
    if(a.pid!==pid||a.status==='erledigt'||a.status==='idee')return;
    if(a.typ==='random'){rnd++;return;}
    const thisWeek=a.status==='aktiv'||(a.dl&&a.dl<=weekEndStr);
    if(!thisWeek)return;
    const h=a.geplant||1;
    if(a.prio==='P1')p1h+=h;
    else if(a.prio==='P2'||a.prio==='P3')p23h+=h;
  });
  return{fh,rh,p1h,p23h,rnd,sw};
}

async function saveWochenreset(){
  const{kw,jahr}=getKW();
  const wr=dieseWocheReset(aP);
  const zielId=document.getElementById('wr-ziel').value||null;
  const selTzIds=[...document.querySelectorAll('.wr-tz-check:checked')].map(x=>x.value);
  const newTzTexts=[1,2,3].map(n=>document.getElementById('wr-b'+n)?.value.trim()||'');
  const newTzIds=[];
  for(const txt of newTzTexts){
    if(!txt){newTzIds.push(null);continue;}
    if(zielId){
      const tzId=nid('tz');
      const tzRec={id:tzId,ziel_id:zielId,name:txt,verantwortlich_id:String(aP),datum:'',erledigt:false};
      const z=S.ziele.find(x=>x.id===zielId);
      if(z){z.teilziele=z.teilziele||[];z.teilziele.push({...tzRec,zielId,verantwortlichId:aP});}
      await dbInsert('teilziele',tzRec);
      newTzIds.push(tzId);
    } else {
      newTzIds.push(null);
    }
  }
  const allIds=[...selTzIds,...newTzIds.filter(Boolean)].slice(0,3);
  while(allIds.length<3)allIds.push(null);
  const allTZ=S.ziele.flatMap(z=>z.teilziele||[]);
  const tzName=id=>id?(allTZ.find(t=>t.id===id)?.name||null):null;
  const rec={
    id:'wr-'+String(aP)+'-'+kw+'-'+jahr,
    pid:aP,kw,jahr,
    blockiert:(document.getElementById('wr-hindernis')?.value.trim()||document.getElementById('wr-blockiert')?.value.trim()||''),
    wenn_dann:(document.getElementById('wr-wenndann')?.value.trim()||''),
    focus_ziel_id:zielId,
    big3_1_tz_id:allIds[0],big3_2_tz_id:allIds[1],big3_3_tz_id:allIds[2],
    big3_1:tzName(allIds[0])||newTzTexts[0]||null,big3_2:tzName(allIds[1])||newTzTexts[1]||null,big3_3:tzName(allIds[2])||newTzTexts[2]||null,
    big3_1_done:wr?.big3_1_tz_id===allIds[0]&&wr?.big3_1_done||false,
    big3_2_done:wr?.big3_2_tz_id===allIds[1]&&wr?.big3_2_done||false,
    big3_3_done:wr?.big3_3_tz_id===allIds[2]&&wr?.big3_3_done||false
  };
  S.wochenresets=S.wochenresets.filter(r=>r.id!==rec.id);
  S.wochenresets.push(rec);
  await supa('wochenresets',{method:'POST',body:rec,prefer:'resolution=merge-duplicates,return=minimal'});
  cm();render();
}

function showKonfetti(){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;inset:0;z-index:999;pointer-events:none;width:100%;height:100%';
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const pieces=Array.from({length:80},()=>({
    x:Math.random()*canvas.width,y:-20,w:8+Math.random()*8,h:8+Math.random()*8,
    r:Math.random()*Math.PI*2,vx:(Math.random()-0.5)*6,vy:3+Math.random()*4,
    vr:(Math.random()-0.5)*0.2,
    color:['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD'][Math.floor(Math.random()*7)]
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.vy+=0.1;
    });
    frame++;
    if(frame<120)requestAnimationFrame(draw);else canvas.remove();
  }
  draw();
}

function rSB(){
  const sorted=[...S.teams].sort((a,b)=>a.id==='gf'?-1:b.id==='gf'?1:0);
  // Pre-compute per-person counts
  const counts={};
  S.aufgaben.forEach(a=>{
    if(!canSee(a))return;
    if(!counts[a.pid])counts[a.pid]={neu:0,aktiv:0};
    if(a.status==='neu')counts[a.pid].neu++;
    else if(a.status==='aktiv')counts[a.pid].aktiv++;
  });
  // Build sets: myTeam, goalPartners, others
  const myTeamIds=new Set();
  const myGoalPartnerIds=new Set();
  const shownIds=new Set();
  // My teams
  const visIds=isGF()?null:isLead()?visiblePersonIds(aP):null;
  sorted.forEach(t=>{
    t.members.forEach(id=>{
      if(isGF()||id===aP||(visIds&&visIds.includes(id)))myTeamIds.add(id);
    });
  });
  // Goal partners: people working on same goals as me
  const myGoalIds=new Set(S.aufgaben.filter(a=>a.pid===aP&&a.zielId).map(a=>a.zielId));
  S.ziele.forEach(z=>{if(z.verantwortlich_id===aP)myGoalIds.add(z.id);});
  if(myGoalIds.size){
    S.aufgaben.forEach(a=>{if(myGoalIds.has(a.zielId)&&a.pid!==aP&&!myTeamIds.has(a.pid))myGoalPartnerIds.add(a.pid);});
    S.ziele.forEach(z=>{if(myGoalIds.has(z.id)&&z.verantwortlich_id&&z.verantwortlich_id!==aP&&!myTeamIds.has(z.verantwortlich_id))myGoalPartnerIds.add(z.verantwortlich_id);});
  }

  let h='';
  // Pre-compute streaks
  const streaks={};
  S.personen.forEach(p=>{
    const doneByDay={};
    S.aufgaben.forEach(a=>{if(a.pid===p.id&&a.status==='erledigt'&&a.updated_at){const d=localDate(new Date(a.updated_at));doneByDay[d]=true;}});
    let streak=0,d=new Date(TODAY+'T12:00:00');
    // If nothing done today, check if yesterday still counts (streak not broken yet today)
    if(!doneByDay[TODAY]){d.setDate(d.getDate()-1);}
    while(true){const ds=localDate(d);if(!doneByDay[ds])break;streak++;d.setDate(d.getDate()-1);}
    streaks[p.id]=streak;
  });

  // Helper to render a person row
  const renderPerson=(id,dim,clickOverride)=>{
    const p=person(id);if(!p)return'';
    const c=cl(p),isMe=id===aP;
    const ct=counts[id]||{neu:0,aktiv:0};
    const paddel=getPaddelCount(id);
    const opacity=dim?'opacity:.45;':'';
    const hasActive=ct.aktiv>0;
    const onclick=clickOverride||('switchPerson(\''+id+'\')');
    return '<button class="sbn'+(isMe?' on':'')+'" onclick="'+onclick+'" style="'+opacity+'position:relative;">'
      +'<div style="position:relative">'+av(p,22,8)
      +(hasActive?'<div style="position:absolute;bottom:-1px;right:-1px;width:7px;height:7px;border-radius:50%;background:var(--green);border:1.5px solid var(--sf)"></div>':'')
      +'</div>'
      +'<span style="flex:1;font-size:11px;font-weight:'+(isMe?600:400)+';color:'+(isMe?c.tc:'var(--text)')+'">'+esc(p.name)+'</span>'
      +'<div style="display:flex;gap:3px;align-items:center">'
      +((streaks[id]||0)>=2?'<span style="font-size:9px;color:#ef4444" title="'+streaks[id]+' Tage Streak">🔥'+streaks[id]+'</span>':'')
      +(ct.neu?'<span style="font-size:8px;background:var(--red-bg);color:var(--red);border-radius:99px;padding:1px 4px;font-weight:700">'+ct.neu+'</span>':'')
      +(ct.aktiv?'<span style="font-size:8px;background:'+c.bg+';color:'+c.tc+';border-radius:99px;padding:1px 4px;font-weight:700">'+ct.aktiv+'</span>':'')
      +'</div></button>';
  };

  // 1) My teams (full visibility)
  sorted.forEach(t=>{
    const vis=t.members.filter(id=>myTeamIds.has(id)&&person(id));
    if(!vis.length)return;
    h+='<div class="gl">'+esc(t.name)+'</div>';
    vis.forEach(id=>{shownIds.add(id);h+=renderPerson(id,false);});
  });

  // 2) Goal partners (shared goals, different team) — click opens shared goals view
  const goalPartners=[...myGoalPartnerIds].filter(id=>!shownIds.has(id)&&person(id));
  if(goalPartners.length){
    h+='<div class="gl" style="margin-top:14px">Gemeinsame Ziele</div>';
    goalPartners.forEach(id=>{
      shownIds.add(id);
      h+=renderPerson(id,false,'openSharedGoals(\''+id+'\')');
    });
  }

  // 3) Other teams (dimmed) — only if not GF (GF already sees all)
  if(!isGF()){
    sorted.forEach(t=>{
      const others=t.members.filter(id=>!shownIds.has(id)&&person(id));
      if(!others.length)return;
      h+='<div class="gl" style="margin-top:14px;opacity:.4">'+esc(t.name)+'</div>';
      others.forEach(id=>{shownIds.add(id);h+=renderPerson(id,true);});
    });
    // Anyone not in any team
    const noTeam=S.personen.filter(p=>!shownIds.has(p.id));
    if(noTeam.length){
      h+='<div class="gl" style="margin-top:14px;opacity:.4">Weitere</div>';
      noTeam.forEach(p=>{h+=renderPerson(p.id,true);});
    }
  }

  // 4) Firmen-Ticker: Heute-Überblick
  const todayDone=S.aufgaben.filter(a=>a.status==='erledigt'&&a.updated_at&&localDate(new Date(a.updated_at))===TODAY);
  const activeNow=S.aufgaben.filter(a=>a.status==='aktiv');
  const todayByPerson={};
  todayDone.forEach(a=>{const p=person(a.pid);if(p){if(!todayByPerson[a.pid])todayByPerson[a.pid]={name:p.name,count:0};todayByPerson[a.pid].count++;}});
  const topToday=Object.values(todayByPerson).sort((a,b)=>b.count-a.count).slice(0,3);

  h+='<div style="margin-top:auto;padding-top:14px;border-top:1px solid var(--bd)">';
  h+='<div class="gl">Heute im Team</div>';
  h+='<div style="display:flex;gap:12px;padding:6px 8px;margin-bottom:4px">';
  h+='<div style="text-align:center"><div style="font-size:16px;font-weight:700;color:var(--green)">'+todayDone.length+'</div><div style="font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px">erledigt</div></div>';
  h+='<div style="text-align:center"><div style="font-size:16px;font-weight:700;color:var(--blue)">'+activeNow.length+'</div><div style="font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px">aktiv</div></div>';
  h+='</div>';
  if(topToday.length){
    topToday.forEach(t=>{
      h+='<div style="font-size:10px;color:var(--t2);padding:1px 8px">'+esc(t.name)+' <span style="color:var(--green);font-weight:600">✓'+t.count+'</span></div>';
    });
  }
  h+='</div>';

  const sb=document.getElementById('sb');
  if(sb)sb.innerHTML=h;
}

async function cycleStepPid(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||!a.ua[i])return;
  const pids=S.personen.map(p=>p.id);
  const cur=a.ua[i].pid||a.pid;
  const idx=pids.indexOf(cur);
  const next=pids[(idx+1)%pids.length];
  a.ua[i].pid=next===a.pid?null:next;
  await dbPatch('aufgaben',id,{ua:a.ua});
  if(document.getElementById('ovl')?.classList.contains('open')){openDetail(id);}else{render();}
}
async function assignStepPid(id,i,newPid){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||!a.ua[i])return;
  a.ua[i].pid=newPid===a.pid?null:newPid;
  await dbPatch('aufgaben',id,{ua:a.ua});
  if(document.getElementById('ovl')?.classList.contains('open')){openDetail(id);}else{render();}
}

  const zN=getZielName(a),editable=canChangePrio(a);

  r+=dlTag(a.dl);
  r+='<button onclick="event.stopPropagation();startenA(\''+a.id+'\')" style="font-size:11px;padding:4px 12px;border-radius:8px;background:var(--inv);color:var(--inv-t);border:none;font-family:inherit;cursor:pointer;font-weight:600;margin-left:auto">▶ Los</button>';

  return r;
}
function rTag(){
  const zugewiesenA=S.aufgaben.filter(a=>a.pid===aP&&a.status==='zugewiesen');
  const myA=S.aufgaben.filter(a=>a.pid===aP&&canSee(a)&&a.status!=='zugewiesen');
  const aktiv=myA.filter(a=>a.status==='aktiv');
  const neu=myA.filter(a=>a.status==='neu'&&!(a.dl_type==='am'&&a.dl>TODAY));
  const bl=myA.filter(a=>a.status==='backlog'&&!(a.dl_type==='am'&&a.dl>TODAY)).sort((a,b)=>{
    const pd={'P1':0,'P2':1,'P3':2};
    const pp=(pd[a.prio]??3)-(pd[b.prio]??3);
    if(pp!==0)return pp;
    if(a.dl&&b.dl)return a.dl.localeCompare(b.dl);
    return a.dl?-1:b.dl?1:0;
  });
  const erl=myA.filter(a=>a.status==='erledigt'&&a.updated_at&&localDate(new Date(a.updated_at))===TODAY);
  const offene=[...neu,...bl].sort((a,b)=>{const po={'P1':0,'P2':1,'P3':2};return(po[a.prio]??3)-(po[b.prio]??3);});
  const naechste=aktiv.length?null:(offene[0]||null);
  const alleGeschafft=!aktiv.length&&!neu.length&&!bl.length;
  let out='';

  // ── Datum-Header mit Uhr + Streak ──
  {
    const d=new Date(TODAY+'T12:00:00');
    const wt=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'][d.getDay()];
    const tag=d.getDate();
    const mon=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'][d.getMonth()];
    // Streak berechnen
    const _dbd={};
    S.aufgaben.forEach(a=>{if(a.pid===aP&&a.status==='erledigt'&&a.updated_at){_dbd[localDate(new Date(a.updated_at))]=true;}});
    let _stk=0,_sd=new Date(TODAY+'T12:00:00');
    if(!_dbd[TODAY])_sd.setDate(_sd.getDate()-1);
    while(_dbd[localDate(_sd)]){_stk++;_sd.setDate(_sd.getDate()-1);}
    out+='<div style="margin-bottom:16px">';
    out+='<div style="font-size:15px;font-weight:700;color:var(--text)">'+wt+'</div>';
    out+='<div style="font-size:12px;color:var(--t2)">'+tag+'. '+mon+(_stk>=2?' · <span style="color:var(--orange)">🔥 '+_stk+' Tage Streak</span>':'')+'</div>';
    out+='</div>';
  }

  // ── Big 3 Wochenkompass ──
  const{kw:kwAkt}=getKW();
  const wrAktuell=dieseWocheReset(aP);
  if(wrAktuell&&(wrAktuell.big3_1||wrAktuell.big3_2)){
    const fz=S.ziele.find(z=>z.id===wrAktuell.focus_ziel_id);
    const f=fz?FARBEN[fz.farbe||0]:FARBEN[0];
    const doneCount=[wrAktuell.big3_1&&wrAktuell.big3_1_done,wrAktuell.big3_2&&wrAktuell.big3_2_done,wrAktuell.big3_3&&wrAktuell.big3_3_done].filter(Boolean).length;
    const totalCount=[wrAktuell.big3_1,wrAktuell.big3_2,wrAktuell.big3_3].filter(Boolean).length;
    out+='<details style="margin-bottom:14px">';
    out+='<summary style="list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--sf);border:1px solid var(--bd);border-left:3px solid '+f.tc+';border-radius:0 8px 8px 0;font-size:11px">';
    out+='<span style="font-weight:700;color:'+f.tc+';letter-spacing:.3px;text-transform:uppercase;font-size:10px">Big 3</span>';
    out+='<span style="color:var(--t3);font-size:10px">KW '+kwAkt+(fz?' · '+esc(fz.name):'')+'</span>';
    out+='<span style="margin-left:auto;font-size:10px;color:'+(doneCount===totalCount?'var(--green)':'var(--t3)')+'">'+doneCount+'/'+totalCount+' ✓</span>';
    out+='<span style="font-size:9px;color:var(--t3)">▸</span>';
    out+='</summary>';
    out+='<div style="padding:8px 12px 10px;border:1px solid var(--bd);border-top:none;border-left:3px solid '+f.tc+';border-radius:0 0 8px 0;background:var(--sf)">';
    [[1,'big3_1_done'],[2,'big3_2_done'],[3,'big3_3_done']].forEach(([n,doneF])=>{
      const txt=wrItemName(wrAktuell,n);if(!txt)return;
      const done=wrAktuell[doneF];
      out+='<div onclick="toggleBig3(\''+wrAktuell.id+'\',\''+doneF+'\')" style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer">';
      out+='<div style="width:16px;height:16px;border-radius:4px;flex-shrink:0;'+(done?'background:'+f.tc+';border:1.5px solid '+f.tc+';display:flex;align-items:center;justify-content:center':'border:1.5px solid var(--bd)')+'">'+(done?'<span style="color:#fff;font-size:9px;font-weight:800">✓</span>':'')+'</div>';
      out+='<span style="font-size:12px;'+(done?'color:var(--t3);text-decoration:line-through':'color:var(--text)')+'">'+txt+'</span>';
      out+='</div>';
    });
    out+='</div></details>';
    if(wrAktuell?.wenn_dann){
      out+='<div style="font-size:11px;color:var(--t3);margin-top:-8px;margin-bottom:10px;padding-left:4px">💡 '+esc(wrAktuell.wenn_dann).slice(0,80)+(wrAktuell.wenn_dann.length>80?'…':'')+'</div>';
    }
    if(wrAktuell.blockiert){
      out+='<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:8px;margin-top:-6px;margin-bottom:12px">';
      out+='<span style="font-size:11px">⚠</span><span style="font-size:11px;color:var(--red);flex:1">'+esc(wrAktuell.blockiert).slice(0,60)+(wrAktuell.blockiert.length>60?'…':'')+'</span>';
      out+='<button onclick="openBlocker(\''+wrAktuell.id+'\')" style="font-size:10px;padding:2px 8px;border-radius:5px;border:1px solid var(--red-bd);background:var(--sf);color:var(--red);cursor:pointer;font-family:inherit;flex-shrink:0">Ändern</button>';
      out+='</div>';
    } else {
      out+='<div style="margin-top:-6px;margin-bottom:12px;display:flex;gap:6px">'
        +'<button onclick="openBlocker(\''+wrAktuell.id+'\')" style="font-size:10px;padding:3px 10px;border-radius:6px;border:1px dashed var(--bd);background:transparent;color:var(--t3);cursor:pointer;font-family:inherit">⚠ Blockade melden</button>'
        +'<button onclick="openDecisionForm()" style="font-size:10px;padding:3px 10px;border-radius:6px;border:1px dashed #f59e0b;background:transparent;color:#d97706;cursor:pointer;font-family:inherit">⚖️ Entscheidung anfragen</button>'
        +'</div>';
    }
  }

  // (Wolken & Ideen moved into unified Inbox below)

  // ── Decision Requests — GF-Queue ──
  if(isGF()){
    const offeneDR=S.decisionRequests.filter(d=>d.status==='offen').sort((a,b)=>{
      const po={'hoch':0,'mittel':1,'niedrig':2};
      const pp=(po[a.prioritaet]??1)-(po[b.prioritaet]??1);
      if(pp!==0)return pp;
      return(a.deadline||'').localeCompare(b.deadline||'');
    });
    if(offeneDR.length){
      out+='<div style="background:var(--sf);border:1.5px solid #f59e0b;border-radius:14px;padding:14px 16px;margin-bottom:14px">';
      out+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
      out+='<span style="font-size:15px">⚖️</span>';
      out+='<span style="font-size:13px;font-weight:700">Entscheidungen</span>';
      out+='<span style="background:#f59e0b;color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px;margin-left:auto">'+offeneDR.length+' offen</span>';
      out+='</div>';
      offeneDR.forEach((d,i)=>{
        const von=S.personen.find(p=>p.id===d.erstellt_von);
        const prioCol=d.prioritaet==='hoch'?'var(--red)':d.prioritaet==='mittel'?'#d97706':'var(--t3)';
        const dl=d.deadline?new Date(d.deadline+'T12:00:00'):null;
        const dlStr=dl?dl.getDate()+'.'+(dl.getMonth()+1)+'.':'—';
        const isUeberfaellig=d.deadline&&d.deadline<TODAY;
        out+='<div style="border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--gray-bg)">';
        out+='<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px">';
        out+='<span style="font-size:10px;font-weight:700;color:'+prioCol+';text-transform:uppercase;padding:2px 7px;border-radius:99px;border:1px solid '+prioCol+';white-space:nowrap;flex-shrink:0">'+d.prioritaet+'</span>';
        out+='<div style="font-size:13px;font-weight:600;line-height:1.3;flex:1">'+esc(d.frage)+'</div>';
        out+='</div>';
        if(d.kontext)out+='<div style="font-size:11px;color:var(--t2);margin-bottom:6px;line-height:1.4">'+esc(d.kontext).slice(0,120)+(d.kontext.length>120?'…':'')+'</div>';
        if(d.blockiert)out+='<div style="font-size:11px;color:var(--red);margin-bottom:6px;font-weight:500">⛔ Stillstand: '+esc(d.blockiert).slice(0,80)+'</div>';
        out+='<div style="display:flex;align-items:center;gap:8px;font-size:10px;color:var(--t3);margin-bottom:8px">';
        out+=(von?'<span>von '+esc(von.name.split(' ')[0])+'</span><span>·</span>':'');
        out+='<span style="color:'+(isUeberfaellig?'var(--red)':'var(--t3)')+'">fällig '+dlStr+(isUeberfaellig?' ⚠':'')+'</span>';
        if(d.slack_link)out+='<span>·</span><a href="'+esc(d.slack_link)+'" target="_blank" style="color:var(--blue);text-decoration:none;font-size:10px">Slack ↗</a>';
        out+='</div>';
        out+='<div style="display:flex;gap:6px">';
        out+='<button onclick="openDecisionAnswer(\''+d.id+'\',\'entscheiden\')" style="flex:1;font-size:11px;padding:6px 12px;border-radius:8px;border:none;background:#f59e0b;color:#fff;cursor:pointer;font-family:inherit;font-weight:600">✓ Entscheiden</button>';
        out+='<button onclick="openDecisionAnswer(\''+d.id+'\',\'zurueck\')" style="font-size:11px;padding:6px 12px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--t2);cursor:pointer;font-family:inherit">↩ Zurückgeben</button>';
        out+='</div></div>';
      });
      out+='</div>';
    }
  }
  // ── Decision Requests — Zurückgegeben (für Ersteller) ──
  {
    const meineZurueck=S.decisionRequests.filter(d=>d.erstellt_von===aP&&d.status==='zurueckgegeben');
    if(meineZurueck.length){
      out+='<div style="background:var(--sf);border:1.5px solid var(--blue-bd);border-radius:14px;padding:14px 16px;margin-bottom:14px">';
      out+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:15px">↩</span><span style="font-size:13px;font-weight:700">Zurückgegeben</span><span style="background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px;margin-left:auto">'+meineZurueck.length+'</span></div>';
      meineZurueck.forEach(d=>{
        out+='<div style="border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--gray-bg)">';
        out+='<div style="font-size:13px;font-weight:600;margin-bottom:4px">'+esc(d.frage)+'</div>';
        out+='<div style="font-size:11px;color:var(--blue);line-height:1.4">'+esc(d.rueckgabe_begruendung||'')+'</div>';
        out+='</div>';
      });
      out+='</div>';
    }
  }

  // ── Team-Blocker (GF/Lead sieht aktive Blocker) ──
  if(isGF()||isLead()){
    const{kw:_bkw,jahr:_bjahr}=getKW();
    const teamBlocker=S.wochenresets.filter(r=>r.kw===_bkw&&r.jahr===_bjahr&&r.blockiert&&String(r.pid)!==String(aP));
    if(teamBlocker.length){
      out+='<div style="background:var(--red-bg);border:1.5px solid var(--red-bd);border-radius:12px;padding:12px 14px;margin-bottom:14px">';
      out+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="font-size:13px">⚠</span><span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--red)">Team-Blocker</span><span style="font-size:10px;color:var(--t3);margin-left:auto">'+teamBlocker.length+'</span></div>';
      teamBlocker.forEach((r,i)=>{
        const p=person(r.pid);
        out+='<div style="padding:7px 0'+(i?';border-top:1px solid var(--red-bd)':'')+'">';
        out+='<div style="display:flex;align-items:flex-start;gap:8px">';
        out+='<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600">'+esc(p?.name||'?')+'</div>';
        out+='<div style="font-size:11px;color:var(--red);margin-top:2px">'+esc(r.blockiert)+'</div></div></div>';
        out+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">';
        out+='<button onclick="blockerZuAufgabe(\''+r.id+'\',\''+esc(p?.id||'')+'\')" style="font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--text);cursor:pointer;font-family:inherit">→ Aufgabe</button>';
        out+='<button onclick="blockerBesprechen(\''+r.id+'\')" style="font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid var(--blue-bd);background:var(--blue-bg);color:var(--blue);cursor:pointer;font-family:inherit">💬 Besprechen</button>';
        out+='<button onclick="blockerLoesen(\''+r.id+'\')" style="font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid var(--green-bd);background:var(--green-bg);color:var(--green);cursor:pointer;font-family:inherit">✓ Gelöst</button>';
        out+='</div></div>';
      });
      out+='</div>';
    }
  }

  // ── Freitag Reset Banner ──
  if(isResetZeit()&&!dieseWocheReset(aP)){
    out+='<div onclick="openWochenreset()" style="background:var(--green);color:#fff;border-radius:12px;padding:13px 15px;margin-bottom:14px;cursor:pointer;display:flex;align-items:center;gap:11px">'
      +'<span style="font-size:20px">📋</span>'
      +'<div style="flex:1"><div style="font-weight:700;font-size:13px">Wochenrückblick KW '+kwAkt+'</div>'
      +'<div style="font-size:11px;opacity:.6;margin-top:1px">Big 3 auswerten · KW '+(kwAkt+1)+' planen</div></div>'
      +'<span style="opacity:.4;font-size:16px">›</span></div>';
  }

  const hasSonderKpi=S.ziele.flatMap(z=>z.kpis||[]).some(k=>String(k.pid)===String(aP)&&k.sonder);
  if(hasSonderKpi)out+=rKpiBlock(aP);

  // ── Tages-Zeitstrahl (einzeilig, drag-to-reorder) ──
  {
    const tlTasks=[...aktiv,...offene].slice(0,10);
    // apply saved order from localStorage
    const orderKey='tagesplan-order-'+aP+'-'+TODAY;
    const savedOrder=JSON.parse(localStorage.getItem(orderKey)||'[]');
    if(savedOrder.length){
      tlTasks.sort((a,b)=>{const ai=savedOrder.indexOf(a.id),bi=savedOrder.indexOf(b.id);return(ai<0?999:ai)-(bi<0?999:bi);});
    }
    if(tlTasks.length){
      const now=new Date();
      const nowH=now.getHours()+now.getMinutes()/60;
      const erlH=erl.reduce((s,a)=>s+(a.gebucht||a.geplant||0.5),0);
      const offenH=tlTasks.reduce((s,a)=>s+(a.geplant||1),0);
      // 9:00 is the anchor — always. Early = bonus, late = visible gap
      const anchor=9;
      let dayStart=Math.min(anchor,Math.floor(nowH));
      let dayEnd=Math.max(17,Math.ceil(nowH+offenH));
      const barH=dayEnd-dayStart;
      const erlPct=(erlH/barH*100);
      const gapH=Math.max(0,(nowH-dayStart)-erlH);
      const gapPct=(gapH/barH*100);
      const nowPct=Math.min(100,Math.max(0,(nowH-dayStart)/barH*100));
      const anchorPct=((anchor-dayStart)/barH*100);
      // early bird bonus?
      const isEarly=nowH<anchor;
      const earlyH=isEarly?Math.max(0,anchor-nowH):0;
      out+='<div style="background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:12px 16px;margin-bottom:14px">';
      out+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">';
      out+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)">Tagesplan</div>';
      out+='<div style="font-size:11px;color:var(--t3)">'
        +(gapH>0.5?'<span style="color:var(--red)">'+Math.round(gapH*10)/10+'h ungenutzt</span> · ':'')
        +Math.round(erlH*10)/10+'h erledigt · '+Math.round(offenH*10)/10+'h offen</div>';
      out+='</div>';
      // time markers
      out+='<div style="position:relative;height:12px;margin-bottom:2px">';
      for(let h=dayStart;h<=dayEnd;h++){
        const pct=((h-dayStart)/barH*100);
        const isAnchor=h===anchor;
        const show=isAnchor||h===12||h===15||h===dayEnd||(h<anchor&&h===dayStart);
        if(show&&pct>=0&&pct<=100)out+='<div style="position:absolute;left:'+pct+'%;font-size:8px;'+(isAnchor?'font-weight:700;color:var(--text)':'color:var(--t3)')+';transform:translateX(-50%)">'+h+(isAnchor?':00':'')+'</div>';
      }
      out+='</div>';
      // bar container
      out+='<div style="position:relative">';
      // 9:00 anchor line
      if(dayStart<anchor)out+='<div style="position:absolute;left:'+anchorPct+'%;top:0;bottom:0;width:1px;background:var(--text);opacity:.15;z-index:8"></div>';
      // single-row bar
      out+='<div id="tagesplan-bar" style="position:relative;display:flex;height:32px;border-radius:8px;overflow:hidden;background:var(--gray-bg)">';
      // erledigt block
      if(erlH>0){
        const earlyBonus=dayStart<anchor&&erlH>0;
        out+='<div style="width:'+erlPct+'%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;border-right:1px solid var(--green-bd)">';
        out+='<span style="font-size:9px;color:var(--green);font-weight:700;white-space:nowrap">'+(earlyBonus?'⚡ ':'✓ ')+Math.round(erlH*10)/10+'h</span>';
        out+='</div>';
      }
      // gap = untracked/lost time (visible pressure when late)
      if(gapH>0.1){
        out+='<div style="width:'+gapPct+'%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(90deg,transparent,transparent 4px,rgba(0,0,0,.03) 4px,rgba(0,0,0,.03) 8px)">';
        if(gapH>0.5)out+='<span style="font-size:8px;color:var(--t3);white-space:nowrap">'+Math.round(gapH*10)/10+'h</span>';
        out+='</div>';
      }
      // task segments (start from "now")
      tlTasks.forEach((a,i)=>{
        const dur=a.geplant||1;
        const wPct=(dur/barH*100);
        const isAktiv=a.status==='aktiv';
        const pc=a.prio==='P1'?'var(--red)':a.prio==='P2'?'var(--orange)':'var(--t3)';
        const bg=isAktiv?'var(--inv)':a.prio==='P1'?'var(--red-bg)':a.prio==='P2'?'var(--orange-bg)':'var(--gray-bg)';
        const tc=isAktiv?'var(--inv-t)':pc;
        const bd=i<tlTasks.length-1?'border-right:1px solid rgba(0,0,0,.08);':'';
        out+='<div draggable="true" data-tpid="'+a.id+'" data-tpi="'+i+'" onclick="openDetail(\''+a.id+'\')" '
          +'ondragstart="window._tpDrag='+i+';this.style.opacity=\'.5\'" '
          +'ondragend="this.style.opacity=\'1\'" '
          +'ondragover="event.preventDefault();this.style.outline=\'2px solid var(--inv)\'" '
          +'ondragleave="this.style.outline=\'none\'" '
          +'ondrop="event.preventDefault();this.style.outline=\'none\';tpReorder(window._tpDrag,'+i+')" '
          +'style="width:'+wPct+'%;background:'+bg+';display:flex;align-items:center;padding:0 6px;gap:4px;cursor:grab;overflow:hidden;flex-shrink:0;'+bd+'">';
        if(isAktiv)out+='<span style="font-size:8px;flex-shrink:0">🔥</span>';
        out+='<span style="font-size:10px;font-weight:600;color:'+tc+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(a.titel)+'</span>';
        out+='<span style="font-size:9px;color:'+tc+';opacity:.5;flex-shrink:0;margin-left:auto">'+fmtH(dur)+'</span>';
        out+='</div>';
      });
      // meeting overlays from Google Calendar
      window._gcalEvtMap=window._gcalEvtMap||{};
      (S.kalender||[]).forEach((ev,idx)=>{
        if(!ev.start||!ev.end)return;
        const sH=ev.start.getHours()+ev.start.getMinutes()/60;
        const eH=ev.end.getHours()+ev.end.getMinutes()/60;
        const lPct=Math.max(0,(sH-dayStart)/barH*100);
        const wPctM=Math.max(1,Math.min(100-lPct,(eH-sH)/barH*100));
        if(lPct>=100)return;
        const fmt=d=>d.getHours()+':'+(''+(d.getMinutes())).padStart(2,'0');
        out+='<div onclick="gcalShowEvent(\''+ev.id+'\')" title="'+esc(ev.titel)+' · '+fmt(ev.start)+'–'+fmt(ev.end)+'" style="position:absolute;left:'+lPct+'%;width:'+wPctM+'%;top:0;bottom:0;background:rgba(29,78,216,.14);border-left:2px solid rgba(29,78,216,.45);z-index:6;pointer-events:auto;cursor:pointer;overflow:hidden;box-sizing:border-box">'
          +'<span style="font-size:8px;color:var(--blue);font-weight:600;padding:0 4px;white-space:nowrap;line-height:32px;display:block;overflow:hidden;text-overflow:ellipsis">📅 '+esc(ev.titel)+'</span>'
          +'</div>';
      });
      out+='</div>';
      // now needle — red line overlaying the bar
      if(nowH>=dayStart&&nowH<=dayEnd){
        out+='<div style="position:absolute;left:'+nowPct+'%;top:-1px;bottom:-1px;width:2px;background:var(--red);border-radius:2px;z-index:10;pointer-events:none"></div>';
        out+='<div style="position:absolute;left:'+nowPct+'%;bottom:-10px;transform:translateX(-50%);font-size:8px;font-weight:700;color:var(--red);pointer-events:none">'+now.getHours()+':'+(''+(now.getMinutes())).padStart(2,'0')+'</div>';
      }
      out+='</div>';
      out+='</div>';
    }

async function setPrio(id,pr){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  const prev={prio:a.prio,status:a.status};a._busy=true;
  try{
    const zielSel=document.getElementById('inbox-ziel-'+id);
    const zid=zielSel?zielSel.value:'';
    a.prio=pr;a.status='backlog';
    if(zid){a.zielId=zid;a.teilzielId=null;}
    try{render();}catch(e){console.error('render@setPrio',e);}
    const patch={prio:pr,status:'backlog'};
    if(zid){patch.ziel_id=zid;patch.teilziel_id=null;}
    const ok=await dbPatch('aufgaben',id,patch);
    if(!ok){a.prio=prev.prio;a.status=prev.status;}
  }catch(e){console.error('setPrio',e);a.prio=prev.prio;a.status=prev.status;}
  finally{a._busy=false;try{render();}catch(e){console.error('render@setPrio2',e);}}
}
async function startenA(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  const prev={status:a.status,aktSeit:a.aktSeit};a._busy=true;
  try{
    a.status='aktiv';a.aktSeit=Date.now();try{render();}catch(e){console.error('render@startenA',e);}
    focusTakeover();
    notify('aufgabe_gestartet',{prio:a.prio||null,team_slack_ids:S.personen.filter(p=>p.id!==aP&&p.slack_id).map(p=>p.slack_id),actor_slack_id:me()?.slack_id||''});
    const ok=await dbPatch('aufgaben',id,{status:'aktiv',akt_seit:new Date().toISOString()});
    if(!ok){a.status=prev.status;a.aktSeit=prev.aktSeit;}
    else{gcalUpdateEventStart(a);}
  }catch(e){console.error('startenA',e);a.status=prev.status;a.aktSeit=prev.aktSeit;}
  finally{a._busy=false;try{render();}catch(e){console.error('render@startenA2',e);}}
}
async function pauseA(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a.status!=='aktiv'||a._busy)return;
  const prev={gebucht:a.gebucht,aktSeit:a.aktSeit,status:a.status};a._busy=true;
  try{
    const gebucht=Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100;
    a.gebucht=gebucht;a.aktSeit=null;a.status='backlog';try{render();}catch(e){console.error('render@pauseA',e);}

    if(!ok){a.gebucht=prev.gebucht;a.aktSeit=prev.aktSeit;a.status=prev.status;}
  }catch(e){console.error('pauseA',e);a.gebucht=prev.gebucht;a.aktSeit=prev.aktSeit;a.status=prev.status;}
  finally{a._busy=false;try{render();}catch(e){console.error('render@pauseA2',e);}}
}
async function fertig(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  const prev={gebucht:a.gebucht,aktSeit:a.aktSeit,status:a.status,updated_at:a.updated_at};a._busy=true;
  try{
    const gebucht=a.status==='aktiv'?Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100:a.gebucht;
    const pid=a.pid;
    a.gebucht=gebucht;a.aktSeit=null;a.status='erledigt';a.updated_at=new Date().toISOString();try{render();}catch(e){console.error('render@fertig',e);}
    const ok=await dbPatch('aufgaben',id,{gebucht,akt_seit:null,status:'erledigt',updated_at:new Date().toISOString()});
    if(!ok){a.gebucht=prev.gebucht;a.aktSeit=prev.aktSeit;a.status=prev.status;a.updated_at=prev.updated_at;return;}
    gcalUpdateEventEnd(a);
    // recurring: create next instance
    if(a.recurring){
      const nextDl=nextRecurringDate(a.dl||TODAY,a.recurring);
      const rec={id:nid('a'),pid:a.pid,titel:a.titel,typ:a.typ,status:'neu',prio:a.prio,
        ziel_id:a.zielId,teilziel_id:a.teilzielId,geplant:a.geplant,gebucht:0,
        dl:nextDl,dl_type:a.dl_type,ua:a.ua?.length?a.ua.map(u=>({t:u.t,d:false})):[],
        notiz:a.notiz,akt_seit:null,vertraulich:a.vertraulich,recurring:a.recurring,erstellt_von:a.erstelltVon||a.pid};
      S.aufgaben.push(normalizeAufgabe(rec));
      await dbInsert('aufgaben',rec);
    }
    showPaddelCelebration(pid);
    checkP1Done(pid);
  }catch(e){console.error('fertig',e);a.gebucht=prev.gebucht;a.aktSeit=prev.aktSeit;a.status=prev.status;a.updated_at=prev.updated_at;}
  finally{a._busy=false;try{render();}catch(e){console.error('render@fertig2',e);}}
}
function nextRecurringDate(fromDate,freq){
  const d=new Date(fromDate+'T12:00:00');
  if(freq==='daily')d.setDate(d.getDate()+1);
  else if(freq==='weekly')d.setDate(d.getDate()+7);
  else if(freq==='monthly')d.setMonth(d.getMonth()+1);
  else d.setDate(d.getDate()+1);
  return localDate(d);
}
async function toggleStep(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||!a.ua||!a.ua[i])return;
  const wasDone=a.ua[i].d;
  a.ua[i].d=!a.ua[i].d;
  const allDone=a.ua.every(u=>u.d)&&a.ua.length;
  if(allDone){a.status='erledigt';a.aktSeit=null;showPaddelCelebration(a.pid);checkP1Done(a.pid);}
  // mini celebration for single step check-off
  if(!wasDone&&a.ua[i].d&&!allDone){
    const row=document.getElementById('sr-'+id+'-'+i);
    if(row){row.classList.add('done-flash');const cb=row.querySelector('.sc');if(cb)cb.classList.add('pop');}
  }
  await dbPatch('aufgaben',id,{ua:a.ua,status:a.status,akt_seit:null});
  if(allDone){cm();render();}
  else if(document.getElementById('ovl')?.classList.contains('open')){openDetail(id);}
  else{render();}
}

async function delStep(id,i){

function tpReorder(fromIdx,toIdx){
  if(fromIdx===toIdx)return;
  const myA=S.aufgaben.filter(a=>String(a.pid)===String(aP)&&['aktiv','neu','backlog'].includes(a.status));
  const aktiv=myA.filter(a=>a.status==='aktiv');
  const offene=myA.filter(a=>['neu','backlog'].includes(a.status)).sort((a,b)=>{const po={P1:0,P2:1,P3:2};return(po[a.prio]??3)-(po[b.prio]??3)||(a.aktSeit||0)-(b.aktSeit||0);});
  const arr=[...aktiv,...offene].slice(0,10);
  const orderKey='tagesplan-order-'+aP+'-'+TODAY;
  const saved=JSON.parse(localStorage.getItem(orderKey)||'[]');
  if(saved.length)arr.sort((a,b)=>{const ai=saved.indexOf(a.id),bi=saved.indexOf(b.id);return(ai<0?999:ai)-(bi<0?999:bi);});
  const [item]=arr.splice(fromIdx,1);
  arr.splice(toIdx,0,item);
  localStorage.setItem(orderKey,JSON.stringify(arr.map(a=>a.id)));
  render();
}

async function saveDetailField(id,field,val){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  if(field==='titel'){if(!val||!val.trim())return;a.titel=val.trim();}
  else if(field==='notiz'){a.notiz=val.trim()||null;}
  else if(field==='dl'){a.dl=val||null;}
  else if(field==='geplant'){a.geplant=val;}
  else if(field==='ziel_id'){a.zielId=val||null;a.teilzielId=null;}
  else if(field==='vertraulich'){a.vertraulich=val;}
  const patch={[field]:field==='titel'?a.titel:field==='notiz'?a.notiz:field==='dl'?a.dl:field==='geplant'?a.geplant:field==='vertraulich'?val:val||null};
  if(field==='ziel_id')patch.teilziel_id=null;
  await dbPatch('aufgaben',id,patch);
  if(field==='dl'&&val&&!gcalGetEvtId(id))gcalCreateEvent(a);
  render();
}
async function setStatusModal(id,st){

  else if(a.status==='aktiv'){patch.gebucht=Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100;patch.akt_seit=null;}
  Object.assign(a,{status:st,aktSeit:st==='aktiv'?Date.now():null,updated_at:now,...(patch.gebucht!==undefined?{gebucht:patch.gebucht}:{})});
  const _teamSlack=S.personen.filter(p=>p.id!==aP&&p.slack_id).map(p=>p.slack_id);

    +'<div style="font-size:16px;font-weight:700">Ziele'+(isGF()&&vorschlaege.length?' <span style="font-size:11px;background:var(--amber);color:#fff;border-radius:99px;padding:1px 7px;font-weight:700;vertical-align:middle">'+vorschlaege.length+'</span>':'')+'</div>'
    +(isGF()?'<button class="btn btn-dk" onclick="addZiel()">+ Neues Ziel</button>':'<button class="btn btn-dk" onclick="vorschlagenZiel()">+ Ziel vorschlagen</button>')
    +'</div>';
  if(isGF()&&vorschlaege.length){
    out+='<div style="background:var(--amber-bg);border:1.5px solid var(--amber-bd);border-radius:12px;padding:14px 16px;margin-bottom:20px">';

    vorschlaege.forEach(z=>{
      const von=person(z.vorgeschlagen_von);

      out+='<div style="flex:1;font-size:13px;font-weight:500">'+esc(z.name)+'</div>';

  const alleZiele=S.ziele.filter(z=>(!z.vertraulich||isGF())&&z.status!=='vorschlag');

  // ── Monats-Pillen ──
  const curMon=TODAY.slice(0,7);
  const monNames=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const curYear=new Date().getFullYear();
  if(!window._zielMonat)window._zielMonat=curMon;

  for(let m=0;m<12;m++){

    const isActive=mon===window._zielMonat;

    if(isActive)style+='var(--inv);background:var(--inv);color:var(--inv-t)';

  out+='<div onclick="window._zielMonat=null;rZiele()" style="font-size:11px;font-weight:600;padding:5px 12px;border-radius:99px;cursor:pointer;white-space:nowrap;border:1.5px solid '+(window._zielMonat===null?'var(--inv);background:var(--inv);color:var(--inv-t)':'var(--bd);background:var(--sf);color:var(--t3)')+'">Alle</div>';

    if(!window._zielMonat)return true;
    const ms=z.monat_start||'';
    const me=z.monat_ende||'';
    if(!ms&&!me)return true;
    if(ms&&me)return window._zielMonat>=ms&&window._zielMonat<=me;
    if(ms)return window._zielMonat>=ms;
    return window._zielMonat<=me;
  };

  const istMeinZiel=z=>isGF()||z.verantwortlichId===aP||(z.teilziele||[]).some(tz=>tz.verantwortlichId===aP);

  const andereZiele=alleZiele.filter(z=>!istMeinZiel(z)&&zielImMonat(z));

    out+='<div style="font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px">';
    if(verantw)out+='<span>'+esc(verantw.name)+'</span>';

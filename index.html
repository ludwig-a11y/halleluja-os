<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Halleluja OS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="H'OS">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --text:#1a1a1a;--t2:#6b6b6b;--t3:#a0a0a0;
  --bg:#f1f0ef;--sf:#fff;--bd:#e5e5e3;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--blue-bd:#bfdbfe;
  --green:#15803d;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --red:#b91c1c;--red-bg:#fef2f2;--red-bd:#fecaca;
  --amber:#a16207;--amber-bg:#fefce8;--amber-bd:#fde68a;--gold:#f59e0b;--gold-t:#92400e;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-bd:#ddd6fe;
  --gray-bg:#f8f8f7;
  --orange:#c2410c;--orange-bg:#fff7ed;--orange-bd:#fed7aa;
  --pink:#9d174d;--pink-bg:#fdf2f8;--pink-bd:#fbcfe8;
  --inv:#1a1a1a;--inv-t:#fff;--hero:#1a1a1a;--hero-t:#fff;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;--r-full:99px;
}
html.dark{
  --text:#e8e5e0;--t2:#b0ada8;--t3:#6a6864;
  --bg:#131211;--sf:#1c1b19;--bd:#2e2c29;
  --blue:#7db8f0;--blue-bg:#131820;--blue-bd:#1e3354;
  --green:#6ecf8a;--green-bg:#131a15;--green-bd:#1a3822;
  --red:#f09090;--red-bg:#1a1313;--red-bd:#3d2020;
  --amber:#d4a94d;--amber-bg:#1a1810;--amber-bd:#3a3018;--gold:#f0a030;--gold-t:#fbbf24;
  --purple:#b09ae8;--purple-bg:#16131e;--purple-bd:#2c2242;
  --gray-bg:#171614;
  --orange:#d49a6a;--orange-bg:#1a1710;--orange-bd:#3a2c18;
  --pink:#f472b6;--pink-bg:#1b1218;--pink-bd:#442035;
  --inv:#f0efed;--inv-t:#1a1a1a;--hero:#252422;--hero-t:#f0efed;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column}

@media(max-width:768px){
  .bar{padding:0 12px;height:50px}
  .logo{font-size:14px;border:none;padding:0;margin:0}
  .nt:not(.new-btn){display:none!important}
  .nt.new-btn{display:none!important}
  .sb{display:none!important}
  .main{padding:14px 14px 90px}
  .modal{border-radius:20px 20px 0 0;width:100%;max-width:100%;position:fixed;bottom:0;left:0;right:0;max-height:90vh;padding:20px 14px 32px}
  .ovl{align-items:flex-end;padding:0}
  .f2{grid-template-columns:1fr}
  #mob-tabs{display:flex!important}
  #mob-add{display:flex!important}
  #mob-memo{display:flex!important}
  input,textarea,select{font-size:16px!important}
  .btn{min-height:44px;font-size:13px!important}
  .card{padding:12px 14px}
}
@media(min-width:769px){
  #mob-tabs{display:none}
  #mob-add{display:none}
  #mob-memo{display:none}
}
#mob-tabs{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--sf);border-top:1px solid var(--bd);z-index:50;align-items:center;justify-content:space-around;padding:0 8px}
.mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;font-family:inherit;padding:8px 4px;color:var(--t3);font-size:9px;font-weight:500;transition:color .15s}
.mob-tab:hover{color:var(--t2)}
.mob-tab.on{color:var(--text);font-weight:600}
.mob-tab svg{width:20px;height:20px}
#mob-add{position:fixed;bottom:72px;right:18px;z-index:51;width:52px;height:52px;border-radius:50%;background:var(--inv);color:var(--inv-t);border:none;font-size:26px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.25);font-family:inherit;transition:transform .15s,box-shadow .15s}
#mob-add:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(0,0,0,.3)}
#mob-add:active{transform:scale(.97)}
#mob-memo:active{transform:scale(.93)}

#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.login-box{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-xl);padding:32px 36px;width:340px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.login-title{font-size:17px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--t3);margin-bottom:20px}
.person-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.person-btn{padding:10px 8px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.person-btn:hover{border-color:var(--text)}
.person-btn.selected{border:2px solid var(--text);background:var(--gray-bg)}
.pin-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--bd);transition:background .15s}
.pin-dot.filled{background:var(--inv)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-key{padding:14px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.pin-key:hover{background:var(--gray-bg)}
.login-err{font-size:12px;color:var(--red);text-align:center;min-height:18px;margin-top:8px}

.bar{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;height:46px;flex-shrink:0;gap:6px}
.logo{font-size:13px;font-weight:700;padding-right:12px;border-right:1px solid var(--bd);margin-right:6px;white-space:nowrap}
.nt{font-size:13px;padding:0 14px;height:46px;border:none;border-bottom:2px solid transparent;cursor:pointer;background:transparent;color:var(--t2);font-family:inherit;font-weight:500;white-space:nowrap;transition:color .15s,border-color .15s}
.nt:hover{color:var(--text)}
.nt.on{color:var(--text);font-weight:600;border-bottom-color:var(--text)}
.nt.new-btn{color:var(--blue);font-weight:600;border:1px solid var(--blue-bd);background:var(--blue-bg);border-radius:8px;height:32px;padding:0 14px;font-size:13px}
.shell{display:flex;flex:1;overflow:hidden}
.sb{width:168px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.gl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:0 8px;margin:12px 0 5px}
.sbn{width:100%;text-align:left;padding:7px 8px;border-radius:9px;border:none;cursor:pointer;background:transparent;font-family:inherit;margin-bottom:2px;display:flex;align-items:center;gap:8px;transition:background .12s}
.sbn.on,.sbn:hover{background:var(--bg)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:8px;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:#d0d0ce}
.card[onclick]:hover,.card[style*="cursor:pointer"]:hover{border-color:var(--t3);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tag{font-size:10px;padding:2px 8px;border-radius:var(--r-full);font-weight:500;white-space:nowrap;display:inline-block;transition:opacity .15s}
.btn{font-size:11px;padding:5px 12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s ease}
/* v183: Drag&Drop sortable lists — ganze Zeile/Karte draggable, kein separater Handle. */
.drag-row{position:relative;transition:opacity .12s,box-shadow .12s}
.drag-row[data-drag-item]{cursor:grab}
.drag-row[data-drag-item]:active{cursor:grabbing}
.drag-row.dragging-now{opacity:.35}
.drag-row.drop-above{box-shadow:inset 0 2px 0 var(--blue)}
.drag-row.drop-below{box-shadow:inset 0 -2px 0 var(--blue)}
.btn:hover{opacity:.85;transform:translateY(-0.5px)}
.btn:active{transform:translateY(0);opacity:1}
.btn-dk{background:var(--inv);color:var(--inv-t)}
.btn-dk:hover{opacity:.85}
.btn-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.btn-ok:hover{background:var(--green-bd);color:var(--green)}
.btn-gr{background:var(--gray-bg);color:var(--t2);border:1px solid var(--bd)}
.btn-gr:hover{background:var(--bd);border-color:var(--t3)}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--red-bd)}
.btn-red:hover{background:var(--red-bg)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.btn-purple:hover{background:var(--purple-bd)}
.btn-prio{font-size:11px;padding:5px 13px;border-radius:8px;border:1px solid var(--bd);cursor:pointer;font-family:inherit;font-weight:400;transition:all .15s}
.btn-prio-on{border:2px solid var(--text);font-weight:700}
.btn-prio:hover{opacity:.85}
.btn-sm{font-size:11px;padding:4px 11px;border-radius:8px;border:1px solid var(--bd);cursor:pointer;font-family:inherit;font-weight:400;transition:all .15s}
.btn-sm:hover{opacity:.85}
.btn-xs{font-size:11px;padding:4px 8px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--t3);cursor:pointer;font-family:inherit}
.btn-xs:hover{opacity:.7}
.btn-toggle{font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid var(--bd);background:var(--gray-bg);color:var(--t2);cursor:pointer;font-family:inherit;font-weight:400;transition:all .15s}
.btn-toggle.on{background:var(--inv);color:var(--inv-t);font-weight:700}
details.fixes-heute{border-radius:99px;transition:border-radius .2s,background .2s}
details.fixes-heute[open]{border-radius:14px}
details.fixes-heute>summary{border-radius:99px;transition:border-radius .2s}
details.fixes-heute[open]>summary{border-radius:14px 14px 0 0}
.hoverable{transition:background .12s}
.hoverable:hover{background:var(--gray-bg)}
.hover-lift{transition:border-color .15s}
.hover-lift:hover{border-color:var(--t3)}
.hover-dim{transition:opacity .15s}
.hover-dim:hover{opacity:.85}
.lock{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.timer{background:var(--gray-bg);border-radius:9px;padding:7px 11px;text-align:center;flex-shrink:0;min-width:80px}
.tn{font-size:17px;font-weight:700;font-family:monospace;letter-spacing:-.5px}
.tbar{height:3px;border-radius:99px;background:var(--bd);margin-top:4px;overflow:hidden}
.tf{height:100%;border-radius:99px;background:var(--blue)}
.sw{padding-left:8px;border-left:2px solid var(--blue-bd);margin:8px 0}
.sr{display:flex;align-items:center;gap:8px;padding:3px 0;user-select:none}
.sc{width:13px;height:13px;border-radius:3px;border:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.sc:hover{border-color:var(--t2)}
.sc.dn{background:var(--inv);border-color:var(--inv)}
.sc.pop{animation:stepPop .4s ease}
@keyframes stepPop{0%{transform:scale(1)}30%{transform:scale(1.6)}60%{transform:scale(.9)}100%{transform:scale(1)}}
.sr.done-flash{animation:rowFlash .5s ease}
@keyframes rowFlash{0%{background:transparent}30%{background:var(--green-bg)}100%{background:transparent}}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--inv);color:var(--inv-t);padding:12px 24px;border-radius:var(--r-full);font-size:15px;font-weight:600;z-index:9999;pointer-events:none;opacity:0;transition:transform .4s cubic-bezier(.2,1,.3,1),opacity .4s ease}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.hide{transform:translateX(-50%) translateY(-40px);opacity:0}
.focus-takeover{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-100%);z-index:9990;display:flex;align-items:center;gap:12px;background:var(--hero);padding:14px 28px;border-radius:0 0 16px 16px;box-shadow:0 4px 24px rgba(0,0,0,.15);transition:transform .4s cubic-bezier(.22,1,.36,1);pointer-events:none}
.focus-takeover.show{transform:translateX(-50%) translateY(0);pointer-events:auto}
.focus-takeover.hide{transform:translateX(-50%) translateY(-100%)}
.ft-emoji{font-size:28px}
.ft-text{font-size:16px;font-weight:700;color:var(--hero-t);letter-spacing:-.3px}
.ft-sub{font-size:13px;font-weight:500;color:var(--hero-t);opacity:.7}
.cele-wrap{position:fixed;inset:0;z-index:9998;pointer-events:none;overflow:hidden}
.cele-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:9999;text-align:center;pointer-events:none;opacity:0;transition:transform .5s cubic-bezier(.2,1.2,.3,1),opacity .4s ease}
.cele-msg.show{transform:translate(-50%,-50%) scale(1);opacity:1}
.cele-msg.hide{transform:translate(-50%,-50%) scale(.8);opacity:0}
.cele-emoji{font-size:64px;display:block;margin-bottom:8px}
.cele-text{font-size:22px;font-weight:800;color:var(--text);background:var(--sf);padding:16px 32px;border-radius:var(--r-xl);box-shadow:0 8px 32px rgba(0,0,0,.15)}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg) translateX(0)}40%{opacity:1}100%{opacity:0;transform:translateY(85vh) rotate(1080deg) translateX(var(--cx))}}
.sl{font-size:11px}.sl.dn{text-decoration:line-through;color:var(--t3)}
.asi{flex:1;font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--text);font-family:inherit;outline:none}
.zcard{border-radius:var(--r-lg);padding:18px;margin-bottom:14px;border:1px solid;transition:box-shadow .15s,transform .15s}
.zcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.05)}
.pbar{height:5px;border-radius:99px;background:rgba(0,0,0,.08);overflow:hidden;flex:1}
.pbar-fill{height:100%;border-radius:99px;transition:width .3s}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:100;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.ovl.open{display:flex}
.modal{background:var(--sf);border-radius:var(--r-xl);padding:24px;width:520px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.mt{font-size:15px;font-weight:700;margin-bottom:16px}
.fl{margin-bottom:13px}
.fl label{display:block;font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fl input,.fl select,.fl textarea{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-bg)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.tz-block{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:11px;padding:12px 14px;margin-bottom:8px}
.tz-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tz-title{font-size:13px;font-weight:600;color:var(--purple);flex:1}
.tz-done{text-decoration:line-through;opacity:.5}
.tz-add-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:9px;border:1.5px dashed var(--purple-bd);background:transparent;color:var(--purple);font-size:11px;font-family:inherit;cursor:pointer;width:100%;margin-top:6px;opacity:.7}
.tz-add-btn:hover{opacity:1;background:rgba(124,58,237,.06)}
.team-block{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.team-block:hover{border-color:#d0d0ce;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.team-block-head{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;background:var(--gray-bg)}
.team-h-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--bd)}
.team-h-row:last-child{border:none}
.team-h-row:hover{background:var(--gray-bg)}
.empty-state{text-align:center;color:var(--t3);padding:60px 20px;font-size:13px;line-height:1.8}
.settings-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.settings-row:last-child{border:none}
.ai-result{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:10px;padding:12px;margin:10px 0;font-size:12px;line-height:1.6}

#quote-overlay{position:fixed;inset:0;background:#0d0d0d;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;opacity:0;pointer-events:none;transition:opacity .5s}
#quote-overlay.show{opacity:1;pointer-events:all}
#quote-text{color:#fff;font-size:20px;font-weight:400;line-height:1.7;max-width:min(580px,90vw);text-align:center;letter-spacing:.01em}
#quote-author{color:#555;font-size:12px;margin-top:20px;letter-spacing:.1em;text-transform:uppercase}
#quote-skip{margin-top:32px;background:transparent;border:1px solid #333;color:#444;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit}
#quote-skip:hover{border-color:#555;color:#666}

.kpi-block{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:12px;transition:border-color .15s}
.kpi-block-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.kpi-item{border:1px solid var(--bd);border-radius:10px;padding:10px 12px;position:relative}
.kpi-item.fällig{border-color:var(--text)}
.kpi-item.inaktiv{opacity:.5}
.kpi-name{font-size:10px;color:var(--t3);margin-bottom:2px}
.kpi-goal-ref{font-size:9px;color:var(--blue);margin-bottom:6px}
.kpi-val{font-size:20px;font-weight:700;line-height:1}
.kpi-val.ok{color:var(--green)}
.kpi-val.nok{color:var(--red)}
.kpi-soll{font-size:11px;color:var(--t3)}
.kpi-freq-label{font-size:9px;color:var(--t3);margin-top:3px}
.kpi-entry{display:flex;gap:5px;margin-top:7px}
.kpi-entry input{flex:1;padding:4px 7px;border:1px solid var(--bd);border-radius:6px;font-size:13px;font-family:inherit;background:var(--gray-bg);color:var(--text);outline:none}
.kpi-entry button{padding:4px 9px;border-radius:6px;background:var(--inv);color:var(--inv-t);border:none;font-size:11px;cursor:pointer;font-family:inherit}

.deleg-block{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-top:16px}
.deleg-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.deleg-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--bd)}
.deleg-row:last-child{border:none}

.prio-wrap{position:relative;display:inline-block}
.prio-dd{position:absolute;top:24px;left:0;background:var(--sf);border:1px solid var(--bd);border-radius:10px;z-index:50;min-width:130px;box-shadow:0 4px 16px rgba(0,0,0,.1);display:none}
.prio-dd.open{display:block}
.prio-dd-item{padding:8px 12px;font-size:11px;cursor:pointer;font-weight:500}
.prio-dd-item:hover{background:var(--gray-bg)}
.prio-dd-item:first-child{border-radius:10px 10px 0 0}
.prio-dd-item:last-child{border-radius:0 0 10px 10px}
.main::-webkit-scrollbar,.modal::-webkit-scrollbar,.sb::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-track,.modal::-webkit-scrollbar-track,.sb::-webkit-scrollbar-track{background:transparent}

const SUPA_URL='https://zkxeuphsbufdvskkuahk.supabase.co';
const SUPA_KEY='sb_publishable_41EMxtYZYsYL5KR1KS_RrA_1mV1SRAL';

// Globales Crash-Netz: unhandled Exceptions/Promise-Rejects werden geloggt und ein kleiner
// Hinweis erscheint — App weiter lebendig statt weißer Seite.
window.addEventListener('error',e=>{try{console.error('window.error',e.error||e.message);}catch(_){}});
window.addEventListener('unhandledrejection',e=>{
  try{console.error('unhandledrejection',e.reason);
    // Supabase-typische stille Schreib-Fehler nur einmal pro 10s toasten.
    const now=Date.now();
    if(!window._lastGlobalErrToast||now-window._lastGlobalErrToast>10000){
      window._lastGlobalErrToast=now;
      if(typeof toast==='function')toast('⚠ Ein Hintergrund-Vorgang ist fehlgeschlagen. Details in der Konsole.');
    }
  }catch(_){}
});

async function supa(path,opts={}){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),5000);
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/'+path,{
      signal:ctrl.signal,
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation',...(opts.headers||{})},
      method:opts.method||'GET',
      body:opts.body?JSON.stringify(opts.body):undefined
    });
    clearTimeout(tid);
    if(!r.ok){console.error('Supabase',path,await r.text());return null;}
    const t=await r.text();return t?JSON.parse(t):true;
  }catch(e){clearTimeout(tid);console.error('supa',e);return null;}
}
const dbGet=(t,q='')=>supa(t+(q?'?'+q:'?select=*'));
const dbPatch=(t,id,b)=>supa(t+'?id=eq.'+id,{method:'PATCH',body:b,prefer:'return=minimal'});
const dbInsert=(t,b)=>supa(t,{method:'POST',body:b});
const dbDelete=(t,id)=>supa(t+'?id=eq.'+id,{method:'DELETE',prefer:'return=minimal'});

  const sichtbar=S.ziele.filter(z=>(!z.vertraulich||isGF())&&z.status!=='vorschlag');
  const bereiche=sichtbar.filter(z=>z.status==='bereich');
  const ziele=sichtbar.filter(z=>z.status!=='bereich');

  return out;
}
// Monatsziel-zentrische Auswahl: Monatsziele (aktiv) gruppiert nach Ziel/Bereich.
// Liefert <option>s mit data-ziel-id, data-datum. Aufrufer deriviert ziel_id aus Auswahl.
function tzLive(tzId){
  if(!tzId)return false;
  for(const z of S.ziele){for(const t of (z.teilziele||[])){if(String(t.id)===String(tzId))return !t.erledigt&&(t.status||'aktiv')==='aktiv';}}
  return false;
}
// Existiert-Check (auch wenn erledigt/archiviert) — für Orphan-Erkennung
function tzExists(tzId){
  if(!tzId)return false;
  for(const z of S.ziele){for(const t of (z.teilziele||[])){if(String(t.id)===String(tzId))return true;}}
  return false;
}
// Einheitliche Slot-Membership: eine Aufgabe gehört zu einem Wochenziel-Slot, wenn sie
// explizit zugeordnet ist (wrId+slot) ODER ihr Parent explizit zugeordnet ist.
// Wird in rTag UND rWoche verwendet — damit beide Ansichten garantiert konsistent rendern.
function slotMembership(wr,slotN){
  const direct=a=>a.wochenresetId===wr.id&&a.big3Slot===slotN;
  const parentIds=new Set(S.aufgaben.filter(direct).map(a=>a.id));
  const belongs=a=>direct(a)||(a.parentId&&parentIds.has(a.parentId));
  return {direct,belongs,parentIds};
}
// Orphan-Scrubber: räumt Daten-Leichen auf (nach loadData). Nur in-memory + Supabase-Patch
// für hartes Dangling, das FK-Errors oder falsche UI verursacht.
async function scrubOrphans(){
  const wrIds=new Set(S.wochenresets.map(w=>w.id));
  const aufgabenIds=new Set(S.aufgaben.map(a=>a.id));
  let patched=0;
  // 1) wochenresets.big3_N_tz_id → null, wenn teilziel nicht mehr existiert
  for(const w of S.wochenresets){
    const patch={};
    for(const n of [1,2,3]){
      const tzId=w['big3_'+n+'_tz_id'];
      if(tzId&&!tzExists(tzId)){patch['big3_'+n+'_tz_id']=null;w['big3_'+n+'_tz_id']=null;}
    }
    if(Object.keys(patch).length){try{await dbPatch('wochenresets',w.id,patch);patched++;}catch(e){}}
  }
  // 2) aufgaben: dangling teilziel_id / wochenreset_id / parent_id → null setzen (in-memory + DB)
  for(const a of S.aufgaben){
    const patch={};
    if(a.teilzielId&&!tzExists(a.teilzielId)){patch.teilziel_id=null;a.teilzielId=null;}
    if(a.wochenresetId&&!wrIds.has(a.wochenresetId)){patch.wochenreset_id=null;patch.big3_slot=null;a.wochenresetId=null;a.big3Slot=null;}
    if(a.parentId&&!aufgabenIds.has(a.parentId)){patch.parent_id=null;a.parentId=null;}
    if(Object.keys(patch).length){try{await dbPatch('aufgaben',a.id,patch);patched++;}catch(e){}}
  }
  if(patched)console.log('[scrubOrphans] '+patched+' Datensätze bereinigt');
}
function meilensteinOptgroups(pid,selTzId='',ownOnly=false){
  const sichtbar=S.ziele.filter(z=>(!z.vertraulich||isGF())&&z.status!=='vorschlag');
  // v180: Verfehlt-Outcomes (Outcome-Monatsziele mit Datum<heute) aus aktiven Gruppen raus → eigene "⚠ Verfehlt"-Gruppe unten.
  const withTz=sichtbar.map(z=>{
    const all=(z.teilziele||[]).filter(t=>!t.erledigt&&(t.status||'aktiv')==='aktiv');
    return {z, tz: all.filter(t=>!tzIstVerfehlt(t))};
  }).filter(x=>x.tz.length);
  const verfehlt=[];
  sichtbar.forEach(z=>{(z.teilziele||[]).forEach(t=>{if(tzIstVerfehlt(t))verfehlt.push({z,t});});});
  const meine=withTz.filter(x=>String(x.z.verantwortlichId)===String(pid)||x.tz.some(t=>String(t.verantwortlichId)===String(pid)));
  const andere=withTz.filter(x=>!meine.find(m=>m.z.id===x.z.id)&&x.z.status!=='bereich');
  const bereiche=withTz.filter(x=>x.z.status==='bereich'&&!meine.find(m=>m.z.id===x.z.id));
  const meineIds=new Set(meine.map(m=>m.z.id));
  const optLabel=t=>{
    const dat=t.datum?' · bis '+t.datum.slice(8)+'.'+t.datum.slice(5,7)+'.':'';
    // Themengebiet überfällig → Hint-Präfix (anwählbar, nur visueller Stups)
    if(tzIstUeberfaelligProjekt(t))return '⚠ überfällig — '+esc(t.name)+dat;
    return esc(t.name)+dat;
  };
  const mkGroup=(label,items)=>{
    if(!items.length)return '';
    return items.map(({z,tz})=>{
      const prefix=z.status==='bereich'?'📁 ':'';
      return '<optgroup label="'+esc(prefix+(z.name||''))+'">'+tz.map(t=>{
        return '<option value="'+t.id+'" data-ziel-id="'+z.id+'" data-datum="'+(t.datum||'')+'"'+(selTzId===t.id?' selected':'')+'>'+optLabel(t)+'</option>';
      }).join('')+'</optgroup>';
    }).join('');
  };
  let out='<option value="">— kein Monatsziel —</option>';
  out+=mkGroup('Meine',meine);
  if(!ownOnly)out+=mkGroup('Andere',andere);
  out+=mkGroup('Bereiche',bereiche);
  // v180: Verfehlte Outcome-Monatsziele am Ende, gedimmt — Stups Richtung Review.
  if(verfehlt.length){
    out+='<optgroup label="⚠ Verfehlt — Review fällig">'
      +verfehlt.map(({z,t})=>{
        const dat=t.datum?' · seit '+t.datum.slice(8)+'.'+t.datum.slice(5,7)+'.':'';
        return '<option value="'+t.id+'" data-ziel-id="'+z.id+'" data-datum="'+(t.datum||'')+'"'+(selTzId===t.id?' selected':'')+'>'+esc(z.name)+' › '+esc(t.name)+dat+'</option>';
      }).join('')
      +'</optgroup>';
  }
  // Fallback: wenn selTzId auf einen erledigten/archivierten TZ zeigt, als disabled-Info anzeigen statt still verschwinden lassen
  if(selTzId){
    const aktivMatch=sichtbar.some(z=>(z.teilziele||[]).some(t=>t.id===selTzId&&!t.erledigt&&(t.status||'aktiv')==='aktiv'));
    if(!aktivMatch){
      let inaktiv=null;
      for(const z of S.ziele){
        if(z.vertraulich&&!isGF()&&z.verantwortlichId!==aP)continue;
        const tz=(z.teilziele||[]).find(t=>t.id===selTzId);
        if(tz){inaktiv={t:tz,z};break;}
      }
      if(inaktiv){
        const status=inaktiv.t.erledigt?'erledigt':(inaktiv.t.status==='archiviert'?'archiviert':(inaktiv.t.status==='pausiert'?'pausiert':'inaktiv'));
        out+='<optgroup label="⚠️ Nicht mehr aktiv"><option value="'+inaktiv.t.id+'" data-ziel-id="'+inaktiv.z.id+'" data-datum="'+(inaktiv.t.datum||'')+'" selected>'+esc(inaktiv.t.name)+' ('+status+')</option></optgroup>';
      }
    }
  }
  return out;
}
// Monatsziel-Picker mit Inline-„+ Neu" Button
// selectId: id des <select>

// selTzId: vorausgewählte TZ

  h+='<div style="display:flex;flex-direction:column;gap:6px">';
  if(!fixed)h+='<select id="'+selectId+'-zid" style="font-size:12px;padding:6px 8px;border:1px solid var(--bd);border-radius:6px;background:var(--sf);color:var(--text);font-family:inherit"><option value="">Ziel wählen…</option>'+zOpts+'</select>';
  else h+='<input type="hidden" id="'+selectId+'-zid" value="'+fixedZielId+'">';
  h+='<input id="'+selectId+'-name" placeholder="Titel (Ich-Satz, z.B. Ich rufe jeden Tag einen Kunden an)" style="font-size:12px;padding:6px 8px;border:1px solid var(--bd);border-radius:6px;background:var(--sf);color:var(--text);font-family:inherit" onkeydown="if(event.key===\'Enter\'){event.preventDefault();saveQuickMs(\''+selectId+'\',\''+pid+'\')}">';
  // v174 · Leading-Indikator-Felder (Mental Model §14): Verb-Metrik Pflicht; Anker optional.
  h+='<input id="'+selectId+'-metrik" placeholder="Leading-Metrik (Verb) · z.B. Call gemacht · Reinigung erledigt" style="font-size:12px;padding:6px 8px;border:1px solid var(--bd);border-radius:6px;background:var(--sf);color:var(--text);font-family:inherit">';
  h+='<div style="display:flex;gap:6px;align-items:center">';
  h+='<input id="'+selectId+'-zielwert" type="number" min="1" placeholder="Anker (optional, z.B. 200)" style="flex:1;font-size:12px;padding:6px 8px;border:1px solid var(--bd);border-radius:6px;background:var(--sf);color:var(--text);font-family:inherit">';
  h+='<input id="'+selectId+'-datum" type="date" style="flex:1;font-size:12px;padding:6px 8px;border:1px solid var(--bd);border-radius:6px;background:var(--sf);color:var(--text);font-family:inherit">';
  h+='</div>';

function cmpSortIdx(a,b,dlField){
  const ai=(a&&a.sortIndex!=null)?a.sortIndex:null;

// Pattern: Container hat data-drag-container="<type>:<param1>:<param2>", Items haben data-drag-item="<id>".
// Nach jedem render() ruft die App dragSortAttach() auf — idempotent via _dragSetup-Flag.
let _dragState=null;
function dragSortAttach(){
  document.querySelectorAll('[data-drag-item]').forEach(el=>{
    if(el._dragSetup)return;
    el._dragSetup=true;
    el.draggable=true;
    el.addEventListener('dragstart',_dsStart);
    el.addEventListener('dragend',_dsEnd);
    el.addEventListener('dragover',_dsOver);
    el.addEventListener('dragleave',_dsLeave);
    el.addEventListener('drop',_dsDrop);
  });
  // Touch-Support: long-press startet Drag-Mode (für mobile)
  document.querySelectorAll('.drag-handle').forEach(h=>{
    if(h._touchSetup)return;
    h._touchSetup=true;
    h.addEventListener('touchstart',_dhTouchStart,{passive:true});
  });

function _dsStart(e){

  this.classList.add('dragging-now');
  try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',this.dataset.dragItem||'');}catch(_){}
}
function _dsOver(e){
  if(!_dragState||this===_dragState.fromEl)return;
  if(this.closest('[data-drag-container]')!==_dragState.container)return;
  e.preventDefault();
  try{e.dataTransfer.dropEffect='move';}catch(_){}
  // Visual feedback: zeige Drop-Position (above/below je nach Mauspos)
  const rect=this.getBoundingClientRect();
  const above=(e.clientY-rect.top)<rect.height/2;
  this.classList.remove(above?'drop-below':'drop-above');
  this.classList.add(above?'drop-above':'drop-below');
}
function _dsLeave(){this.classList.remove('drop-above','drop-below');}
function _dsDrop(e){
  if(!_dragState)return;
  e.preventDefault();

  this.classList.remove('drop-above','drop-below');
  if(this===_dragState.fromEl)return;
  const fromId=_dragState.fromId,toId=this.dataset.dragItem;
  const containerType=_dragState.container.dataset.dragContainer;
  _dragDispatch(containerType,fromId,toId,above);

function _dsEnd(){

  slots.splice(toIdx,0,moved);
  // Slot-Mapping: alter Slot → neuer Slot. Damit ziehen wir auch die Aufgaben mit (big3Slot).
  const slotMap=new Map();
  slots.forEach((s,i)=>{slotMap.set(s.n,i+1);});
  // Schreibe Wochenreset-Patch
  const patch={};
  slots.forEach((s,i)=>{
    const t=i+1;
    wr['big3_'+t]=s.text;wr['big3_'+t+'_done']=s.done;wr['big3_'+t+'_tz_id']=s.tzId;
    patch['big3_'+t]=s.text;patch['big3_'+t+'_done']=s.done;patch['big3_'+t+'_tz_id']=s.tzId;
  });
  // v183-fix: Aufgaben mit big3Slot mitziehen — sonst hängen sie nach Tausch am falschen Inhalt.
  const aufgabenPatches=[];
  (S.aufgaben||[]).forEach(a=>{
    if(String(a.wochenresetId)!==String(wrId))return;
    if(!a.big3Slot)return;
    const newSlot=slotMap.get(a.big3Slot);
    if(newSlot&&newSlot!==a.big3Slot){
      a.big3Slot=newSlot;
      aufgabenPatches.push(dbPatch('aufgaben',a.id,{big3_slot:newSlot}).catch(()=>{}));
    }
  });
  await Promise.all([dbPatch('wochenresets',wrId,patch).catch(()=>{}),...aufgabenPatches]);
  render();
}

function poolFor(tzId){
  // Vertraulich-Check: wenn TZ oder Parent-Ziel vertraulich → nur GF oder Verantwortlicher sehen Pool-Items
  let allowed=true;
  for(const z of S.ziele){
    const tz=(z.teilziele||[]).find(t=>String(t.id)===String(tzId));
    if(!tz)continue;
    const tzVer=tz.vertraulich&&!isGF()&&String(tz.verantwortlichId)!==String(aP);
    const zVer=z.vertraulich&&!isGF()&&String(z.verantwortlichId)!==String(aP);
    if(tzVer||zVer)allowed=false;
    break;
  }
  if(!allowed)return[];
  return(S.wochenzielPool||[]).filter(p=>String(p.teilzielId)===String(tzId)).sort((a,b)=>(a.sortIndex??9999)-(b.sortIndex??9999));
}
function getKwFromDate(d){
  // ISO-Wochenkalender — KW-Nummer + Jahr aus Date
  const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=dt.getUTCDay()||7;
  dt.setUTCDate(dt.getUTCDate()+4-day);
  const yearStart=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  const kw=Math.ceil(((dt-yearStart)/86400000+1)/7);
  return{kw,jahr:dt.getUTCFullYear()};
}
function dateOfKwMonday(jahr,kw){
  const simple=new Date(Date.UTC(jahr,0,1+(kw-1)*7));
  const dow=simple.getUTCDay();
  const monday=new Date(simple);
  if(dow<=4)monday.setUTCDate(simple.getUTCDate()-dow+1);
  else monday.setUTCDate(simple.getUTCDate()+8-dow);
  return monday;
}
function kwAusDatum(yyyymmdd){
  if(!yyyymmdd||!/^\d{4}-\d{2}-\d{2}/.test(yyyymmdd))return null;
  return getKwFromDate(new Date(yyyymmdd+'T12:00:00'));
}
// v219: Monat (YYYY-MM) des Montags einer KW
function kwMonat(kw,jahr){
  const mon=dateOfKwMonday(jahr,kw);
  return mon.getUTCFullYear()+'-'+String(mon.getUTCMonth()+1).padStart(2,'0');
}
// v219: Erste KW die Tage in einem Monat hat
function firstKWOfMonth(ym){
  const y=parseInt(ym.slice(0,4));const m=parseInt(ym.slice(5,7));
  return getKwFromDate(new Date(y,m-1,1));
}

// Liste der KWs zwischen zwei Datums (inklusive)
function kwListe(startDate,endDate){
  const list=[];
  let cur=new Date(startDate);
  // Auf Montag der Start-KW snappen
  const sk=getKwFromDate(cur);
  const startMon=dateOfKwMonday(sk.jahr,sk.kw);
  cur=new Date(startMon);
  let safety=0;
  while(cur<=endDate&&safety<60){
    const k=getKwFromDate(cur);
    list.push({kw:k.kw,jahr:k.jahr,monday:new Date(cur)});
    cur.setUTCDate(cur.getUTCDate()+7);
    safety++;
  }
  return list;
}
// KWs für den Wochenplaner eines MZ: alle KWs die das MZ-Datum (Deadline) berührt + aktuelle + 1 Vor-Woche
function kwListeFurMZ(tz){
  const today=new Date(TODAY+'T12:00:00');
  const heute=getKwFromDate(today);
  const tzDl=tz.datum?new Date(tz.datum+'T12:00:00'):null;
  // Start: 1 KW vor heute (für Carry-over)
  const start=dateOfKwMonday(heute.jahr,heute.kw);
  start.setUTCDate(start.getUTCDate()-7);
  // Ende: KW der Deadline (oder +5 KWs ab heute wenn keine Deadline)
  let ende;
  if(tzDl){const e=getKwFromDate(tzDl);ende=dateOfKwMonday(e.jahr,e.kw);ende.setUTCDate(ende.getUTCDate()+6);}
  else{ende=new Date(today);ende.setUTCDate(ende.getUTCDate()+35);}
  return kwListe(start,ende);
}

// Wochenziel ist verfehlt: KW liegt vor aktuellem KW UND big3_done=false
function wochenzielIstVerfehlt(wr,slot){

async function _mzpDrop(e,zone){
  e.preventDefault();
  zone.style.background='';
  if(!_mzpDragSrc)return;
  const src=_mzpDragSrc;_mzpDragSrc=null;
  const dst=zone.getAttribute('data-mzp-zone');
  // Parse src + dst
  const sp=src.split('|');
  const dp=dst.split('|');
  // v186: MZ-Marker-Reschedule (Drag des MZ-Markers in eine andere KW)
  if(sp[0]==='mz'&&dp[0]==='kw'){
    await _mzReschedule(sp[1],parseInt(dp[2],10),parseInt(dp[3],10));
    return;
  }
  // v192: MZ-Marker → Month-Cell der Ziele-Matrix (datum = letzter Tag des Monats)
  if(sp[0]==='mz'&&dp[0]==='month'){
    await _zgSetMonth(sp[1],dp[2]);
    return;
  }
  // v192: MZ-Marker → Zielpool (datum = null)
  if(sp[0]==='mz'&&dp[0]==='zielpool'){
    await _zgClearMonth(sp[1]);
    return;
  }
  // v186: MZ-Marker → Pool (Wochenziel-Pool): ignorieren
  if(sp[0]==='mz')return;
  // v188: Wochenziel-Drop in Extend-Zone (KW nach Deadline) → Deadline erst verlängern, dann Drop
  const extendsTzId=zone.getAttribute('data-mzp-extends');
  if(extendsTzId&&dp[0]==='kw'){
    const tz=_tzById(extendsTzId);
    if(tz){
      const monday=dateOfKwMonday(parseInt(dp[3],10),parseInt(dp[2],10));
      const sunday=new Date(monday);sunday.setUTCDate(sunday.getUTCDate()+6);
      const newDatum=sunday.toISOString().slice(0,10);
      if(!confirm('Deadline von "'+tz.name+'" auf KW '+dp[2]+' ('+newDatum.slice(8)+'.'+newDatum.slice(5,7)+'.) verlängern und Wochenziel hier ablegen?'))return;
      tz.datum=newDatum;
      await dbPatch('teilziele',extendsTzId,{datum:newDatum}).catch(()=>{});
      // Fallthrough zum normalen Drop unten
    }
  }
  // Track active MZ to re-open Wochenplaner-Modal after drop (nur wenn Modal offen war)
  let tzId=null;
  if(sp[0]==='pool'){const p=(S.wochenzielPool||[]).find(x=>x.id===sp[1]);if(p)tzId=p.teilzielId;}
  else if(sp[0]==='kw'){const w=(S.wochenresets||[]).find(x=>x.id===sp[1]);if(w)tzId=w['big3_'+sp[2]+'_tz_id'];}
  if(sp[0]==='pool'&&dp[0]==='kw'){
    await _mzPlanerDrop('pool',{poolId:sp[1]},'kw',{wrId:dp[1],kw:parseInt(dp[2],10),jahr:parseInt(dp[3],10)});
  } else if(sp[0]==='kw'&&dp[0]==='kw'){
    await _mzPlanerDrop('kw',{wrId:sp[1],slot:parseInt(sp[2],10)},'kw',{wrId:dp[1],kw:parseInt(dp[2],10),jahr:parseInt(dp[3],10)});
  } else if(sp[0]==='kw'&&dp[0]==='pool'){
    await _mzPlanerDrop('kw',{wrId:sp[1],slot:parseInt(sp[2],10)},'pool',{});
  }
  // Re-Open Modal NUR wenn der Wochenplaner-Modal aktiv ist (in der Matrix-View kein Re-Open).
  const modalOpen=document.getElementById('ovl')?.classList.contains('open');
  if(tzId&&modalOpen)setTimeout(()=>openMZWochenplaner(tzId),50);
}

// v186: MZ-Marker in andere KW droppen → Deadline updaten (Sonntag der Ziel-KW).
// Confirm-Dialog bei Monats-Sprung. Ziel-KW = neue Deadline-KW.
async function _mzReschedule(tzId,kw,jahr){
  const tz=_tzById(tzId);if(!tz)return;
  // Sonntag der Ziel-KW als neues Datum (= "bis Ende dieser Woche")
  const monday=dateOfKwMonday(jahr,kw);
  const sunday=new Date(monday);sunday.setUTCDate(sunday.getUTCDate()+6);
  const newDatum=sunday.toISOString().slice(0,10);
  // Aktuelles effektives Datum (für Vergleich)
  const altDatum=tz.datum||(function(){
    const j=new Date();const last=new Date(j.getFullYear(),j.getMonth()+1,0);
    return last.toISOString().slice(0,10);
  })();
  if(newDatum===altDatum)return; // nichts zu tun
  // Monats-Sprung-Confirm
  const altMonat=altDatum.slice(0,7);
  const neuMonat=newDatum.slice(0,7);
  if(altMonat!==neuMonat){
    const monNamen=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    const neuMonName=monNamen[parseInt(neuMonat.slice(5,7),10)-1];
    if(!confirm('Monatsziel "'+tz.name+'" in '+neuMonName+' verschieben (neue Deadline: '+newDatum.slice(8)+'.'+newDatum.slice(5,7)+'.)?'))return;
  }
  // v202: Existierende Big3-Slots für dieses MZ in anderen KWs erkennen + im Toast erwähnen
  let existingSlots=0;
  (S.wochenresets||[]).forEach(w=>{
    [1,2,3].forEach(n=>{ if(String(w['big3_'+n+'_tz_id'])===String(tzId))existingSlots++; });
  });
  // Update in-memory + DB
  tz.datum=newDatum;
  await dbPatch('teilziele',tzId,{datum:newDatum}).catch(()=>{});
  const tail=existingSlots>0?' · '+existingSlots+' bestehende Wochenziel-Slots bleiben':'';
  toast('🏁 Deadline → '+newDatum.slice(8)+'.'+newDatum.slice(5,7)+'.'+tail);
  render();
}

  for(const w of wartende){

    await dbPatch('aufgaben',w.id,{wartet_auf_pid:null,wartet_grund:null,wartet_auf_aufgabe_id:null}).catch(()=>{});
  }
  // Toast für Owner der wartenden Aufgaben (nur wenn aktuell eingeloggt = aP)
  const meine=wartende.filter(w=>String(w.pid)===String(aP));
  if(meine.length){toast('▶ '+meine.length+' Aufgabe'+(meine.length>1?'n':'')+' aus Wartet zurück');}

// Auto-Resume: bei Tageswechsel pausierte Aufgaben mit pausiertBis<TODAY zurückholen.
// Sammelt Returnees in window._wartetReturnees für sanften Toast (siehe checkResumeToast).
async function autoResumePausedTasks(){
  const expired=S.aufgaben.filter(a=>a.pausiertBis&&a.pausiertBis<TODAY);
  if(!expired.length)return;
  const seenKey='resumeSeen_'+TODAY;
  const seen=JSON.parse(localStorage.getItem(seenKey)||'[]');
  const fresh=[];
  for(const a of expired){
    a.pausiertBis=null;
    dbPatch('aufgaben',a.id,{pausiert_bis:null}).catch(()=>{});
    if(!seen.includes(a.id))fresh.push(a);
  }
  if(fresh.length){
    window._resumeReturnees=fresh;
    localStorage.setItem(seenKey,JSON.stringify([...seen,...fresh.map(a=>a.id)]));
  }
}

function _bisSonntagISO(){
  const d=new Date(TODAY+'T00:00:00');

// Wochenziele-Sort-Helfer für Aufgaben unter einem big3-Slot.
// Aufgaben mit sortIndex=null werden auf (P1>P2>P3) + Deadline sortiert.
function cmpAufgabeSlot(a,b){
  const ai=a.sortIndex!=null?a.sortIndex:null,bi=b.sortIndex!=null?b.sortIndex:null;
  if(ai!=null&&bi!=null)return ai-bi;
  if(ai!=null)return -1;
  if(bi!=null)return 1;
  const pr={P1:1,P2:2,P3:3};
  const ap=pr[a.prio]||9,bp=pr[b.prio]||9;
  if(ap!==bp)return ap-bp;
  const ad=a.dl||'9999-12-31',bd=b.dl||'9999-12-31';
  return ad.localeCompare(bd);
}

// Resolve: ISO-String 'YYYY-MM-DD' oder null (Abbruch)
function pickDate(opts){
  opts=opts||{};
  const today=new Date();today.setHours(0,0,0,0);
  const toIso=d=>d.toISOString().slice(0,10);
  const addDays=(base,n)=>{const d=new Date(base);d.setDate(d.getDate()+n);return d;};
  const fmtDe=iso=>{if(!iso)return'';const[y,m,d]=iso.split('-');return d+'.'+m+'.'+y;};
  let min=toIso(today);
  if(opts.minDate==='tomorrow')min=toIso(addDays(today,1));
  else if(opts.minDate&&/^\d{4}-\d{2}-\d{2}$/.test(opts.minDate))min=opts.minDate;
  const def=opts.defaultVal&&opts.defaultVal>=min?opts.defaultVal:toIso(addDays(today,1));
  return new Promise(resolve=>{
    const ov=document.createElement('div');
    ov.id='pd-ovl';
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px';
    const quick1=toIso(addDays(today,1)); // morgen
    const quick3=toIso(addDays(today,3));
    const quick7=toIso(addDays(today,7));
    ov.innerHTML=
      '<div style="background:var(--bg);border:1px solid var(--bd);border-radius:14px;max-width:380px;width:100%;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.4)">'
      +'<div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px">'+(opts.title||'Datum wählen')+'</div>'
      +(opts.hint?'<div style="font-size:12px;color:var(--t2);margin-bottom:14px">'+opts.hint+'</div>':'<div style="margin-bottom:14px"></div>')
      +'<input id="pd-date" type="date" value="'+def+'" min="'+min+'" style="width:100%;padding:12px 14px;font-size:15px;border:1.5px solid var(--bd);border-radius:9px;background:var(--sf);color:var(--text);font-family:inherit;margin-bottom:10px">'
      +'<div id="pd-preview" style="font-size:12px;color:var(--t2);margin-bottom:12px;min-height:16px"></div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">'
        +'<button data-d="'+quick1+'" class="pd-q" style="font-size:11px;padding:6px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--gray-bg);color:var(--t2);cursor:pointer;font-family:inherit">Morgen</button>'
        +'<button data-d="'+quick3+'" class="pd-q" style="font-size:11px;padding:6px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--gray-bg);color:var(--t2);cursor:pointer;font-family:inherit">+3 Tage</button>'
        +'<button data-d="'+quick7+'" class="pd-q" style="font-size:11px;padding:6px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--gray-bg);color:var(--t2);cursor:pointer;font-family:inherit">Nächste Woche</button>'
      +'</div>'
      +'<div style="display:flex;gap:8px;justify-content:flex-end">'
        +'<button id="pd-cancel" style="font-size:13px;padding:9px 16px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit">Abbrechen</button>'
        +'<button id="pd-ok" style="font-size:13px;font-weight:600;padding:9px 18px;border-radius:8px;border:none;background:var(--inv);color:var(--inv-t);cursor:pointer;font-family:inherit">Übernehmen</button>'
      +'</div>'
      +'</div>';
    document.body.appendChild(ov);
    const input=ov.querySelector('#pd-date');
    const preview=ov.querySelector('#pd-preview');
    const updatePreview=()=>{
      const v=input.value;
      if(!v){preview.textContent='';return;}
      const d=new Date(v+'T00:00:00');
      const wochentage=['So','Mo','Di','Mi','Do','Fr','Sa'];
      const days=Math.round((d-today)/86400000);
      const rel=days===0?'heute':days===1?'morgen':days>0?'in '+days+' Tagen':'vor '+(-days)+' Tagen';
      preview.textContent='📅 '+wochentage[d.getDay()]+', '+fmtDe(v)+' · '+rel;
    };
    updatePreview();
    input.addEventListener('input',updatePreview);
    input.addEventListener('change',updatePreview);
    ov.querySelectorAll('.pd-q').forEach(b=>b.addEventListener('click',()=>{input.value=b.dataset.d;updatePreview();}));
    const close=val=>{ov.remove();resolve(val);};
    ov.querySelector('#pd-cancel').addEventListener('click',()=>close(null));
    ov.addEventListener('click',e=>{if(e.target===ov)close(null);});
    ov.querySelector('#pd-ok').addEventListener('click',()=>{
      const v=input.value;
      if(!v||!/^\d{4}-\d{2}-\d{2}$/.test(v)){toast('⚠ Kein gültiges Datum');return;}
      if(v<min){toast('⚠ Datum muss ab '+fmtDe(min)+' liegen','var(--red)');return;}
      close(v);
    });
    setTimeout(()=>{try{input.focus();}catch(e){}},50);
  });
}

async function changePrio(e,aid,newPrio){

function getKpiTodayVal(kpiId,pid){const k=S.kpiToday[pid+'-'+kpiId];return k!==undefined?k:null;}
function saveKpiTodayVal(kpiId,pid,val){
  S.kpiToday[pid+'-'+kpiId]=val;
  try{localStorage.setItem('kpiToday_'+TODAY,JSON.stringify(S.kpiToday));}catch(e){}
}
async function _saveKpi(kpiId,pid,val){
  saveKpiTodayVal(kpiId,pid,val);
  const existing=S.kpiVals[pid+'-'+kpiId];
  const mKey=pid+'-'+kpiId;
  const oldVal=(existing&&existing.datum===TODAY)?existing.val:0;
  S.kpiVals[mKey]={val,datum:TODAY};
  // Monatssumme aktualisieren: alten Tageswert ersetzen, neuen addieren
  S.kpiValsMonth[mKey]=(S.kpiValsMonth[mKey]||0)-oldVal+val;
  // Wochensumme ebenfalls live aktualisieren (heute ist immer in dieser Woche)
  S.kpiValsWeek[mKey]=(S.kpiValsWeek[mKey]||0)-oldVal+val;
  if(existing&&existing.datum===TODAY){
    await supa('kpi_vals?pid=eq.'+pid+'&kpi_id=eq.'+kpiId+'&datum=eq.'+TODAY,{method:'PATCH',body:{val},prefer:'return=minimal'});
  }else{
    await supa('kpi_vals',{method:'POST',body:{pid,kpi_id:kpiId,val,datum:TODAY}});
  }
}
async function incrementKpi(kpiId,pid){
  const allKpis=S.ziele.flatMap(z=>z.kpis||[]);
  const k=allKpis.find(x=>x.id===kpiId);if(!k)return;
  const cur=getKpiTodayVal(kpiId,pid)??kpiVal(k);
  const newVal=Math.max(0,(cur||0)+1);
  await _saveKpi(kpiId,pid,newVal);
  render();
  if(k.sonder)showSonderCelebration(pid,k.label,newVal,k.ziel);
  else if(k.prio==='P1'&&k.teilzielId)showPaddelCelebration(pid);
  else toast('+1 · ohne Monatsziel+P1 kein Paddel-Punkt');
}
function showSonderCelebration(pid,label,val,ziel){
  const p=person(pid);
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0],[660,.15],[440,.35],[550,.6],[440,.9]].forEach(([freq,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(.5,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+1.2);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+1.5);
    });
  }catch(e){}
  const el=document.createElement('div');
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;text-align:center;padding:24px';

    +'<div style="font-size:11px;font-weight:700;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin:16px 0 8px">Verkauf abgeschlossen</div>'
    +'<div style="font-size:36px;font-weight:900;color:#fff;margin-bottom:8px">'+(p?p.name:'')+'</div>'
    +'<div style="font-size:18px;color:rgba(255,255,255,.7);margin-bottom:32px">'+esc(label)+' · '+val+' / '+ziel+'</div>'
    +'<div style="font-size:12px;color:rgba(255,255,255,.35)">Tippen zum Schließen</div>';
  document.body.appendChild(el);
  showKonfetti();
  setTimeout(()=>el.remove(),10000);
}
let _dataPoll=null,_dataHash='',_kpiHash='',_dataPending=false;
function _aufgabenHash(arr){return arr.map(a=>a.id+a.status+(a.updated_at||'')).join('|');}
function _kpiHashFn(arr){return arr.map(k=>k.id+(k.sonder?'1':'0')+(k.pid||'')+k.label).join('|');}
function startDataPoller(){
  if(_dataPoll){clearInterval(_dataPoll);_dataPoll=null;}
  _dataHash=_aufgabenHash(S.aufgaben);
  _kpiHash=_kpiHashFn(S.ziele.flatMap(z=>z.kpis||[]));
  _dataPoll=setInterval(async()=>{
    // Jede einzelne Zeile hier ist ein potentieller App-Killer: Netzwerkfehler, kaputte DB-Row,
    // render()-Exception. Ohne try/catch wird die Uncaught-Promise-Rejection teilweise als Tab-
    // Crash sichtbar. Wir loggen und machen im nächsten 60s-Tick weiter.
    try{
      const [aufgaben,signale,kpis,wochenresets,beobachtungen,kontextFeed,decisionRequests,meetings,paddelGewinner]=await Promise.all([
        dbGet('aufgaben','select=*&order=created_at'),
        dbGet('signale','select=*&order=created_at.desc'),
        dbGet('kpis','select=*'),
        dbGet('wochenresets','select=*&order=created_at.desc'),
        dbGet('beobachtungen','select=*&order=created_at.desc'),
        dbGet('kontext_feed','select=*&order=created_at.desc&limit=50'),
        dbGet('decision_requests','select=*&order=erstellt_am.desc'),
        dbGet('meetings','select=*&order=erstellt_am.desc'),
        dbGet('paddel_gewinner','select=*&order=erstellt_am.desc'),
      ]);
      if(decisionRequests)S.decisionRequests=decisionRequests;
      if(meetings)S.meetings=meetings.map(m=>({...m,teilnehmer_ids:m.teilnehmer_ids||[]}));
      if(paddelGewinner)S.paddelGewinner=paddelGewinner;
      if(kontextFeed)S.kontext=kontextFeed;
      let changed=false;
      if(aufgaben){
        const newHash=_aufgabenHash(aufgaben);
        if(newHash!==_dataHash){
          S.aufgaben=aufgaben.map(normalizeAufgabe);
          if(signale)S.signale=signale;
          _dataHash=newHash;
          changed=true;
        }
      }
      if(kpis){
        const newKpiHash=_kpiHashFn(kpis);
        if(newKpiHash!==_kpiHash){
          S.ziele.forEach(z=>{z.kpis=kpis.filter(k=>k.ziel_id===z.id).map(k=>({...k,zielId:k.ziel_id,teilzielId:k.teilziel_id||null,prio:k.prio||null}));});
          _kpiHash=newKpiHash;
          changed=true;
        }
      }
      if(wochenresets)S.wochenresets=wochenresets;
      if(beobachtungen)S.beobachtungen=beobachtungen;
      if(!changed)return;
      const modalOpen=document.getElementById('ovl')?.classList.contains('open');
      if(modalOpen){_dataPending=true;}
      else{try{render();}catch(e){console.error('dataPoll render',e);}}
    }catch(e){console.error('dataPoll',e);}
  },60000);
}

let _sonderSeen={},_sonderPoll=null;
function startSonderPoller(){
  if(_sonderPoll){clearInterval(_sonderPoll);_sonderPoll=null;}
  const sonderKpis=S.ziele.flatMap(z=>z.kpis||[]).filter(k=>k.sonder);
  // Baseline = max aller Personen heute, nicht nur aP
  sonderKpis.forEach(k=>{
    let maxVal=0;
    Object.entries(S.kpiVals).forEach(([key,v])=>{if(key.endsWith('-'+k.id)&&v.datum===TODAY)maxVal=Math.max(maxVal,v.val);});
    _sonderSeen[k.id]=maxVal;
  });
  _sonderPoll=setInterval(async()=>{
    // Alle 5s aktiv → jede Exception multipliziert sich. Hart einpacken.
    try{
      if(!isGF())return;
      const sk=S.ziele.flatMap(z=>z.kpis||[]).filter(k=>k.sonder);
      if(!sk.length)return;
      const ids='('+sk.map(k=>'\''+k.id+'\'').join(',')+')';
      const rows=await dbGet('kpi_vals','kpi_id=in.'+ids+'&datum=eq.'+TODAY);
      if(!rows)return;
      rows.forEach(row=>{
        const prev=_sonderSeen[row.kpi_id]??0;
        if(row.val>prev&&row.pid!==aP){
          _sonderSeen[row.kpi_id]=row.val;
          const k=sk.find(x=>x.id===row.kpi_id);
          try{showSonderCelebration(row.pid,k?.label||'Verkauf',row.val,k?.ziel||'?');}catch(e){console.error('sonderCelebration',e);}
        } else if(row.val>prev){
          _sonderSeen[row.kpi_id]=row.val;
        }
      });
    }catch(e){console.error('sonderPoll',e);}
  },5000);
}
function isFällig(freq){
  const now=new Date();
  if(freq==='täglich')return true;
  if(freq==='wöchentlich')return now.getDay()===5;
  if(freq==='monatlich'){const last=new Date(now.getFullYear(),now.getMonth()+1,0);return now.getDate()===last.getDate();}
  return false;
}
function freqLabel(freq){return{täglich:'Täglich',wöchentlich:'Wöchentlich (Freitag)',monatlich:'Monatlich (Monatsletzter)'}[freq]||freq;}

function hasPendingP1Kpis(pid){
  const result=[];
  (S.ziele||[]).forEach(z=>{
    (z.kpis||[]).forEach(k=>{
      if(String(k.pid)!==String(pid))return;
      if(k.prio!=='P1'&&!k.sonder)return;
      if(!isFällig(k.freq))return;
      const isTaeglich=k.typ==='täglich';
      const todayVal=getKpiTodayVal(k.id,pid);
      const displayVal=isTaeglich
        ?(todayVal!==null?todayVal:(S.kpiVals[pid+'-'+k.id]?.datum===TODAY?S.kpiVals[pid+'-'+k.id].val:0))
        :(todayVal!==null?todayVal:kpiVal(k));
      const reached=k.inv?displayVal<=k.ziel:displayVal>=k.ziel;
      if(!reached)result.push({...k,displayVal,zielName:z.name});
    });
  });
  return result;
}

// "Fixes heute" — Kalendertermine + App-Events (Aufgaben mit Uhrzeit) + Tasks ohne Uhrzeit.
// Collapsed = nächstes Fix + Countdown; open = volle Liste.
function rFixesHeute(pid){
  const now=Date.now();
  const fmt=d=>d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  const fmtDiff=(ms)=>{const min=Math.round(ms/60000);if(min<60)return'in '+min+'min';const h=Math.floor(min/60);return'in '+h+'h'+(min%60?' '+(min%60)+'min':'');};
  // Google Calendar events today
  const kalHeute=(S.kalender||[]).filter(ev=>{
    if(!ev.start)return false;
    const d=ev.start;const ymd=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    return ymd===TODAY;
  });
  // App-Events: tasks with dl=today AND dlUhrzeit set
  const appEvents=(S.aufgaben||[]).filter(a=>
    String(a.pid)===String(pid)&&a.dl===TODAY&&a.dlUhrzeit&&
    !['erledigt','zurueckgegeben','archiviert','backlog'].includes(a.status)
  ).filter(a=>/^\d{2}:\d{2}$/.test(a.dlUhrzeit)).map(a=>{
    const [hh,mm]=a.dlUhrzeit.split(':').map(Number);
    const start=new Date(TODAY+'T'+String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':00');
    const durMin=Math.round((parseFloat(a.geplant)||1)*60);
    const end=new Date(start.getTime()+durMin*60000);
    return{...a,_isAppEvent:true,start,end};
  });
  // Merge + sort all fixed-time entries
  const allFixed=[...kalHeute,...appEvents].sort((a,b)=>a.start-b.start);
  // Tasks with dl=today but NO time (plain deadline)
  const tasksHeute=S.aufgaben.filter(a=>
    String(a.pid)===String(pid)&&a.dl===TODAY&&!a.dlUhrzeit&&
    !['erledigt','zurueckgegeben','archiviert','backlog'].includes(a.status)
  );
  if(!allFixed.length&&!tasksHeute.length)return'';
  const upcoming=allFixed.filter(ev=>ev.end.getTime()>now);
  const next=upcoming[0];
  let collapsed='',imminent=false,autoOpen=false;
  if(next){
    const diffMs=next.start.getTime()-now;
    const isRunning=diffMs<=0&&next.end.getTime()>now;
    imminent=(diffMs>0&&diffMs<=15*60000)||isRunning;
    autoOpen=imminent;
    const tc=imminent?'var(--red)':'var(--text)';
    const icon=next._isAppEvent?'📝':'📅';
    const label=isRunning?'🔴 LÄUFT':imminent?'⏰ GLEICH':'⏰ Fix heute';
    const when=isRunning?'jetzt':diffMs>0?fmtDiff(diffMs):'jetzt';
    collapsed='<div style="font-size:10px;font-weight:700;color:'+tc+';letter-spacing:.4px;text-transform:uppercase;white-space:nowrap">'+label+'</div>'
      +'<div style="flex:1;font-size:13px;font-weight:600;color:'+tc+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+fmt(next.start)+' · '+icon+' '+esc(next.titel)+'</div>'
      +'<div style="font-size:11px;color:'+tc+';font-weight:600;white-space:nowrap">'+when+'</div>';
  }else if(allFixed.length){
    collapsed='<div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase">✓ Fixes heute</div><div style="flex:1;font-size:12px;color:var(--t3)">alle durch</div>';

  }

      const deco=passed?'text-decoration:line-through':'';
      if(ev._isAppEvent){
        // App-Event: click → task detail
        const prioColor=ev.prio==='P1'?'var(--red)':ev.prio==='P2'?'var(--blue)':'var(--t3)';
        // Liebevolle Reibung: no milestone
        const noMilestone=!ev.teilzielId;

        expanded+='<span style="font-weight:700;min-width:48px;font-variant-numeric:tabular-nums">'+fmt(ev.start)+'</span>';
        expanded+='<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📝 '+esc(ev.titel)+'</span>';
        expanded+='<span style="font-size:10px;font-weight:700;color:'+prioColor+'">'+(ev.prio||'')+'</span>';
        if(noMilestone)expanded+='<span title="Kein Ziel-Bezug. Warum ist das in deinem Kalender?" style="font-size:11px;color:var(--t3);cursor:help">🤔</span>';
        if(running)expanded+='<span style="font-size:10px;font-weight:700;color:var(--red)">läuft</span>';
        expanded+='</div>';
      }else{
        // Google Calendar event
        expanded+='<div onclick="gcalShowEvent(\''+ev.id+'\')" style="display:flex;align-items:center;gap:10px;padding:7px 14px;cursor:pointer;border-top:1px solid var(--bd);font-size:12px;color:'+color+';'+deco+'">';
        expanded+='<span style="font-weight:700;min-width:48px;font-variant-numeric:tabular-nums">'+fmt(ev.start)+'</span>';
        expanded+='<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📅 '+esc(ev.titel)+'</span>';
        if(running)expanded+='<span style="font-size:10px;font-weight:700;color:var(--red)">läuft</span>';
        expanded+='</div>';
      }
    });
  }
  if(tasksHeute.length){
    expanded+='<div style="padding:6px 14px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);border-top:1px solid var(--bd);background:var(--gray-bg)">Heute fällig (kein Fixpunkt)</div>';
    tasksHeute.forEach(a=>{

      expanded+='<div onclick="openDetail(\''+a.id+'\')" style="display:flex;align-items:center;gap:10px;padding:7px 14px;cursor:pointer;border-top:1px solid var(--bd);font-size:12px">';
      expanded+='<span style="font-size:10px;font-weight:700;color:'+prioColor+';min-width:48px">'+(a.prio||'—')+'</span>';
      expanded+='<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(a.titel)+'</span>';
      expanded+='</div>';
    });
  }
  const bg=imminent?'var(--red-bg)':'var(--sf)';
  const bd=imminent?'var(--red-bd)':'var(--bd)';
  let h='<details class="fixes-heute" style="margin-bottom:10px;background:'+bg+';border:1px solid '+bd+';overflow:hidden"'+(autoOpen?' open':'')+'>';

  h+='</details>';

async function _doAufgabeZurueck(id,grund){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  a._busy=true;
  const prev={pid:a.pid,status:a.status,prio:a.prio,notiz:a.notiz};
  try{
    const absender=person(a.erstelltVon);
    a.pid=a.erstelltVon;a.status='zurueckgegeben';a.prio=null;
    const notizPrefix='↩ Zurückgegeben';
    a.notiz=(grund?notizPrefix+': '+grund:notizPrefix)+(prev.notiz?'\n\n'+prev.notiz:'');
    render();
    const ok=await dbPatch('aufgaben',id,{pid:a.erstelltVon,status:'zurueckgegeben',prio:null,notiz:a.notiz});
    if(!ok){a.pid=prev.pid;a.status=prev.status;a.prio=prev.prio;a.notiz=prev.notiz;toast('⚠ Fehler beim Speichern');}
    else{
      if(absender?.slack_id)notify('aufgabe_zurueckgegeben',{aufgabe:a.titel,grund:grund||'',fuer:{id:absender.id,name:absender.name,slack_id:absender.slack_id}});
      toast('↩ Aufgabe zurückgegeben');
    }
  }catch(e){console.error('_doAufgabeZurueck',e);a.pid=prev.pid;a.status=prev.status;a.prio=prev.prio;a.notiz=prev.notiz;toast('⚠ Fehler');}
  finally{a._busy=false;render();}
}

// ─── DEADLINE-ALARM (Konzept A) ─────────────────────────────────
// Aufgaben mit dl<=TODAY, die NICHT als Wochenziele sichtbar sind.
// Deadline = Commitment, unabhängig von Priorität.
function rDeadlineAlarm(pid){
  const wr=dieseWocheReset(pid);
  const big3TzIds=new Set();
  if(wr){[1,2,3].forEach(n=>{const t=wr['big3_'+n+'_tz_id'];if(t)big3TzIds.add(String(t));});}
  const overdue=S.aufgaben.filter(a=>
    String(a.pid)===String(pid)&&
    a.dl&&a.dl<=TODAY&&
    a.inboxStatus!=='neu'&&  // #3: Inbox-Items erst nach Triage alarmieren
    !['erledigt','zurueckgegeben','archiviert','backlog'].includes(a.status)&&
    !taskIsPaused(a)&&!taskIsArchived(a)&&  // v175: Pausierte/archivierte MS → kein Deadline-Alarm
    !(a.teilzielId&&big3TzIds.has(String(a.teilzielId)))
  ).sort((a,b)=>(a.dl||'').localeCompare(b.dl||''));
  if(!overdue.length)return'';
  let h='<div style="background:var(--red-bg);border:1.5px solid var(--red);border-radius:14px;padding:12px 14px;margin-bottom:14px">';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
  h+='<span style="font-size:15px">🚨</span>';
  h+='<span style="font-size:13px;font-weight:700;color:var(--red)">Deadline heute/überfällig</span>';
  h+='<span style="margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px">'+overdue.length+'</span>';
  h+='</div>';
  overdue.forEach(a=>{
    const dlD=new Date(a.dl+'T12:00:00');
    const dlStr=a.dl===TODAY?'heute':dlD.getDate()+'.'+(dlD.getMonth()+1)+'.';
    const isUeber=a.dl<TODAY;
    const prioCol=prioColor(a.prio);
    h+='<div style="background:var(--sf);border:1px solid var(--red-bd);border-radius:10px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">';
    h+='<span style="font-size:10px;font-weight:700;color:var(--red);white-space:nowrap;min-width:52px">'+(isUeber?'⚠ ':'')+dlStr+'</span>';
    if(a.prio)h+='<span style="font-size:10px;font-weight:700;color:'+prioCol+';white-space:nowrap">'+a.prio+'</span>';
    h+='<span style="flex:1;font-size:13px;font-weight:600;cursor:pointer;overflow:hidden;text-overflow:ellipsis" onclick="openDetail(\''+a.id+'\')">'+esc(a.titel)+'</span>';
    h+='<button onclick="fertig(\''+a.id+'\')" style="flex-shrink:0;font-size:11px;padding:6px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--t2);cursor:pointer;font-family:inherit" title="Erledigen">✓</button>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

// ─── CLEANUP · DEIN PARKPLATZ (v181) ────────────────────────────
// Tagestermin (ab 15:00) zum Aufräumen: alle geparkten Aufgaben + Pflege-Bedarf.
// Doktrin: nichts versandet — alles erscheint spätestens hier, täglich klärbar.
function rCleanup(pid){
  const cfgKey='cleanup_start_'+pid;
  const raw=parseInt(localStorage.getItem(cfgKey)||'15',10);
  const startH=Math.min(18,Math.max(15,isNaN(raw)?15:raw));
  const nowH=new Date().getHours();
  if(nowH<startH)return'';
  const items=S.aufgaben.filter(a=>{
    if(String(a.pid)!==String(pid))return false;
    if(['erledigt','zurueckgegeben','archiviert'].includes(a.status))return false;
    // Geparkt: Status=backlog, pausiert mit Datum, oder wartet-auf-Person.
    const isParked=a.status==='backlog'||a.pausiertBis||a.wartetAufPid;
    // Pflege-Bedarf: kein Monatsziel + keine Deadline (Alarm hat Deadlines)
    const isPflege=!a.teilzielId&&!(a.dl&&a.dl<=TODAY);
    return isParked||isPflege;
  }).sort((a,b)=>{
    // Reihenfolge: aktive Pflege-Items zuerst, dann geparkte ohne Datum, dann schlafende mit Datum
    const aSleep=a.pausiertBis&&a.pausiertBis>TODAY?1:0;
    const bSleep=b.pausiertBis&&b.pausiertBis>TODAY?1:0;
    if(aSleep!==bSleep)return aSleep-bSleep;
    const po={'P1':0,'P2':1,'P3':2};
    return (po[a.prio]??3)-(po[b.prio]??3);
  });
  if(!items.length)return'';
  let h='<div style="background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;padding:12px 14px;margin-bottom:14px">';
  h+='<div style="display:flex;align-items:center;gap:8px">';
  h+='<span style="font-size:15px">🧹</span>';
  h+='<span style="font-size:13px;font-weight:700">Cleanup · Dein Parkplatz</span>';
  h+='<span style="background:var(--gray-bg);color:var(--t2);font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px">'+items.length+'</span>';
  h+='<button onclick="toggleCleanupSettings()" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:14px;color:var(--t3);padding:8px 10px;min-width:36px;min-height:36px" title="Cleanup-Startzeit ändern">⚙</button>';
  h+='</div>';

async function cleanupToWochenziel(taskId,wrId,combined){
  const [slotStr,tzIdRaw]=(combined||'').split('|');
  const slot=parseInt(slotStr,10);
  const tzId=tzIdRaw||null; // v181: tzId optional — Wochenziel kann ohne Monatsziel-Bezug existieren
  if(!slot)return;
  const a=S.aufgaben.find(x=>x.id===taskId);if(!a||a._busy)return;
  let zielId=null;
  if(tzId){
    S.ziele.forEach(z=>{(z.teilziele||[]).forEach(t=>{if(String(t.id)===String(tzId))zielId=z.id;});});
    if(!zielId){toast('⚠️ Monatsziel dieses Wochenziels existiert nicht mehr','var(--red)');return;}
  }
  // v181: Vom Parkplatz zurück ins Spiel — Status auf 'neu' (falls backlog), Park-Felder löschen.
  const prev={teilzielId:a.teilzielId,zielId:a.zielId,wochenresetId:a.wochenresetId,big3Slot:a.big3Slot,
    status:a.status,pausiertBis:a.pausiertBis};
  a._busy=true;
  a.wochenresetId=wrId;a.big3Slot=slot;
  const patch={wochenreset_id:wrId,big3_slot:slot};
  if(tzId){a.teilzielId=tzId;a.zielId=zielId;patch.teilziel_id=tzId;patch.ziel_id=zielId;}
  if(a.status==='backlog'){a.status='neu';patch.status='neu';}
  if(a.pausiertBis){a.pausiertBis=null;patch.pausiert_bis=null;}
  render();
  const ok=await dbPatch('aufgaben',taskId,patch);
  a._busy=false;
  if(!ok){Object.assign(a,prev);toast('⚠️ Speichern fehlgeschlagen','var(--red)');render();return;}
  toast('✓ Zu Wochenziel zugeordnet — vom Parkplatz geholt');
}

// v174 · Leading-Indicator-Helpers (Mental Model §14)
// Ein Primitiv: Input-Count. Streak ist eine Ansicht, kein Modus.
function _tzById(tzId){
  if(!tzId)return null;
  for(const z of S.ziele||[]){for(const t of (z.teilziele||[])){if(String(t.id)===String(tzId))return t;}}
  return null;
}
// v175 §14+: Rekalibrierungs-Primitive. Pause = reversibel, ruht sichtbar. Archiv = raus aus Standard-Views.
// Auf Teilziel-Ebene (nicht Aufgabe) — Pause ist eine Ziel-Entscheidung, Aufgaben erben sie.
function tzStatus(tzOrId){
  const tz=typeof tzOrId==='string'?_tzById(tzOrId):tzOrId;
  return tz?(tz.status||'aktiv'):'aktiv';
}
function tzIsPaused(tzOrId){return tzStatus(tzOrId)==='pausiert';}
function tzIsArchived(tzOrId){return tzStatus(tzOrId)==='archiviert';}
// v180: Outcome vs Projekt — Verhalten leitet sich vom Parent ab.
// Ziel (status≠bereich) → "Monatsziel" (Outcome, harte Frist, Verfehlt = Review)
// Bereich (status='bereich') → "Themengebiet" (laufender Schwerpunkt, Datum verlängerbar)
function tzIstUnterBereich(tzOrId){
  const tz=typeof tzOrId==='string'?_tzById(tzOrId):tzOrId;
  return !!(tz&&istBereich(tz.zielId));
}
function tzLabel(tzOrId){return tzIstUnterBereich(tzOrId)?'Themengebiet':'Monatsziel';}
function tzLabelPlural(tzOrId){return tzIstUnterBereich(tzOrId)?'Themengebiete':'Monatsziele';}
// "Verfehlt" — nur für Outcome-Monatsziele (unter Ziel). Themengebiete kennen nur "überfällig".
function tzIstVerfehlt(tzOrId){
  const tz=typeof tzOrId==='string'?_tzById(tzOrId):tzOrId;
  if(!tz)return false;
  if(tzIstUnterBereich(tz))return false;
  if(tz.erledigt)return false;
  if((tz.status||'aktiv')!=='aktiv')return false;
  return !!(tz.datum&&tz.datum<TODAY);
}
// Themengebiet überfällig — gedimmt, aber kein Review-Zwang.
function tzIstUeberfaelligProjekt(tzOrId){
  const tz=typeof tzOrId==='string'?_tzById(tzOrId):tzOrId;
  if(!tz)return false;
  if(!tzIstUnterBereich(tz))return false;
  if(tz.erledigt)return false;
  if((tz.status||'aktiv')!=='aktiv')return false;
  return !!(tz.datum&&tz.datum<TODAY);
}
// v180: Liste verfehlter Outcome-Monatsziele.
// Default = nur eigene (Owner = aP). Für Team-Sicht später eigene Funktion.
// GF sieht NICHT automatisch alle — fremde Ziele sollen nicht in der persönlichen Reflexion auftauchen.
function tzVerfehltMS(){
  const list=[];
  S.ziele.forEach(z=>{
    if(istBereich(z.id))return;
    if(z.vertraulich&&!isGF()&&z.verantwortlichId!==aP)return;
    (z.teilziele||[]).forEach(t=>{
      if(!tzIstVerfehlt(t))return;
      const mine=String(t.verantwortlichId)===String(aP);
      if(mine)list.push({z,t});
    });
  });
  return list;
}

async function _reviewArchivierenFinal(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const tz=(z.teilziele||[]).find(t=>t.id===tzid);if(!tz)return;
  const links=tzCountLinks(tzid);
  const aufAction=document.getElementById('rev-arch-auf')?.value;
  const aufTarget=document.getElementById('rev-arch-auf-target')?.value;
  const aufTargetZid=document.getElementById('rev-arch-auf-target')?.selectedOptions?.[0]?.dataset?.zid;
  const wzAction=document.getElementById('rev-arch-wz')?.value;
  // 1. MZ archivieren
  tz.status='archiviert';
  await dbPatch('teilziele',tzid,{status:'archiviert'}).catch(()=>{});
  // 2. Aufgaben behandeln
  if(links.aufgaben.length&&aufAction){
    for(const a of links.aufgaben){
      if(aufAction==='losloesen'){
        a.teilzielId=null;
        await dbPatch('aufgaben',a.id,{teilziel_id:null}).catch(()=>{});
      } else if(aufAction==='mitarchivieren'){
        a.status='archiviert';
        await dbPatch('aufgaben',a.id,{status:'archiviert'}).catch(()=>{});
      } else if(aufAction==='umhaengen'&&aufTarget){
        a.teilzielId=aufTarget;
        a.zielId=aufTargetZid||a.zielId;
        await dbPatch('aufgaben',a.id,{teilziel_id:aufTarget,ziel_id:aufTargetZid||a.zielId}).catch(()=>{});
      }
    }
  }
  // 3. Wochenziel-Slots behandeln
  if(links.wzSlots&&wzAction==='losloesen'){
    for(const wr of (S.wochenresets||[])){
      const patch={};
      [1,2,3].forEach(n=>{if(String(wr['big3_'+n+'_tz_id'])===String(tzid)){wr['big3_'+n+'_tz_id']=null;patch['big3_'+n+'_tz_id']=null;}});
      if(Object.keys(patch).length)await dbPatch('wochenresets',wr.id,patch).catch(()=>{});
    }
  }
  toast('🗄 Archiviert — '+tz.name);
  if(tzVerfehltMS().length){openVerfehltReview();}else{cm();render();}
}

// Aufgaben-Sicht: derived. Pause/Archiv einer MS zieht alle verknüpften Aufgaben mit.
function taskMsStatus(a){return a&&a.teilzielId?tzStatus(a.teilzielId):'aktiv';}
// v178: Pause kann jetzt zwei Quellen haben — Monatsziel-Pause (vererbt) oder Direkt-Pause (pausiertBis).

function msInputs(tzId){return(S.monatszielInputs||[]).filter(i=>String(i.teilzielId)===String(tzId));}

// v191: effectiveLeading(tz) — Sam-Ovens-Hybrid mit Inheritance.
// Wenn MZ.metrik gesetzt → MZ-Override (Phase-Indicator).
// Sonst → erbt vom übergeordneten Ziel (strategischer Indicator).
// Returns null wenn beide leer.
function effectiveLeading(tz){
  if(!tz)return null;
  if(tz.metrik&&String(tz.metrik).trim()){
    return{
      metrik:tz.metrik,
      leadingFreq:tz.leadingFreq||'daily',
      leadingCount:tz.leadingCount??null,
      zielWert:tz.zielWert??null,
      source:'mz'
    };
  }
  const z=tz.zielId?(S.ziele||[]).find(x=>x.id===tz.zielId):null;
  if(z&&z.metrik&&String(z.metrik).trim()){
    return{
      metrik:z.metrik,
      leadingFreq:z.leadingFreq||'daily',
      leadingCount:z.leadingCount??null,
      zielWert:z.zielWert??null,
      source:'ziel'
    };
  }
  return null;
}
// v182: Frequenz-bezogene Counts für Leading-Indicators (Ovens-Way).
function msInputsThisWeek(tzId){
  const{monday,sunday}=getWeekRange();
  return msInputs(tzId).filter(i=>i.datum>=monday&&i.datum<=sunday);
}
function msInputsThisMonth(tzId){
  const ym=TODAY.slice(0,7);
  return msInputs(tzId).filter(i=>(i.datum||'').startsWith(ym));
}
// v206: Pro Sam-Ovens + Mental Model: MZ-Counter ist PERSÖNLICH.
// Aggregation über alle MZ eines Ziels (Team-Total) lebt separat in zielLeadingAggregat() —
// wird auf der Ziel-Karte angezeigt, nicht auf der MZ-Karte.
function msLeadingFor(tz){
  const eff=effectiveLeading(tz);
  if(!eff)return null;
  const freq=eff.leadingFreq;
  const ziel=eff.leadingCount;
  let ist=0,scopeLbl='';
  if(freq==='daily'){ist=msInputsToday(tz.id).length;scopeLbl='heute';}
  else if(freq==='weekly'){ist=msInputsThisWeek(tz.id).length;scopeLbl='diese Woche';}
  else{ist=msInputsThisMonth(tz.id).length;scopeLbl='dieser Monat';}
  return{ist,ziel,scopeLbl,freq,source:eff.source};
}
// v206: Team-Aggregat am Ziel — Summe aller MZ-Inputs des Ziels (für Ziel-Karte).
// Liefert {ist, anker, freq, metrik, mzCount} oder null wenn kein Leading definiert.
function zielLeadingAggregat(z){
  if(!z||!z.metrik||!String(z.metrik).trim())return null;
  const freq=z.leadingFreq||'daily';
  // Alle aktiven, nicht-erledigten MZ des Ziels — auch die mit eigenem Override (Phase) zählen mit
  // v214: Manager-MZ excluded — sie tragen nicht zum Leading-Aggregat bei
  const tzs=(z.teilziele||[]).filter(t=>(t.status||'aktiv')==='aktiv'&&!t.erledigt&&!t.leadingDisabled);
  const sumLen=fn=>tzs.reduce((s,t)=>s+fn(t.id).length,0);
  let ist=0;
  if(freq==='daily')ist=sumLen(msInputsToday);
  else if(freq==='weekly')ist=sumLen(msInputsThisWeek);
  else ist=sumLen(msInputsThisMonth);
  // Anker = z.zielWert (Quartals-/Monats-Total über alle MZ-Slices)
  return{ist,anker:z.zielWert||null,freq,metrik:z.metrik,mzCount:tzs.length};
}
function msStreak(tzId){
  const set={};
  msInputs(tzId).forEach(i=>{if(i.datum)set[i.datum]=true;});
  let s=0,d=new Date(TODAY+'T12:00:00');
  // Wenn heute noch kein Input, Streak beginnt ab gestern (gebrochen am heutigen Tag ist ok, solange gestern gehalten)
  if(!set[TODAY])d.setDate(d.getDate()-1);
  while(set[localDate(d)]){s++;d.setDate(d.getDate()-1);}
  return s;
}
// Input pushen: manuell oder via Task-Completion. Nur für Leading-MS (metrik gesetzt).
async function msPushInput(tzId,quelle){
  if(!tzId)return;
  const tz=_tzById(tzId);
  if(!tz||!effectiveLeading(tz))return; // v191: Non-Leading-MS (auch ohne geerbten Ziel-Leading) bekommen keine Inputs
  // v214: Manager-MZ erzeugt keine Inputs (Begleit-Arbeit, kein Counter)
  if(tz.leadingDisabled)return;
  // v175: Pausierte/archivierte MS zählen keine neuen Inputs. Historische Inputs bleiben.
  if(tzIsPaused(tz)||tzIsArchived(tz))return;
  const id=nid('mi');
  const countBefore=msCount(tzId);
  const local={id,teilzielId:tzId,datum:TODAY,quelle:quelle||'manual',createdBy:aP||null,createdAt:new Date().toISOString()};
  S.monatszielInputs=S.monatszielInputs||[];
  S.monatszielInputs.push(local);
  try{render();}catch(e){console.error('render@msPushInput',e);}
  try{
    const rec={id,teilziel_id:tzId,datum:TODAY,quelle:quelle||'manual',created_by:aP||null};
    const ok=await dbInsert('monatsziel_inputs',rec);
    if(!ok){
      S.monatszielInputs=S.monatszielInputs.filter(i=>i.id!==id);
      try{toast('⚠ Input nicht gespeichert');}catch(_){}
      try{render();}catch(_){}
      return;
    }
    // Anker erreicht? Mini-Acknowledgement (§13: keine Fanfare).
    if(tz.zielWert&&countBefore<tz.zielWert&&countBefore+1>=tz.zielWert){
      setTimeout(()=>{try{toast('Anker erreicht · sauber.');}catch(_){}},300);
    }
  }catch(e){
    console.error('msPushInput',e);
    S.monatszielInputs=S.monatszielInputs.filter(i=>i.id!==id);
    try{render();}catch(_){}
  }
}

async function msUndoLast(tzId){

function msOnTaskDone(a,quelle){

// ── v176 WIN-Modus — Was Ist jetzt wichtig ────────────────────────────────
// Doktrin: Mental Model §13 (Dopamin am Input), §14 (Leading), Sam Ovens (one-thing).
// +1 = "Block produktiv". Counter zeigt Blöcke ODER KPI-Hits (je nach Kopplung).
// Schweigen = Tal. Wer in Flow war, korrigiert per Sammel-Tick rückwärts.
const WIN_BLOCK_MIN=25, WIN_PAUSE_MIN=5, WIN_CYCLE_MIN=30;

function winHeute(pid){
  pid=pid||aP;
  return (S.winTage||[]).find(w=>w.pid===pid&&w.datum===TODAY)||null;
}
function winYesterdayLast(pid){
  pid=pid||aP;
  const list=(S.winTage||[]).filter(w=>w.pid===pid&&w.datum<TODAY).sort((a,b)=>b.datum.localeCompare(a.datum));
  return list[0]||null;
}
function winErreicht(w){
  if(!w)return false;
  return winCount(w)>=(w.nZiel||1);
}
// Counter-Display: KPI-gekoppelt → KPI-Wert heute; sonst → produktive Blöcke
function winCount(w){
  if(!w)return 0;
  if(w.einheit==='kpi'&&w.kpiId){
    const e=S.kpiVals[w.pid+'-'+w.kpiId];
    return (e&&e.datum===TODAY)?e.val:0;
  }
  return (w.blocks||[]).filter(b=>b.ok).length;
}
function winEinheitLbl(w){
  if(!w)return '';
  if(w.einheit==='kpi'&&w.kpiId){
    const k=(S.ziele||[]).flatMap(z=>z.kpis||[]).find(x=>x.id===w.kpiId);
    return k?(k.label||'KPI'):'KPI';
  }
  return 'Blöcke';
}
// Wie viele Blöcke seit Start vergangen sein müssten (für Tal-Visualisierung)
function winExpectedBlocks(w){
  if(!w)return 0;
  const start=(w.startH??8), end=(w.endH??17);
  const now=new Date();
  const cur=now.getHours()+now.getMinutes()/60;
  if(cur<start)return 0;
  const runMin=Math.min((end-start)*60, (cur-start)*60);
  return Math.floor(runMin/WIN_CYCLE_MIN);
}
function winTotalBlocks(w){
  const start=(w&&w.startH)??8, end=(w&&w.endH)??17;
  return Math.floor((end-start)*60/WIN_CYCLE_MIN);
}
function winMissingCount(w){
  return Math.max(0, winExpectedBlocks(w)-(w.blocks||[]).length);
}
// Live block-status: phase + remaining minutes
function winBlockStatus(w){
  if(!w)return{phase:'before',label:''};
  const startH=w.startH??8, endH=w.endH??17;
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const startMin=startH*60, endMin=endH*60;
  const total=winTotalBlocks(w);
  if(nowMin<startMin)return{phase:'before',label:'Tag startet '+startH+':00',n:0,total};
  if(nowMin>=endMin)return{phase:'after',label:'Tag vorbei',n:total,total};
  const intoDay=nowMin-startMin;
  const cycleIdx=Math.floor(intoDay/WIN_CYCLE_MIN);
  const intoCycle=intoDay-cycleIdx*WIN_CYCLE_MIN;
  if(intoCycle<WIN_BLOCK_MIN){
    const remain=WIN_BLOCK_MIN-intoCycle;
    return{phase:'block',n:cycleIdx+1,total,remain,label:'Block '+(cycleIdx+1)+'/'+total+' · noch '+remain+' min'};
  } else {
    const remain=WIN_CYCLE_MIN-intoCycle;
    return{phase:'pause',n:cycleIdx+1,total,remain,label:'Pause · '+remain+' min bis Block '+(cycleIdx+2)};
  }
}
function winNowHHMM(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

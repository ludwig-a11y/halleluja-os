<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Halleluja OS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="H'OS">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --text:#1a1a1a;--t2:#6b6b6b;--t3:#a0a0a0;
  --bg:#f1f0ef;--sf:#fff;--bd:#e5e5e3;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--blue-bd:#bfdbfe;
  --green:#15803d;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --red:#b91c1c;--red-bg:#fef2f2;--red-bd:#fecaca;
  --amber:#a16207;--amber-bg:#fefce8;--amber-bd:#fde68a;--gold:#f59e0b;--gold-t:#92400e;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-bd:#ddd6fe;
  --gray-bg:#f8f8f7;
  --orange:#c2410c;--orange-bg:#fff7ed;--orange-bd:#fed7aa;
  --pink:#9d174d;--pink-bg:#fdf2f8;--pink-bd:#fbcfe8;
  --inv:#1a1a1a;--inv-t:#fff;--hero:#1a1a1a;--hero-t:#fff;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;--r-full:99px;
}
html.dark{
  --text:#e8e5e0;--t2:#b0ada8;--t3:#6a6864;
  --bg:#131211;--sf:#1c1b19;--bd:#2e2c29;
  --blue:#7db8f0;--blue-bg:#131820;--blue-bd:#1e3354;
  --green:#6ecf8a;--green-bg:#131a15;--green-bd:#1a3822;
  --red:#f09090;--red-bg:#1a1313;--red-bd:#3d2020;
  --amber:#d4a94d;--amber-bg:#1a1810;--amber-bd:#3a3018;--gold:#f0a030;--gold-t:#fbbf24;
  --purple:#b09ae8;--purple-bg:#16131e;--purple-bd:#2c2242;
  --gray-bg:#171614;
  --orange:#d49a6a;--orange-bg:#1a1710;--orange-bd:#3a2c18;
  --pink:#f472b6;--pink-bg:#1b1218;--pink-bd:#442035;
  --inv:#f0efed;--inv-t:#1a1a1a;--hero:#252422;--hero-t:#f0efed;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column}

@media(max-width:768px){
  .bar{padding:0 12px;height:50px}
  .logo{font-size:14px;border:none;padding:0;margin:0}
  .nt:not(.new-btn){display:none!important}
  .nt.new-btn{display:none!important}
  .sb{display:none!important}
  .main{padding:14px 14px 90px}
  .modal{border-radius:20px 20px 0 0;width:100%;max-width:100%;position:fixed;bottom:0;left:0;right:0;max-height:90vh;padding:20px 14px 32px}
  .ovl{align-items:flex-end;padding:0}
  .f2{grid-template-columns:1fr}
  #mob-tabs{display:flex!important}
  #mob-add{display:flex!important}
  #mob-memo{display:flex!important}
  input,textarea,select{font-size:16px!important}
  .btn{min-height:44px;font-size:13px!important}
  .card{padding:12px 14px}
}
@media(min-width:769px){
  #mob-tabs{display:none}
  #mob-add{display:none}
  #mob-memo{display:none}
}
#mob-tabs{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--sf);border-top:1px solid var(--bd);z-index:50;align-items:center;justify-content:space-around;padding:0 8px}
.mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;font-family:inherit;padding:8px 4px;color:var(--t3);font-size:9px;font-weight:500;transition:color .15s}
.mob-tab:hover{color:var(--t2)}
.mob-tab.on{color:var(--text);font-weight:600}
.mob-tab svg{width:20px;height:20px}
#mob-add{position:fixed;bottom:72px;right:18px;z-index:51;width:52px;height:52px;border-radius:50%;background:var(--inv);color:var(--inv-t);border:none;font-size:26px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.25);font-family:inherit;transition:transform .15s,box-shadow .15s}
#mob-add:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(0,0,0,.3)}
#mob-add:active{transform:scale(.97)}
#mob-memo:active{transform:scale(.93)}

#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.login-box{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-xl);padding:32px 36px;width:340px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.login-title{font-size:17px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--t3);margin-bottom:20px}
.person-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.person-btn{padding:10px 8px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.person-btn:hover{border-color:var(--text)}
.person-btn.selected{border:2px solid var(--text);background:var(--gray-bg)}
.pin-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--bd);transition:background .15s}
.pin-dot.filled{background:var(--inv)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-key{padding:14px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.pin-key:hover{background:var(--gray-bg)}
.login-err{font-size:12px;color:var(--red);text-align:center;min-height:18px;margin-top:8px}

.bar{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;height:46px;flex-shrink:0;gap:6px}
.logo{font-size:13px;font-weight:700;padding-right:12px;border-right:1px solid var(--bd);margin-right:6px;white-space:nowrap}
.nt{font-size:13px;padding:0 14px;height:46px;border:none;border-bottom:2px solid transparent;cursor:pointer;background:transparent;color:var(--t2);font-family:inherit;font-weight:500;white-space:nowrap;transition:color .15s,border-color .15s}
.nt:hover{color:var(--text)}
.nt.on{color:var(--text);font-weight:600;border-bottom-color:var(--text)}
.nt.new-btn{color:var(--blue);font-weight:600;border:1px solid var(--blue-bd);background:var(--blue-bg);border-radius:8px;height:32px;padding:0 14px;font-size:13px}
.shell{display:flex;flex:1;overflow:hidden}
.sb{width:168px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.gl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:0 8px;margin:12px 0 5px}
.sbn{width:100%;text-align:left;padding:7px 8px;border-radius:9px;border:none;cursor:pointer;background:transparent;font-family:inherit;margin-bottom:2px;display:flex;align-items:center;gap:8px;transition:background .12s}
.sbn.on,.sbn:hover{background:var(--bg)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:8px;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:#d0d0ce}
.card[onclick]:hover,.card[style*="cursor:pointer"]:hover{border-color:var(--t3);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tag{font-size:10px;padding:2px 8px;border-radius:var(--r-full);font-weight:500;white-space:nowrap;display:inline-block;transition:opacity .15s}
.btn{font-size:11px;padding:5px 12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s ease}
.btn:hover{opacity:.85;transform:translateY(-0.5px)}
.btn:active{transform:translateY(0);opacity:1}
.btn-dk{background:var(--inv);color:var(--inv-t)}
.btn-dk:hover{opacity:.85}
.btn-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.btn-ok:hover{background:var(--green-bd);color:var(--green)}
.btn-gr{background:var(--gray-bg);color:var(--t2);border:1px solid var(--bd)}
.btn-gr:hover{background:var(--bd);border-color:var(--t3)}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--red-bd)}
.btn-red:hover{background:var(--red-bg)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.btn-purple:hover{background:var(--purple-bd)}
.btn-prio{font-size:11px;padding:5px 13px;border-radius:8px;border:1px solid var(--bd);cursor:pointer;font-family:inherit;font-weight:400;transition:all .15s}
.btn-prio-on{border:2px solid var(--text);font-weight:700}
.btn-prio:hover{opacity:.85}
.btn-sm{font-size:11px;padding:4px 11px;border-radius:8px;border:1px solid var(--bd);cursor:pointer;font-family:inherit;font-weight:400;transition:all .15s}
.btn-sm:hover{opacity:.85}
.btn-xs{font-size:11px;padding:4px 8px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--t3);cursor:pointer;font-family:inherit}
.btn-xs:hover{opacity:.7}
.btn-toggle{font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid var(--bd);background:var(--gray-bg);color:var(--t2);cursor:pointer;font-family:inherit;font-weight:400;transition:all .15s}
.btn-toggle.on{background:var(--inv);color:var(--inv-t);font-weight:700}
details.fixes-heute{border-radius:99px;transition:border-radius .2s,background .2s}
details.fixes-heute[open]{border-radius:14px}
details.fixes-heute>summary{border-radius:99px;transition:border-radius .2s}
details.fixes-heute[open]>summary{border-radius:14px 14px 0 0}
.hoverable{transition:background .12s}
.hoverable:hover{background:var(--gray-bg)}
.hover-lift{transition:border-color .15s}
.hover-lift:hover{border-color:var(--t3)}
.hover-dim{transition:opacity .15s}
.hover-dim:hover{opacity:.85}
.lock{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.timer{background:var(--gray-bg);border-radius:9px;padding:7px 11px;text-align:center;flex-shrink:0;min-width:80px}
.tn{font-size:17px;font-weight:700;font-family:monospace;letter-spacing:-.5px}
.tbar{height:3px;border-radius:99px;background:var(--bd);margin-top:4px;overflow:hidden}
.tf{height:100%;border-radius:99px;background:var(--blue)}
.sw{padding-left:8px;border-left:2px solid var(--blue-bd);margin:8px 0}
.sr{display:flex;align-items:center;gap:8px;padding:3px 0;user-select:none}
.sc{width:13px;height:13px;border-radius:3px;border:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.sc:hover{border-color:var(--t2)}
.sc.dn{background:var(--inv);border-color:var(--inv)}
.sc.pop{animation:stepPop .4s ease}
@keyframes stepPop{0%{transform:scale(1)}30%{transform:scale(1.6)}60%{transform:scale(.9)}100%{transform:scale(1)}}
.sr.done-flash{animation:rowFlash .5s ease}
@keyframes rowFlash{0%{background:transparent}30%{background:var(--green-bg)}100%{background:transparent}}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--inv);color:var(--inv-t);padding:12px 24px;border-radius:var(--r-full);font-size:15px;font-weight:600;z-index:9999;pointer-events:none;opacity:0;transition:transform .4s cubic-bezier(.2,1,.3,1),opacity .4s ease}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.hide{transform:translateX(-50%) translateY(-40px);opacity:0}
.focus-takeover{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-100%);z-index:9990;display:flex;align-items:center;gap:12px;background:var(--hero);padding:14px 28px;border-radius:0 0 16px 16px;box-shadow:0 4px 24px rgba(0,0,0,.15);transition:transform .4s cubic-bezier(.22,1,.36,1);pointer-events:none}
.focus-takeover.show{transform:translateX(-50%) translateY(0);pointer-events:auto}
.focus-takeover.hide{transform:translateX(-50%) translateY(-100%)}
.ft-emoji{font-size:28px}
.ft-text{font-size:16px;font-weight:700;color:var(--hero-t);letter-spacing:-.3px}
.ft-sub{font-size:13px;font-weight:500;color:var(--hero-t);opacity:.7}
.cele-wrap{position:fixed;inset:0;z-index:9998;pointer-events:none;overflow:hidden}
.cele-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:9999;text-align:center;pointer-events:none;opacity:0;transition:transform .5s cubic-bezier(.2,1.2,.3,1),opacity .4s ease}
.cele-msg.show{transform:translate(-50%,-50%) scale(1);opacity:1}
.cele-msg.hide{transform:translate(-50%,-50%) scale(.8);opacity:0}
.cele-emoji{font-size:64px;display:block;margin-bottom:8px}
.cele-text{font-size:22px;font-weight:800;color:var(--text);background:var(--sf);padding:16px 32px;border-radius:var(--r-xl);box-shadow:0 8px 32px rgba(0,0,0,.15)}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg) translateX(0)}40%{opacity:1}100%{opacity:0;transform:translateY(85vh) rotate(1080deg) translateX(var(--cx))}}
.sl{font-size:11px}.sl.dn{text-decoration:line-through;color:var(--t3)}
.asi{flex:1;font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--text);font-family:inherit;outline:none}
.zcard{border-radius:var(--r-lg);padding:18px;margin-bottom:14px;border:1px solid;transition:box-shadow .15s,transform .15s}
.zcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.05)}
.pbar{height:5px;border-radius:99px;background:rgba(0,0,0,.08);overflow:hidden;flex:1}
.pbar-fill{height:100%;border-radius:99px;transition:width .3s}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:100;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.ovl.open{display:flex}
.modal{background:var(--sf);border-radius:var(--r-xl);padding:24px;width:520px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.mt{font-size:15px;font-weight:700;margin-bottom:16px}
.fl{margin-bottom:13px}
.fl label{display:block;font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fl input,.fl select,.fl textarea{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-bg)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.tz-block{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:11px;padding:12px 14px;margin-bottom:8px}
.tz-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tz-title{font-size:13px;font-weight:600;color:var(--purple);flex:1}
.tz-done{text-decoration:line-through;opacity:.5}
.tz-add-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:9px;border:1.5px dashed var(--purple-bd);background:transparent;color:var(--purple);font-size:11px;font-family:inherit;cursor:pointer;width:100%;margin-top:6px;opacity:.7}
.tz-add-btn:hover{opacity:1;background:rgba(124,58,237,.06)}
.team-block{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.team-block:hover{border-color:#d0d0ce;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.team-block-head{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;background:var(--gray-bg)}
.team-h-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--bd)}
.team-h-row:last-child{border:none}
.team-h-row:hover{background:var(--gray-bg)}
.empty-state{text-align:center;color:var(--t3);padding:60px 20px;font-size:13px;line-height:1.8}
.settings-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.settings-row:last-child{border:none}
.ai-result{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:10px;padding:12px;margin:10px 0;font-size:12px;line-height:1.6}

#quote-overlay{position:fixed;inset:0;background:#0d0d0d;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;opacity:0;pointer-events:none;transition:opacity .5s}
#quote-overlay.show{opacity:1;pointer-events:all}
#quote-text{color:#fff;font-size:20px;font-weight:400;line-height:1.7;max-width:min(580px,90vw);text-align:center;letter-spacing:.01em}
#quote-author{color:#555;font-size:12px;margin-top:20px;letter-spacing:.1em;text-transform:uppercase}
#quote-skip{margin-top:32px;background:transparent;border:1px solid #333;color:#444;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit}
#quote-skip:hover{border-color:#555;color:#666}

.kpi-block{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:12px;transition:border-color .15s}
.kpi-block-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.kpi-item{border:1px solid var(--bd);border-radius:10px;padding:10px 12px;position:relative}
.kpi-item.fällig{border-color:var(--text)}
.kpi-item.inaktiv{opacity:.5}
.kpi-name{font-size:10px;color:var(--t3);margin-bottom:2px}
.kpi-goal-ref{font-size:9px;color:var(--blue);margin-bottom:6px}
.kpi-val{font-size:20px;font-weight:700;line-height:1}
.kpi-val.ok{color:var(--green)}
.kpi-val.nok{color:var(--red)}
.kpi-soll{font-size:11px;color:var(--t3)}
.kpi-freq-label{font-size:9px;color:var(--t3);margin-top:3px}
.kpi-entry{display:flex;gap:5px;margin-top:7px}
.kpi-entry input{flex:1;padding:4px 7px;border:1px solid var(--bd);border-radius:6px;font-size:13px;font-family:inherit;background:var(--gray-bg);color:var(--text);outline:none}
.kpi-entry button{padding:4px 9px;border-radius:6px;background:var(--inv);color:var(--inv-t);border:none;font-size:11px;cursor:pointer;font-family:inherit}

.deleg-block{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-top:16px}
.deleg-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.deleg-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--bd)}
.deleg-row:last-child{border:none}

.prio-wrap{position:relative;display:inline-block}
.prio-dd{position:absolute;top:24px;left:0;background:var(--sf);border:1px solid var(--bd);border-radius:10px;z-index:50;min-width:130px;box-shadow:0 4px 16px rgba(0,0,0,.1);display:none}
.prio-dd.open{display:block}
.prio-dd-item{padding:8px 12px;font-size:11px;cursor:pointer;font-weight:500}
.prio-dd-item:hover{background:var(--gray-bg)}
.prio-dd-item:first-child{border-radius:10px 10px 0 0}
.prio-dd-item:last-child{border-radius:0 0 10px 10px}
.main::-webkit-scrollbar,.modal::-webkit-scrollbar,.sb::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-track,.modal::-webkit-scrollbar-track,.sb::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb,.modal::-webkit-scrollbar-thumb,.sb::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px}
.main::-webkit-scrollbar-thumb:hover,.modal::-webkit-scrollbar-thumb:hover{background:var(--t3)}
@keyframes bell-shake{0%,100%{transform:rotate(0)}15%{transform:rotate(18deg)}30%{transform:rotate(-16deg)}45%{transform:rotate(12deg)}60%{transform:rotate(-10deg)}75%{transform:rotate(6deg)}90%{transform:rotate(-4deg)}}

const SUPA_URL='https://zkxeuphsbufdvskkuahk.supabase.co';
const SUPA_KEY='sb_publishable_41EMxtYZYsYL5KR1KS_RrA_1mV1SRAL';

async function supa(path,opts={}){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),5000);
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/'+path,{
      signal:ctrl.signal,
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation',...(opts.headers||{})},
      method:opts.method||'GET',
      body:opts.body?JSON.stringify(opts.body):undefined
    });
    clearTimeout(tid);
    if(!r.ok){console.error('Supabase',path,await r.text());return null;}
    const t=await r.text();return t?JSON.parse(t):true;
  }catch(e){clearTimeout(tid);console.error('supa',e);return null;}
}

function istBereich(zielId){const z=zielObj(zielId);return z&&z.status==='bereich';}
function zieleOptgroups(pid,selId=''){
  const sichtbar=S.ziele.filter(z=>(!z.vertraulich||isGF())&&z.status!=='vorschlag');
  const bereiche=sichtbar.filter(z=>z.status==='bereich');
  const ziele=sichtbar.filter(z=>z.status!=='bereich');
  const meine=ziele.filter(z=>String(z.verantwortlichId)===String(pid)||(z.teilziele||[]).some(tz=>String(tz.verantwortlichId)===String(pid)));
  const andere=ziele.filter(z=>!meine.find(m=>m.id===z.id));
  const opt=z=>'<option value="'+z.id+'"'+(selId===z.id?' selected':'')+'>'+esc(z.name)+'</option>';
  let out='<option value="">— kein Ziel / Bereich —</option>';
  if(meine.length)out+='<optgroup label="Meine Ziele">'+meine.map(opt).join('')+'</optgroup>';
  if(andere.length)out+='<optgroup label="Andere Ziele">'+andere.map(opt).join('')+'</optgroup>';
  if(bereiche.length)out+='<optgroup label="📁 Bereiche">'+bereiche.map(z=>'<option value="'+z.id+'"'+(selId===z.id?' selected':'')+'>📁 '+esc(z.name)+'</option>').join('')+'</optgroup>';
  return out;
}
// Monatsziel-zentrische Auswahl: Monatsziele (aktiv) gruppiert nach Ziel/Bereich.
// Liefert <option>s mit data-ziel-id, data-datum. Aufrufer deriviert ziel_id aus Auswahl.
function meilensteinOptgroups(pid,selTzId=''){
  const sichtbar=S.ziele.filter(z=>(!z.vertraulich||isGF())&&z.status!=='vorschlag');
  const withTz=sichtbar.map(z=>({z,tz:(z.teilziele||[]).filter(t=>!t.erledigt&&(t.status||'aktiv')==='aktiv')})).filter(x=>x.tz.length);
  const meine=withTz.filter(x=>String(x.z.verantwortlichId)===String(pid)||x.tz.some(t=>String(t.verantwortlichId)===String(pid)));
  const andere=withTz.filter(x=>!meine.find(m=>m.z.id===x.z.id)&&x.z.status!=='bereich');
  const bereiche=withTz.filter(x=>x.z.status==='bereich'&&!meine.find(m=>m.z.id===x.z.id));
  const meineIds=new Set(meine.map(m=>m.z.id));
  const mkGroup=(label,items)=>{
    if(!items.length)return '';
    return items.map(({z,tz})=>{
      const prefix=z.status==='bereich'?'📁 ':'';
      return '<optgroup label="'+esc(prefix+(z.name||''))+'">'+tz.map(t=>{
        const dat=t.datum?' · bis '+t.datum.slice(8)+'.'+t.datum.slice(5,7)+'.':'';
        return '<option value="'+t.id+'" data-ziel-id="'+z.id+'" data-datum="'+(t.datum||'')+'"'+(selTzId===t.id?' selected':'')+'>'+esc(t.name)+dat+'</option>';
      }).join('')+'</optgroup>';
    }).join('');
  };
  let out='<option value="">— kein Monatsziel —</option>';
  out+=mkGroup('Meine',meine);
  out+=mkGroup('Andere',andere);
  out+=mkGroup('Bereiche',bereiche);
  // Fallback: wenn selTzId auf einen erledigten/archivierten TZ zeigt, als disabled-Info anzeigen statt still verschwinden lassen
  if(selTzId){
    const aktivMatch=sichtbar.some(z=>(z.teilziele||[]).some(t=>t.id===selTzId&&!t.erledigt&&(t.status||'aktiv')==='aktiv'));
    if(!aktivMatch){
      let inaktiv=null;
      for(const z of S.ziele){
        if(z.vertraulich&&!isGF()&&z.verantwortlichId!==aP)continue;
        const tz=(z.teilziele||[]).find(t=>t.id===selTzId);
        if(tz){inaktiv={t:tz,z};break;}
      }
      if(inaktiv){
        const status=inaktiv.t.erledigt?'erledigt':(inaktiv.t.status==='archiviert'?'archiviert':'inaktiv');
        out+='<optgroup label="⚠️ Nicht mehr aktiv"><option value="'+inaktiv.t.id+'" data-ziel-id="'+inaktiv.z.id+'" data-datum="'+(inaktiv.t.datum||'')+'" selected>'+esc(inaktiv.t.name)+' ('+status+')</option></optgroup>';
      }
    }
  }
  return out;
}
// Monatsziel-Picker mit Inline-„+ Neu" Button

  h+='<button type="button" onclick="saveQuickMs(\''+selectId+'\',\''+pid+'\')" style="flex:1;font-size:11px;padding:7px;border-radius:6px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit;font-weight:700">Anlegen &amp; auswählen</button>';

function toggleQuickMsForm(selectId){
  const f=document.getElementById(selectId+'-addform');if(!f)return;

async function saveQuickMs(selectId,pid){
  const zidEl=document.getElementById(selectId+'-zid');
  const nameEl=document.getElementById(selectId+'-name');
  const datumEl=document.getElementById(selectId+'-datum');
  if(!zidEl||!nameEl)return;
  const zid=zidEl.value;
  const name=nameEl.value.trim();
  const datum=datumEl?.value||'';
  if(!zid){toast('Bitte Ziel wählen');return;}
  if(name.length<3){toast('Titel zu kurz');return;}
  const z=zielObj(zid);if(!z){toast('Ziel nicht gefunden');return;}
  const id=nid('tz'),rec={id,ziel_id:zid,name,verantwortlich_id:pid,datum:datum||null,erledigt:false,vertraulich:false,status:'aktiv'};
  z.teilziele=z.teilziele||[];
  z.teilziele.push({...rec,zielId:zid,verantwortlichId:pid,datum:datum||'',vertraulich:false,status:'aktiv'});
  const ok=await dbInsert('teilziele',rec);
  if(!ok){toast('Fehler beim Speichern');z.teilziele=z.teilziele.filter(t=>t.id!==id);return;}
  const sel=document.getElementById(selectId);
  if(sel){
    sel.innerHTML=meilensteinOptgroups(pid,id);
    sel.value=id;
    sel.dispatchEvent(new Event('change'));
  }
  toggleQuickMsForm(selectId);
  toast('✓ Monatsziel angelegt');
}
function wochenTage(){
  const today=new Date(),dow=today.getDay(),diff=dow===0?-6:1-dow;
  const mo=new Date(today);mo.setDate(today.getDate()+diff);mo.setHours(0,0,0,0);
  return Array.from({length:6},(_,i)=>{const d=new Date(mo);d.setDate(mo.getDate()+i);return localDate(d);});
}
function getKW(d){
  const date=new Date(d||Date.now());
  date.setHours(0,0,0,0);
  date.setDate(date.getDate()+3-(date.getDay()+6)%7);
  const w1=new Date(date.getFullYear(),0,4);
  return{kw:1+Math.round(((date-w1)/86400000-3+(w1.getDay()+6)%7)/7),jahr:date.getFullYear()};
}
function getResetStartH(){const raw=parseInt(localStorage.getItem('reset_start_'+(aP||''))||'16',10);return Math.min(18,Math.max(14,isNaN(raw)?16:raw));}
function getResetEndH(){const raw=parseInt(localStorage.getItem('reset_end_'+(aP||''))||'19',10);return Math.min(22,Math.max(17,isNaN(raw)?19:raw));}
function getResetSnoozeMins(){
  const n=new Date();
  if(n.getDay()!==5)return 30; // Sa/So: fixer 30-Min-Snooze
  const endH=getResetEndH();
  const endMs=new Date(n.getFullYear(),n.getMonth(),n.getDate(),endH,0,0).getTime();
  const remainingMin=Math.max(0,(endMs-Date.now())/60000);
  if(remainingMin<10)return 0;
  return Math.max(5,Math.floor(remainingMin/3));
}
function isResetZeit(){const n=new Date();const d=n.getDay();if(d===6||d===0)return true;return d===5&&n.getHours()>=getResetStartH();}
function isResetAnkuendigung(){const n=new Date();const d=n.getDay();if(d===6||d===0)return true;if(d!==5)return false;const startH=getResetStartH();return n.getHours()>=Math.max(12,startH-2);}
function _snoozeKey(){return'hallj_snooze_'+aP;}
function _snoozeLoad(){
  if(!aP)return;
  try{
    const raw=localStorage.getItem(_snoozeKey());if(!raw)return;
    const o=JSON.parse(raw);
    if(!o||typeof o!=='object')return;
    _resetSnoozeCount=typeof o.count==='number'?o.count:(o.used?_RESET_SNOOZE_MAX:0);
    if(o.until&&o.until>Date.now()){
      _resetSnoozeUntil=o.until;
      if(_resetSnoozeTimer)clearTimeout(_resetSnoozeTimer);
      _resetSnoozeTimer=setTimeout(()=>{if(aP&&!dieseWocheReset(aP))openWochenresetZwang();},Math.max(0,o.until-Date.now()));
      // Text nur wiederherstellen wenn Snooze noch aktiv läuft
      window._wrGutSnooze=o.gut||'';
      window._wrBlockiertSnooze=o.blockiert||'';
    } else {
      // Snooze abgelaufen → kein Pre-Fill, Text verwerfen
      _resetSnoozeUntil=0;
      window._wrGutSnooze='';
      window._wrBlockiertSnooze='';
    }
  }catch(e){}
}
function _snoozePersist(gut,blockiert){
  if(!aP)return;
  try{
    localStorage.setItem(_snoozeKey(),JSON.stringify({
      until:_resetSnoozeUntil,count:_resetSnoozeCount,
      gut:gut||window._wrGutSnooze||'',blockiert:blockiert||window._wrBlockiertSnooze||''
    }));
  }catch(e){}
}
function _snoozeClear(){
  if(!aP)return;
  try{localStorage.removeItem(_snoozeKey());}catch(e){}
  window._wrGutSnooze='';window._wrBlockiertSnooze='';
}

function getWeekRange(){
  const now=new Date();
  const dow=(now.getDay()+6)%7; // 0=Mo, 6=So
  const mon=new Date(now); mon.setHours(0,0,0,0); mon.setDate(now.getDate()-dow);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return{monday:fmt(mon),sunday:fmt(sun)};
}

async function _saveKpi(kpiId,pid,val){
  saveKpiTodayVal(kpiId,pid,val);
  const existing=S.kpiVals[pid+'-'+kpiId];
  const mKey=pid+'-'+kpiId;
  const oldVal=(existing&&existing.datum===TODAY)?existing.val:0;
  S.kpiVals[mKey]={val,datum:TODAY};
  // Monatssumme aktualisieren: alten Tageswert ersetzen, neuen addieren
  S.kpiValsMonth[mKey]=(S.kpiValsMonth[mKey]||0)-oldVal+val;
  // Wochensumme ebenfalls live aktualisieren (heute ist immer in dieser Woche)
  S.kpiValsWeek[mKey]=(S.kpiValsWeek[mKey]||0)-oldVal+val;
  if(existing&&existing.datum===TODAY){
    await supa('kpi_vals?pid=eq.'+pid+'&kpi_id=eq.'+kpiId+'&datum=eq.'+TODAY,{method:'PATCH',body:{val},prefer:'return=minimal'});
  }else{
    await supa('kpi_vals',{method:'POST',body:{pid,kpi_id:kpiId,val,datum:TODAY}});
  }
}
async function incrementKpi(kpiId,pid){
  const allKpis=S.ziele.flatMap(z=>z.kpis||[]);
  const k=allKpis.find(x=>x.id===kpiId);if(!k)return;
  const cur=getKpiTodayVal(kpiId,pid)??kpiVal(k);
  const newVal=Math.max(0,(cur||0)+1);
  await _saveKpi(kpiId,pid,newVal);
  render();
  if(k.sonder)showSonderCelebration(pid,k.label,newVal,k.ziel);
  else if(k.prio==='P1'&&k.teilzielId)showPaddelCelebration(pid);

      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(.5,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+1.2);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+1.5);
    });
  }catch(e){}
  const el=document.createElement('div');
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;text-align:center;padding:24px';
  el.onclick=()=>el.remove();
  el.innerHTML='<div style="font-size:90px;animation:bell-shake .6s ease infinite">🔔</div>'
    +'<div style="font-size:11px;font-weight:700;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin:16px 0 8px">Verkauf abgeschlossen</div>'
    +'<div style="font-size:36px;font-weight:900;color:#fff;margin-bottom:8px">'+(p?p.name:'')+'</div>'
    +'<div style="font-size:18px;color:rgba(255,255,255,.7);margin-bottom:32px">'+esc(label)+' · '+val+' / '+ziel+'</div>'
    +'<div style="font-size:12px;color:rgba(255,255,255,.35)">Tippen zum Schließen</div>';
  document.body.appendChild(el);
  showKonfetti();
  setTimeout(()=>el.remove(),10000);
}
let _dataPoll=null,_dataHash='',_kpiHash='',_dataPending=false;
function _aufgabenHash(arr){return arr.map(a=>a.id+a.status+(a.updated_at||'')).join('|');}
function _kpiHashFn(arr){return arr.map(k=>k.id+(k.sonder?'1':'0')+(k.pid||'')+k.label).join('|');}
function startDataPoller(){
  if(_dataPoll){clearInterval(_dataPoll);_dataPoll=null;}

  _dataPoll=setInterval(async()=>{

    if(paddelGewinner)S.paddelGewinner=paddelGewinner;
    if(kontextFeed)S.kontext=kontextFeed;
    let changed=false;
    if(aufgaben){
      const newHash=_aufgabenHash(aufgaben);
      if(newHash!==_dataHash){
        S.aufgaben=aufgaben.map(normalizeAufgabe);
        if(signale)S.signale=signale;
        _dataHash=newHash;
        changed=true;
      }
    }
    if(kpis){
      const newKpiHash=_kpiHashFn(kpis);
      if(newKpiHash!==_kpiHash){
        S.ziele.forEach(z=>{z.kpis=kpis.filter(k=>k.ziel_id===z.id).map(k=>({...k,zielId:k.ziel_id,teilzielId:k.teilziel_id||null,prio:k.prio||null}));});
        _kpiHash=newKpiHash;
        changed=true;
      }
    }

    if(beobachtungen)S.beobachtungen=beobachtungen;

let _sonderSeen={},_sonderPoll=null;
function startSonderPoller(){
  if(_sonderPoll){clearInterval(_sonderPoll);_sonderPoll=null;}
  const sonderKpis=S.ziele.flatMap(z=>z.kpis||[]).filter(k=>k.sonder);
  // Baseline = max aller Personen heute, nicht nur aP
  sonderKpis.forEach(k=>{
    let maxVal=0;
    Object.entries(S.kpiVals).forEach(([key,v])=>{if(key.endsWith('-'+k.id)&&v.datum===TODAY)maxVal=Math.max(maxVal,v.val);});
    _sonderSeen[k.id]=maxVal;
  });
  _sonderPoll=setInterval(async()=>{
    if(!isGF())return;
    const sk=S.ziele.flatMap(z=>z.kpis||[]).filter(k=>k.sonder);
    if(!sk.length)return;
    const ids='('+sk.map(k=>'\''+k.id+'\'').join(',')+')';
    const rows=await dbGet('kpi_vals','kpi_id=in.'+ids+'&datum=eq.'+TODAY);

  },5000);
}
function isFällig(freq){
  const now=new Date();
  if(freq==='täglich')return true;
  if(freq==='wöchentlich')return now.getDay()===5;
  if(freq==='monatlich'){const last=new Date(now.getFullYear(),now.getMonth()+1,0);return now.getDate()===last.getDate();}
  return false;
}
function freqLabel(freq){return{täglich:'Täglich',wöchentlich:'Wöchentlich (Freitag)',monatlich:'Monatlich (Monatsletzter)'}[freq]||freq;}

function hasPendingP1Kpis(pid){

      if(String(k.pid)!==String(pid))return;

      if(!reached)result.push({...k,displayVal,zielName:z.name});
    });
  });
  return result;
}

// "Fixes heute" — Kalendertermine + App-Events (Aufgaben mit Uhrzeit) + Tasks ohne Uhrzeit.
// Collapsed = nächstes Fix + Countdown; open = volle Liste.
function rFixesHeute(pid){
  const now=Date.now();
  const fmt=d=>d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  const fmtDiff=(ms)=>{const min=Math.round(ms/60000);if(min<60)return'in '+min+'min';const h=Math.floor(min/60);return'in '+h+'h'+(min%60?' '+(min%60)+'min':'');};
  // Google Calendar events today
  const kalHeute=(S.kalender||[]).filter(ev=>{
    if(!ev.start)return false;
    const d=ev.start;const ymd=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    return ymd===TODAY;
  });
  // App-Events: tasks with dl=today AND dlUhrzeit set
  const appEvents=(S.aufgaben||[]).filter(a=>
    String(a.pid)===String(pid)&&a.dl===TODAY&&a.dlUhrzeit&&
    !['erledigt','zurueckgegeben','archiviert','backlog'].includes(a.status)
  ).filter(a=>/^\d{2}:\d{2}$/.test(a.dlUhrzeit)).map(a=>{
    const [hh,mm]=a.dlUhrzeit.split(':').map(Number);
    const start=new Date(TODAY+'T'+String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':00');
    const durMin=Math.round((parseFloat(a.geplant)||1)*60);
    const end=new Date(start.getTime()+durMin*60000);
    return{...a,_isAppEvent:true,start,end};
  });
  // Merge + sort all fixed-time entries
  const allFixed=[...kalHeute,...appEvents].sort((a,b)=>a.start-b.start);
  // Tasks with dl=today but NO time (plain deadline)
  const tasksHeute=S.aufgaben.filter(a=>
    String(a.pid)===String(pid)&&a.dl===TODAY&&!a.dlUhrzeit&&
    !['erledigt','zurueckgegeben','archiviert','backlog'].includes(a.status)
  );
  if(!allFixed.length&&!tasksHeute.length)return'';
  const upcoming=allFixed.filter(ev=>ev.end.getTime()>now);
  const next=upcoming[0];
  let collapsed='',imminent=false,autoOpen=false;
  if(next){
    const diffMs=next.start.getTime()-now;
    const isRunning=diffMs<=0&&next.end.getTime()>now;
    imminent=(diffMs>0&&diffMs<=15*60000)||isRunning;
    autoOpen=imminent;
    const tc=imminent?'var(--red)':'var(--text)';
    const icon=next._isAppEvent?'📝':'📅';
    const label=isRunning?'🔴 LÄUFT':imminent?'⏰ GLEICH':'⏰ Fix heute';
    const when=isRunning?'jetzt':diffMs>0?fmtDiff(diffMs):'jetzt';
    collapsed='<div style="font-size:10px;font-weight:700;color:'+tc+';letter-spacing:.4px;text-transform:uppercase;white-space:nowrap">'+label+'</div>'
      +'<div style="flex:1;font-size:13px;font-weight:600;color:'+tc+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+fmt(next.start)+' · '+icon+' '+esc(next.titel)+'</div>'
      +'<div style="font-size:11px;color:'+tc+';font-weight:600;white-space:nowrap">'+when+'</div>';
  }else if(allFixed.length){
    collapsed='<div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase">✓ Fixes heute</div><div style="flex:1;font-size:12px;color:var(--t3)">alle durch</div>';
  }else{
    collapsed='<div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase">📋 Heute fällig</div><div style="flex:1;font-size:12px;color:var(--t2)">'+tasksHeute.length+' Aufgabe'+(tasksHeute.length!==1?'n':'')+'</div>';
  }
  // Expanded content — all fixed-time entries merged
  let expanded='';
  if(allFixed.length){
    allFixed.forEach(ev=>{
      const passed=ev.end.getTime()<=now;
      const running=ev.start.getTime()<=now&&ev.end.getTime()>now;
      const color=passed?'var(--t3)':running?'var(--red)':'var(--text)';
      const deco=passed?'text-decoration:line-through':'';
      if(ev._isAppEvent){
        // App-Event: click → task detail
        const prioColor=ev.prio==='P1'?'var(--red)':ev.prio==='P2'?'var(--blue)':'var(--t3)';
        // Liebevolle Reibung: no milestone
        const noMilestone=!ev.teilzielId;
        expanded+='<div onclick="openDetail(\''+ev.id+'\')" style="display:flex;align-items:center;gap:10px;padding:7px 14px;cursor:pointer;border-top:1px solid var(--bd);font-size:12px;color:'+color+';'+deco+'">';
        expanded+='<span style="font-weight:700;min-width:48px;font-variant-numeric:tabular-nums">'+fmt(ev.start)+'</span>';
        expanded+='<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📝 '+esc(ev.titel)+'</span>';
        expanded+='<span style="font-size:10px;font-weight:700;color:'+prioColor+'">'+(ev.prio||'')+'</span>';
        if(noMilestone)expanded+='<span title="Kein Ziel-Bezug. Warum ist das in deinem Kalender?" style="font-size:11px;color:var(--t3);cursor:help">🤔</span>';
        if(running)expanded+='<span style="font-size:10px;font-weight:700;color:var(--red)">läuft</span>';
        expanded+='</div>';
      }else{
        // Google Calendar event
        expanded+='<div onclick="gcalShowEvent(\''+ev.id+'\')" style="display:flex;align-items:center;gap:10px;padding:7px 14px;cursor:pointer;border-top:1px solid var(--bd);font-size:12px;color:'+color+';'+deco+'">';
        expanded+='<span style="font-weight:700;min-width:48px;font-variant-numeric:tabular-nums">'+fmt(ev.start)+'</span>';
        expanded+='<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📅 '+esc(ev.titel)+'</span>';
        if(running)expanded+='<span style="font-size:10px;font-weight:700;color:var(--red)">läuft</span>';
        expanded+='</div>';
      }
    });
  }
  if(tasksHeute.length){
    expanded+='<div style="padding:6px 14px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);border-top:1px solid var(--bd);background:var(--gray-bg)">Heute fällig (kein Fixpunkt)</div>';
    tasksHeute.forEach(a=>{
      const prioColor=a.prio==='P1'?'var(--red)':a.prio==='P2'?'var(--blue)':'var(--t3)';
      expanded+='<div onclick="openDetail(\''+a.id+'\')" style="display:flex;align-items:center;gap:10px;padding:7px 14px;cursor:pointer;border-top:1px solid var(--bd);font-size:12px">';
      expanded+='<span style="font-size:10px;font-weight:700;color:'+prioColor+';min-width:48px">'+(a.prio||'—')+'</span>';
      expanded+='<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(a.titel)+'</span>';
      expanded+='</div>';
    });
  }
  const bg=imminent?'var(--red-bg)':'var(--sf)';
  const bd=imminent?'var(--red-bd)':'var(--bd)';
  let h='<details class="fixes-heute" style="margin-bottom:10px;background:'+bg+';border:1px solid '+bd+';overflow:hidden"'+(autoOpen?' open':'')+'>';
  h+='<summary style="list-style:none;cursor:pointer;padding:9px 14px;display:flex;align-items:center;gap:10px">'+collapsed+'<span style="font-size:10px;color:var(--t3);margin-left:4px">▾</span></summary>';
  h+=expanded;
  h+='</details>';
  return h;
}

async function _doAufgabeZurueck(id,grund){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  a._busy=true;
  const prev={pid:a.pid,status:a.status,prio:a.prio,notiz:a.notiz};
  try{
    const absender=person(a.erstelltVon);
    a.pid=a.erstelltVon;a.status='zurueckgegeben';a.prio=null;
    const notizPrefix='↩ Zurückgegeben';
    a.notiz=(grund?notizPrefix+': '+grund:notizPrefix)+(prev.notiz?'\n\n'+prev.notiz:'');
    render();
    const ok=await dbPatch('aufgaben',id,{pid:a.erstelltVon,status:'zurueckgegeben',prio:null,notiz:a.notiz});
    if(!ok){a.pid=prev.pid;a.status=prev.status;a.prio=prev.prio;a.notiz=prev.notiz;toast('⚠ Fehler beim Speichern');}
    else{
      if(absender?.slack_id)notify('aufgabe_zurueckgegeben',{aufgabe:a.titel,grund:grund||'',fuer:{id:absender.id,name:absender.name,slack_id:absender.slack_id}});
      toast('↩ Aufgabe zurückgegeben');
    }
  }catch(e){console.error('_doAufgabeZurueck',e);a.pid=prev.pid;a.status=prev.status;a.prio=prev.prio;a.notiz=prev.notiz;toast('⚠ Fehler');}
  finally{a._busy=false;render();}
}
async function aufgabeZurueckGesehen(id){

function rMorgenPreview(pid){
  if(new Date().getHours()<17)return'';
  const tomorrow=localDate(new Date(new Date(TODAY+'T12:00:00').getTime()+86400000));
  const fmt=d=>d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  // Kalender-Events morgen
  const kalMorgen=(S.kalender||[]).filter(ev=>{
    if(!ev.start)return false;
    return localDate(ev.start)===tomorrow;
  }).sort((a,b)=>a.start-b.start);
  // P1-Aufgaben morgen (oder überfällig P1)
  const tasksMorgen=S.aufgaben.filter(a=>
    String(a.pid)===String(pid)&&a.prio==='P1'&&a.dl===tomorrow&&
    !['erledigt','zurueckgegeben','archiviert'].includes(a.status)
  );
  if(!kalMorgen.length&&!tasksMorgen.length)return'';
  const total=kalMorgen.length+tasksMorgen.length;
  const firstFix=kalMorgen[0];
  let collapsed='<div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.4px;text-transform:uppercase;white-space:nowrap">🌅 Morgen</div>';

    collapsed+='<div style="flex:1;font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+fmt(firstFix.start)+' · '+esc(firstFix.titel)+'</div>';
  }
  if(total>1||(!firstFix&&total>0)){
    collapsed+='<div style="font-size:11px;color:var(--t3);white-space:nowrap">'+total+' '+(total===1?'Fix':'Fixes')+'</div>';
  }
  let expanded='';
  if(kalMorgen.length){
    kalMorgen.forEach(ev=>{
      expanded+='<div style="display:flex;align-items:center;gap:10px;padding:7px 14px;border-top:1px solid var(--bd);font-size:12px;color:var(--t2)">';
      expanded+='<span style="font-weight:700;min-width:48px;font-variant-numeric:tabular-nums">'+fmt(ev.start)+'</span>';
      expanded+='<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📅 '+esc(ev.titel)+'</span>';
      expanded+='</div>';
    });
  }
  if(tasksMorgen.length){
    if(kalMorgen.length)expanded+='<div style="padding:4px 14px 3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);border-top:1px solid var(--bd);background:var(--gray-bg)">P1 morgen</div>';
    tasksMorgen.forEach(a=>{
      expanded+='<div onclick="openDetail(\''+a.id+'\')" style="display:flex;align-items:center;gap:10px;padding:7px 14px;border-top:1px solid var(--bd);font-size:12px;cursor:pointer">';
      expanded+='<span style="font-size:10px;font-weight:700;color:var(--red);min-width:48px">P1</span>';
      expanded+='<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(a.titel)+'</span>';

  h+='<summary style="list-style:none;cursor:pointer;padding:9px 14px;display:flex;align-items:center;gap:10px">'+collapsed+'<span style="font-size:10px;color:var(--t3);margin-left:4px">▾</span></summary>';

// ─── DEADLINE-ALARM (Konzept A) ─────────────────────────────────
// Aufgaben mit dl<=TODAY, die NICHT als Wochenziele sichtbar sind.
// Deadline = Commitment, unabhängig von Priorität.
function rDeadlineAlarm(pid){
  const wr=dieseWocheReset(pid);
  const big3TzIds=new Set();
  if(wr){[1,2,3].forEach(n=>{const t=wr['big3_'+n+'_tz_id'];if(t)big3TzIds.add(String(t));});}
  const overdue=S.aufgaben.filter(a=>
    String(a.pid)===String(pid)&&
    a.dl&&a.dl<=TODAY&&
    a.inboxStatus!=='neu'&&  // #3: Inbox-Items erst nach Triage alarmieren
    !['erledigt','zurueckgegeben','archiviert','backlog'].includes(a.status)&&
    !(a.teilzielId&&big3TzIds.has(String(a.teilzielId)))
  ).sort((a,b)=>(a.dl||'').localeCompare(b.dl||''));
  if(!overdue.length)return'';
  let h='<div style="background:var(--red-bg);border:1.5px solid var(--red);border-radius:14px;padding:12px 14px;margin-bottom:14px">';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
  h+='<span style="font-size:15px">🚨</span>';
  h+='<span style="font-size:13px;font-weight:700;color:var(--red)">Deadline heute/überfällig</span>';
  h+='<span style="margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px">'+overdue.length+'</span>';
  h+='</div>';
  overdue.forEach(a=>{
    const dlD=new Date(a.dl+'T12:00:00');
    const dlStr=a.dl===TODAY?'heute':dlD.getDate()+'.'+(dlD.getMonth()+1)+'.';
    const isUeber=a.dl<TODAY;
    const prioCol=prioColor(a.prio);
    h+='<div style="background:var(--sf);border:1px solid var(--red-bd);border-radius:10px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">';
    h+='<span style="font-size:10px;font-weight:700;color:var(--red);white-space:nowrap;min-width:52px">'+(isUeber?'⚠ ':'')+dlStr+'</span>';
    if(a.prio)h+='<span style="font-size:10px;font-weight:700;color:'+prioCol+';white-space:nowrap">'+a.prio+'</span>';
    h+='<span style="flex:1;font-size:13px;font-weight:600;cursor:pointer;overflow:hidden;text-overflow:ellipsis" onclick="openDetail(\''+a.id+'\')">'+esc(a.titel)+'</span>';
    h+='<button onclick="fertig(\''+a.id+'\')" style="flex-shrink:0;font-size:11px;padding:6px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--t2);cursor:pointer;font-family:inherit" title="Erledigen">✓</button>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

// ─── CLEANUP (Konzept B) ────────────────────────────────────────
// Aufgaben ohne Monatsziel, sichtbar ab konfigurierbarer Uhrzeit (min 15:00).
// "Fokus endet. Jetzt aufräumen." Zählt nicht fürs Paddel.
function rCleanup(pid){
  const cfgKey='cleanup_start_'+pid;
  // #6: NaN-Guard — korrupter localStorage-Wert fällt auf Default 15 zurück
  const raw=parseInt(localStorage.getItem(cfgKey)||'15',10);
  const startH=Math.min(18,Math.max(15,isNaN(raw)?15:raw));
  const nowH=new Date().getHours();
  if(nowH<startH)return'';
  const items=S.aufgaben.filter(a=>
    String(a.pid)===String(pid)&&
    !a.teilzielId&&
    !(a.dl&&a.dl<=TODAY)&&  // #2: Tasks mit Deadline im Alarm, nicht im Cleanup
    !['erledigt','zurueckgegeben','archiviert'].includes(a.status)&&
    a.inboxStatus!=='neu'
  ).sort((a,b)=>{
    const po={'P1':0,'P2':1,'P3':2};
    return (po[a.prio]??3)-(po[b.prio]??3);
  });
  if(!items.length)return'';
  let h='<div style="background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;padding:12px 14px;margin-bottom:14px">';
  h+='<div style="display:flex;align-items:center;gap:8px">';
  h+='<span style="font-size:15px">🧹</span>';
  h+='<span style="font-size:13px;font-weight:700">Cleanup ab '+startH+':00</span>';
  h+='<span style="background:var(--gray-bg);color:var(--t2);font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px">'+items.length+'</span>';
  h+='<button onclick="toggleCleanupSettings()" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:14px;color:var(--t3);padding:8px 10px;min-width:36px;min-height:36px" title="Cleanup-Startzeit ändern">⚙</button>';
  h+='</div>';
  h+='<div id="cleanup-settings" style="display:none;padding:8px 0 6px;margin-top:8px;border-top:1px solid var(--bd)">';
  h+='<div style="font-size:11px;color:var(--t2);margin-bottom:6px">Cleanup-Pille erscheint ab:</div>';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
  [15,16,17,18].forEach(h2=>{
    const sel=h2===startH;
    h+='<button onclick="setCleanupStart(\''+pid+'\','+h2+')" style="font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid '+(sel?'var(--inv)':'var(--bd)')+';background:'+(sel?'var(--inv)':'var(--sf)')+';color:'+(sel?'var(--inv-t)':'var(--t2)')+';cursor:pointer;font-family:inherit;font-weight:'+(sel?'700':'500')+'">'+h2+':00</button>';
  });
  h+='</div></div>';
  h+='<div style="font-size:11px;color:var(--t3);margin:8px 0 10px">Aufgaben ohne Monatsziel — zählt nicht fürs Paddel.</div>';
  items.forEach(a=>{
    const prioCol=prioColor(a.prio);
    h+='<div style="background:var(--gray-bg);border:1px solid var(--bd);border-radius:10px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">';
    if(a.prio)h+='<span style="font-size:10px;font-weight:700;color:'+prioCol+';white-space:nowrap;min-width:18px">'+a.prio+'</span>';
    h+='<span style="flex:1;font-size:13px;cursor:pointer;overflow:hidden;text-overflow:ellipsis" onclick="openDetail(\''+a.id+'\')">'+esc(a.titel)+'</span>';
    h+='<button onclick="fertig(\''+a.id+'\')" style="flex-shrink:0;font-size:11px;padding:6px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--t2);cursor:pointer;font-family:inherit" title="Erledigen">✓</button>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

// ─── INBOX (End-of-Day Ritual) ──────────────────────────────────

    !['erledigt','archiviert'].includes(a.status)
  );

      expanded+='<option value="">'+(bereitsTZ?'🎯 Monatsziel ändern…':'🎯 Monatsziel…')+'</option>';
      meineTZ.forEach(t=>expanded+='<option value="'+t.id+'"'+(a.teilzielId===t.id?' selected':'')+'>'+esc(t.zielName)+' › '+esc(t.name)+'</option>');

      expanded+='</select>';

    expanded+='<button onclick="inboxArchive(\''+a.id+'\')" style="font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--t3);cursor:pointer;font-family:inherit">✕</button>';

async function inboxAcceptMonatsziel(id,tzId){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;

function kapTier(ratio){
  if(ratio<0.5) return{label:'Luft nach oben',short:'Luft',color:'var(--blue)',bar:'var(--blue)',bg:'var(--blue-bg)',bd:'var(--blue-bd)'};
  if(ratio<=1.1) return{label:'Stretch ↑',short:'Stretch',color:'var(--amber)',bar:'var(--amber)',bg:'var(--amber-bg)',bd:'var(--amber-bd)'};
  return{label:'Sehr ambitioniert',short:'Voll',color:'var(--t2)',bar:'#9ca3af',bg:'var(--gray-bg)',bd:'var(--bd)'};
}
function getKapazitaet(pid){
  const p=person(pid);if(!p)return null;
  const sw=p.stunden_woche||40;
  let fh=0;
  if(p.fokus_start&&p.fokus_end){
    const [sh,sm]=p.fokus_start.split(':').map(Number);
    const [eh,em]=p.fokus_end.split(':').map(Number);
    fh=Math.max(0,((eh*60+em)-(sh*60+sm))/60)*5;
  }
  const rh=Math.max(0,sw-fh);
  const now=new Date();
  const daysToSun=now.getDay()===0?0:7-now.getDay();
  const weekEndStr=localDate(new Date(now.getFullYear(),now.getMonth(),now.getDate()+daysToSun));
  let p1h=0,p23h=0,rnd=0;
  S.aufgaben.forEach(a=>{
    if(a.pid!==pid||a.status==='erledigt'||a.status==='idee')return;
    if(a.typ==='random'){rnd++;return;}
    const thisWeek=a.status==='aktiv'||(a.dl&&a.dl<=weekEndStr);
    if(!thisWeek)return;
    const h=a.geplant||1;
    if(a.prio==='P1')p1h+=h;
    else if(a.prio==='P2'||a.prio==='P3')p23h+=h;
  });
  return{fh,rh,p1h,p23h,rnd,sw};
}

  const k=getKapazitaet(pid);if(!k||!k.fh)return'';
  const fPct=Math.min(k.p1h/k.fh,1.4)*100/1.4;

  const ft=kapTier(k.fh>0?k.p1h/k.fh:0);
  const rt=kapTier(k.rh>0?k.p23h/k.rh:0);

  // Tages-Verteilung: Stunden pro Wochentag Mo–Fr

  const now=new Date();

  out+='<div style="height:7px;background:var(--red-bg);border-radius:99px;overflow:hidden"><div style="height:100%;border-radius:99px;background:var(--red);width:'+fPct+'%;transition:width .4s"></div></div>';

// Brian Johnson "Heroic" Score: Commitment-Integrität messbar machen
// 1 Pt pro Big-3 · +2 Bonus bei Perfect Week (3/3) · Streak zählt aufeinanderfolgende Perfect Weeks
function getWochenScore(wr){
  if(!wr)return{done:0,total:0,perfect:false,points:0};
  let done=0,total=0;
  [1,2,3].forEach(n=>{
    const txt=wrItemName(wr,n);if(!txt)return;
    total++;if(wr['big3_'+n+'_done'])done++;
  });
  // Perfect = alle committeten erledigt (egal ob 1, 2 oder 3 Big 3)
  const perfect=total>0&&done===total;
  const points=done+(perfect?2:0);
  return{done,total,perfect,points};
}
function getPerfectStreak(pid){
  // Zähle Perfect Weeks rückwärts ab aktueller Woche (oder letzter abgeschlossener Woche)
  const {kw,jahr}=getKW();
  let streak=0,curKw=kw,curJahr=jahr;
  for(let i=0;i<52;i++){
    const r=(S.wochenresets||[]).find(r=>String(r.pid)===String(pid)&&r.kw===curKw&&r.jahr===curJahr);
    if(!r)break;
    const s=getWochenScore(r);
    if(!s.perfect)break;
    streak++;
    curKw--;if(curKw<1){curKw=52;curJahr--;}
  }
  return streak;
}
// Momentum-Score: 50er-Floor-Formel (Brian-Johnson-inspiriert)
// score = 50 + (done - missed_big3) / 12 × 50
// → Neutral startet bei 50, 4 Perfect Weeks in Folge = 100, 4 verfehlte Wochen = 0
// Verfehlte Wochen (ohne wochenreset) zählen als 3 missed, aber erst ab erstem Commitment.
function getMomentumScore(pid){
  const {kw,jahr}=getKW();
  const eigeneWr=(S.wochenresets||[]).filter(r=>String(r.pid)===String(pid));
  if(!eigeneWr.length)return{score:null,weeks:0,done:0,missedBig3:0,missedWeeks:0};
  const wkNum=(k,j)=>j*53+k;
  const firstWk=Math.min(...eigeneWr.map(r=>wkNum(r.kw,r.jahr)));
  let done=0,weeks=0,missedBig3=0,missedWeeks=0,committedBig3=0;
  let curKw=kw,curJahr=jahr;
  for(let i=0;i<4;i++){
    if(wkNum(curKw,curJahr)<firstWk)break;
    const r=eigeneWr.find(r=>r.kw===curKw&&r.jahr===curJahr);
    if(r){
      const s=getWochenScore(r);
      if(s.total>0){done+=s.done;committedBig3+=s.total;missedBig3+=(s.total-s.done);weeks++;}
    } else {
      missedWeeks++;missedBig3+=3;
    }
    curKw--;if(curKw<1){curKw=52;curJahr--;}
  }
  if(weeks===0&&missedWeeks===0)return{score:null,weeks:0,done:0,missedBig3:0,missedWeeks:0};
  // Floor-Formel: 50 + (done - missed)/12 × 50, geclamped auf 0-100
  const raw=50+(done-missedBig3)/12*50;
  const score=Math.max(0,Math.min(100,Math.round(raw)));
  return{score,weeks,done,committedBig3,missedBig3,missedWeeks};
}
function momentumFarbe(score){
  if(score==null)return{bg:'var(--gray-bg)',tc:'var(--t2)',bd:'var(--bd)',label:'—'};
  if(score>=90)return{bg:'var(--green-bg)',tc:'var(--green)',bd:'var(--green-bd)',label:'Elite'};
  if(score>=75)return{bg:'var(--blue-bg)',tc:'var(--blue)',bd:'var(--blue-bd)',label:'Stark'};
  if(score>=60)return{bg:'var(--amber-bg)',tc:'var(--amber)',bd:'var(--amber-bd)',label:'Okay'};
  return{bg:'var(--red-bg)',tc:'var(--red)',bd:'var(--red-bd)',label:'Warnung'};
}

// ─── MISS-PATTERN KARTE (Leading Indicator #2, neben Momentum) ───
function getMissPatternData(pid){
  const tasks=S.aufgaben.filter(a=>String(a.pid)===String(pid)&&a.lastMissAction);
  const breakdown={neu_schaetzen:0,splitten:0,los:0,irrelevant:0};
  tasks.forEach(a=>{if(breakdown[a.lastMissAction]!==undefined)breakdown[a.lastMissAction]++;});
  const total=tasks.length;
  if(total<3)return{total,breakdown,dominant:null,interpretation:null};
  const entries=Object.entries(breakdown);
  const max=entries.reduce((m,e)=>e[1]>m[1]?e:m);
  const dominantRatio=max[1]/total;
  const dominant=dominantRatio>=0.6?max[0]:null;
  const interpretations={
    neu_schaetzen:'Du schätzt strukturell zu eng. Plane kleinere Schritte statt steilerer Deadlines.',
    splitten:'Du planst zu groß. Zerlege Tasks früher in 2-Stunden-Häppchen.',
    los:'Prokrastinations-Muster. Das Problem ist Start-Reibung, nicht Scope.',
    irrelevant:'Plan-Qualität niedrig. Zu viel auf die Liste ohne Filter.'
  };
  const interpretation=dominant?interpretations[dominant]:'Mischbild — noch kein klares Muster.';
  return{total,breakdown,dominant,interpretation};
}

// ── §6 Phase A: Wochenrückblick — 3 Fragen ──────────────────────
function openWrPhaseA(wr){
  if(!window._wrPhaseA||window._wrPhaseA.wrId!==wr.id)
    window._wrPhaseA={wrId:wr.id,step:1,geliefert:null,hauptthema:null,learning:''};

    +big3Items.map(({txt,done})=>'<div style="display:flex;align-items:center;gap:8px;padding:2px 0">'
      +'<span style="font-size:13px;color:'+(done?'var(--green)':'var(--t3)')+'">'+( done?'✓':'○')+'</span>'
      +'<span style="font-size:12px;color:var(--t2);'+(done?'text-decoration:line-through':'')+'">'+esc(txt)+'</span>'

    +[1,2,3].filter(n=>n<=2||true).map(n=>{

      return'<div style="flex:1;height:4px;border-radius:99px;background:'+(n<=st.step?'var(--inv)':'var(--bd)')+'"></div>';
    }).join('')+'</div>';
  h+=stepInd;
  if(st.step===1){
    h+=big3Html;
    h+='<div style="font-size:15px;font-weight:700;margin-bottom:16px">Wie viele Wochenziele hast du <em>geliefert</em>?</div>';
    h+='<div style="display:flex;gap:10px;margin-bottom:24px">';
    [0,1,2,3].filter(n=>n<=big3Total||(big3Total===0&&n===0)).forEach(n=>{
      const sel=st.geliefert===n;
      h+='<button onclick="wrPhaseASet(1,'+n+')" style="flex:1;padding:18px 0;border-radius:12px;font-size:24px;font-weight:800;border:2px solid '+(sel?'var(--inv)':'var(--bd)')+';background:'+(sel?'var(--inv)':'var(--sf)')+';color:'+(sel?'var(--inv-t)':'var(--text)')+';cursor:pointer;font-family:inherit">'+n+'</button>';
    });
    h+='</div>';
    h+='<div class="mf"><button class="btn btn-dk" onclick="wrPhaseANext()" '+(st.geliefert!==null?'':'disabled style="opacity:.4"')+' style="min-width:180px">Weiter →</button></div>';
  }else if(st.step===2){
    h+='<div style="font-size:15px;font-weight:700;margin-bottom:8px">Was war das Hauptthema?</div>';
    h+='<div style="font-size:12px;color:var(--t2);margin-bottom:16px">Nicht als Kritik — als Diagnose für nächste Woche.</div>';
    h+='<div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap">';
    [{v:'ausfuehrung',e:'⚡',l:'Ausführung',s:'Nicht gemacht, abgelenkt, zu spät'},{v:'scoping',e:'📐',l:'Scoping',s:'Zu viel gewollt, falsch eingeschätzt'}].forEach(({v,e,l,s})=>{
      const sel=st.hauptthema===v;
      h+='<button onclick="wrPhaseASet(2,\''+v+'\')" style="flex:1 1 140px;padding:14px 12px;border-radius:12px;text-align:left;border:2px solid '+(sel?'var(--inv)':'var(--bd)')+';background:'+(sel?'var(--inv)':'var(--sf)')+';cursor:pointer;font-family:inherit">';
      h+='<div style="font-size:15px;font-weight:700;color:'+(sel?'var(--inv-t)':'var(--text)')+'">'+e+' '+l+'</div>';
      h+='<div style="font-size:11px;color:'+(sel?'var(--inv-t)':'var(--t2)')+';margin-top:3px">'+s+'</div></button>';
    });
    h+='</div>';
    h+='<div class="mf"><button class="btn btn-gr" onclick="wrPhaseASet(\'back\',1)" style="margin-right:auto">← Zurück</button><button class="btn btn-dk" onclick="wrPhaseANext()" '+(st.hauptthema?'':'disabled style="opacity:.4"')+' style="min-width:180px">Weiter →</button></div>';
  }else{
    const len=(st.learning||'').length;
    h+='<div style="font-size:15px;font-weight:700;margin-bottom:8px">Ein Satz Learning dieser Woche.</div>';
    h+='<div style="font-size:12px;color:var(--t2);margin-bottom:12px">Max. 140 Zeichen. Für dich — nicht für andere.</div>';
    h+='<textarea id="wra-ta" maxlength="140" rows="3" oninput="wrPhaseAInput()" style="width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:10px;font-family:inherit;font-size:14px;resize:none;box-sizing:border-box" placeholder="z.B. Ich habe unterschätzt wie lange X dauert…">'+esc(st.learning||'')+'</textarea>';
    h+='<div id="wra-cnt" style="font-size:10px;color:var(--t3);text-align:right;margin:3px 0 16px">'+(140-len)+' Zeichen übrig</div>';
    const backStep=st.geliefert<(big3Total||3)?2:1;
    h+='<div class="mf"><button class="btn btn-gr" onclick="wrPhaseASet(\'back\','+backStep+')" style="margin-right:auto">← Zurück</button>';
    h+='<button id="wra-save" class="btn btn-dk" onclick="saveWrPhaseA(\''+wr.id+'\')" style="min-width:180px;'+(len>=10?'':'opacity:.4')+'">✓ Speichern & zur Planung</button></div>';
  }
  document.getElementById('mb').innerHTML=h;
  document.getElementById('ovl').classList.add('open');
  if(st.step===3)setTimeout(()=>{const ta=document.getElementById('wra-ta');if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}},80);
}
function wrPhaseASet(field,val){
  if(!window._wrPhaseA)return;
  if(field==='back'){window._wrPhaseA.step=val;}
  else if(field===1)window._wrPhaseA.geliefert=val;
  else if(field===2)window._wrPhaseA.hauptthema=val;
  const wr=S.wochenresets.find(r=>r.id===window._wrPhaseA.wrId);
  if(wr)openWrPhaseA(wr);
}
function wrPhaseANext(){
  const st=window._wrPhaseA;if(!st)return;
  const wr=S.wochenresets.find(r=>r.id===st.wrId);if(!wr)return;
  const big3Total=[1,2,3].filter(n=>wrItemName(wr,n)).length;
  if(st.step===1){
    if(st.geliefert===null)return;
    st.step=(st.geliefert<big3Total)?2:3;
  }else if(st.step===2){
    if(!st.hauptthema)return;
    st.step=3;
  }
  openWrPhaseA(wr);
}
function wrPhaseAInput(){
  const ta=document.getElementById('wra-ta');if(!ta)return;
  const len=ta.value.length;
  const cnt=document.getElementById('wra-cnt');if(cnt)cnt.textContent=(140-len)+' Zeichen übrig';
  const btn=document.getElementById('wra-save');if(btn)btn.style.opacity=len>=10?'1':'0.4';
  if(window._wrPhaseA)window._wrPhaseA.learning=ta.value;
}
async function saveWrPhaseA(wrId){
  const st=window._wrPhaseA;if(!st)return;
  const ta=document.getElementById('wra-ta');
  const learning=(ta?ta.value:st.learning||'').trim();
  if(learning.length<10){toast('⚠ Mindestens 10 Zeichen für Learning');return;}
  const wr=S.wochenresets.find(r=>r.id===wrId);if(!wr)return;
  wr.learning=learning;wr.geliefert_count=st.geliefert;wr.haupt_thema=st.hauptthema||null;
  window._wrPhaseA=null;
  // DB — silent fail wenn Spalten noch nicht existieren (Migration nötig)
  await dbPatch('wochenresets',wrId,{learning,geliefert_count:st.geliefert,haupt_thema:st.hauptthema||null});
  openWochenreset();
}
// ─────────────────────────────────────────────────────────────────
function openWochenreset(){
  const{kw,jahr}=getKW();
  const nextKw=kw;
  const wr=dieseWocheReset(aP);
  const lw=letzteWocheReset(aP);
  const istRueckblick=isResetZeit()||!!wr;

  // ── §6 Phase A: Rückblick-Gate ──
  // Wenn diese Woche ein WR existiert und noch kein Learning vorhanden ist,
  // muss zuerst Phase A (3-Fragen-Rückblick) beantwortet werden.
  if(wr && !wr.learning && istRueckblick && !_resetZwang){
    return openWrPhaseA(wr);
  }

  // ── Wochenzusammenfassung ──
  const{monday:_wrMon,sunday:_wrSun}=getWeekRange();
  const erlDW=S.aufgaben.filter(a=>{
    if(a.pid!==aP||a.status!=='erledigt'||!a.updated_at)return false;
    const dt=new Date(a.updated_at);if(isNaN(dt.getTime()))return false;
    const d=localDate(dt);return d>=_wrMon&&d<=_wrSun;
  });
  const erlP1=erlDW.filter(a=>a.prio==='P1'),erlP2=erlDW.filter(a=>a.prio==='P2'),erlP3=erlDW.filter(a=>a.prio==='P3');
  const offP1=S.aufgaben.filter(a=>a.pid===aP&&a.prio==='P1'&&a.status!=='erledigt'&&canSee(a));
  let summaryHtml='';
  if(istRueckblick){
    summaryHtml+='<div style="background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:14px">';
    summaryHtml+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:10px">📊 KW '+kw+' auf einen Blick</div>';
    // Big 3 dieser Woche
    if(wr){
      let b3html='';
      [1,2,3].forEach(n=>{
        const txt=wrItemName(wr,n),done=wr['big3_'+n+'_done'];if(!txt)return;
        b3html+='<div style="display:flex;align-items:center;gap:8px;padding:3px 0">';
        b3html+='<div style="width:15px;height:15px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;'+(done?'background:var(--green);':'border:1.5px solid var(--bd)')+'">'+(done?'<span style="color:#fff;font-size:8px;font-weight:800">✓</span>':'')+'</div>';
        b3html+='<span style="font-size:12px;'+(done?'color:var(--t3);text-decoration:line-through':'color:var(--text)')+'">'+esc(txt)+'</span>';
        b3html+='</div>';
      });
      if(b3html){
        summaryHtml+='<div style="font-size:10px;font-weight:700;color:var(--t2);margin-bottom:4px">Wochenziele</div>';
        summaryHtml+=b3html;
        summaryHtml+='<div style="border-top:1px solid var(--bd);margin:10px 0"></div>';
      }
    }
    // Erledigte diese Woche
    if(erlDW.length){
      summaryHtml+='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px">';
      summaryHtml+='<span style="font-size:12px;font-weight:700;color:var(--green)">✓ '+erlDW.length+' erledigt</span>';
      if(erlP1.length)summaryHtml+='<span style="font-size:10px;padding:1px 6px;border-radius:99px;background:var(--red-bg);color:var(--red);font-weight:700">P1 ×'+erlP1.length+'</span>';
      if(erlP2.length)summaryHtml+='<span style="font-size:10px;padding:1px 6px;border-radius:99px;background:var(--blue-bg);color:var(--blue);font-weight:700">P2 ×'+erlP2.length+'</span>';
      if(erlP3.length)summaryHtml+='<span style="font-size:10px;padding:1px 6px;border-radius:99px;background:var(--gray-bg);color:var(--t3);font-weight:700">P3 ×'+erlP3.length+'</span>';

      erlP1.slice(0,3).forEach(a=>{summaryHtml+='<div style="font-size:11px;color:var(--t3);padding:1px 0 1px 10px">✓ '+esc(a.titel.length>52?a.titel.slice(0,52)+'…':a.titel)+'</div>';});
      if(erlP1.length>3)summaryHtml+='<div style="font-size:10px;color:var(--t3);padding-left:10px">… '+( erlP1.length-3)+' weitere P1</div>';
    } else {
      summaryHtml+='<div style="font-size:12px;color:var(--t3)">Noch keine Aufgaben diese Woche erledigt.</div>';
    }
    // Noch offene P1s
    if(offP1.length){
      summaryHtml+='<div style="margin-top:8px;border-top:1px solid var(--bd);padding-top:8px">';
      summaryHtml+='<span style="font-size:12px;font-weight:700;color:var(--orange)">⚠ '+offP1.length+' P1 noch offen</span>';

  }

  // Letzte Woche Rückblick (alte Chips — nur bei erstmaligem Planen)
  let rueckblickHtml='';
  if(lw&&!istRueckblick){

  // Monatsziele-Buttons: Ziel als Kontext, Monatsziel als primäre Auswahl
  const tzBtnWR=(t,z)=>{
    const f=FARBEN[z.farbe||0];const sel=t.id===selTZId;

      +'<textarea id="wrpa-learning" maxlength="140" oninput="window._wrPhaseA.learning=this.value;const ch=document.getElementById(\'wrpa-chr\');if(ch)ch.textContent=this.value.length+\'/140\';const b=document.getElementById(\'wrpa-submit\');if(b){const ok=this.value.trim().length>=10;b.style.opacity=ok?\'1\':\'.5\';b.style.cursor=ok?\'pointer\':\'not-allowed\';}" placeholder="z.B. Montag-Morgen-Block für Deep Work ist Gold wert." style="width:100%;height:72px;padding:10px 12px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--text);font-family:inherit;font-size:13px;resize:none;box-sizing:border-box">'+esc(st.learning||'')+'</textarea>'
      +'<div style="display:flex;justify-content:flex-end;font-size:10px;color:var(--t3);margin-top:2px" id="wrpa-chr">'+lLen+'/140</div>'

    +'</div>';
  document.getElementById('mb').innerHTML=html;

async function saveWrPhaseA(){
  const st=window._wrPhaseA;if(!st)return;
  if(st.geliefert===null||st.geliefert===undefined){toast('⚠️ Bitte Anzahl wählen');return;}
  if(st.geliefert<3&&!st.thema){toast('⚠️ Bitte Hauptthema wählen');return;}
  const learning=(st.learning||'').trim();
  if(learning.length<10){toast('⚠️ Learning-Satz zu kurz (min. 10 Zeichen)');return;}
  const patch={geliefert_count:st.geliefert,haupt_thema:st.thema||null,learning};
  const wr=S.wochenresets.find(r=>r.id===st.wrId);
  if(wr)Object.assign(wr,patch);
  await dbPatch('wochenresets',st.wrId,patch);
  window._wrPhaseA=null;
  toast('✓ Rückblick abgeschlossen — jetzt planen');
  openWochenreset(); // Re-open, now in planning mode (Phase B)
}

// Kandidaten-Button: Text in nächsten freien Slot eintragen (oder entfernen)
function _wrKandidatSelect(btnEl){
  const text=btnEl.getAttribute('data-kandidat-text');if(!text)return;
  // Bereits in einem Slot? → entfernen
  for(let n=1;n<=3;n++){
    const inp=document.getElementById('wr-b'+n);
    if(inp&&inp.value.trim()===text){inp.value='';_wrUpdateKandidaten();return;}
  }

// UX-Guardrails: Heuristische Big-3-Qualitätsprüfung (Bezos "high standards via system")
// Debounced: erst 800ms nach letztem Tastendruck zeigen, sonst nervt's
const _big3ValidateTimers={};
function validateBig3Input(n){
  clearTimeout(_big3ValidateTimers[n]);
  const hintEarly=document.getElementById('wr-b'+n+'-hint');
  if(hintEarly)hintEarly.style.display='none';
  _big3ValidateTimers[n]=setTimeout(()=>_validateBig3Now(n),800);
}
function _validateBig3Now(n){
  const el=document.getElementById('wr-b'+n);
  const hint=document.getElementById('wr-b'+n+'-hint');
  if(!el||!hint)return;
  const val=(el.value||'').trim();
  if(!val){hint.style.display='none';return;}
  let msg='',typ='warn';
  const low=val.toLowerCase();
  // Check 1: zu kurz
  if(val.length<15){msg='Zu kurz — was soll am Freitag konkret fertig sein?';}
  // Check 2: nur ein Verb / Aufgabe-Sprache
  else if(/^(anrufen|schreiben|mailen|erstellen|machen|checken|überlegen|planen|klären|besprechen|vorbereiten|durchgehen)$/i.test(val)||val.split(/\s+/).length<=2){
    msg='Klingt nach Aufgabe — formuliere als Ergebnis: „…ist fertig/versendet/live".';
  }
  // Check 3: Meeting als Big 3
  else if(/^(meeting|call|termin|besprechung|gespräch)\b/i.test(low)){
    msg='Ein Meeting ist kein Ergebnis. Was soll danach anders sein?';
  }
  // Check 4: vages Aktivitätswort ohne Ergebnis
  else if(/^(an|bei|zu|mit)\b/i.test(low)&&val.length<40&&!/\b(fertig|final|live|versendet|abgeschickt|veröffentlicht|signiert|unterschrieben|eingereicht|bestätigt|abgeschlossen)\b/i.test(low)){
    msg='Hinweis: Nennst du einen Endzustand (fertig / versendet / live)?';
    typ='info';
  }
  if(msg){
    hint.textContent=(typ==='info'?'💡 ':'⚠ ')+msg;
    hint.style.color=typ==='info'?'var(--t2)':'var(--orange)';
    hint.style.display='block';
  } else {
    hint.textContent='✓ Gut formuliert.';
    hint.style.color='var(--green)';
    hint.style.display='block';
  }
}

}

function getPaddelCount(pid){
  // Nur diese Woche (Mo–So)
  const{monday,sunday}=getWeekRange();
  // Aufgaben dieser Woche: P1=3, P2=1, P3=0
  // WICHTIG: nur Ziel-alignte Tasks zählen (teilzielId gesetzt = über Monatsziel ans Ziel gebunden).
  // Leading Indicator = Ausführung von Taktik, die zum Ziel führt. Busywork ohne Ziel-Bezug gibt 0 Punkte.
  const aufgabenPts=S.aufgaben.filter(a=>{
    if(a.pid!==pid||a.status!=='erledigt'||!a.updated_at)return false;
    if(!a.teilzielId)return false; // Kein Monatsziel-Bezug → 0 Punkte
    const dt=new Date(a.updated_at);
    if(isNaN(dt.getTime()))return false;
    const d=localDate(dt);
    return d>=monday&&d<=sunday;
  }).reduce((sum,a)=>sum+(a.prio==='P1'?3:a.prio==='P2'?1:0),0);
  // Sonder-KPIs dieser Woche: Verkauf/Sauna=5pts, Termin/andere=3pts
  // täglich → Wochensumme; kumulativ → aktueller Wert
  const kpiPts=S.ziele.flatMap(z=>z.kpis||[]).filter(k=>String(k.pid)===String(pid)&&k.sonder).reduce((sum,k)=>{
    const isTaeglich=k.typ==='täglich';
    const v=Math.max(0,isTaeglich?(S.kpiValsWeek[pid+'-'+k.id]||0):(kpiVal(k)||0));
    const lbl=(k.label||'').toLowerCase();
    const pts=(lbl.includes('verkauf')||lbl.includes('sauna'))?5:3;
    return sum+v*pts;
  },0);
  // P1-KPIs (nicht-Sonder) mit Monatsziel: 1 Paddel pro Increment diese Woche
  const p1KpiPts=S.ziele.flatMap(z=>z.kpis||[]).filter(k=>
    String(k.pid)===String(pid)&&!k.sonder&&k.prio==='P1'&&k.teilzielId
  ).reduce((sum,k)=>{
    const isTaeglich=k.typ==='täglich';
    const v=Math.max(0,isTaeglich?(S.kpiValsWeek[pid+'-'+k.id]||0):(kpiVal(k)||0));
    return sum+v;
  },0);
  // Wochenziele (big3_N_done=true): 3 Pts pro erledigtem Wochenziel diese Woche.
  // Modell B: Wochenziel IST der Outcome; sein Check ist P1-äquivalent.
  // Doppelzählung wird verhindert: wenn ein Task exakten Titel-Match zum big3_N hat
  // und schon als P1 gezählt wurde, reduzieren wir hier um 3.
  const {kw:_curKw,jahr:_curJahr}=getKW();
  const wrThis=(S.wochenresets||[]).find(r=>String(r.pid)===String(pid)&&r.kw===_curKw&&r.jahr===_curJahr);
  let big3Pts=0;
  if(wrThis){
    [1,2,3].forEach(n=>{
      if(!wrThis['big3_'+n+'_done'])return;
      big3Pts+=3;
      const txt=(wrThis['big3_'+n]||'').toLowerCase().trim();
      const tz=wrThis['big3_'+n+'_tz_id'];
      if(!txt||!tz)return;
      // Check ob ein Task exakt gespiegelt existiert (Legacy-Duplikat) und in aufgabenPts schon gezählt wurde
      const dupe=S.aufgaben.find(a=>a.pid===pid&&a.status==='erledigt'&&a.prio==='P1'&&String(a.teilzielId)===String(tz)&&(a.titel||'').toLowerCase().trim()===txt);
      if(dupe&&dupe.updated_at){
        const dt=new Date(dupe.updated_at);
        if(!isNaN(dt.getTime())){
          const d=localDate(dt);
          if(d>=monday&&d<=sunday)big3Pts-=3; // Doppelzählung korrigieren
        }
      }
    });
  }
  return aufgabenPts+kpiPts+p1KpiPts+big3Pts;
}
function showKonfetti(){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;inset:0;z-index:999;pointer-events:none;width:100%;height:100%';
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const pieces=Array.from({length:80},()=>({
    x:Math.random()*canvas.width,y:-20,w:8+Math.random()*8,h:8+Math.random()*8,
    r:Math.random()*Math.PI*2,vx:(Math.random()-0.5)*6,vy:3+Math.random()*4,
    vr:(Math.random()-0.5)*0.2,
    color:['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD'][Math.floor(Math.random()*7)]
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.vy+=0.1;
    });
    frame++;
    if(frame<120)requestAnimationFrame(draw);else canvas.remove();
  }
  draw();
}

// ─── MISSED-DEADLINE FEEDBACK (MVP) ──────────────────────────────
// Trigger: P1 verpasst um ≥1 Tag, P2 verpasst um ≥2 Tage. P3/ohne dl → nie.
// Batch: ein Stack-Modal das alle verpassten Tasks nacheinander zeigt.
// Pro Tag nur 1× pro Task (last_miss_at < heute als Guard).
function getMissedTasks(){
  const p=me();if(!p)return[];
  return S.aufgaben.filter(a=>{
    if(String(a.pid)!==String(aP))return false;
    if(a.status==='erledigt'||a.status==='archiviert'||a.status==='zurueckgegeben'||a.status==='backlog')return false;
    if(a.parentId)return false; // Unteraufgaben überspringen, Parent trägt Deadline
    if(!a.dl)return false;
    if(a.prio!=='P1'&&a.prio!=='P2')return false;
    const threshold=a.prio==='P1'?1:2;
    // dl + threshold Tage <= TODAY bedeutet: die Deadline ist um threshold Tage überschritten
    const dlDate=new Date(a.dl+'T00:00:00');
    const diffDays=Math.floor((new Date(TODAY+'T00:00:00')-dlDate)/86400000);
    if(diffDays<threshold)return false;
    // Guard: schon heute behandelt?
    if(a.lastMissAt){
      const lastDate=(a.lastMissAt||'').slice(0,10);
      if(lastDate===TODAY)return false;
    }
    return true;
  });
}
function checkMissedDeadlines(){
  // Nicht triggern während Onboarding, Monatsziel-Review oder Wochenreset-Zwang aktiv sind
  if(window._onb)return;
  if(document.getElementById('mr-ovl'))return;
  if(_resetZwang)return;
  const missed=getMissedTasks();
  if(!missed.length)return;
  // Nach Priorität + Verzug sortieren (P1 zuerst, dann älteste DL)
  missed.sort((x,y)=>{
    if(x.prio!==y.prio)return x.prio==='P1'?-1:1;
    return (x.dl||'').localeCompare(y.dl||'');
  });
  window._missStack={tasks:missed,idx:0,note:''};
  openMissedStack();
}

async function saveMonatszielReview(tzId){
  const st=window._mrState&&window._mrState[tzId];if(!st)return;
  const learning=document.getElementById('mr-learning')?.value.trim()||'';
  if(learning.length<10){toast('⚠️ Learning-Satz zu kurz (min. 10 Zeichen)');return;}
  const patch={review_done:true,review_erreicht:st.erreicht,review_grund:st.grund||null,review_learning:learning,review_at:new Date().toISOString()};
  const tz=S.ziele.flatMap(z=>z.teilziele||[]).find(t=>t.id===tzId);
  if(tz)Object.assign(tz,patch);
  await dbPatch('teilziele',tzId,patch);
  delete window._mrState[tzId]; // State bereinigen — verhindert pre-filled Modal bei erneutem Öffnen
  const ov=document.getElementById('mr-ovl');if(ov)ov.remove();

function checkDiagnosePattern(){
  // Returns 'plan' | 'ausfuehrung' | null based on last 3 "nein" reviews
  const allTZ=S.ziele.flatMap(z=>z.teilziele||[]);
  const meineTZ=allTZ.filter(t=>String(t.verantwortlichId)===String(aP)&&t.review_done&&t.review_erreicht==='nein')
    .sort((a,b)=>(b.review_at||'').localeCompare(a.review_at||''));
  if(meineTZ.length<3)return null;
  const last3=meineTZ.slice(0,3);
  const planC=last3.filter(t=>t.review_grund==='plan').length;
  const ausfC=last3.filter(t=>t.review_grund==='ausfuehrung').length;
  if(planC>=2)return'plan';
  if(ausfC>=2)return'ausfuehrung';
  return null;
}
function getDiagnoseHint(){

}

function snoozeReset(){

  window._wrGutSnooze=gut;window._wrBlockiertSnooze=blockiert;
  const isFriday=new Date().getDay()===5;
  if(isFriday){
    // Smooth snooze: proportional zur verbleibenden Fenster-Zeit
    const snoozeMins=getResetSnoozeMins();
    if(snoozeMins<=0){toast('⏱ Fenster fast geschlossen — jetzt kurz durchziehen.');return;}
    _resetSnoozeUntil=Date.now()+snoozeMins*60*1000;
    _snoozePersist(gut,blockiert);_resetZwang=false;window._noOverlayClose=false;cm();
    toast('⏱ In ~'+snoozeMins+' Min erneut.');
    if(_resetSnoozeTimer)clearTimeout(_resetSnoozeTimer);
    _resetSnoozeTimer=setTimeout(()=>{if(aP&&!dieseWocheReset(aP))openWochenresetZwang();},snoozeMins*60*1000);
  }else{
    // Sa/So: klassisch 30 Min, max 3×
    if(_resetSnoozeCount>=_RESET_SNOOZE_MAX)return;
    _resetSnoozeCount++;_resetSnoozeUntil=Date.now()+30*60*1000;
    _snoozePersist(gut,blockiert);_resetZwang=false;window._noOverlayClose=false;cm();

    toast(rest>0?'⏱ In 30 Min erneut — noch '+rest+'× verschiebbar.':'⏱ In 30 Min — danach kein Aufschub mehr.');

    _resetSnoozeTimer=setTimeout(()=>{if(aP&&!dieseWocheReset(aP))openWochenresetZwang();},30*60*1000);

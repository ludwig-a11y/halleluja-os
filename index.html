}

function rSB(){
  const sorted=[...S.teams].sort((a,b)=>a.id==='gf'?-1:b.id==='gf'?1:0);
  // Pre-compute per-person counts
  const counts={};
  S.aufgaben.forEach(a=>{
    if(!canSee(a))return;
    if(!counts[a.pid])counts[a.pid]={neu:0,aktiv:0};
    if(a.status==='neu')counts[a.pid].neu++;
    else if(a.status==='aktiv')counts[a.pid].aktiv++;
  });
  // Build sets: myTeam, goalPartners, others
  const myTeamIds=new Set();
  const myGoalPartnerIds=new Set();
  const shownIds=new Set();
  // My teams
  const visIds=isGF()?null:isLead()?visiblePersonIds(aP):null;
  sorted.forEach(t=>{
    t.members.forEach(id=>{
      if(isGF()||id===aP||(visIds&&visIds.includes(id)))myTeamIds.add(id);
    });
  });
  // Goal partners: people working on same goals as me
  const myGoalIds=new Set(S.aufgaben.filter(a=>a.pid===aP&&a.zielId).map(a=>a.zielId));
  S.ziele.forEach(z=>{if(z.verantwortlich_id===aP)myGoalIds.add(z.id);});
  if(myGoalIds.size){
    S.aufgaben.forEach(a=>{if(myGoalIds.has(a.zielId)&&a.pid!==aP&&!myTeamIds.has(a.pid))myGoalPartnerIds.add(a.pid);});
    S.ziele.forEach(z=>{if(myGoalIds.has(z.id)&&z.verantwortlich_id&&z.verantwortlich_id!==aP&&!myTeamIds.has(z.verantwortlich_id))myGoalPartnerIds.add(z.verantwortlich_id);});
  }

  let h='';
  // Pre-compute streaks
  const streaks={};
  S.personen.forEach(p=>{
    const doneByDay={};
    S.aufgaben.forEach(a=>{if(a.pid===p.id&&a.status==='erledigt'&&a.updated_at){const d=localDate(new Date(a.updated_at));doneByDay[d]=true;}});
    let streak=0,d=new Date(TODAY+'T12:00:00');
    // If nothing done today, check if yesterday still counts (streak not broken yet today)
    if(!doneByDay[TODAY]){d.setDate(d.getDate()-1);}
    while(true){const ds=localDate(d);if(!doneByDay[ds])break;streak++;d.setDate(d.getDate()-1);}
    streaks[p.id]=streak;
  });

  // Helper to render a person row
  const renderPerson=(id,dim,clickOverride)=>{
    const p=person(id);if(!p)return'';
    const c=cl(p),isMe=id===aP;
    const ct=counts[id]||{neu:0,aktiv:0};
    const paddel=getPaddelCount(id);
    const opacity=dim?'opacity:.45;':'';
    const hasActive=ct.aktiv>0;
    const onclick=clickOverride||('switchPerson(\''+id+'\')');
    return '<button class="sbn'+(isMe?' on':'')+'" onclick="'+onclick+'" style="'+opacity+'position:relative;">'
      +'<div style="position:relative">'+av(p,22,8)
      +(hasActive?'<div style="position:absolute;bottom:-1px;right:-1px;width:7px;height:7px;border-radius:50%;background:var(--green);border:1.5px solid var(--sf)"></div>':'')
      +'</div>'
      +'<span style="flex:1;font-size:11px;font-weight:'+(isMe?600:400)+';color:'+(isMe?c.tc:'var(--text)')+'">'+esc(p.name)+'</span>'
      +'<div style="display:flex;gap:3px;align-items:center">'
      +((streaks[id]||0)>=2?'<span style="font-size:9px;color:#ef4444" title="'+streaks[id]+' Tage Streak">🔥'+streaks[id]+'</span>':'')
      +(ct.neu?'<span style="font-size:8px;background:var(--red-bg);color:var(--red);border-radius:99px;padding:1px 4px;font-weight:700">'+ct.neu+'</span>':'')
      +(ct.aktiv?'<span style="font-size:8px;background:'+c.bg+';color:'+c.tc+';border-radius:99px;padding:1px 4px;font-weight:700">'+ct.aktiv+'</span>':'')
      +'</div></button>';
  };

  // 1) My teams (full visibility)
  sorted.forEach(t=>{
    const vis=t.members.filter(id=>myTeamIds.has(id)&&person(id));
    if(!vis.length)return;
    h+='<div class="gl">'+esc(t.name)+'</div>';
    vis.forEach(id=>{shownIds.add(id);h+=renderPerson(id,false);});
  });

  // 2) Goal partners (shared goals, different team) — click opens shared goals view
  const goalPartners=[...myGoalPartnerIds].filter(id=>!shownIds.has(id)&&person(id));
  if(goalPartners.length){
    h+='<div class="gl" style="margin-top:14px">Gemeinsame Ziele</div>';
    goalPartners.forEach(id=>{
      shownIds.add(id);
      h+=renderPerson(id,false,'openSharedGoals(\''+id+'\')');
    });
  }

  // 3) Other teams (dimmed) — only if not GF (GF already sees all)
  if(!isGF()){
    sorted.forEach(t=>{
      const others=t.members.filter(id=>!shownIds.has(id)&&person(id));
      if(!others.length)return;
      h+='<div class="gl" style="margin-top:14px;opacity:.4">'+esc(t.name)+'</div>';
      others.forEach(id=>{shownIds.add(id);h+=renderPerson(id,true);});
    });
    // Anyone not in any team
    const noTeam=S.personen.filter(p=>!shownIds.has(p.id));
    if(noTeam.length){
      h+='<div class="gl" style="margin-top:14px;opacity:.4">Weitere</div>';
      noTeam.forEach(p=>{h+=renderPerson(p.id,true);});
    }
  }

  // 4) Firmen-Ticker: Heute-Überblick
  const todayDone=S.aufgaben.filter(a=>a.status==='erledigt'&&a.updated_at&&localDate(new Date(a.updated_at))===TODAY);
  const activeNow=S.aufgaben.filter(a=>a.status==='aktiv');
  const todayByPerson={};
  todayDone.forEach(a=>{const p=person(a.pid);if(p){if(!todayByPerson[a.pid])todayByPerson[a.pid]={name:p.name,count:0};todayByPerson[a.pid].count++;}});
  const topToday=Object.values(todayByPerson).sort((a,b)=>b.count-a.count).slice(0,3);

  h+='<div style="margin-top:auto;padding-top:14px;border-top:1px solid var(--bd)">';
  h+='<div class="gl">Heute im Team</div>';
  h+='<div style="display:flex;gap:12px;padding:6px 8px;margin-bottom:4px">';
  h+='<div style="text-align:center"><div style="font-size:16px;font-weight:700;color:var(--green)">'+todayDone.length+'</div><div style="font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px">erledigt</div></div>';
  h+='<div style="text-align:center"><div style="font-size:16px;font-weight:700;color:var(--blue)">'+activeNow.length+'</div><div style="font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px">aktiv</div></div>';
  h+='</div>';
  if(topToday.length){
    topToday.forEach(t=>{
      h+='<div style="font-size:10px;color:var(--t2);padding:1px 8px">'+esc(t.name)+' <span style="color:var(--green);font-weight:600">✓'+t.count+'</span></div>';
    });
  }
  h+='</div>';

  const sb=document.getElementById('sb');
  if(sb)sb.innerHTML=h;
}
function switchPerson(id){
  if(isGF()||visiblePersonIds(aP).includes(id)||id===aP){
    // Snooze-State pro Person: Timer clearen + für neue Person laden
    if(_resetSnoozeTimer){clearTimeout(_resetSnoozeTimer);_resetSnoozeTimer=null;}

async function cycleStepPid(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||!a.ua[i])return;
  const pids=S.personen.map(p=>p.id);
  const cur=a.ua[i].pid||a.pid;
  const idx=pids.indexOf(cur);
  const next=pids[(idx+1)%pids.length];
  a.ua[i].pid=next===a.pid?null:next;
  await dbPatch('aufgaben',id,{ua:a.ua});
  if(document.getElementById('ovl')?.classList.contains('open')){openDetail(id);}else{render();}
}
async function assignStepPid(id,i,newPid){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||!a.ua[i])return;
  a.ua[i].pid=newPid===a.pid?null:newPid;
  await dbPatch('aufgaben',id,{ua:a.ua});
  if(document.getElementById('ovl')?.classList.contains('open')){openDetail(id);}else{render();}
}

async function setPrio(id,pr){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  // P1: Empfänger managed seine Kapazität — warnen, nicht blockieren
  if(pr==='P1'){
    if(p1Count(a.pid)>=3){
      if(!confirm('Du hast bereits '+p1Count(a.pid)+' offene P1-Aufgaben. Trotzdem als P1 annehmen?'))return;
    }
    const zSel=document.getElementById('inbox-ziel-'+id);
    const tzid=zSel?zSel.value:'';
    if(!tzid){
      if(!confirm('P1 ohne Monatsziel – sicher? Ohne Monatsziel-Zuordnung gibt es keinen Paddel-Punkt.')){
        if(zSel){zSel.style.outline='2px solid var(--red)';zSel.focus();}

  const prev={prio:a.prio,status:a.status,zielId:a.zielId,teilzielId:a.teilzielId};a._busy=true;

    }
    a.prio=p;a.status=p?'backlog':'neu';
    if(tzid){a.zielId=zid||null;a.teilzielId=tzid;}
    try{render();}catch(e){console.error('render@setPrio',e);}

    if(tzid){patch.ziel_id=zid||null;patch.teilziel_id=tzid;}
    const ok=await dbPatch('aufgaben',id,patch);

async function pauseA(id){

  finally{a._busy=false;try{render();}catch(e){console.error('render@pauseA2',e);}}

async function fertig(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  const prev={gebucht:a.gebucht,aktSeit:a.aktSeit,status:a.status,updated_at:a.updated_at};a._busy=true;
  try{
    const gebucht=a.status==='aktiv'?Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100:a.gebucht;
    const pid=a.pid;
    a.gebucht=gebucht;a.aktSeit=null;a.status='erledigt';a.updated_at=new Date().toISOString();try{render();}catch(e){console.error('render@fertig',e);}
    const ok=await dbPatch('aufgaben',id,{gebucht,akt_seit:null,status:'erledigt',updated_at:new Date().toISOString()});
    if(!ok){a.gebucht=prev.gebucht;a.aktSeit=prev.aktSeit;a.status=prev.status;a.updated_at=prev.updated_at;return;}
    gcalUpdateEventEnd(a);
    // recurring: create next instance
    if(a.recurring){
      const nextDl=nextRecurringDate(a.dl||TODAY,a.recurring);
      const rec={id:nid('a'),pid:a.pid,titel:a.titel,typ:a.typ,status:'neu',prio:a.prio,
        ziel_id:a.zielId,teilziel_id:a.teilzielId,geplant:a.geplant,gebucht:0,
        dl:nextDl,dl_type:a.dl_type,ua:a.ua?.length?a.ua.map(u=>({t:u.t,d:false})):[],
        notiz:a.notiz,akt_seit:null,vertraulich:a.vertraulich,recurring:a.recurring,erstellt_von:a.erstelltVon||a.pid};
      S.aufgaben.push(normalizeAufgabe(rec));
      await dbInsert('aufgaben',rec);
    }
    // Fokus aufräumen wenn diese Aufgabe der aktive Fokus war
    if(localStorage.getItem('fokus_id_'+aP)===id)localStorage.removeItem('fokus_id_'+aP);
    if(a.teilzielId){
      showPaddelCelebration(pid);
      celebrateErl(a);
    }else{
      // Ovens-Prinzip: keine Feier für Busywork. Nur nüchterne Bestätigung.
      toast('✓ Erledigt · ohne Monatsziel-Zuordnung kein Paddel-Punkt');
    }
    checkP1Done(pid);
    const restOffen=S.aufgaben.filter(x=>String(x.pid)===String(aP)&&x.status!=='erledigt');
    if(!restOffen.length)setTimeout(()=>celebrate('🏆','Alle Aufgaben erledigt! 🎉'),1500);
  }catch(e){console.error('fertig',e);a.gebucht=prev.gebucht;a.aktSeit=prev.aktSeit;a.status=prev.status;a.updated_at=prev.updated_at;}
  finally{a._busy=false;try{render();}catch(e){console.error('render@fertig2',e);}}
}
function nextRecurringDate(fromDate,freq){
  const d=new Date(fromDate+'T12:00:00');
  if(freq==='daily')d.setDate(d.getDate()+1);
  else if(freq==='weekly')d.setDate(d.getDate()+7);
  else if(freq==='monthly')d.setMonth(d.getMonth()+1);
  else d.setDate(d.getDate()+1);
  return localDate(d);
}
async function toggleStep(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy||!a.ua||!a.ua[i])return;
  a._busy=true;
  const wasDone=a.ua[i].d;
  const prevStatus=a.status;const prevAktSeit=a.aktSeit;const prevGebucht=a.gebucht;
  try{
    a.ua[i].d=!a.ua[i].d;
    const patch={ua:a.ua};
    // mini celebration for single step check-off (Checkliste = Gedankenstütze, never auto-completes task)
    if(!wasDone&&a.ua[i].d){
      const row=document.getElementById('sr-'+id+'-'+i);
      if(row){row.classList.add('done-flash');const cb=row.querySelector('.sc');if(cb)cb.classList.add('pop');}
    }
    const ok=await dbPatch('aufgaben',id,patch);
    if(!ok){a.ua[i].d=wasDone;toast('⚠ Fehler beim Speichern');}
  }catch(e){console.error('toggleStep',e);a.ua[i].d=wasDone;a.status=prevStatus;a.aktSeit=prevAktSeit;a.gebucht=prevGebucht;}
  finally{
    a._busy=false;
    if(a.status==='erledigt'&&prevStatus!=='erledigt'){cm();render();}
    else if(document.getElementById('ovl')?.classList.contains('open')){openDetail(id);}
    else{render();}
  }
}

function tpReorder(fromIdx,toIdx){
  if(fromIdx===toIdx)return;
  const myA=S.aufgaben.filter(a=>String(a.pid)===String(aP)&&['aktiv','neu','backlog'].includes(a.status));
  const aktiv=myA.filter(a=>a.status==='aktiv');
  const offene=myA.filter(a=>['neu','backlog'].includes(a.status)).sort((a,b)=>{const po={P1:0,P2:1,P3:2};return(po[a.prio]??3)-(po[b.prio]??3)||(a.aktSeit||0)-(b.aktSeit||0);});
  const arr=[...aktiv,...offene].slice(0,10);
  const orderKey='tagesplan-order-'+aP+'-'+TODAY;
  const saved=JSON.parse(localStorage.getItem(orderKey)||'[]');
  if(saved.length)arr.sort((a,b)=>{const ai=saved.indexOf(a.id),bi=saved.indexOf(b.id);return(ai<0?999:ai)-(bi<0?999:bi);});
  const [item]=arr.splice(fromIdx,1);
  arr.splice(toIdx,0,item);
  localStorage.setItem(orderKey,JSON.stringify(arr.map(a=>a.id)));
  render();
}

async function saveDetailField(id,field,val){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  let prevDl=null;
  if(field==='titel'){if(!val||!val.trim())return;a.titel=val.trim();}
  else if(field==='notiz'){a.notiz=val.trim()||null;}
  else if(field==='dl'){prevDl=a.dl||null;a.dl=val||null;}
  else if(field==='geplant'){a.geplant=val;}
  else if(field==='ziel_id'){a.zielId=val||null;a.teilzielId=null;}
  else if(field==='vertraulich'){a.vertraulich=val;}
  const patch={[field]:field==='titel'?a.titel:field==='notiz'?a.notiz:field==='dl'?a.dl:field==='geplant'?a.geplant:field==='vertraulich'?val:val||null};
  if(field==='ziel_id')patch.teilziel_id=null;
  // Deadline-Shift zählen: nur wenn schon eine dl existierte und der neue Wert anders ist
  if(field==='dl'&&prevDl&&val&&prevDl!==val){
    a.shiftCount=(a.shiftCount||0)+1;
    patch.shift_count=a.shiftCount;
  }
  await dbPatch('aufgaben',id,patch);
  if(field==='dl'&&val&&!gcalGetEvtId(id))gcalCreateEvent(a);
  render();
}
async function setStatusModal(id,st){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  a._busy=true;
  const prev={status:a.status,aktSeit:a.aktSeit,gebucht:a.gebucht,updated_at:a.updated_at};
  try{
    const now=new Date().toISOString();
    let patch={status:st,updated_at:now};
    if(st==='aktiv')patch.akt_seit=now;
    else if(a.status==='aktiv'){patch.gebucht=Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100;patch.akt_seit=null;}
    Object.assign(a,{status:st,aktSeit:st==='aktiv'?Date.now():null,updated_at:now,...(patch.gebucht!==undefined?{gebucht:patch.gebucht}:{})});
    try{render();}catch(e){console.error('render@setStatusModal',e);}
    const ok=await dbPatch('aufgaben',id,patch);
    if(!ok){a.status=prev.status;a.aktSeit=prev.aktSeit;a.gebucht=prev.gebucht;a.updated_at=prev.updated_at;toast('⚠️ Speichern fehlgeschlagen','var(--red)');}
    else{
      const _teamSlack=S.personen.filter(p=>p.id!==aP&&p.slack_id).map(p=>p.slack_id);
      if(st==='erledigt'){
        // #4: Paddel-Gate — nur Feier wenn Monatsziel zugeordnet (Ovens: no fake rewards)
        if(a.teilzielId){celebrateErl(a);}
        else{toast('✓ Erledigt · ohne Monatsziel-Zuordnung kein Paddel-Punkt');}
        checkP1Done(a.pid);
        const restOffen=S.aufgaben.filter(x=>String(x.pid)===String(aP)&&x.status!=='erledigt');
        if(!restOffen.length)setTimeout(()=>celebrate('🏆','Alle Aufgaben erledigt! 🎉'),1500);
      }
      if(st==='aktiv')notify('aufgabe_gestartet',{prio:a.prio||null,team_slack_ids:_teamSlack,actor_slack_id:me()?.slack_id||''});
    }
  }catch(e){console.error('setStatusModal',e);a.status=prev.status;a.aktSeit=prev.aktSeit;a.gebucht=prev.gebucht;a.updated_at=prev.updated_at;toast('⚠️ Fehler beim Statuswechsel','var(--red)');}
  finally{a._busy=false;cm();try{render();}catch(e){console.error('render@setStatusModal2',e);}}
}
async function setTeilziel(id,tzid){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy)return;
  a._busy=true;
  const prev={teilzielId:a.teilzielId,zielId:a.zielId};
  a.teilzielId=tzid||null;
  const patch={teilziel_id:tzid||null};
  // Wenn neuer MS zu anderem Ziel gehört → Ziel mitziehen
  if(tzid){
    for(const z of S.ziele){
      if((z.teilziele||[]).some(t=>t.id===tzid)){
        if(String(a.zielId)!==String(z.id)){a.zielId=z.id;patch.ziel_id=z.id;}
        break;
      }
    }
  }
  const ok=await dbPatch('aufgaben',id,patch);
  if(!ok){a.teilzielId=prev.teilzielId;a.zielId=prev.zielId;toast('⚠ Fehler beim Speichern','var(--red)');}
  a._busy=false;
  render();
}
async function reassignAufgabe(id,newPid){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a._busy||String(a.pid)===String(newPid))return;
  a._busy=true;
  const prev={pid:a.pid,status:a.status,erstelltVon:a.erstelltVon,inboxStatus:a.inboxStatus};
  try{
    const istFremdPid=String(newPid)!==String(aP);
    const neuePerson=person(newPid);
    a.pid=newPid;a.status='zugewiesen';a.erstelltVon=a.erstelltVon||aP;
    if(istFremdPid)a.inboxStatus='neu';
    const patch={pid:newPid,status:'zugewiesen',erstellt_von:a.erstelltVon};
    if(istFremdPid)patch.inbox_status='neu';
    cm();render();
    const ok=await dbPatch('aufgaben',id,patch);
    if(!ok){a.pid=prev.pid;a.status=prev.status;a.erstelltVon=prev.erstelltVon;a.inboxStatus=prev.inboxStatus;toast('⚠ Fehler beim Zuweisen');}
    else if(istFremdPid){
      notify('aufgabe_zugewiesen',{aufgabe:a.titel,prio:a.prio,dl:a.dl,fuer:neuePerson?{id:neuePerson.id,name:neuePerson.name,slack_id:neuePerson.slack_id}:null});
    }
  }catch(e){console.error('reassignAufgabe',e);a.pid=prev.pid;a.status=prev.status;a.erstelltVon=prev.erstelltVon;a.inboxStatus=prev.inboxStatus;toast('⚠ Fehler beim Zuweisen');}
  finally{a._busy=false;render();}
}
async function delAufgabe(id){
  if(!confirm('Aufgabe löschen?'))return;
  S.aufgaben=S.aufgaben.filter(x=>x.id!==id);
  await dbDelete('aufgaben',id);cm();render();
}

function generateFokusReport(pid,scope){
  const p=person(pid); if(!p)return '';
  const sc=FOKUS_SCOPES[scope]||FOKUS_SCOPES.quartal;
  const {kw,jahr}=getKW();
  const today=TODAY;
  const curQ=Math.ceil((new Date().getMonth()+1)/3);
  const meineZ=S.ziele.filter(z=>z.status==='aktiv'&&(String(z.verantwortlichId)===String(pid)||(z.teilziele||[]).some(tz=>String(tz.verantwortlichId)===String(pid))));
  const mom=getMomentumScore(pid);
  const wrs=(S.wochenresets||[]).filter(r=>String(r.pid)===String(pid)).slice(0,4);
  const wrNow=dieseWocheReset(pid);
  const offP1=S.aufgaben.filter(a=>String(a.pid)===String(pid)&&a.prio==='P1'&&a.status!=='erledigt'&&a.status!=='idee').slice(0,8);
  const offP2Count=S.aufgaben.filter(a=>String(a.pid)===String(pid)&&a.prio==='P2'&&a.status!=='erledigt'&&a.status!=='idee').length;
  // Alle Monatsziele (auch Review-Historie)
  const alleTZ=S.ziele.flatMap(z=>(z.teilziele||[]).filter(t=>String(t.verantwortlichId)===String(pid)).map(t=>({...t,ziel:z})));
  const aktiveTZ=alleTZ.filter(t=>!t.erledigt&&!t.review_done).sort((a,b)=>(a.datum||'9999').localeCompare(b.datum||'9999'));
  const reviewedTZ=alleTZ.filter(t=>t.review_done).sort((a,b)=>(b.review_at||'').localeCompare(a.review_at||'')).slice(0,5);

  let r='# Fokus-Status: '+p.name+' ('+(p.rolle||'')+')\n';
  r+='Datum: '+today+' · KW '+kw+'/'+jahr+' · Q'+curQ+' · Scope: '+sc.label+'\n\n';

function fkSwitchScope(scope){
  if(!FOKUS_SCOPES[scope])return;
  window._fkScope=scope;
  openFokusCoach(scope);
}

function fkRefreshForScope(){
  const scope=window._fkScope||'quartal';
  const sc=FOKUS_SCOPES[scope];
  const rEl=document.getElementById('fkReport');
  if(rEl)rEl.value=generateFokusReport(aP,scope);
  const hEl=document.getElementById('fkReturnHint');
  if(hEl)hEl.innerHTML=sc.returnHint;
  const retEl=document.getElementById('fkReturn');
  if(retEl)retEl.setAttribute('placeholder',sc.returnPlaceholder);
  fkUpdatePrompt();
}

function fkUpdatePrompt(){
  const roleSel=document.getElementById('fkRole'); if(!roleSel)return;
  const role=roleSel.value;
  const pd=FOKUS_PROMPTS[role];
  const scope=window._fkScope||'quartal';
  document.getElementById('fkPrompt').value=fokusBasisPrompt(scope)+'\n**Rollen-Kontext: '+pd.label+'**\n'+pd.addon+'\n';
}

async function fkCopyOpen(){
  const prompt=document.getElementById('fkPrompt').value;
  const report=document.getElementById('fkReport').value;
  const text=prompt+'\n\n---\n\n# Mein Status-Report\n\n'+report;
  let copied=false;
  try{await navigator.clipboard.writeText(text);copied=true;}catch(e){}
  if(copied)toast('✓ In Zwischenablage — Claude öffnet sich');
  else toast('Clipboard-Fehler — bitte manuell kopieren');
  setTimeout(()=>{try{window.open('https://claude.ai/new','_blank','noopener');}catch(e){}},250);
}

async function fkParseReturn(){
  const raw=(document.getElementById('fkReturn').value||'').trim();
  if(!raw){toast('Nichts zum Einfügen');return;}
  const lines=raw.split(/\r?\n/).map(l=>l.trim()).filter(l=>l&&!l.startsWith('```'));
  let zCount=0,tzCount=0,wzCount=0,aCount=0,skip=0,orphanTasks=0;
  // 2-Pass-Parser: erst alles klassifizieren, dann in Kaskaden-Reihenfolge anlegen
  // (Quartal → Monat → Woche → Aufgabe). So finden Aufgaben den neu angelegten
  // Monatsziel auch dann, wenn er erst NACH ihnen in Claudes Output steht.
  const items={ziele:[],monatsziele:[],wochenziele:[],aufgaben:[]};
  for(const line of lines){
    const m=line.match(/^(QUARTALSZIEL|ZIEL|MONATSZIEL|MEILENSTEIN|WOCHENZIEL|BIG3|AUFGABE|TASK|TODO)\s*:\s*(.+)$/i);
    if(!m){skip++;continue;}
    const typ=m[1].toUpperCase();
    const parts=m[2].split('|').map(s=>s.trim()).filter(Boolean);
    if(typ==='QUARTALSZIEL'||typ==='ZIEL'){
      const name=parts[0]; if(!name||name.length<5){skip++;continue;}
      const dl=parts[1]&&/^\d{4}-\d{2}-\d{2}$/.test(parts[1])?parts[1]:null;
      items.ziele.push({name,dl});
    } else if(typ==='MONATSZIEL'||typ==='MEILENSTEIN'){
      const name=parts[0]; if(!name||name.length<5){skip++;continue;}
      const dl=parts[1]&&/^\d{4}-\d{2}-\d{2}$/.test(parts[1])?parts[1]:null;
      items.monatsziele.push({name,dl,parentKeyword:parts[2]||''});
    } else if(typ==='WOCHENZIEL'||typ==='BIG3'){
      const titel=parts[0]; if(!titel||titel.length<3){skip++;continue;}
      items.wochenziele.push(titel);
    } else if(typ==='AUFGABE'||typ==='TASK'||typ==='TODO'){
      const titel=parts[0]; if(!titel||titel.length<3){skip++;continue;}
      let prio='P2';
      for(const pp of parts.slice(1)){if(/^P1$/i.test(pp))prio='P1';else if(/^P2$/i.test(pp))prio='P2';else if(/^P3$/i.test(pp))prio='P3';}
      let dl=null;
      for(const pp of parts.slice(1)){if(/^\d{4}-\d{2}-\d{2}$/.test(pp))dl=pp;}
      items.aufgaben.push({titel,prio,dl});
    } else skip++;
  }
  // Pass 2a: Quartalsziele
  let lastZielId=null;
  for(const it of items.ziele){
    const id=nid('z');
    const rec={id,name:it.name,farbe:0,pct:0,verantwortlich_id:String(aP),vertraulich:false,status:'vorschlag',vorgeschlagen_von:String(aP)};
    if(it.dl)rec.monat_ende=it.dl.slice(0,7);
    try{await dbInsert('ziele',rec);S.ziele.push({...rec,verantwortlichId:aP,kpis:[],teilziele:[]});zCount++;lastZielId=id;}catch(e){skip++;}
  }
  // Pass 2b: Monatsziele
  let lastTzId=null;
  for(const it of items.monatsziele){
    let zielId=lastZielId;
    if(!zielId&&it.parentKeyword){
      const kwLc=it.parentKeyword.toLowerCase();
      const match=S.ziele.find(z=>z.name&&z.name.toLowerCase().includes(kwLc)&&(String(z.verantwortlichId)===String(aP)||isGF()));
      if(match)zielId=match.id;
    }
    if(!zielId){
      const eig=S.ziele.find(z=>z.status==='aktiv'&&String(z.verantwortlichId)===String(aP));
      if(eig)zielId=eig.id;
    }
    if(!zielId){skip++;continue;}
    const id=nid('tz');
    const rec={id,ziel_id:zielId,name:it.name,verantwortlich_id:String(aP),datum:it.dl,erledigt:false,vertraulich:false,status:'aktiv'};
    try{
      await dbInsert('teilziele',rec);
      const z=S.ziele.find(x=>x.id===zielId);
      if(z){z.teilziele=z.teilziele||[];z.teilziele.push({...rec,zielId,verantwortlichId:aP,datum:it.dl||''});}
      tzCount++;lastTzId=id;
    }catch(e){skip++;}
  }
  // sessionParentTz: bester verfügbarer MS für Aufgaben UND Wochenziele.
  // Reihenfolge: frisch angelegter MS dieser Session → existierender aktiver MS des Users.
  let sessionParentTz=lastTzId;
  if(!sessionParentTz){
    const alleTZ=S.ziele.flatMap(z=>(z.teilziele||[]).filter(t=>String(t.verantwortlichId)===String(aP)&&!t.erledigt&&!t.review_done));
    const aktiv=alleTZ.sort((a,b)=>(a.datum||'9999').localeCompare(b.datum||'9999'))[0];
    if(aktiv)sessionParentTz=aktiv.id;
  }
  // Parent-Ziel ermitteln (für focus_ziel_id im Wochenreset)
  let sessionFocusZielId=null;
  if(sessionParentTz){
    for(const z of S.ziele){if((z.teilziele||[]).some(t=>t.id===sessionParentTz)){sessionFocusZielId=z.id;break;}}
  }
  // Pass 2c: Wochenziele ins aktuelle Wochenreset
  if(items.wochenziele.length){
    const {kw,jahr}=getKW();
    let wr=dieseWocheReset(aP);
    if(!wr){
      const wrId=nid('wr');
      wr={id:wrId,pid:String(aP),kw,jahr,focus_ziel_id:sessionFocusZielId,
        big3_1_tz_id:null,big3_1:null,big3_1_done:false,
        big3_2_tz_id:null,big3_2:null,big3_2_done:false,
        big3_3_tz_id:null,big3_3:null,big3_3_done:false};
      S.wochenresets.unshift(wr);
      try{await dbInsert('wochenresets',wr);}catch(e){}
    }
    const patch={};
    for(const txt of items.wochenziele.slice(0,3)){
      for(const n of [1,2,3]){
        if(!wr['big3_'+n]){
          wr['big3_'+n]=txt;wr['big3_'+n+'_tz_id']=sessionParentTz||null;wr['big3_'+n+'_done']=false;
          patch['big3_'+n]=txt;patch['big3_'+n+'_tz_id']=sessionParentTz||null;patch['big3_'+n+'_done']=false;
          wzCount++;
          break;
        }
      }
    }
    if(sessionFocusZielId&&!wr.focus_ziel_id){wr.focus_ziel_id=sessionFocusZielId;patch.focus_ziel_id=sessionFocusZielId;}
    if(Object.keys(patch).length){try{await dbPatch('wochenresets',wr.id,patch);}catch(e){}}
  }
  // Pass 2d: Aufgaben — hängen an sessionParentTz (garantiert Kaskaden-Zuordnung)
  for(const it of items.aufgaben){
    const id=nid('a');
    const rec={id,titel:it.titel,pid:String(aP),prio:it.prio,status:'offen',erstellt_von:String(aP)};
    if(it.dl)rec.dl=it.dl;
    if(sessionParentTz)rec.teilziel_id=sessionParentTz;
    else orphanTasks++;
    try{await dbInsert('aufgaben',rec);S.aufgaben.push(normalizeAufgabe(rec));aCount++;}catch(e){skip++;}
  }
  const pieces=[];
  if(zCount)pieces.push(zCount+' Quartalsziel-Vorschlag'+(zCount!==1?'e':''));
  if(tzCount)pieces.push(tzCount+' Monatsziel'+(tzCount!==1?'e':''));
  if(wzCount)pieces.push(wzCount+' Wochenziel'+(wzCount!==1?'e':''));
  if(aCount)pieces.push(aCount+' Aufgabe'+(aCount!==1?'n':''));
  let summary='✓ '+(pieces.length?pieces.join(' · '):'nichts angelegt')+(skip?' · '+skip+' Zeile'+(skip!==1?'n':'')+' ignoriert':'');
  if(orphanTasks)summary+=' · ⚠️ '+orphanTasks+' Aufgabe'+(orphanTasks!==1?'n':'')+' ohne Monatsziel-Anbindung (bitte manuell zuordnen)';
  toast(summary);
  cm();
  if(typeof rZiele==='function')rZiele();
  if(typeof rStart==='function')rStart();
  if(typeof rWoche==='function')rWoche();
  if(typeof rMonat==='function')rMonat();
}
// ─── Ende FOKUS-COACH ────────────────────────────────────────────

  const alleZiele=S.ziele.filter(z=>(!z.vertraulich||isGF())&&z.status!=='vorschlag'&&z.status!=='bereich');

  // ── Quartals-Pillen ──
  const curMon=TODAY.slice(0,7);

    let style='font-size:12px;font-weight:700;padding:7px 18px;border-radius:99px;cursor:pointer;white-space:nowrap;border:1.5px solid ';
    if(isActive)style+='var(--inv);background:var(--inv);color:var(--inv-t)';

    const ms=z.monat_start||'';
    const me=z.monat_ende||'';

    if(ms)return ms<=qEnd;
    return me>=qStart;

  const istMeinZiel=z=>isGF()||z.verantwortlichId===aP||(z.teilziele||[]).some(tz=>tz.verantwortlichId===aP);

        if(collapsed)out+='<button onclick="localStorage.setItem(\''+collapseKey+'\',\'1\');rZiele();" style="margin-top:6px;width:100%;font-size:10px;padding:5px;border-radius:7px;border:1px dashed '+f.bd+';background:transparent;color:var(--t2);cursor:pointer;font-family:inherit">+ '+(myTZ.length-5)+' weitere zeigen</button>';
        else if(myTZ.length>5)out+='<button onclick="localStorage.removeItem(\''+collapseKey+'\');rZiele();" style="margin-top:6px;width:100%;font-size:10px;padding:5px;border-radius:7px;border:1px dashed '+f.bd+';background:transparent;color:var(--t2);cursor:pointer;font-family:inherit">↑ weniger zeigen</button>';
      }
      out+='</div>';
    }

    // Aufgaben ohne Teilziel
    const aOhneTZ=zA.filter(a=>!a.teilzielId);
    if(aOhneTZ.length){
      out+='<div style="border-top:1px solid var(--bd);padding-top:10px;margin-top:4px">';
      out+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:6px">Weitere Aufgaben</div>';
      out+='<div style="display:flex;flex-direction:column;gap:3px">';
      aOhneTZ.forEach(a=>{
        const p2=person(a.pid);
        out+='<div onclick="openDetail(\''+a.id+'\')" style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:7px;border:1px solid var(--bd);background:var(--gray-bg);cursor:pointer">';
        out+='<span style="font-size:8px;color:'+(a.status==='aktiv'?'var(--blue)':'var(--t3)')+'">●</span>';
        out+='<span style="flex:1;font-size:11px">'+esc(a.titel)+'</span>';
        if(p2)out+='<span style="font-size:10px;color:var(--t3)">'+p2.name+'</span>';
        out+=prioTag(a.prio,null,false);
        out+='</div>';
      });
      out+='</div></div>';
    }

    // Footer buttons

async function toggleTZ(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const tz=(z.teilziele||[]).find(t=>t.id===tzid);if(!tz)return;
  tz.erledigt=!tz.erledigt;
  await dbPatch('teilziele',tzid,{erledigt:tz.erledigt});
  if(tz.erledigt){celebrate('🎯',istBereich(zid)?'Thema abgeschlossen!':'Monatsziel erreicht!');notify('meilenstein_erledigt',{meilenstein:tz.name,ziel:z.name});}
  rZiele();
}
function openAddTZ(zid){
  const _isB=istBereich(zid),_lbl=_isB?'Thema':'Monatsziel',_ph=_isB?'z.B. Wartung & TÜV, IT-Sicherheit…':'z.B. Messe München vorbereitet';
  const _diagnoseHint=_isB?'':getDiagnoseHint();
  document.getElementById('mb').innerHTML='<div class="mt">'+_lbl+' hinzufügen</div>'
    +_diagnoseHint
    +'<div class="fl"><label>Name</label><input id="tzn" placeholder="'+_ph+'" autofocus></div>'
    +'<div class="f2"><div class="fl"><label>Verantwortlich</label><select id="tzv">'+S.personen.map(p=>'<option value="'+p.id+'">'+esc(p.name)+'</option>').join('')+'</select></div>'
    +'<div class="fl"><label>Bis wann <span style="font-weight:400;color:var(--t2)">(optional)</span></label><input type="date" id="tzd"></div></div>'
    +'<div class="mf"><button class="btn btn-gr" onclick="cm()">Abbrechen</button><button class="btn btn-dk" onclick="saveTZ(\''+zid+'\',null)">Speichern</button></div>';
  document.getElementById('ovl').classList.add('open');
}
function editTZ(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const tz=(z.teilziele||[]).find(t=>t.id===tzid);if(!tz)return;
  const _isB=istBereich(zid),_lbl=_isB?'Thema':'Monatsziel';
  const zielOpts=S.ziele.filter(zl=>zl.status!=='vorschlag').map(zl=>'<option value="'+zl.id+'"'+(zl.id===zid?' selected':'')+'>'+(zl.status==='bereich'?'📁 ':'')+esc(zl.name)+'</option>').join('');
  document.getElementById('mb').innerHTML='<div class="mt">'+_lbl+' bearbeiten</div>'
    +'<div class="fl"><label>Name</label><input id="tzn" value="'+esc(tz.name)+'" autofocus></div>'
    +'<div class="fl"><label>Gehört zu</label><select id="tzz">'+zielOpts+'</select></div>'
    +'<div class="f2"><div class="fl"><label>Verantwortlich</label><select id="tzv">'+S.personen.map(p=>'<option value="'+p.id+'"'+(tz.verantwortlichId===p.id?' selected':'')+'>'+esc(p.name)+'</option>').join('')+'</select></div>'
    +'<div class="fl"><label>Bis wann</label><input type="date" id="tzd" value="'+(tz.datum||'')+'"></div></div>'
    +(isGF()?'<div class="fl"><label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:13px;font-weight:400"><input type="checkbox" id="tzvert" '+(tz.vertraulich?'checked':'')+' style="width:auto"> 🔒 Vertraulich</label><div style="font-size:10px;color:var(--t3);margin-top:2px">Sichtbar für: Geschäftsführung &amp; Verantwortlicher</div></div>':'')
    +'<div class="mf"><button class="btn btn-red" onclick="delTZ(\''+zid+'\',\''+tzid+'\')">Löschen</button><button class="btn btn-gr" onclick="cm()">Abbrechen</button><button class="btn btn-dk" onclick="saveTZ(\''+zid+'\',\''+tzid+'\')">Speichern</button></div>';
  document.getElementById('ovl').classList.add('open');
}
async function saveTZ(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const name=document.getElementById('tzn').value.trim();if(!name)return;
  const vid=document.getElementById('tzv').value,datum=document.getElementById('tzd').value;
  const tzVertEl=document.getElementById('tzvert');
  const vertraulich=tzVertEl?tzVertEl.checked:((z.teilziele||[]).find(t=>t.id===tzid)?.vertraulich||false);
  const newZid=document.getElementById('tzz')?.value||zid;
  if(tzid){
    const tz=(z.teilziele||[]).find(t=>t.id===tzid);
    if(tz){tz.name=name;tz.verantwortlichId=vid;tz.datum=datum;tz.vertraulich=vertraulich;tz.zielId=newZid;}
    if(newZid!==zid){
      z.teilziele=(z.teilziele||[]).filter(t=>t.id!==tzid);
      const nz=zielObj(newZid);if(nz){nz.teilziele=nz.teilziele||[];nz.teilziele.push(tz);}
    }
    await dbPatch('teilziele',tzid,{name,verantwortlich_id:vid,datum:datum||null,ziel_id:newZid,vertraulich});
  } else {
    const id=nid('tz'),rec={id,ziel_id:zid,name,verantwortlich_id:vid,datum:datum||null,erledigt:false,vertraulich:false,status:'aktiv'};
    z.teilziele=z.teilziele||[];z.teilziele.push({...rec,zielId:zid,verantwortlichId:vid,datum:datum||'',vertraulich:false,status:'aktiv'});
    await dbInsert('teilziele',rec);
  }
  cm();rZiele();
}
async function delTZ(zid,tzid){
  if(!confirm(istBereich(zid)?'Thema löschen?':'Monatsziel löschen?'))return;
  const z=zielObj(zid);if(!z)return;
  z.teilziele=(z.teilziele||[]).filter(t=>t.id!==tzid);
  S.aufgaben.forEach(a=>{if(a.teilzielId===tzid)a.teilzielId=null;});
  await dbDelete('teilziele',tzid);cm();rZiele();
}

async function saveKpi(zid,kid){
  const z=zielObj(zid);if(!z)return;const k=z.kpis.find(x=>x.id===kid);if(!k)return;

  k.pid=S.personen.find(p=>String(p.id)===rawPid)?.id??rawPid;

  const kpiPatch={label:k.label,ist:k.ist,ziel:k.ziel,unit:k.unit,freq:k.freq,pid:k.pid,inv:k.inv,sonder:!!k.sonder,typ:k.typ,prio:k.prio,teilziel_id:k.teilzielId};
  await dbPatch('kpis',kid,kpiPatch);
  // _sonderSeen für neu aktivierte Sonder-KPIs initialisieren
  if(k.sonder&&_sonderSeen[kid]===undefined){
    let maxVal=0;
    Object.entries(S.kpiVals).forEach(([key,v])=>{if(key.endsWith('-'+kid)&&v.datum===TODAY)maxVal=Math.max(maxVal,v.val);});

  }

}

function getFriday(){
  const d=new Date();
  const day=d.getDay(); // 0=So,1=Mo,...,5=Fr,6=Sa
  const daysToFri=(5-day+7)%7; // 0=heute Fr, 1=Do, 2=Mi, 3=Di, 4=Mo, 5=So, 6=Sa
  // ≤1 Tag bis Freitag (also Donnerstag) → nächste Woche; alle anderen → diese/nächste Fri
  const add=daysToFri<=1&&daysToFri!==0?daysToFri+7:daysToFri;
  d.setDate(d.getDate()+add);
  return d.toISOString().slice(0,10);
}

function smartNeuContext(){
  const wr=dieseWocheReset(aP);
  if(wr){
    for(let n=1;n<=3;n++){
      const tzId=wr['big3_'+n+'_tz_id'];
      const done=wr['big3_'+n+'_done'];
      if(tzId && !done) return {teilzielId:tzId, prio:'P1'};
    }
  }
  const myTZ=S.ziele.flatMap(z=>(z.teilziele||[]).filter(t=>
    String(t.verantwortlichId)===String(aP) && !t.erledigt && (t.status||'aktiv')==='aktiv'
  ));
  myTZ.sort((a,b)=>(a.datum||'9999').localeCompare(b.datum||'9999'));
  if(myTZ.length) return {teilzielId:myTZ[0].id};
  return {};
}

function checkDeepLink(){

  if(!hash||!hash.startsWith('#card='))return;
  const id=hash.slice(6);

  const tab=id.startsWith('dr')?'team':id.startsWith('mt')||id.startsWith('me')?'team':'team';
  nav(tab);

    const el=document.getElementById('card-'+id);

  },400);
}

async function saveTeam(tid){
  const name=document.getElementById('tn').value.trim();if(!name)return;
  const checked=[...document.querySelectorAll('#mb input[type=checkbox]:checked')].map(c=>c.value);
  if(tid){
    const t=S.teams.find(x=>x.id===tid);if(!t)return;
    const old=[...t.members];t.name=name;t.members=checked;
    S.personen.forEach(p=>{
      const was=old.includes(p.id),is=checked.includes(p.id);
      if(was&&!is)p.teams=(p.teams||[]).filter(x=>x!==tid);
      if(!was&&is){p.teams=p.teams||[];if(!p.teams.includes(tid))p.teams.push(tid);}
    });
    await dbPatch('teams',tid,{name,members:checked});
  } else {
    const id=nid('t'),rec={id,name,members:checked};
    S.teams.push(rec);await dbInsert('teams',rec);
    checked.forEach(pid=>{const p=person(pid);if(p&&!(p.teams||[]).includes(id)){p.teams=p.teams||[];p.teams.push(id);}});
  }
  await Promise.all(S.personen.map(p=>dbPatch('personen',p.id,{teams:p.teams})));
  openSettings();render();
}
async function delTeam(tid){
  if(!confirm('Team löschen?'))return;
  S.teams=S.teams.filter(x=>x.id!==tid);
  S.personen.forEach(p=>{p.teams=(p.teams||[]).filter(x=>x!==tid);});
  await dbDelete('teams',tid);
  await Promise.all(S.personen.map(p=>dbPatch('personen',p.id,{teams:p.teams})));
  openSettings();render();
}

function parseProfilStruktur(p){
  const s=p._profilStruktur||{};
  return{ketten:s.ketten||[],teamSize:s.teamSize||0,kernaufgaben:s.kernaufgaben||'',hebel:s.hebel||'',extras:s.extras||''};
}
function buildProfilText(s){
  let parts=[];
  if(s.ketten.length){const labels=s.ketten.map(k=>{const c=KETTE_CHIPS.find(x=>x.k===k);return c?c.icon+' '+c.label:k;});parts.push('Position in der Wertschöpfungskette: '+labels.join(', '));}
  if(s.teamSize>0)parts.push('Führt ein Team von '+s.teamSize+' Personen (Multiplikator-Effekt: Verbesserungen wirken '+s.teamSize+'x)');
  if(s.kernaufgaben)parts.push('Kernaufgaben: '+s.kernaufgaben);
  if(s.hebel)parts.push('Größter Hebel: '+s.hebel);
  if(s.extras)parts.push(s.extras);
  return parts.join('. ')+'.';
}

async function savePerson(pid){
  const p=person(pid);if(!p)return;
  p.name=document.getElementById('en').value.trim()||p.name;
  p.k=document.getElementById('ek').value.trim().toUpperCase().slice(0,3)||p.k;
  p.rolle=document.getElementById('er').value.trim()||p.rolle;
  p.stufe=document.getElementById('es').value;
  p.fokus_start=document.getElementById('epfs').value||'09:00';
  p.fokus_end=document.getElementById('epfe').value||'11:00';
  // Strukturiertes Profil speichern
  const struktur=readProfilForm();
  p._profilStruktur=struktur;
  p.profil=buildProfilText(struktur);
  p.slack_id=document.getElementById('ep-slack')?.value.trim()||'';
  const np=document.getElementById('ep').value.trim();
  if(np.length===4&&/^\d{4}$/.test(np))p.pin=np;
  await dbPatch('personen',pid,{name:p.name,k:p.k,rolle:p.rolle,stufe:p.stufe,pin:p.pin,fokus_start:p.fokus_start,fokus_end:p.fokus_end,profil:p.profil,_profilStruktur:p._profilStruktur,slack_id:p.slack_id});
  openSettings();render();
}
async function deletePerson(pid){
  if(!confirm('Person löschen?'))return;
  S.personen=S.personen.filter(x=>x.id!==pid);
  S.teams.forEach(t=>{t.members=t.members.filter(id=>id!==pid);});
  await dbDelete('personen',pid);openSettings();render();
}

  const name=document.getElementById('un').value.trim(),k=document.getElementById('uk').value.trim().toUpperCase().slice(0,3);

function startTimers(){
  if(timIv)clearInterval(timIv);
  timIv=setInterval(()=>{
    document.querySelectorAll('[data-tid]').forEach(el=>{
      const a=S.aufgaben.find(x=>x.id===el.dataset.tid);if(!a)return;
      const s=elapsedSec(a),pct=Math.min(100,Math.round(s/((a.geplant||1)*3600)*100));
      const n=el.querySelector('.tn'),f=el.querySelector('.tf');
      if(n)n.textContent=fmt(s);if(f)f.style.width=pct+'%';
    });
    const now=new Date();
    const hh=('0'+now.getHours()).slice(-2),mm=('0'+now.getMinutes()).slice(-2);
    const clock=document.getElementById('live-clock');
    if(clock)clock.textContent=hh+':'+mm;
    if(aP){
      const p=me();if(p){
        const fs=p.fokus_start||'09:00',fe=p.fokus_end||'11:00';
        const [fsh,fsm]=fs.split(':').map(Number),[feh,fem]=fe.split(':').map(Number);
        const nowMin=now.getHours()*60+now.getMinutes();
        const inFokus=nowMin>=fsh*60+fsm&&nowMin<feh*60+fem;
        const banner=document.getElementById('fokus-banner'),label=document.getElementById('fokus-label');
        if(banner&&label){banner.style.display=inFokus?'flex':'none';if(inFokus)label.textContent='Fokuszeit bis '+fe+' — bitte nicht stören';}
      }
    }
  },1000);
}

function openSharedGoals(partnerId){

  const myGoalIds=new Set();
  const partnerGoalIds=new Set();
  S.aufgaben.forEach(a=>{if(a.zielId){if(a.pid===aP)myGoalIds.add(a.zielId);if(a.pid===partnerId)partnerGoalIds.add(a.zielId);}});
  S.ziele.forEach(z=>{if(z.verantwortlich_id===aP)myGoalIds.add(z.id);if(z.verantwortlich_id===partnerId)partnerGoalIds.add(z.id);});

      h+='</div>';

async function mdUploadAudio(input){
  const file=input.files[0];if(!file)return;
  const status=document.getElementById('md-status');
  const sizeMB=(file.size/1024/1024).toFixed(1);
  status.innerHTML='<div style="padding:10px;color:var(--amber);font-size:12px;display:flex;align-items:center;gap:6px"><span style="display:inline-block;animation:spin 1s linear infinite">⟳</span> Transkribiere Audio mit Whisper… ('+sizeMB+' MB)</div>';
  const whisperUrl=localStorage.getItem('n8n_whisper');
  if(!whisperUrl){
    status.innerHTML='<div style="padding:10px;color:var(--red);font-size:12px">⚠️ Whisper-URL nicht konfiguriert. Bitte in Einstellungen (⚙) unter „n8n Whisper URL" eintragen.</div>';
    return;
  }
  try{
    const fd=new FormData();fd.append('file',file);
    const resp=await fetch(whisperUrl,{method:'POST',body:fd});
    if(!resp.ok){status.innerHTML='<div style="padding:10px;color:var(--red);font-size:12px">⚠️ Whisper-Fehler (HTTP '+resp.status+'). Prüfe den Workflow in n8n.</div>';return;}
    const data=await resp.json();
    const transcript=data.transcript||data.text||data.result||'';
    if(transcript){
      document.getElementById('md-text').value=transcript;
      status.innerHTML='<div style="padding:10px;color:var(--green);font-size:12px">✅ Transkription fertig — '+transcript.split(/\s+/).length+' Wörter. Jetzt „Aufgaben extrahieren" klicken.</div>';
    }else{
      status.innerHTML='<div style="padding:10px;color:var(--red);font-size:12px">⚠️ Keine Transkription erhalten. Prüfe den Whisper-Workflow in n8n.</div>';
    }
  }catch(e){
    status.innerHTML='<div style="padding:10px;color:var(--red);font-size:12px">⚠️ Fehler bei Transkription: '+esc(e.message)+'</div>';
  }
}

      document.getElementById('md-status').innerHTML='<div style="padding:12px;color:var(--red);font-size:12px">⚠️ KI-Antwort konnte nicht verarbeitet werden. Bitte nochmal versuchen.</div>';
      btn.disabled=false;btn.textContent='✦ Aufgaben extrahieren';return;
    }
    if(!Array.isArray(tasks)||!tasks.length){
      document.getElementById('md-status').innerHTML='<div style="padding:12px;color:var(--amber);font-size:12px">Keine konkreten Aufgaben gefunden. Ist das Transkript lang genug?</div>';
      btn.disabled=false;btn.textContent='✦ Aufgaben extrahieren';return;
    }
    _mdTasks=tasks;
    mdRenderPreview();
  }catch(e){
    document.getElementById('md-status').innerHTML='<div style="padding:12px;color:var(--red);font-size:12px">⚠️ Fehler: '+esc(e.message)+'</div>';
    btn.disabled=false;btn.textContent='✦ Aufgaben extrahieren';
  }
}

function mdRemoveRow(i){
  const row=document.getElementById('md-row-'+i);if(row)row.style.display='none';
  const chk=document.getElementById('md-chk-'+i);if(chk)chk.checked=false;
  mdUpdateCount();
}

function mdUpdateCount(){
  let c=0;_mdTasks.forEach((_,i)=>{const chk=document.getElementById('md-chk-'+i);if(chk&&chk.checked)c++;});
  const el=document.getElementById('md-count');if(el)el.textContent=c+' ausgewählt';
}

async function mdConfirm(){
  const toCreate=[];
  _mdTasks.forEach((t,i)=>{
    const chk=document.getElementById('md-chk-'+i);if(!chk||!chk.checked)return;
    const titel=document.getElementById('md-titel-'+i)?.value.trim();if(!titel)return;
    const typ=document.getElementById('md-typ-'+i)?.value||(t.typ||'aufgabe');
    const pid=document.getElementById('md-pid-'+i)?.value||null;
    const prio=document.getElementById('md-prio-'+i)?.value||null;
    const dl=document.getElementById('md-dl-'+i)?.value||null;
    const zielSel=document.getElementById('md-ziel-'+i);
    const ziel_id=(zielSel?zielSel.value:'')||t.ziel_id||null;
    toCreate.push({titel,typ,pid,prio,dl,ziel_id,kontext:t.kontext||''});
  });
  if(!toCreate.length)return;
  const m=document.getElementById('mb');
  m.innerHTML='<div class="mt">📝 Meeting Dump</div>'
    +'<div style="text-align:center;padding:40px">'
    +'<div style="font-size:14px;color:var(--purple);font-weight:600">⟳ Lege '+toCreate.length+' Items an…</div>'
    +'<div id="md-progress" style="margin-top:12px;font-size:12px;color:var(--t3)">0 / '+toCreate.length+'</div>'
    +'</div>';
  let cntA=0,cntW=0,cntM=0,cntQ=0;
  const wr=dieseWocheReset(aP);
  let wrSlot=[wr?.big3_1,wr?.big3_2,wr?.big3_3].filter(Boolean).length;
  const wrPatch={};
  for(const t of toCreate){
    if(t.typ==='aufgabe'||!t.typ){
      const pid=t.pid||aP;const isOther=pid!==aP;
      const id=nid('a');
      const rec={id,pid,titel:t.titel,typ:t.ziel_id?'strategisch':'operativ',
        status:isOther?'zugewiesen':(t.prio?'backlog':'neu'),
        prio:t.prio,ziel_id:t.ziel_id,teilziel_id:null,
        geplant:1,gebucht:0,dl:t.dl,dl_type:t.dl?'bis':null,
        ua:[],notiz:t.kontext?'Meeting: '+t.kontext:null,
        akt_seit:null,vertraulich:false,erstellt_von:aP,
        inbox_status:isOther?'neu':(!t.prio?'neu':null)};
      S.aufgaben.push(normalizeAufgabe(rec));
      await dbInsert('aufgaben',rec);
      if(isOther){const tp=person(pid);if(tp?.slack_id)notify('aufgabe_zugewiesen',{aufgabe:t.titel,fuer:{id:pid,name:tp.name,slack_id:tp.slack_id},prio:t.prio,dl:t.dl});}
      cntA++;
    }else if(t.typ==='wochenziel'){
      if(wr&&wrSlot<3){
        const slot='big3_'+(wrSlot+1);
        wrPatch[slot]=t.titel;
        wr[slot]=t.titel;
        wrSlot++;cntW++;
      }else{
        // Kein Wochenplan oder voll → als Aufgabe P1
        const pid=t.pid||aP;const id=nid('a');
        const rec={id,pid,titel:t.titel,typ:'operativ',status:'backlog',prio:'P1',
          ziel_id:null,teilziel_id:null,geplant:1,gebucht:0,dl:t.dl||getFriday(),
          dl_type:'bis',ua:[],notiz:t.kontext?'Meeting: '+t.kontext:null,
          akt_seit:null,vertraulich:false,erstellt_von:aP,inbox_status:null};
        S.aufgaben.push(normalizeAufgabe(rec));
        await dbInsert('aufgaben',rec);cntA++;
      }
    }else if(t.typ==='monatsziel'){
      const id=nid('tz');
      const rec={id,ziel_id:t.ziel_id||null,name:t.titel,datum:t.dl||null,
        status:'aktiv',erledigt:false,erstellt_von:aP,erstellt_am:new Date().toISOString()};
      if(!S.ziele.find(z=>z.id===t.ziel_id)){rec.ziel_id=null;}
      // Push to local state
      const z=S.ziele.find(z=>z.id===rec.ziel_id);
      if(z){z.teilziele=z.teilziele||[];z.teilziele.push(rec);}
      await dbInsert('teilziele',rec);cntM++;
    }else if(t.typ==='quartalsziel'){
      const id=nid('z');
      const rec={id,name:t.titel,status:'aktiv',erledigt:false,
        datum:t.dl||null,farbe:0,
        erstellt_von:aP,erstellt_am:new Date().toISOString(),teilziele:[]};
      S.ziele.push(rec);
      await dbInsert('ziele',rec);cntQ++;
    }
    const prog=document.getElementById('md-progress');
    if(prog)prog.textContent=(cntA+cntW+cntM+cntQ)+' / '+toCreate.length;
  }
  // Flush Wochenziel-Patches
  if(wr&&Object.keys(wrPatch).length){
    Object.assign(wr,wrPatch);
    await dbPatch('wochenresets',wr.id,wrPatch);
  }
  const summary=[];
  if(cntA)summary.push(cntA+' Aufgabe'+(cntA!==1?'n':''));
  if(cntW)summary.push(cntW+' Wochenziel'+(cntW!==1?'e':''));
  if(cntM)summary.push(cntM+' Monatsziel'+(cntM!==1?'e':''));
  if(cntQ)summary.push(cntQ+' Quartalsziel'+(cntQ!==1?'e':''));
  m.innerHTML='<div class="mt">📝 Meeting Dump</div>'
    +'<div style="text-align:center;padding:40px">'
    +'<div style="font-size:48px;margin-bottom:12px">✅</div>'
    +'<div style="font-size:20px;font-weight:700;margin-bottom:8px">Alles angelegt</div>'
    +'<div style="font-size:13px;color:var(--t2);margin-bottom:20px">'+summary.join(' · ')+'</div>'
    +'<div style="font-size:12px;color:var(--t3);margin-bottom:20px">Zugewiesene Personen werden per Slack benachrichtigt.</div>'
    +'<div style="display:flex;justify-content:center"><button class="btn btn-dk" onclick="cm();render()" style="padding:10px 24px;font-size:14px">Fertig</button></div>'
    +'</div>';
}

async function saveOffeneFrage(){
  const frage=document.getElementById('of-frage').value.trim();
  if(!frage){toast('Bitte Frage eingeben');return;}
  const typ=document.querySelector('input[name="of-typ"]:checked')?.value||'entscheidung';
  const sicht=document.getElementById('of-sicht-team')?.checked?'team':'gf_only';
  const anPersonId=document.getElementById('of-an').value||null;
  const deadline=document.getElementById('of-deadline').value||null;
  const rec={
    id:nid('dr'),
    frage,
    typ,
    kontext:document.getElementById('of-kontext').value.trim()||null,
    blockiert:document.getElementById('of-blockiert').value.trim()||null,
    prioritaet:document.getElementById('of-prio').value,
    deadline:deadline||null,
    sichtbarkeit:sicht,
    erstellt_von:aP,
    an_person_id:anPersonId,
    erstellt_am:new Date().toISOString(),
    status:'offen'
  };
  // Kein optimistic insert — erst DB prüfen, dann UI
  const result=await dbInsert('decision_requests',rec);
  if(!result){
    toast('⚠️ Speichern fehlgeschlagen — DB-Migration ausgeführt? (Supabase → SQL Editor)');
    return;
  }
  const saved=Array.isArray(result)&&result[0]?result[0]:rec;
  S.decisionRequests.unshift(saved);

async function saveMeeting(){
  const titel=document.getElementById('mf-titel').value.trim();
  if(!titel){toast('Bitte Titel eingeben');return;}
  const datum=document.getElementById('mf-datum').value||null;
  const uhrzeit=document.getElementById('mf-uhrzeit').value||null;
  const teilnehmerIds=[...document.querySelectorAll('input[name="mt-teil"]:checked')].map(el=>el.value);
  const selectedFragen=[...document.querySelectorAll('input[name="mt-frage"]:checked')].map(el=>el.value);
  // Auto-Teilnehmer: Ersteller + Empfänger aller angehakten Fragen automatisch hinzufügen
  const teilnSet=new Set(teilnehmerIds);
  teilnSet.add(aP); // Ersteller des Meetings immer dabei
  for(const drId of selectedFragen){
    const d=S.decisionRequests.find(x=>x.id===drId);if(!d)continue;
    if(d.erstellt_von)teilnSet.add(d.erstellt_von);
    if(d.an_person_id)teilnSet.add(d.an_person_id);
  }
  const finalTeiln=[...teilnSet];
  const meetId=nid('mt');
  const rec={id:meetId,titel,datum,uhrzeit,teilnehmer_ids:finalTeiln,meet_link:null,gcal_event_id:null,aufnahme_link:null,status:'geplant',erstellt_von:aP,erstellt_am:new Date().toISOString()};
  S.meetings.unshift(rec);
  await dbInsert('meetings',rec);
  for(const drId of selectedFragen){
    const d=S.decisionRequests.find(x=>x.id===drId);if(!d)continue;
    d.status='in_meeting';d.meeting_id=meetId;
    await dbPatch('decision_requests',drId,{status:'in_meeting',meeting_id:meetId});
  }
  const teilnNames=finalTeiln.map(id=>person(id)?.name||'').filter(Boolean);
  notify('meeting_erstellt',{titel,datum,teilnehmer_names:teilnNames,fragen_count:selectedFragen.length,actor_slack_id:me()?.slack_id||''});
  cm();
  if(gcalIsConnected())gcalCreateMeetingEvent(rec);
  render();toast('🗓 Meeting erstellt');
}
async function gcalCreateMeetingEvent(meeting){
  if(!gcalIsConnected())return;
  const token=localStorage.getItem('gcal_token');
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'Europe/Vienna';
  const dateStr=meeting.datum||TODAY;
  const timeStr=(meeting.uhrzeit||'10:00').slice(0,5)+':00';
  const startD=new Date(dateStr+'T'+timeStr);
  const endD=new Date(startD.getTime()+60*60*1000);
  const body={
    summary:'🗓 '+meeting.titel,
    description:'Halleluja OS Meeting',
    start:{dateTime:startD.toISOString(),timeZone:tz},
    end:{dateTime:endD.toISOString(),timeZone:tz},
    conferenceData:{createRequest:{requestId:meeting.id,conferenceSolutionKey:{type:'hangoutsMeet'}}}
  };
  try{
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?conferenceDataVersion=1',
      {method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(resp.ok){
      const d=await resp.json();
      const meetLink=d.conferenceData?.entryPoints?.find(e=>e.entryPointType==='video')?.uri||null;
      const gcalId=d.id||null;
      const m=S.meetings.find(x=>x.id===meeting.id);
      if(m){m.meet_link=meetLink;m.gcal_event_id=gcalId;}
      if(gcalId)await dbPatch('meetings',meeting.id,{meet_link:meetLink,gcal_event_id:gcalId});
      if(meetLink){render();toast('📅 Meet-Link erstellt');}
    }else if(resp.status===401){localStorage.removeItem('gcal_token');}
  }catch(e){console.warn('gcalCreateMeetingEvent:',e);}
}

async function drLoeschen(drId){

  if(!confirm('Frage wirklich löschen?\n\n"'+d.frage.slice(0,100)+'"\n\nDas kann nicht rückgängig gemacht werden.'))return;
  const idx=S.decisionRequests.findIndex(x=>x.id===drId);

function gcalIsConnected(){
  if(localStorage.getItem('gcal_ever_connected')!=='1')return false;
  const token=localStorage.getItem('gcal_token');
  const expiry=parseInt(localStorage.getItem('gcal_token_expiry')||'0');
  return !!(token&&Date.now()<expiry);
}
const GCAL_DEFAULT_CLIENT_ID='72621178595-l3kjb0a7u8khba1dt61lgu5gfs0daorb.apps.googleusercontent.com';
const GCAL_SCOPE='https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events';
let _gcalTokenClient=null;

function _gcalInitClient(onSuccess,silent=false){
  const clientId=(localStorage.getItem('gcal_client_id')||GCAL_DEFAULT_CLIENT_ID).trim();
  if(!window.google?.accounts?.oauth2){
    if(!silent)toast('GCal: Bitte kurz warten und nochmal versuchen');
    return;
  }
  _gcalTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:clientId,
    scope:GCAL_SCOPE,
    prompt:silent?'':'consent',
    callback:(resp)=>{
      if(resp.access_token){
        localStorage.setItem('gcal_token',resp.access_token);
        localStorage.setItem('gcal_token_expiry',String(Date.now()+(resp.expires_in||3600)*1000));
        localStorage.setItem('gcal_ever_connected','1'); // persistent flag
        if(!silent)toast('✅ Google Kalender verbunden');
        gcalFetchToday();render();
      } else if(!silent){
        toast('GCal: Verbindung fehlgeschlagen');
      }
    },
    error_callback:(err)=>{
      if(!silent)toast('GCal: '+( err?.type||'Fehler'));
    }
  });
  _gcalTokenClient.requestAccessToken({prompt:silent?'none':undefined});
}

function gcalConnect(){_gcalInitClient(null,false);}

function gcalSilentRefresh(){
  // GIS-Library noch nicht geladen → warten und nochmal versuchen
  if(!window.google?.accounts?.oauth2){
    setTimeout(gcalSilentRefresh,1000);
    return;
  }
  _gcalInitClient(null,true);
}

function gcalDisconnect(){
  localStorage.removeItem('gcal_token');
  localStorage.removeItem('gcal_token_expiry');
  localStorage.removeItem('gcal_ever_connected');
  S.kalender=[];
  if(window._gcalNotifIv)clearInterval(window._gcalNotifIv);
  if(window.google?.accounts?.oauth2&&_gcalTokenClient){
    try{google.accounts.oauth2.revoke(localStorage.getItem('gcal_token')||'',()=>{});}catch(e){}
  }
  toast('Google Kalender getrennt');
  render();
}

function gcalHandleCallback(){
  // Legacy-Handler für alten Implicit-Flow-Redirect (falls noch im Hash)
  if(!location.hash.includes('access_token'))return;
  const params=new URLSearchParams(location.hash.replace(/^#/,''));
  const token=params.get('access_token');
  const expiresIn=parseInt(params.get('expires_in')||'3600');
  if(token){
    localStorage.setItem('gcal_token',token);
    localStorage.setItem('gcal_token_expiry',String(Date.now()+expiresIn*1000));
    history.replaceState(null,'',location.pathname);
    toast('✅ Google Kalender verbunden');
  }
}
async function gcalFetchToday(){
  const expiry=parseInt(localStorage.getItem('gcal_token_expiry')||'0');
  // Token abgelaufen → erst still erneuern, dann weitermachen
  if(Date.now()>expiry&&localStorage.getItem('gcal_token')){
    gcalSilentRefresh();return; // gcalSilentRefresh ruft gcalFetchToday nach Erfolg
  }
  const token=localStorage.getItem('gcal_token');
  if(!token){S.kalender=[];return;}
  const d=new Date();
  const start=new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0).toISOString();
  const end=new Date(d.getFullYear(),d.getMonth(),d.getDate(),23,59,59).toISOString();
  try{
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events'
      +'?timeMin='+encodeURIComponent(start)
      +'&timeMax='+encodeURIComponent(end)
      +'&singleEvents=true&orderBy=startTime&maxResults=25',
      {headers:{Authorization:'Bearer '+token}});
    if(resp.status===401){
      // Token ungültig → still erneuern statt rauswerfen
      localStorage.removeItem('gcal_token');
      gcalSilentRefresh();
      return;
    }
    const data=await resp.json();
    window._gcalEvtMap={};
    S.kalender=(data.items||[])
      .filter(e=>e.start&&e.start.dateTime)
      .map((e,i)=>{
        const ev={id:'ge_'+i,titel:e.summary||'(Kein Titel)',beschreibung:e.description||'',ort:e.location||'',start:new Date(e.start.dateTime),end:new Date(e.end.dateTime)};
        window._gcalEvtMap[ev.id]=ev;
        return ev;
      });
    render();
    gcalStartNotifications();
  }catch(err){console.warn('gcal fetch:',err);}
}
function gcalStartNotifications(){
  if(window._gcalNotifIv)clearInterval(window._gcalNotifIv);
  window._gcalNotifIv=setInterval(()=>{
    if(!aP)return;
    const now=Date.now();
    (S.kalender||[]).forEach(ev=>{
      if(!ev.start)return;
      const diff=(ev.start.getTime()-now)/60000;
      if(diff>0&&diff<=10&&!ev._notif10){ev._notif10=true;toast('📅 '+esc(ev.titel)+' in '+Math.round(diff)+' Min');}
      else if(diff>-1&&diff<=0&&!ev._notifFired){ev._notifFired=true;toast('📅 '+esc(ev.titel)+' startet jetzt!');}
    });
  },30000);
}
function _gcalVorlaufOpts(evDate){
  // Gibt Vorlauf-Optionen zurück, abhängig davon wie weit das Event entfernt ist
  const daysUntil=Math.round((new Date(evDate+'T12:00:00')-new Date(TODAY+'T12:00:00'))/86400000);
  const addDays=(d,n)=>{const r=new Date(d+'T12:00:00');r.setDate(r.getDate()+n);return localDate(r);};
  const fmtD=d=>{const dd=new Date(d+'T12:00:00');return['So','Mo','Di','Mi','Do','Fr','Sa'][dd.getDay()]+' '+dd.getDate()+'.'+(dd.getMonth()+1)+'.';};
  const opts=[];
  if(daysUntil>0)opts.push({label:'Am Tag davor',sub:fmtD(addDays(evDate,-1)),date:addDays(evDate,-1)});
  if(daysUntil>2)opts.push({label:'2 Tage davor',sub:fmtD(addDays(evDate,-2)),date:addDays(evDate,-2)});
  if(daysUntil>7)opts.push({label:'1 Woche davor',sub:fmtD(addDays(evDate,-7)),date:addDays(evDate,-7)});
  if(daysUntil>14)opts.push({label:'2 Wochen davor',sub:fmtD(addDays(evDate,-14)),date:addDays(evDate,-14)});
  opts.push({label:'Heute',sub:fmtD(TODAY),date:TODAY});
  return opts.filter(o=>o.date>=TODAY);
}

// ─── Google Calendar Write-Sync ─────────────────────────────────
function gcalGetEvtId(aufgabeId){return localStorage.getItem('gcal_evt_'+aufgabeId)||null;}
function gcalSetEvtId(aufgabeId,gcalId){if(gcalId)localStorage.setItem('gcal_evt_'+aufgabeId,gcalId);else localStorage.removeItem('gcal_evt_'+aufgabeId);}
function gcalNextDay(dateStr){const d=new Date(dateStr+'T12:00:00');d.setDate(d.getDate()+1);return localDate(d);}
async function gcalCreateEvent(a){
  if(!gcalIsConnected()||String(a.pid)!==String(aP))return;
  // P1 immer in Kalender (auch ohne dl); P2/P3 nur mit dl
  if(a.prio!=='P1'&&!a.dl)return;
  if(gcalGetEvtId(a.id))return;
  const token=localStorage.getItem('gcal_token');
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const hrs=a.geplant||1;
  const tag=a.dl||TODAY;
  const uhrzeit=a.dl_uhrzeit||a.dlUhrzeit||null;
  // App-Event mit Uhrzeit → exakte Zeit; Heute ohne Zeit → nächste volle Stunde; Zukunft → 9:00
  let startD;
  if(uhrzeit&&/^\d{2}:\d{2}$/.test(uhrzeit)){
    const[hh,mm]=uhrzeit.split(':').map(Number);
    startD=new Date(tag+'T'+String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':00');
  }else if(tag===TODAY){
    const now=new Date();
    startD=new Date(now);
    startD.setMinutes(0,0,0);
    startD.setHours(startD.getHours()+1);
  }else{
    startD=new Date(tag+'T09:00:00');
  }
  const endD=new Date(startD.getTime()+hrs*3600000);
  const zN=getZielName(a);
  // App-Event mit Zeit → echter Titel (User hat explizit Termin gesetzt)
  // P1 ohne Zeit → anonym (Privatsphäre); P2/P3 → Prio + Titel
  const summary=uhrzeit?a.titel:a.prio==='P1'?'⚡ P1 — '+(zN||'Fokus'):'['+a.prio+'] '+a.titel;
  const description=a.prio==='P1'?'Halleluja OS':'Halleluja OS';
  const colorMap={'P1':'11','P2':'6','P3':'8'};
  const body={
    summary,
    description,
    colorId:colorMap[a.prio||'P3']||'8',
    start:{dateTime:startD.toISOString(),timeZone:tz},
    end:{dateTime:endD.toISOString(),timeZone:tz}
  };
  try{
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',
      {method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(resp.ok){
      const d=await resp.json();
      gcalSetEvtId(a.id,d.id);
      toast('📅 Im Kalender eingetragen');
    } else if(resp.status===401){
      localStorage.removeItem('gcal_token');
      gcalSilentRefresh(); // still erneuern, nächste Aktion klappt dann
    } else if(resp.status===403){
      toast('GCal: Schreibrechte fehlen — bitte einmal neu verbinden');
      localStorage.removeItem('gcal_token');
    } else {
      const err=await resp.json().catch(()=>({}));
      console.warn('gcalCreateEvent error:',resp.status,err);
    }
  }catch(e){console.warn('gcalCreateEvent:',e);}
}
async function gcalUpdateEventStart(a){
  if(!gcalIsConnected()||String(a.pid)!==String(aP))return;
  const evtId=gcalGetEvtId(a.id);
  if(!evtId){if(a.dl)await gcalCreateEvent(a);return;}
  const token=localStorage.getItem('gcal_token');
  const now=new Date();
  const end=new Date(now.getTime()+(a.geplant||1)*3600000);
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  try{
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/'+encodeURIComponent(evtId),
      {method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
       body:JSON.stringify({start:{dateTime:now.toISOString(),timeZone:tz},end:{dateTime:end.toISOString(),timeZone:tz}})});
    if(resp.status===401){localStorage.removeItem('gcal_token');}
    else if(resp.status===403){localStorage.removeItem('gcal_token');toast('GCal: Schreibrechte fehlen — bitte neu verbinden');}
  }catch(e){console.warn('gcalUpdateEventStart:',e);}
}
async function gcalUpdateEventEnd(a){
  if(!gcalIsConnected()||String(a.pid)!==String(aP))return;
  const evtId=gcalGetEvtId(a.id);
  if(!evtId)return;
  const token=localStorage.getItem('gcal_token');
  const now=new Date();
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  try{
    const getResp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/'+encodeURIComponent(evtId),
      {headers:{Authorization:'Bearer '+token}});
    if(!getResp.ok){if(getResp.status===401)localStorage.removeItem('gcal_token');return;}
    const evt=await getResp.json();
    const patch={end:{dateTime:now.toISOString(),timeZone:tz}};
    if(evt.start&&evt.start.date){
      const d=new Date(); d.setHours(9,0,0,0);
      patch.start={dateTime:d.toISOString(),timeZone:tz};
    }
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/'+encodeURIComponent(evtId),
      {method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(patch)});
    if(resp.status===401){localStorage.removeItem('gcal_token');}
    else if(resp.status===403){localStorage.removeItem('gcal_token');toast('GCal: Schreibrechte fehlen — bitte neu verbinden');}
  }catch(e){console.warn('gcalUpdateEventEnd:',e);}
}

        if(ap)ap.style.display='flex';
        updateBadge();render();checkOnboarding();checkMonatszielReviews();setTimeout(()=>checkMissedDeadlines(),800);startSonderPoller();startDataPoller();handleDeepLink();checkDeepLink();
        gcalFetchToday();
      } else localStorage.removeItem('h_session');
    }
  }catch(e){console.warn('Session restore:',e);}
  setInterval(()=>{
    if(!aP)return;
    try{const raw=localStorage.getItem('h_session');if(!raw){logout();return;}const s=JSON.parse(raw);if(!s||!s.ts||Date.now()-s.ts>30*24*60*60*1000){logout();}}catch(e){logout();}
  },60000);
  // GCal: beim Start Token prüfen — kein Auto-Popup (würde Browser-Blocker triggern)
  if(localStorage.getItem('gcal_ever_connected')==='1'){
    const _t=localStorage.getItem('gcal_token');
    const _e=parseInt(localStorage.getItem('gcal_token_expiry')||'0');
    if(_t&&Date.now()<_e-60000){
      // Token noch gültig → direkt Daten laden, kein Popup nötig
      setTimeout(gcalFetchToday,1500);
    }
    // Token abgelaufen → User muss selbst auf "GCal verbinden" klicken (user-initiated)
  }
  // GCal Token Auto-Refresh: nur wenn Tab aktiv UND User-Interaktion stattfand
  let _gcalLastInteraction=Date.now();
  document.addEventListener('click',()=>_gcalLastInteraction=Date.now(),{passive:true});
  setInterval(()=>{
    if(!aP||!localStorage.getItem('gcal_ever_connected'))return;
    const expiry=parseInt(localStorage.getItem('gcal_token_expiry')||'0');
    // Nur refreshen wenn Token abläuft UND User war in letzten 10 Min aktiv
    if(Date.now()>expiry-15*60*1000&&Date.now()-_gcalLastInteraction<10*60*1000){
      gcalSilentRefresh();
    }
  },5*60*1000);
})();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>

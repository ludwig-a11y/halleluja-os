          // ── Erledigt (kompakt, klappbar) ──
          if(tzA_erledigt.length){
            out+='<details style="border-top:1px solid '+f.bd+'">';
            out+='<summary style="list-style:none;cursor:pointer;padding:6px 12px 6px '+indent+'px;font-size:10px;font-weight:700;color:var(--green);background:var(--green-bg);display:flex;align-items:center;gap:6px">✓ '+tzA_erledigt.length+' erledigt<span style="font-size:9px;color:var(--t3);margin-left:auto">▾</span></summary>';
            tzA_erledigt.forEach(a=>{
              out+='<div onclick="openDetail(\''+a.id+'\')" style="display:flex;align-items:center;gap:8px;padding:6px 12px 6px '+indent+'px;border-top:1px solid '+f.bd+';cursor:pointer;background:var(--green-bg)">';
              out+='<span style="flex:1;font-size:11px;color:var(--t3);text-decoration:line-through">'+esc(a.titel)+'</span>';
              out+='</div>';
            });
            out+='</details>';
          }
          // ── Footer: + Aufgabe ──
          out+='<div style="padding:7px 12px;border-top:1px solid '+f.bd+';background:'+f.bg+'">';
          out+='<button onclick="openNeu({zielId:\''+z.id+'\',teilzielId:\''+tz.id+'\'})" style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid '+f.bd+';background:var(--sf);color:'+f.tc+';font-weight:500;cursor:pointer;font-family:inherit">+ Aufgabe</button>';
          out+='</div></div>';
        });
        // Tasks without Thema
        const aOhneTZB=bAufg.filter(a=>!a.teilzielId);
        if(aOhneTZB.length){
          out+='<div style="margin-top:'+(myTZB.length?'4':'0')+'px">';
          if(myTZB.length)out+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:6px">Weitere Aufgaben</div>';
          aOhneTZB.forEach(a=>{
            const p2=person(a.pid);
            out+='<div onclick="openDetail(\''+a.id+'\')" style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:7px;border:1px solid '+f.bd+';background:var(--sf);cursor:pointer;margin-bottom:3px" onmouseenter="this.style.background=\'var(--gray-bg)\'" onmouseleave="this.style.background=\'var(--sf)\'">';
            out+='<span style="font-size:8px;color:'+(a.status==='aktiv'?'var(--blue)':'var(--t3)')+'">●</span>';
            out+='<span style="flex:1;font-size:11px">'+esc(a.titel)+'</span>';
            if(p2)out+='<span style="font-size:10px;color:var(--t3)">'+p2.name+'</span>';
            out+=prioTag(a.prio,null,false);
            out+='</div>';
          });
          out+='</div>';
        }
        if(!myTZB.length&&!aOhneTZB.length&&!paVorschlaege.length)out+='<div style="font-size:12px;color:var(--t3);padding:4px 0">Noch keine Themengebiete oder Aufgaben.</div>';
        // + Power-Aktivität Button (für Bereichsleiter und GF)
        if(canManageTZ(z.id))out+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid '+f.bd+'">'
          +'<button onclick="openAddPowerAktivitaet(\''+z.id+'\')" style="font-size:11px;padding:5px 14px;border-radius:7px;border:1px solid var(--amber-bd);background:var(--amber-bg);color:var(--orange);cursor:pointer;font-family:inherit;font-weight:600">⚡ + Power-Aktivität vorschlagen</button>'
          +'<div style="font-size:10px;color:var(--t3);margin-top:4px">Optimierungsziel — geht zur Freigabe an die GF</div>'
          +'</div>';
        out+='</div>';
      }
      out+='</div>';
    });
    if(!alleBereiche.length)out+='<div style="font-size:12px;color:var(--t3);padding:8px 0">Noch keine Bereiche erstellt.</div>';
    out+='</div>';
  }

  document.getElementById('main').innerHTML=out;
}

async function toggleTZ(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const tz=(z.teilziele||[]).find(t=>t.id===tzid);if(!tz)return;
  tz.erledigt=!tz.erledigt;
  await dbPatch('teilziele',tzid,{erledigt:tz.erledigt});
  if(tz.erledigt){celebrate('🎯',istBereich(zid)?'Themengebiet abgeschlossen!':'Monatsziel erreicht!');notify('meilenstein_erledigt',{meilenstein:tz.name,ziel:z.name});}
  rZiele();
}

function editTZ(zid,tzid){

  const _isB=istBereich(zid),_lbl=_isB?'Themengebiet':'Monatsziel';

    +'<div class="fl"><label>Bis wann</label><input type="date" id="tzd" value="'+(tz.datum||'')+'"></div></div>'

    +'<div class="fl"><label>Doer <span style="font-weight:400;color:var(--t3);font-size:10px">(macht die Leading-Aktion)</span></label>'

      }
      // Override-Section: in Phase-Mode öffnen wenn schon gesetzt, sonst kollabiert
      const _open=_hasOverride||!_zielHasLeading;
      _h+='<details '+(_open?'open':'')+' style="background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:8px;padding:8px 12px;margin-bottom:10px">'
        +'<summary style="cursor:pointer;font-size:11px;font-weight:700;color:var(--text);list-style:none">'

        +(_zielHasLeading
          ?'Eigener Leading nur für diesen Monat. Faustregel: <i>„Würde ich es heute nicht tun, müsste es aber diese Woche?"</i> — dann weekly.'
          :'Die <i>tägliche Aktion</i>, die dieses MZ erzwingt. Wenn du den gleichen Leading für mehrere MZ brauchst, leg ihn besser direkt am übergeordneten Ziel an.')
        +'</div>'
        +'<div class="fl" style="margin-top:8px"><label>Leading-Aktion (Verb)</label><input id="tzmetrik" value="'+esc(tz.metrik||'')+'" placeholder="z.B. Call gemacht, Outreach-Mail verschickt"></div>'

          +'<option value="monthly"'+(tz.leadingFreq==='monthly'?' selected':'')+'>Monatlich</option>'
        +'</select></div>'
        +'<div class="fl"><label>Zielzahl pro Frequenz</label><input id="tzlcount" type="number" min="1" value="'+(tz.leadingCount||'')+'" placeholder="z.B. 30 (täglich)"></div></div>'
        +'<div class="fl"><label>Monats-Anker (Aggregat, optional)</label><input id="tzzw" type="number" min="1" value="'+(tz.zielWert||'')+'" placeholder="z.B. 600 = 30 × 20 Arbeitstage"></div>'
        +'</details>';
      return _h;
    })()
    // v175 §14+: Status (Rekalibrierung). Pause = reversibel, Archiv = raus aus Views.
    +(canManageTZ(zid)?('<div class="fl"><label>Status</label><select id="tzstatus">'

    +'<div class="mf"><button class="btn btn-red" onclick="delTZ(\''+zid+'\',\''+tzid+'\')">Löschen</button><button class="btn btn-gr" onclick="cm()">Abbrechen</button><button class="btn btn-dk" onclick="saveTZ(\''+zid+'\',\''+tzid+'\')">Speichern</button></div>';
  document.getElementById('ovl').classList.add('open');
}
async function saveTZ(zid,tzid){

  // v205: Force-Blur damit native date-picker pending commits noch landen
  const _datEl=document.getElementById('tzd');if(_datEl)_datEl.blur();
  const name=document.getElementById('tzn').value.trim();if(!name)return;

// v210: Undo für Ziel-/Monatsziel-Löschung. Snapshot vor Delete, Toast 30s, voller Restore.
let _delUndo=null;
function _delShowUndo(label){
  let bar=document.getElementById('del-undo-bar');
  if(bar)bar.remove();
  bar=document.createElement('div');
  bar.id='del-undo-bar';
  bar.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--text);color:var(--bg);padding:10px 14px 10px 16px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.18);display:flex;align-items:center;gap:10px;font-family:inherit;font-size:13px;font-weight:600;max-width:90vw';
  bar.innerHTML='<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60vw">🗑 '+esc(label)+' gelöscht</span><button onclick="_delDoUndo()" style="background:rgba(255,255,255,.18);color:inherit;border:none;border-radius:99px;padding:5px 12px;font:600 12px inherit;cursor:pointer;flex-shrink:0">↶ Rückgängig</button>';
  document.body.appendChild(bar);
  setTimeout(()=>{try{const b=document.getElementById('del-undo-bar');if(b)b.remove();_delUndo=null;}catch(_){}},30000);
}
function _zielFromDb(r){return {...r,verantwortlichId:r.verantwortlich_id,zielWert:r.zielwert,leadingFreq:r.leading_freq||'daily',leadingCount:r.leading_count,vorgeschlagenVon:r.vorgeschlagen_von};}
function _tzFromDb(r){return {...r,zielId:r.ziel_id,verantwortlichId:r.verantwortlich_id,zielWert:r.zielwert,leadingFreq:r.leading_freq||'daily',leadingCount:r.leading_count,leadingDoerId:r.leading_doer_id||null,leadingDisabled:!!r.leading_disabled};}
async function _delDoUndo(){
  const u=_delUndo;_delUndo=null;
  const bar=document.getElementById('del-undo-bar');if(bar)bar.remove();
  if(!u)return;
  try{toast('↶ Wiederherstellen…');}catch(_){}
  try{
    if(u.type==='ziel'){
      if(u.ziel)await dbInsert('ziele',u.ziel);
      for(const k of (u.kpis||[]))await dbInsert('kpis',k);
      for(const t of (u.teilziele||[]))await dbInsert('teilziele',t);
      for(const a of (u.aufgaben||[])){
        await dbPatch('aufgaben',a.id,{ziel_id:a.ziel_id,teilziel_id:a.teilziel_id,typ:a.typ});
        const sa=S.aufgaben.find(x=>x.id===a.id);
        if(sa){sa.zielId=a.ziel_id;sa.teilzielId=a.teilziel_id;sa.typ=a.typ;}
      }
      if(u.ziel){
        const zR=_zielFromDb(u.ziel);
        zR.kpis=(u.kpis||[]).map(k=>({...k}));
        zR.teilziele=(u.teilziele||[]).map(_tzFromDb);
        S.ziele.push(zR);
      }
    }else if(u.type==='tz'){
      if(u.teilziel){
        await dbInsert('teilziele',u.teilziel);
        const z=zielObj(u.teilziel.ziel_id);
        if(z){z.teilziele=z.teilziele||[];z.teilziele.push(_tzFromDb(u.teilziel));}
      }
      for(const a of (u.aufgaben||[])){
        const sa=S.aufgaben.find(x=>x.id===a.id);
        if(sa)sa.teilzielId=a.teilziel_id;
      }
    }else if(u.type==='vorschlag'){
      if(u.ziel){
        await dbInsert('ziele',u.ziel);
        const zR=_zielFromDb(u.ziel);zR.kpis=[];zR.teilziele=[];
        S.ziele.push(zR);
      }
    }
    try{toast('✓ Wiederhergestellt');}catch(_){}
    rZiele();
  }catch(e){
    console.error('undo failed',e);
    try{toast('⚠ Wiederherstellen fehlgeschlagen','var(--red)');}catch(_){}
  }
}
async function delTZ(zid,tzid){
  if(!confirm(istBereich(zid)?'Themengebiet löschen?':'Monatsziel löschen?'))return;
  const z=zielObj(zid);if(!z)return;
  // v210: Snapshot vor Delete für Undo
  const tzDb=(await supa('teilziele?id=eq.'+tzid))?.[0];
  const snap={type:'tz',teilziel:tzDb,aufgaben:S.aufgaben.filter(a=>a.teilzielId===tzid).map(a=>({id:a.id,teilziel_id:a.teilzielId}))};
  z.teilziele=(z.teilziele||[]).filter(t=>t.id!==tzid);
  S.aufgaben.forEach(a=>{if(a.teilzielId===tzid)a.teilzielId=null;});
  await dbDelete('teilziele',tzid);
  _delUndo=snap;_delShowUndo(tzDb?.name||(istBereich(zid)?'Themengebiet':'Monatsziel'));
  cm();rZiele();
}
// v175 §14+: Rekalibrierungs-Aktionen. Pause = reversibel, Archiv = raus aus Standard-Views.
// Kaskade ist derived: Aufgaben-Sicht zieht tz.status, kein Schreiben auf aufgaben nötig.
async function setTZStatus(zid,tzid,newStatus){
  const z=zielObj(zid);if(!z)return;
  const tz=(z.teilziele||[]).find(t=>t.id===tzid);if(!tz)return;
  const prev=tz.status||'aktiv';
  if(prev===newStatus)return;
  tz.status=newStatus;
  try{render();}catch(_){}
  const ok=await dbPatch('teilziele',tzid,{status:newStatus});
  if(!ok){tz.status=prev;try{toast('⚠ Speichern fehlgeschlagen','var(--red)');}catch(_){}try{render();}catch(_){}return;}
  const lbl={aktiv:'▶ Reaktiviert',pausiert:'⏸ Pausiert',archiviert:'📦 Archiviert'}[newStatus]||'✓';
  try{toast(lbl+' · '+tz.name);}catch(_){}
}
function pauseTZ(zid,tzid){setTZStatus(zid,tzid,'pausiert');}
function reactivateTZ(zid,tzid){setTZStatus(zid,tzid,'aktiv');}
async function archiveTZ(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const tz=(z.teilziele||[]).find(t=>t.id===tzid);if(!tz)return;
  if(!confirm('Monatsziel archivieren?\n\n"'+tz.name+'" verschwindet aus allen Ansichten. Reversibel über Archiv-Toggle im Ziele-Tab.'))return;
  setTZStatus(zid,tzid,'archiviert');
}

async function saveZiel(zid){
  const z=S.ziele.find(x=>x.id===zid);if(!z)return;
  const name=document.getElementById('zn').value.trim()||z.name;
  const verantwortlichId=document.getElementById('zver').value||null;
  const farbe=parseInt(document.getElementById('zfarbe').value)||0;
  const vertraulich=document.getElementById('zvert')?.checked||false;
  const monat_start=document.getElementById('zms').value||null;
  const monat_ende=document.getElementById('zme').value||null;
  // v191: Strategischer Leading-Indicator auf Ziel-Ebene
  const metrik=(document.getElementById('zmetrik')?.value||'').trim()||null;
  const leadingFreq=document.getElementById('zfreq')?.value||'daily';
  const lcParsed=parseInt(document.getElementById('zlcount')?.value||'',10);
  const leadingCount=Number.isFinite(lcParsed)&&lcParsed>0?lcParsed:null;
  const zwParsed=parseInt(document.getElementById('zzw')?.value||'',10);
  const zielWert=Number.isFinite(zwParsed)&&zwParsed>0?zwParsed:null;
  // v208: Validierung — Zielzahl/Anker ohne Verb ergibt keinen funktionierenden Leading.
  // Der ganze Inheritance-Pfad (effectiveLeading) braucht metrik !== null. Sonst sehen
  // Mitarbeiter mit eigenem MZ unter diesem Ziel keinen Counter (genau Christophs Bug).
  if(!metrik&&(leadingCount||zielWert)){
    toast('⚠ Leading braucht ein Verb — sonst sehen Team-Mitglieder keinen Counter');
    document.getElementById('zmetrik')?.focus();
    return;
  }
  const isBottleneck=document.getElementById('zbn')?.checked||false;
  z.name=name;z.verantwortlichId=verantwortlichId;z.farbe=farbe;z.vertraulich=vertraulich;z.monat_start=monat_start;z.monat_ende=monat_ende;
  z.metrik=metrik;z.leadingFreq=leadingFreq;z.leadingCount=leadingCount;z.zielWert=zielWert;z.isBottleneck=isBottleneck;
  await dbPatch('ziele',zid,{name,verantwortlich_id:verantwortlichId,farbe,vertraulich,monat_start,monat_ende,metrik,leading_freq:leadingFreq,leading_count:leadingCount,zielwert:zielWert,is_bottleneck:isBottleneck});
  cm();render();
}
// v208: Phase-Override eines MZ aufs Ziel hochheben + vom MZ entfernen.
// Stellt Sam-Ovens-Way (one Leading per Strategie) wieder her.
async function _zielPromoteOverride(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const tz=(z.teilziele||[]).find(t=>t.id===tzid);if(!tz)return;
  if(!confirm('Leading-Override von "'+tz.name+'" aufs Ziel "'+z.name+'" hochheben?\n\n• Alle MZ unter diesem Ziel erben dann automatisch den Indicator.\n• Der Override am MZ wird entfernt.'))return;
  // Aufs Ziel kopieren
  z.metrik=tz.metrik;z.leadingFreq=tz.leadingFreq||'daily';z.leadingCount=tz.leadingCount;z.zielWert=tz.zielWert;
  // Vom MZ entfernen
  tz.metrik=null;tz.leadingFreq='daily';tz.leadingCount=null;tz.zielWert=null;
  await Promise.all([
    dbPatch('ziele',zid,{metrik:z.metrik,leading_freq:z.leadingFreq,leading_count:z.leadingCount,zielwert:z.zielWert}).catch(()=>{}),
    dbPatch('teilziele',tzid,{metrik:null,leading_freq:'daily',leading_count:null,zielwert:null}).catch(()=>{})
  ]);
  toast('🎯 Leading hochgehoben — alle MZ unter "'+z.name+'" erben jetzt');
  cm();editZiel(zid); // Modal mit aktualisierten Werten neu öffnen
}
async function delZiel(zid){
  if(!confirm('Ziel wirklich löschen?'))return;
  // v210: Snapshot vor Delete für Undo (inkl. KPIs, Teilziele, Aufgaben-Verknüpfungen)
  const zDb=(await supa('ziele?id=eq.'+zid))?.[0];
  const kpisDb=(await supa('kpis?ziel_id=eq.'+zid))||[];
  const tzDb=(await supa('teilziele?ziel_id=eq.'+zid))||[];
  const snap={type:'ziel',ziel:zDb,kpis:kpisDb,teilziele:tzDb,aufgaben:S.aufgaben.filter(a=>a.zielId===zid).map(a=>({id:a.id,ziel_id:a.zielId,teilziel_id:a.teilzielId,typ:a.typ}))};
  S.aufgaben.forEach(a=>{if(a.zielId===zid){a.zielId=null;a.teilzielId=null;a.typ='operativ';}});
  await supa('aufgaben?ziel_id=eq.'+zid,{method:'PATCH',body:{ziel_id:null,teilziel_id:null,typ:'operativ'},prefer:'return=minimal'});
  const z=zielObj(zid);
  if(z){
    await Promise.all((z.kpis||[]).map(k=>dbDelete('kpis',k.id)));
    await Promise.all((z.teilziele||[]).map(t=>dbDelete('teilziele',t.id)));
  }
  S.ziele=S.ziele.filter(x=>x.id!==zid);
  await dbDelete('ziele',zid);
  _delUndo=snap;_delShowUndo(zDb?.name||'Ziel');
  cm();rZiele();
}

async function saveKpi(zid,kid){
  const z=zielObj(zid);if(!z)return;const k=z.kpis.find(x=>x.id===kid);if(!k)return;
  k.label=document.getElementById('kl').value.trim()||k.label;
  k.ist=parseFloat(document.getElementById('ki').value)||0;
  k.ziel=parseFloat(document.getElementById('kz').value)||0;
  k.unit=document.getElementById('ku').value;
  k.freq=document.getElementById('kf').value;
  // pid: Typ beibehalten wie in S.personen (Number oder String), damit === Vergleiche stimmen
  const rawPid=document.getElementById('kp').value;
  k.pid=S.personen.find(p=>String(p.id)===rawPid)?.id??rawPid;
  k.inv=document.getElementById('kinv').checked;
  k.sonder=document.getElementById('ksonder').checked;
  k.typ=document.querySelector('input[name="ktyp"]:checked')?.value||'kumulativ';
  k.prio=document.getElementById('kprio')?.value||null;
  k.teilzielId=document.getElementById('kteilziel')?.value||null;
  // sonder im selben PATCH wie alles andere — kein separater Call mehr
  const kpiPatch={label:k.label,ist:k.ist,ziel:k.ziel,unit:k.unit,freq:k.freq,pid:k.pid,inv:k.inv,sonder:!!k.sonder,typ:k.typ,prio:k.prio,teilziel_id:k.teilzielId};
  await dbPatch('kpis',kid,kpiPatch);
  // _sonderSeen für neu aktivierte Sonder-KPIs initialisieren
  if(k.sonder&&_sonderSeen[kid]===undefined){
    let maxVal=0;
    Object.entries(S.kpiVals).forEach(([key,v])=>{if(key.endsWith('-'+kid)&&v.datum===TODAY)maxVal=Math.max(maxVal,v.val);});

async function delKpi(zid,kid){
  const z=zielObj(zid);if(!z)return;
  const orig=(z.kpis||[]).find(x=>x.id===kid);
  if(!orig)return;
  if(!confirm('KPI "'+orig.label+'" wirklich löschen?'))return;
  // 1. FK-Blocker räumen: kpi_vals zu dieser KPI weg (sonst schlägt DELETE kpis in Supabase fehl)
  const valsDel=await supa('kpi_vals?kpi_id=eq.'+kid,{method:'DELETE',prefer:'return=minimal'});
  // 2. KPI selbst löschen, Ergebnis prüfen (sonst kommt sie beim nächsten Poll wieder zurück)
  const ok=await dbDelete('kpis',kid);
  if(ok===null||valsDel===null){toast('⚠ KPI konnte nicht gelöscht werden (Server-Fehler). Bitte erneut versuchen.');return;}
  z.kpis=(z.kpis||[]).filter(x=>x.id!==kid);
  Object.keys(S.kpiVals||{}).forEach(key=>{if(key.endsWith('-'+kid))delete S.kpiVals[key];});
  Object.keys(S.kpiValsWeek||{}).forEach(key=>{if(key.endsWith('-'+kid))delete S.kpiValsWeek[key];});
  Object.keys(S.kpiValsMonth||{}).forEach(key=>{if(key.endsWith('-'+kid))delete S.kpiValsMonth[key];});
  // _kpiHash auf aktuellen lokalen State setzen, sonst holt der 60s-Data-Poller die grade gelöschte
  // KPI aus der (ggf. noch nicht frisch gezogenen) DB-Antwort zurück.
  try{if(typeof _kpiHashFn==='function')_kpiHash=_kpiHashFn(S.ziele.flatMap(zz=>zz.kpis||[]));}catch(e){}
  cm();render();
}

function getFriday(){
  const d=new Date();
  const day=d.getDay(); // 0=So,1=Mo,...,5=Fr,6=Sa
  const daysToFri=(5-day+7)%7; // 0=heute Fr, 1=Do, 2=Mi, 3=Di, 4=Mo, 5=So, 6=Sa
  // ≤1 Tag bis Freitag (also Donnerstag) → nächste Woche; alle anderen → diese/nächste Fri
  const add=daysToFri<=1&&daysToFri!==0?daysToFri+7:daysToFri;
  d.setDate(d.getDate()+add);
  return d.toISOString().slice(0,10);
}

async function saveNeu(){
  // Dedup-Guard: Doppel-Klicks / Doppel-Enter auf Speichern verhindern Duplikate
  if(window._savingNeu)return;
  const t=document.getElementById('nt').value.trim();if(!t)return;
  // Priorität ist Pflicht — keine „kein Prio"-Option mehr
  if(!_selPrio){toast('⚠️ Bitte Priorität wählen (P1/P2/P3)');return;}
  window._savingNeu=true;
  try{
  // Ersteller darf immer anlegen — Kapazität managed der Empfänger in seiner Inbox
  const tzSel=document.getElementById('ntz');
  const teilzielId=tzSel?tzSel.value||null:null;
  let zielId=null;
  if(teilzielId && tzSel){
    const opt=tzSel.options[tzSel.selectedIndex];
    zielId=opt?.dataset?.zielId||null;
  }
  const typ=(zielId&&!istBereich(zielId))?'strategisch':'operativ';
  // Vertraulich: GF-Checkbox oder Vererbung von Ziel/Teilziel
  let vert=document.getElementById('nvert')?document.getElementById('nvert').checked:false;
  if(!vert){
    const _tzInh=tzSel&&tzSel.value?S.ziele.flatMap(z=>z.teilziele||[]).find(t=>t.id===tzSel.value):null;
    const _zInh=zielId?S.ziele.find(z=>z.id===zielId):null;
    if(_tzInh?.vertraulich||_zInh?.vertraulich)vert=true;
  }
  let pid=document.getElementById('np').value;
  // @mention Erkennung: @vorname → Person zuweisen
  const mentionMatch=t.match(/@(\w+)/i);
  if(mentionMatch){
    const mName=mentionMatch[1].toLowerCase();
    const matched=S.personen.find(p=>p.name.toLowerCase().startsWith(mName)||p.name.split(' ')[0].toLowerCase()===mName);
    if(matched){pid=matched.id;document.getElementById('np').value=pid;}
  }
  const id=nid('a');
  const parentId=window._neuParentId||null;
  const rec={id,pid,titel:t,typ,status:pid!==aP?'zugewiesen':(_selPrio?'backlog':'neu'),prio:_selPrio||null,
    ziel_id:zielId,teilziel_id:teilzielId,parent_id:parentId,
    geplant:parseFloat(document.getElementById('nh').value)||1,
    gebucht:0,dl:document.getElementById('ndl').value||null,
    dl_type:(document.getElementById('dltype-bis')?.dataset.v==='bis')?'bis':'am',
    dl_uhrzeit:document.getElementById('ndluhr')?.value||null,
    event_id:window._pendingEventId||null,
    ua:window._neuSteps||[],notiz:document.getElementById('nno').value.trim(),akt_seit:null,vertraulich:vert,
    recurring:document.getElementById('nrec')?.value||null,
    erstellt_von:aP,
    wochenreset_id:window._neuWochenresetId||null,
    big3_slot:window._neuBig3Slot||null};
  window._neuParentId=null;
  window._neuWochenresetId=null;
  window._neuBig3Slot=null;
  window._pendingEventId=null;
  S.aufgaben.push(normalizeAufgabe(rec));
  await dbInsert('aufgaben',rec);
  // P1 immer in Kalender, P2/P3 nur mit Deadline
  if(rec.prio==='P1'||rec.dl)gcalCreateEvent(rec);
  if(pid!==aP){const tp=person(pid);notify('aufgabe_zugewiesen',{aufgabe:t,fuer:{id:pid,name:tp?tp.name:'?',slack_id:tp?.slack_id||''},prio:rec.prio,dl:rec.dl});}
  // Paddel-Hint: beim Anlegen ohne Monatsziel-Zuordnung warnen (auch für delegierte Tasks)
  if(!teilzielId){
    const msg = pid===aP
      ? '💡 Ohne Monatsziel zählt diese Aufgabe nicht für deinen Paddel-Score'
      : '💡 Ohne Monatsziel zählt diese Aufgabe nicht für '+((person(pid)?.name||'').split(' ')[0]||'den Zugewiesenen')+'s Paddel-Score';
    setTimeout(()=>toast(msg),200);
  }
  cm();render();
  // Feedback wenn aus Idee/Wolke erstellt
  if(window._fromSignalId){
    const sid=window._fromSignalId;window._fromSignalId=null;
    const sig=S.signale.find(x=>String(x.id)===String(sid));
    if(sig){sig._aufgabe_erstellt=true;render();}
    const typ=sig?.typ==='idee'?'Idee':'Wolke';
    const wem=rec.pid!==aP?(person(rec.pid)?.name.split(' ')[0]||''):'dir';
    toast('✓ Aufgabe aus '+typ+' erstellt'+(rec.pid!==aP?' → Inbox von '+wem:''));
  }
  }finally{window._savingNeu=false;}
}

async function vergabePaddel(pid){
  if(!isGF())return;
  const{kw,jahr}=getKW();
  const pts=getPaddelCount(pid);
  const p=person(pid);if(!p)return;
  const bereitsVergeben=(S.paddelGewinner||[]).find(g=>g.kw===kw&&g.jahr===jahr);
  if(bereitsVergeben){toast('⚠️ Paddel KW '+kw+' bereits vergeben an '+(person(bereitsVergeben.pid)?.name||'?'));return;}
  const rec={id:p.id+'-'+kw+'-'+jahr,pid:p.id,kw,jahr,punkte:pts};
  const res=await dbInsert('paddel_gewinner',rec);
  if(!res){toast('❌ Fehler beim Speichern — bitte nochmal versuchen');return;}
  S.paddelGewinner=[...(S.paddelGewinner||[]),rec];
  notify('paddel_vergeben',{name:p.name,kw,punkte:pts});
  render();
  showPaddelCelebration(p.id);
  toast('🏆 Paddel KW '+kw+' → '+esc(p.name)+'!');
}
function copyCardLink(id){
  const url=location.origin+location.pathname+'#card='+id;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>toast('🔗 Link kopiert!'));}
  else{const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('🔗 Link kopiert!');}
}
function checkDeepLink(){
  const hash=location.hash;
  if(!hash||!hash.startsWith('#card='))return;
  const id=hash.slice(6);
  // Determine tab: DR ids start with 'dr', meeting ids start with 'mt' or 'me'
  const tab=id.startsWith('dr')?'team':id.startsWith('mt')||id.startsWith('me')?'team':'team';
  nav(tab);
  setTimeout(()=>{
    const el=document.getElementById('card-'+id);
    if(!el)return;
    el.scrollIntoView({behavior:'smooth',block:'center'});
    el.style.transition='outline .1s';
    el.style.outline='3px solid var(--gold)';
    el.style.borderRadius='12px';
    setTimeout(()=>{el.style.outline='';},2000);
  },400);
}

async function saveTeam(tid){
  const name=document.getElementById('tn').value.trim();if(!name)return;
  const checked=[...document.querySelectorAll('#mb input[type=checkbox]:checked')].map(c=>c.value);
  if(tid){
    const t=S.teams.find(x=>x.id===tid);if(!t)return;
    const old=[...t.members];t.name=name;t.members=checked;
    S.personen.forEach(p=>{
      const was=old.includes(p.id),is=checked.includes(p.id);
      if(was&&!is)p.teams=(p.teams||[]).filter(x=>x!==tid);
      if(!was&&is){p.teams=p.teams||[];if(!p.teams.includes(tid))p.teams.push(tid);}
    });
    await dbPatch('teams',tid,{name,members:checked});
  } else {
    const id=nid('t'),rec={id,name,members:checked};
    S.teams.push(rec);await dbInsert('teams',rec);
    checked.forEach(pid=>{const p=person(pid);if(p&&!(p.teams||[]).includes(id)){p.teams=p.teams||[];p.teams.push(id);}});
  }
  await Promise.all(S.personen.map(p=>dbPatch('personen',p.id,{teams:p.teams})));
  openSettings();render();
}

function buildProfilText(s){
  let parts=[];
  if(s.ketten.length){const labels=s.ketten.map(k=>{const c=KETTE_CHIPS.find(x=>x.k===k);return c?c.icon+' '+c.label:k;});parts.push('Position in der Wertschöpfungskette: '+labels.join(', '));}

  if(timIv)clearInterval(timIv);

    document.querySelectorAll('[data-tid]').forEach(el=>{
      const a=S.aufgaben.find(x=>x.id===el.dataset.tid);if(!a)return;
      const s=elapsedSec(a),pct=Math.min(100,Math.round(s/((a.geplant||1)*3600)*100));
      const n=el.querySelector('.tn'),f=el.querySelector('.tf');
      if(n)n.textContent=fmt(s);if(f)f.style.width=pct+'%';
    });
    const now=new Date();
    const hh=('0'+now.getHours()).slice(-2),mm=('0'+now.getMinutes()).slice(-2);
    const clock=document.getElementById('live-clock');
    if(clock)clock.textContent=hh+':'+mm;
    if(aP){
      const p=me();if(p){
        const fs=p.fokus_start||'09:00',fe=p.fokus_end||'11:00';
        const [fsh,fsm]=fs.split(':').map(Number),[feh,fem]=fe.split(':').map(Number);
        const nowMin=now.getHours()*60+now.getMinutes();
        const inFokus=nowMin>=fsh*60+fsm&&nowMin<feh*60+fem;
        const banner=document.getElementById('fokus-banner'),label=document.getElementById('fokus-label');
        if(banner&&label){banner.style.display=inFokus?'flex':'none';if(inFokus)label.textContent='Fokuszeit bis '+fe+' — bitte nicht stören';}
      }
    }
  },1000);
}

async function mdUploadAudio(input){
  const file=input.files[0];if(!file)return;
  const status=document.getElementById('md-status');
  const sizeMB=(file.size/1024/1024).toFixed(1);
  status.innerHTML='<div style="padding:10px;color:var(--amber);font-size:12px;display:flex;align-items:center;gap:6px"><span style="display:inline-block;animation:spin 1s linear infinite">⟳</span> Transkribiere Audio mit Whisper… ('+sizeMB+' MB)</div>';
  const whisperUrl=localStorage.getItem('n8n_whisper');
  if(!whisperUrl){
    status.innerHTML='<div style="padding:10px;color:var(--red);font-size:12px">⚠️ Whisper-URL nicht konfiguriert. Bitte in Einstellungen (⚙) unter „n8n Whisper URL" eintragen.</div>';
    return;
  }
  try{
    const fd=new FormData();fd.append('file',file);
    const resp=await fetch(whisperUrl,{method:'POST',body:fd});
    if(!resp.ok){status.innerHTML='<div style="padding:10px;color:var(--red);font-size:12px">⚠️ Whisper-Fehler (HTTP '+resp.status+'). Prüfe den Workflow in n8n.</div>';return;}
    const data=await resp.json();
    const transcript=data.transcript||data.text||data.result||'';
    if(transcript){
      document.getElementById('md-text').value=transcript;
      status.innerHTML='<div style="padding:10px;color:var(--green);font-size:12px">✅ Transkription fertig — '+transcript.split(/\s+/).length+' Wörter. Jetzt „Aufgaben extrahieren" klicken.</div>';

function formatAuditDate(){
  return new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});
}

function mdRekaliExtractPersons(transkript){
  if(!transkript||!S.personen?.length)return [];
  const t=transkript.toLowerCase();
  const matched=[];
  S.personen.forEach(p=>{
    if(!p.name)return;
    const vorname=p.name.trim().split(/\s+/)[0].toLowerCase();
    if(!vorname||vorname.length<2)return;
    // Wortgrenzen beachten — kein Match innerhalb längerer Wörter
    const re=new RegExp('\\b'+vorname.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i');
    if(re.test(t))matched.push(p.id);
  });
  if(matched.length===0){
    // Fallback: alle Personen
    return S.personen.map(p=>p.id);
  }
  return matched;
}

function mdRekaliBuildContext(){
  const transkript=(_mdTranscript||document.getElementById('md-text')?.value||'').trim();
  const personIds=mdRekaliExtractPersons(transkript);
  const personenMap={};
  personIds.forEach(pid=>{
    const p=S.personen.find(x=>x.id===pid);
    if(p)personenMap[pid]=p.name;
  });
  const offeneStatus=['neu','backlog','aktiv','zugewiesen'];
  let aufgaben=(S.aufgaben||[]).filter(a=>
    offeneStatus.includes(a.status)&&personIds.includes(a.pid)
  );
  // Cap bei 100 — Prio-sortiert (P1 zuerst), dann nach erstellt_am (neueste zuerst)
  if(aufgaben.length>100){
    const prioRank={P1:1,P2:2,P3:3};
    aufgaben=aufgaben.sort((a,b)=>{
      const pa=prioRank[a.prio]||9,pb=prioRank[b.prio]||9;
      if(pa!==pb)return pa-pb;
      const da=a.erstellt_am||a.created_at||'',db=b.erstellt_am||b.created_at||'';
      return db.localeCompare(da);
    }).slice(0,100);
  }
  const aufgabenPayload=aufgaben.map(a=>({
    id:a.id,titel:a.titel||'',prio:a.prio||null,pid:a.pid||null,ziel_id:a.ziel_id||null
  }));
  // Zusätzlich: aus diesem Meeting neu extrahierte Aufgaben als Kontext
  const neuAusMeeting=(_mdTasks||[]).filter(t=>(t.typ||'aufgabe')==='aufgabe').map(t=>({
    titel:t.titel||'',pid:t.pid||null,prio:t.prio||null,kontext:t.kontext||''
  }));
  return {transkript,aufgaben:aufgabenPayload,personenMap,neuAusMeeting};
}

async function mdRekaliStart(){
  if(_mdRekali?.status==='loading')return;
  const transkript=(_mdTranscript||document.getElementById('md-text')?.value||'').trim();
  if(!transkript){toast('Kein Transkript vorhanden');return;}
  _mdRekali={status:'loading',vorschlaege:[],fehler:null};
  mdRekaliRender();
  try{
    const ctx=mdRekaliBuildContext();
    if(!ctx.aufgaben.length){
      _mdRekali={status:'empty',vorschlaege:[],fehler:null};
      mdRekaliRender();
      return;
    }
    const sys='Du bist ein Priorisierungs-Berater für das Team-OS Halleluja (Sauna-Firma).\n\n'
      +'Du bekommst: ein Meeting-Transkript, bestehende offene Aufgaben der erwähnten Personen, '
      +'und optional neu aus dem Meeting extrahierte Aufgaben als Kontext.\n\n'
      +'Aufgabe: Identifiziere bestehende Aufgaben, deren Priorität angepasst werden sollte, '
      +'basierend auf konkreten Aussagen im Transkript.\n\n'
      +'Regeln:\n'
      +'- Nur belegbare Änderungen vorschlagen — keine Vermutungen.\n'
      +'- Prio-Werte sind P1 (hoch), P2 (mittel), P3 (niedrig).\n'
      +'- Jede Änderung braucht eine max 200 Zeichen lange Begründung, direkt aus dem Transkript.\n'
      +'- Wenn keine Änderungen gerechtfertigt: leeres vorschlaege-Array.\n'
      +'- Nur EINE Änderung pro Aufgaben-ID (keine Duplikate).\n'
      +'- Antwort NUR als JSON, kein Fließtext, kein Markdown-Codeblock.\n\n'
      +'Format:\n{"vorschlaege":[{"targetId":"<id>","neuPrio":"P1|P2|P3","grund":"<max 200 Zeichen>"}]}';
    let userMsg='TRANSKRIPT:\n'+ctx.transkript+'\n\n';
    if(ctx.neuAusMeeting&&ctx.neuAusMeeting.length){
      userMsg+='NEU AUS DIESEM MEETING EXTRAHIERT (Kontext):\n'+JSON.stringify(ctx.neuAusMeeting)+'\n\n';
    }
    userMsg+='BESTEHENDE OFFENE AUFGABEN (der erwähnten Personen):\n'+JSON.stringify(ctx.aufgaben)+'\n\n';
    userMsg+='PERSONEN-MAP:\n'+JSON.stringify(ctx.personenMap)+'\n\n';
    userMsg+='Heute: '+TODAY;
    const resp=await fetch('https://halleluja-app.germanywestcentral.cloudapp.azure.com/n8n/webhook/ki-proxy',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:sys,messages:[{role:'user',content:userMsg}]})
    });
    if(!resp.ok)throw new Error('KI-Proxy HTTP '+resp.status);
    const data=await resp.json();
    const raw=data.content?.map(c=>c.text||'').join('')||'';
    let parsed;
    try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch(e){throw new Error('KI-Antwort nicht lesbar');}
    if(!parsed||!Array.isArray(parsed.vorschlaege)){
      throw new Error('KI-Antwort unvollständig');
    }
    // Validierung
    const seenIds=new Set();
    const validated=[];
    parsed.vorschlaege.forEach((v,idx)=>{
      if(!v||!v.targetId)return;
      if(seenIds.has(v.targetId))return;
      const a=S.aufgaben.find(x=>x.id===v.targetId);
      if(!a)return;
      if(!['P1','P2','P3'].includes(v.neuPrio))return;
      if(!v.grund||typeof v.grund!=='string')return;
      if(v.grund.length>400)return;
      // Überspringe "Änderungen" die keine sind (gleiche Prio)
      if(a.prio===v.neuPrio)return;
      seenIds.add(v.targetId);
      validated.push({
        id:'r_'+Date.now()+'_'+idx,
        targetId:v.targetId,
        altPrio:a.prio||null,
        neuPrio:v.neuPrio,
        grund:v.grund.slice(0,200),
        userStatus:'offen'
      });
    });
    _mdRekali={status:'ready',vorschlaege:validated,fehler:null};
    mdRekaliRender();
  }catch(e){
    console.error('mdRekaliStart error:',e);
    _mdRekali={status:'error',vorschlaege:[],fehler:e.message||'Unbekannter Fehler'};
    toast('⚠ Rekalibrierung fehlgeschlagen');
    mdRekaliRender();
  }
}

async function mdRekaliAccept(vorschlagId){
  if(!_mdRekali||!_mdRekali.vorschlaege)return;
  const v=_mdRekali.vorschlaege.find(x=>x.id===vorschlagId);
  if(!v)return;
  if(v.userStatus!=='offen'&&v.userStatus!=='bearbeitet')return;
  const a=(S.aufgaben||[]).find(x=>x.id===v.targetId);
  if(!a){
    toast('Aufgabe wurde inzwischen gelöscht');
    v.userStatus='abgelehnt';
    mdRekaliRender();
    return;
  }
  const grundKurz=(v.grund||'').slice(0,120);
  const auditLine='📝 '+formatAuditDate()+' Prio '+(v.altPrio||'—')+'→'+v.neuPrio+' (Meeting: '+grundKurz+')';
  const neueNotiz=a.notiz?auditLine+'\n---\n'+a.notiz:auditLine;
  // Optimistisches Update
  const prev={prio:a.prio,notiz:a.notiz};
  const prevStatus=v.userStatus;
  a.prio=v.neuPrio;
  a.notiz=neueNotiz;
  v.userStatus=v.userStatus==='bearbeitet'?'bearbeitet':'bestaetigt';
  mdRekaliRender();
  const ok=await dbPatch('aufgaben',v.targetId,{prio:v.neuPrio,notiz:neueNotiz});
  if(!ok){
    // Rollback
    a.prio=prev.prio;
    a.notiz=prev.notiz;
    v.userStatus=prevStatus;
    toast('⚠ Speichern fehlgeschlagen — bitte nochmal versuchen');
    mdRekaliRender();
  }
}

function mdRekaliReject(vorschlagId){
  if(!_mdRekali||!_mdRekali.vorschlaege)return;
  const v=_mdRekali.vorschlaege.find(x=>x.id===vorschlagId);
  if(!v)return;
  if(v.userStatus!=='offen')return;
  v.userStatus='abgelehnt';
  mdRekaliRender();
}

async function mdRekaliEditApply(vorschlagId){
  if(!_mdRekali||!_mdRekali.vorschlaege)return;
  const v=_mdRekali.vorschlaege.find(x=>x.id===vorschlagId);
  if(!v)return;
  const sel=document.getElementById('md-rekali-edit-'+vorschlagId);
  if(!sel)return;
  const neuerWert=sel.value;
  if(!['P1','P2','P3'].includes(neuerWert))return;

function mdRekaliGateCheck(){
  if(!_mdRekali)return true;
  if(!_mdRekali.vorschlaege||_mdRekali.vorschlaege.length===0)return true;
  return _mdRekali.vorschlaege.every(v=>v.userStatus!=='offen');
}

async function mdConfirm(){
  // Rekali-Gate: offene Vorschlaege muessen entschieden sein
  if(!mdRekaliGateCheck()){
    const offen=(_mdRekali?.vorschlaege||[]).filter(v=>v.userStatus==='offen').length;
    toast('⚠ '+offen+' Rekalibrierungs-Vorschlag'+(offen===1?'':'e')+' offen — bitte zuerst entscheiden');
    return;
  }
  const toCreate=[];
  _mdTasks.forEach((t,i)=>{
    const chk=document.getElementById('md-chk-'+i);if(!chk||!chk.checked)return;
    const titel=document.getElementById('md-titel-'+i)?.value.trim();if(!titel)return;
    const typ=document.getElementById('md-typ-'+i)?.value||(t.typ||'aufgabe');
    const pid=document.getElementById('md-pid-'+i)?.value||null;
    const prio=document.getElementById('md-prio-'+i)?.value||null;
    const dl=document.getElementById('md-dl-'+i)?.value||null;
    const zielSel=document.getElementById('md-ziel-'+i);
    const ziel_id=(zielSel?zielSel.value:'')||t.ziel_id||null;
    toCreate.push({titel,typ,pid,prio,dl,ziel_id,kontext:t.kontext||''});
  });
  if(!toCreate.length)return;
  const m=document.getElementById('mb');
  m.innerHTML='<div class="mt">📝 Meeting Dump</div>'
    +'<div style="text-align:center;padding:40px">'
    +'<div style="font-size:14px;color:var(--purple);font-weight:600">⟳ Lege '+toCreate.length+' Items an…</div>'
    +'<div id="md-progress" style="margin-top:12px;font-size:12px;color:var(--t3)">0 / '+toCreate.length+'</div>'
    +'</div>';
  let cntA=0,cntW=0,cntM=0,cntQ=0;
  const wr=dieseWocheReset(aP);
  let wrSlot=[wr?.big3_1,wr?.big3_2,wr?.big3_3].filter(Boolean).length;
  const wrPatch={};
  for(const t of toCreate){
    if(t.typ==='aufgabe'||!t.typ){
      const pid=t.pid||aP;const isOther=pid!==aP;
      const id=nid('a');
      const rec={id,pid,titel:t.titel,typ:t.ziel_id?'strategisch':'operativ',
        status:isOther?'zugewiesen':(t.prio?'backlog':'neu'),
        prio:t.prio,ziel_id:t.ziel_id,teilziel_id:null,
        geplant:1,gebucht:0,dl:t.dl,dl_type:t.dl?'bis':null,
        ua:[],notiz:t.kontext?'Meeting: '+t.kontext:null,
        akt_seit:null,vertraulich:false,erstellt_von:aP,
        inbox_status:(isOther||(!t.ziel_id&&!t.prio))?'neu':null};
      S.aufgaben.push(normalizeAufgabe(rec));
      await dbInsert('aufgaben',rec);
      if(isOther){const tp=person(pid);if(tp?.slack_id)notify('aufgabe_zugewiesen',{aufgabe:t.titel,fuer:{id:pid,name:tp.name,slack_id:tp.slack_id},prio:t.prio,dl:t.dl});}
      cntA++;
    }else if(t.typ==='wochenziel'){
      if(wr&&wrSlot<3){
        const slot='big3_'+(wrSlot+1);
        wrPatch[slot]=t.titel;
        wr[slot]=t.titel;
        wrSlot++;cntW++;
      }else{
        // Kein Wochenplan oder voll → als Aufgabe P1
        const pid=t.pid||aP;const id=nid('a');
        const rec={id,pid,titel:t.titel,typ:'operativ',status:'backlog',prio:'P1',
          ziel_id:null,teilziel_id:null,geplant:1,gebucht:0,dl:t.dl||getFriday(),
          dl_type:'bis',ua:[],notiz:t.kontext?'Meeting: '+t.kontext:null,
          akt_seit:null,vertraulich:false,erstellt_von:aP,inbox_status:null};
        S.aufgaben.push(normalizeAufgabe(rec));
        await dbInsert('aufgaben',rec);cntA++;
      }
    }else if(t.typ==='monatsziel'){
      const id=nid('tz');
      const rec={id,ziel_id:t.ziel_id||null,name:t.titel,datum:t.dl||null,
        status:'aktiv',erledigt:false,erstellt_von:aP,erstellt_am:new Date().toISOString()};
      if(!S.ziele.find(z=>z.id===t.ziel_id)){rec.ziel_id=null;}
      // Push to local state
      const z=S.ziele.find(z=>z.id===rec.ziel_id);
      if(z){z.teilziele=z.teilziele||[];z.teilziele.push(rec);}
      await dbInsert('teilziele',rec);cntM++;
    }else if(t.typ==='quartalsziel'){
      const id=nid('z');
      const rec={id,name:t.titel,status:'aktiv',erledigt:false,
        datum:t.dl||null,farbe:0,
        erstellt_von:aP,erstellt_am:new Date().toISOString(),teilziele:[]};
      S.ziele.push(rec);
      await dbInsert('ziele',rec);cntQ++;
    }
    const prog=document.getElementById('md-progress');
    if(prog)prog.textContent=(cntA+cntW+cntM+cntQ)+' / '+toCreate.length;
  }
  // Flush Wochenziel-Patches
  if(wr&&Object.keys(wrPatch).length){
    Object.assign(wr,wrPatch);
    await dbPatch('wochenresets',wr.id,wrPatch);
  }
  const summary=[];

async function saveOffeneFrage(){
  const frage=document.getElementById('of-frage').value.trim();
  if(!frage){toast('Bitte Frage eingeben');return;}
  const typ=document.querySelector('input[name="of-typ"]:checked')?.value||'entscheidung';
  const sicht=document.getElementById('of-sicht-team')?.checked?'team':'gf_only';
  const anPersonId=document.getElementById('of-an').value||null;
  const deadline=document.getElementById('of-deadline').value||null;
  const rec={
    id:nid('dr'),
    frage,
    typ,
    kontext:document.getElementById('of-kontext').value.trim()||null,
    blockiert:document.getElementById('of-blockiert').value.trim()||null,
    prioritaet:document.getElementById('of-prio').value,
    deadline:deadline||null,
    sichtbarkeit:sicht,
    erstellt_von:aP,
    an_person_id:anPersonId,
    erstellt_am:new Date().toISOString(),
    status:'offen'
  };
  // Kein optimistic insert — erst DB prüfen, dann UI
  const result=await dbInsert('decision_requests',rec);
  if(!result){
    toast('⚠️ Speichern fehlgeschlagen — DB-Migration ausgeführt? (Supabase → SQL Editor)');
    return;
  }
  const saved=Array.isArray(result)&&result[0]?result[0]:rec;
  S.decisionRequests.unshift(saved);
  const anP=S.personen.find(p=>p.id===anPersonId);
  const gfSlackIds=S.personen.filter(p=>p.stufe==='gf'&&p.id!==aP&&p.id!==anPersonId&&p.slack_id).map(p=>p.slack_id);
  notify('entscheidung_angefragt',{frage:saved.frage,typ,prioritaet:saved.prioritaet,deadline:saved.deadline,blockiert:saved.blockiert,an_slack_id:anP?.slack_id||'',gf_slack_ids:gfSlackIds,actor_slack_id:me()?.slack_id||''});
  cm();render();
  toast('✅ Frage gestellt'+(anP?' → '+anP.name.split(' ')[0]:''));
}

async function saveDecisionAnswer(id){
  const d=S.decisionRequests.find(x=>x.id===id);if(!d)return;
  const beschluss=document.getElementById('dr-beschluss').value.trim();
  const warum=document.getElementById('dr-warum').value.trim();
  if(!beschluss){toast('Bitte Beschluss eingeben');return;}
  if(!warum){toast('Warum ist Pflicht — Dalio-Prinzip');return;}
  const now=new Date().toISOString();
  d.status='entschieden';d.beschluss=beschluss;d.warum=warum;d.beantwortet_am=now;d.beantwortet_von=aP;
  await dbPatch('decision_requests',id,{status:'entschieden',beschluss,warum,beantwortet_am:now,beantwortet_von:aP});
  // Ersteller benachrichtigen
  const von=S.personen.find(p=>p.id===d.erstellt_von);
  if(von?.slack_id)notify('entscheidung_getroffen',{frage:d.frage,beschluss,warum,an_slack_id:von.slack_id,actor_slack_id:me()?.slack_id||''});
  cm();render();
  toast('✅ Beschluss gespeichert');
}
async function forwardDecisionRequest(id){
  const d=S.decisionRequests.find(x=>x.id===id);if(!d)return;
  const anId=document.getElementById('dr-wl-an').value;
  if(!anId){toast('Bitte Person wählen');return;}
  const notiz=document.getElementById('dr-wl-notiz')?.value.trim()||null;
  d.an_person_id=anId;
  if(notiz)d.kontext=(d.kontext?d.kontext+'\n\n':'')+'Weitergeleitet von '+(me()?.name||'?')+': '+notiz;
  await dbPatch('decision_requests',id,{an_person_id:anId,...(notiz?{kontext:d.kontext}:{})});
  const anP=S.personen.find(p=>p.id===anId);
  if(anP?.slack_id)notify('entscheidung_weitergeleitet',{frage:d.frage,notiz,an_slack_id:anP.slack_id,actor_slack_id:me()?.slack_id||''});
  cm();render();

}

async function zuPipeline(drId){
  const d=S.decisionRequests.find(x=>x.id===drId);if(!d||d._busy)return;
  d._busy=true;
  const prev=d.status;
  d.status='pipeline';d.pipeline_seit=TODAY;
  render();
  const ok=await dbPatch('decision_requests',drId,{status:'pipeline',pipeline_seit:TODAY});
  if(!ok){d.status=prev;d.pipeline_seit=null;render();toast('⚠️ Speichern fehlgeschlagen');}
  else{
    const von=person(d.erstellt_von);
    const anP=d.an_person_id?person(d.an_person_id):null;
    notify('frage_zu_pipeline',{frage:d.frage,von_name:von?.name||'',typ:d.typ||'entscheidung',an_slack_id:anP?.slack_id||'',actor_slack_id:me()?.slack_id||''});
    toast('⏳ Zur Meeting-Pipeline hinzugefügt');
  }
  d._busy=false;
}

async function saveMeeting(){
  const titel=document.getElementById('mf-titel').value.trim();
  if(!titel){toast('Bitte Titel eingeben');return;}
  const datum=document.getElementById('mf-datum').value||null;
  const uhrzeit=document.getElementById('mf-uhrzeit').value||null;
  const teilnehmerIds=[...document.querySelectorAll('input[name="mt-teil"]:checked')].map(el=>el.value);
  const selectedFragen=[...document.querySelectorAll('input[name="mt-frage"]:checked')].map(el=>el.value);
  // Auto-Teilnehmer: Ersteller + Empfänger aller angehakten Fragen automatisch hinzufügen
  const teilnSet=new Set(teilnehmerIds);
  teilnSet.add(aP); // Ersteller des Meetings immer dabei
  for(const drId of selectedFragen){
    const d=S.decisionRequests.find(x=>x.id===drId);if(!d)continue;
    if(d.erstellt_von)teilnSet.add(d.erstellt_von);
    if(d.an_person_id)teilnSet.add(d.an_person_id);
  }
  const finalTeiln=[...teilnSet];
  const meetId=nid('mt');
  const rec={id:meetId,titel,datum,uhrzeit,teilnehmer_ids:finalTeiln,meet_link:null,gcal_event_id:null,aufnahme_link:null,status:'geplant',erstellt_von:aP,erstellt_am:new Date().toISOString()};
  S.meetings.unshift(rec);
  await dbInsert('meetings',rec);
  for(const drId of selectedFragen){
    const d=S.decisionRequests.find(x=>x.id===drId);if(!d)continue;
    d.status='in_meeting';d.meeting_id=meetId;
    await dbPatch('decision_requests',drId,{status:'in_meeting',meeting_id:meetId});
  }
  const teilnNames=finalTeiln.map(id=>person(id)?.name||'').filter(Boolean);
  notify('meeting_erstellt',{titel,datum,teilnehmer_names:teilnNames,fragen_count:selectedFragen.length,actor_slack_id:me()?.slack_id||''});
  cm();
  if(gcalIsConnected())gcalCreateMeetingEvent(rec);
  render();toast('🗓 Meeting erstellt');
}
async function gcalCreateMeetingEvent(meeting){
  if(!gcalIsConnected())return;
  const token=localStorage.getItem('gcal_token');
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'Europe/Vienna';
  const dateStr=meeting.datum||TODAY;
  const timeStr=(meeting.uhrzeit||'10:00').slice(0,5)+':00';
  const startD=new Date(dateStr+'T'+timeStr);
  const endD=new Date(startD.getTime()+60*60*1000);
  const body={
    summary:'🗓 '+meeting.titel,
    description:'Halleluja OS Meeting',
    start:{dateTime:startD.toISOString(),timeZone:tz},
    end:{dateTime:endD.toISOString(),timeZone:tz},
    conferenceData:{createRequest:{requestId:meeting.id,conferenceSolutionKey:{type:'hangoutsMeet'}}}
  };
  try{
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?conferenceDataVersion=1',
      {method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(resp.ok){
      const d=await resp.json();
      const meetLink=d.conferenceData?.entryPoints?.find(e=>e.entryPointType==='video')?.uri||null;
      const gcalId=d.id||null;
      const m=S.meetings.find(x=>x.id===meeting.id);
      if(m){m.meet_link=meetLink;m.gcal_event_id=gcalId;}
      if(gcalId)await dbPatch('meetings',meeting.id,{meet_link:meetLink,gcal_event_id:gcalId});
      if(meetLink){render();toast('📅 Meet-Link erstellt');}
    }else if(resp.status===401){localStorage.removeItem('gcal_token');}
  }catch(e){console.warn('gcalCreateMeetingEvent:',e);}

async function drLoeschen(drId){

}

// ─── Google Calendar Integration ───────────────────────────────
function gcalIsConnected(){
  if(localStorage.getItem('gcal_ever_connected')!=='1')return false;
  const token=localStorage.getItem('gcal_token');
  const expiry=parseInt(localStorage.getItem('gcal_token_expiry')||'0');
  return !!(token&&Date.now()<expiry);
}
const GCAL_DEFAULT_CLIENT_ID='72621178595-l3kjb0a7u8khba1dt61lgu5gfs0daorb.apps.googleusercontent.com';
const GCAL_SCOPE='https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events';
let _gcalTokenClient=null;

function _gcalInitClient(onSuccess,silent=false){
  const clientId=(localStorage.getItem('gcal_client_id')||GCAL_DEFAULT_CLIENT_ID).trim();
  if(!window.google?.accounts?.oauth2){
    if(!silent)toast('GCal: Bitte kurz warten und nochmal versuchen');
    return;
  }
  _gcalTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:clientId,
    scope:GCAL_SCOPE,
    prompt:silent?'':'consent',
    callback:(resp)=>{
      if(resp.access_token){
        localStorage.setItem('gcal_token',resp.access_token);
        localStorage.setItem('gcal_token_expiry',String(Date.now()+(resp.expires_in||3600)*1000));
        localStorage.setItem('gcal_ever_connected','1'); // persistent flag
        if(!silent)toast('✅ Google Kalender verbunden');
        gcalFetchToday();render();
      } else if(!silent){
        toast('GCal: Verbindung fehlgeschlagen');
      }
    },
    error_callback:(err)=>{
      if(!silent)toast('GCal: '+( err?.type||'Fehler'));
    }
  });
  _gcalTokenClient.requestAccessToken({prompt:silent?'none':undefined});
}

function gcalConnect(){_gcalInitClient(null,false);}

function gcalSilentRefresh(){
  // GIS-Library noch nicht geladen → warten und nochmal versuchen
  if(!window.google?.accounts?.oauth2){
    setTimeout(gcalSilentRefresh,1000);
    return;
  }
  _gcalInitClient(null,true);
}

function gcalDisconnect(){
  localStorage.removeItem('gcal_token');
  localStorage.removeItem('gcal_token_expiry');
  localStorage.removeItem('gcal_ever_connected');
  S.kalender=[];
  if(window._gcalNotifIv)clearInterval(window._gcalNotifIv);
  if(window.google?.accounts?.oauth2&&_gcalTokenClient){
    try{google.accounts.oauth2.revoke(localStorage.getItem('gcal_token')||'',()=>{});}catch(e){}
  }
  toast('Google Kalender getrennt');
  render();
}

function gcalHandleCallback(){
  // Legacy-Handler für alten Implicit-Flow-Redirect (falls noch im Hash)
  if(!location.hash.includes('access_token'))return;
  const params=new URLSearchParams(location.hash.replace(/^#/,''));
  const token=params.get('access_token');
  const expiresIn=parseInt(params.get('expires_in')||'3600');
  if(token){
    localStorage.setItem('gcal_token',token);
    localStorage.setItem('gcal_token_expiry',String(Date.now()+expiresIn*1000));
    history.replaceState(null,'',location.pathname);
    toast('✅ Google Kalender verbunden');
  }
}
async function gcalFetchToday(){
  const expiry=parseInt(localStorage.getItem('gcal_token_expiry')||'0');
  // Token abgelaufen → erst still erneuern, dann weitermachen
  if(Date.now()>expiry&&localStorage.getItem('gcal_token')){
    gcalSilentRefresh();return; // gcalSilentRefresh ruft gcalFetchToday nach Erfolg
  }
  const token=localStorage.getItem('gcal_token');
  if(!token){S.kalender=[];return;}
  const d=new Date();
  const start=new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0).toISOString();
  // 7-Tage-Fenster: heute 00:00 bis heute+6 23:59 — für Tages- UND Wochenansicht
  const endD=new Date(d.getFullYear(),d.getMonth(),d.getDate()+6,23,59,59);
  const end=endD.toISOString();
  try{
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events'
      +'?timeMin='+encodeURIComponent(start)
      +'&timeMax='+encodeURIComponent(end)
      +'&singleEvents=true&orderBy=startTime&maxResults=100',
      {headers:{Authorization:'Bearer '+token}});
    if(resp.status===401){
      // Token ungültig → still erneuern statt rauswerfen
      localStorage.removeItem('gcal_token');
      gcalSilentRefresh();
      return;
    }
    const data=await resp.json();
    window._gcalEvtMap={};
    S.kalender=(data.items||[])
      .filter(e=>e.start&&e.start.dateTime)
      .map((e,i)=>{
        const ev={id:'ge_'+i,gId:e.id,titel:e.summary||'(Kein Titel)',beschreibung:e.description||'',ort:e.location||'',start:new Date(e.start.dateTime),end:new Date(e.end.dateTime)};
        window._gcalEvtMap[ev.id]=ev;
        return ev;
      });
    render();
    gcalStartNotifications();
  }catch(err){console.warn('gcal fetch:',err);}
}
function gcalStartNotifications(){
  if(window._gcalNotifIv)clearInterval(window._gcalNotifIv);
  window._gcalNotifIv=setInterval(()=>{
    try{
      if(!aP)return;
      const now=Date.now();
      (S.kalender||[]).forEach(ev=>{
        if(!ev.start)return;
        const diff=(ev.start.getTime()-now)/60000;
        if(diff>0&&diff<=10&&!ev._notif10){ev._notif10=true;toast('📅 '+esc(ev.titel)+' in '+Math.round(diff)+' Min');}
        else if(diff>-1&&diff<=0&&!ev._notifFired){ev._notifFired=true;toast('📅 '+esc(ev.titel)+' startet jetzt!');}
      });
    }catch(e){console.error('gcalNotif',e);}
  },30000);
}
function _gcalVorlaufOpts(evDate){
  // Gibt Vorlauf-Optionen zurück, abhängig davon wie weit das Event entfernt ist
  const daysUntil=Math.round((new Date(evDate+'T12:00:00')-new Date(TODAY+'T12:00:00'))/86400000);
  const addDays=(d,n)=>{const r=new Date(d+'T12:00:00');r.setDate(r.getDate()+n);return localDate(r);};
  const fmtD=d=>{const dd=new Date(d+'T12:00:00');return['So','Mo','Di','Mi','Do','Fr','Sa'][dd.getDay()]+' '+dd.getDate()+'.'+(dd.getMonth()+1)+'.';};
  const opts=[];
  if(daysUntil>0)opts.push({label:'Am Tag davor',sub:fmtD(addDays(evDate,-1)),date:addDays(evDate,-1)});
  if(daysUntil>2)opts.push({label:'2 Tage davor',sub:fmtD(addDays(evDate,-2)),date:addDays(evDate,-2)});
  if(daysUntil>7)opts.push({label:'1 Woche davor',sub:fmtD(addDays(evDate,-7)),date:addDays(evDate,-7)});
  if(daysUntil>14)opts.push({label:'2 Wochen davor',sub:fmtD(addDays(evDate,-14)),date:addDays(evDate,-14)});
  opts.push({label:'Heute',sub:fmtD(TODAY),date:TODAY});
  return opts.filter(o=>o.date>=TODAY);
}

async function gcalDeleteEvent(id){
  const ev=(window._gcalEvtMap||{})[id];
  if(!ev){toast('Event nicht gefunden');return;}

  try{
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/'+encodeURIComponent(gId),
      {method:'DELETE',headers:{Authorization:'Bearer '+token}});
    if(resp.ok||resp.status===410||resp.status===404){
      // lokal aufräumen
      if(window._gcalEvtMap)delete window._gcalEvtMap[id];
      S.kalender=(S.kalender||[]).filter(e=>e.id!==id);
      // Falls ein App-Task dieses Event erzeugt hat → Mapping lösen

      });
      cm();
      toast('🗑 Termin gelöscht');
      if(typeof render==='function')render();
    }else if(resp.status===401){
      localStorage.removeItem('gcal_token');

      toast('GCal: Keine Berechtigung zum Löschen');

      const err=await resp.json().catch(()=>({}));

// ─── Google Calendar Write-Sync ─────────────────────────────────
function gcalGetEvtId(aufgabeId){return localStorage.getItem('gcal_evt_'+aufgabeId)||null;}
function gcalSetEvtId(aufgabeId,gcalId){if(gcalId)localStorage.setItem('gcal_evt_'+aufgabeId,gcalId);else localStorage.removeItem('gcal_evt_'+aufgabeId);}
function gcalNextDay(dateStr){const d=new Date(dateStr+'T12:00:00');d.setDate(d.getDate()+1);return localDate(d);}
async function gcalCreateEvent(a){
  if(!gcalIsConnected()||String(a.pid)!==String(aP))return;
  // P1 immer in Kalender (auch ohne dl); P2/P3 nur mit dl
  if(a.prio!=='P1'&&!a.dl)return;
  if(gcalGetEvtId(a.id))return;
  const token=localStorage.getItem('gcal_token');
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const hrs=a.geplant||1;
  const tag=a.dl||TODAY;
  const uhrzeit=a.dl_uhrzeit||a.dlUhrzeit||null;
  // App-Event mit Uhrzeit → exakte Zeit; Heute ohne Zeit → nächste volle Stunde; Zukunft → 9:00
  let startD;
  if(uhrzeit&&/^\d{2}:\d{2}$/.test(uhrzeit)){
    const[hh,mm]=uhrzeit.split(':').map(Number);
    startD=new Date(tag+'T'+String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':00');
  }else if(tag===TODAY){
    const now=new Date();
    startD=new Date(now);
    startD.setMinutes(0,0,0);
    startD.setHours(startD.getHours()+1);
  }else{
    startD=new Date(tag+'T09:00:00');
  }
  const endD=new Date(startD.getTime()+hrs*3600000);
  const zN=getZielName(a);
  // App-Event mit Zeit → echter Titel (User hat explizit Termin gesetzt)
  // P1 ohne Zeit → anonym (Privatsphäre); P2/P3 → Prio + Titel
  const summary=uhrzeit?a.titel:a.prio==='P1'?'⚡ P1 — '+(zN||'Fokus'):'['+a.prio+'] '+a.titel;
  const description=a.prio==='P1'?'Halleluja OS':'Halleluja OS';
  const colorMap={'P1':'11','P2':'6','P3':'8'};
  const body={
    summary,
    description,
    colorId:colorMap[a.prio||'P3']||'8',
    start:{dateTime:startD.toISOString(),timeZone:tz},
    end:{dateTime:endD.toISOString(),timeZone:tz}
  };
  try{
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',
      {method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(resp.ok){
      const d=await resp.json();
      gcalSetEvtId(a.id,d.id);
      toast('📅 Im Kalender eingetragen');
    } else if(resp.status===401){
      localStorage.removeItem('gcal_token');
      gcalSilentRefresh(); // still erneuern, nächste Aktion klappt dann
    } else if(resp.status===403){
      toast('GCal: Schreibrechte fehlen — bitte einmal neu verbinden');
      localStorage.removeItem('gcal_token');
    } else {
      const err=await resp.json().catch(()=>({}));
      console.warn('gcalCreateEvent error:',resp.status,err);
    }
  }catch(e){console.warn('gcalCreateEvent:',e);}
}
async function gcalUpdateEventStart(a){
  if(!gcalIsConnected()||String(a.pid)!==String(aP))return;
  const evtId=gcalGetEvtId(a.id);
  if(!evtId){if(a.dl)await gcalCreateEvent(a);return;}
  const token=localStorage.getItem('gcal_token');
  const now=new Date();
  const end=new Date(now.getTime()+(a.geplant||1)*3600000);
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  try{
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/'+encodeURIComponent(evtId),
      {method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
       body:JSON.stringify({start:{dateTime:now.toISOString(),timeZone:tz},end:{dateTime:end.toISOString(),timeZone:tz}})});
    if(resp.status===401){localStorage.removeItem('gcal_token');}
    else if(resp.status===403){localStorage.removeItem('gcal_token');toast('GCal: Schreibrechte fehlen — bitte neu verbinden');}
  }catch(e){console.warn('gcalUpdateEventStart:',e);}
}
async function gcalUpdateEventEnd(a){
  if(!gcalIsConnected()||String(a.pid)!==String(aP))return;
  const evtId=gcalGetEvtId(a.id);
  if(!evtId)return;
  const token=localStorage.getItem('gcal_token');
  const now=new Date();
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  try{
    const getResp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/'+encodeURIComponent(evtId),
      {headers:{Authorization:'Bearer '+token}});
    if(!getResp.ok){if(getResp.status===401)localStorage.removeItem('gcal_token');return;}
    const evt=await getResp.json();
    const patch={end:{dateTime:now.toISOString(),timeZone:tz}};
    if(evt.start&&evt.start.date){
      const d=new Date(); d.setHours(9,0,0,0);
      patch.start={dateTime:d.toISOString(),timeZone:tz};
    }
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/'+encodeURIComponent(evtId),
      {method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(patch)});
    if(resp.status===401){localStorage.removeItem('gcal_token');}
    else if(resp.status===403){localStorage.removeItem('gcal_token');toast('GCal: Schreibrechte fehlen — bitte neu verbinden');}
  }catch(e){console.warn('gcalUpdateEventEnd:',e);}
}

<script>
// v202: Touch-Drag-Polyfill — übersetzt Touch-Events in synthetische DragEvents
// damit ondragstart/ondragover/ondrop auf iOS/iPad funktionieren.
(function(){
  if(!('ontouchstart' in window))return;
  let src=null,srcRect=null,ghost=null,lastZone=null,startX=0,startY=0,activated=false;
  const HOLD_MS=180,MOVE_THRESH=8;
  let holdTimer=null;
  const dt={_data:{},setData(t,v){this._data[t]=v;},getData(t){return this._data[t]||'';},setDragImage(){},effectAllowed:'move',dropEffect:'move'};
  function dispatch(el,type,clientX,clientY){
    if(!el)return;
    const ev=new Event(type,{bubbles:true,cancelable:true});
    ev.dataTransfer=dt;ev.clientX=clientX;ev.clientY=clientY;
    el.dispatchEvent(ev);
    return ev;
  }
  function findDraggable(el){while(el&&el!==document){if(el.getAttribute&&el.getAttribute('draggable')==='true')return el;el=el.parentNode;}return null;}
  function findDropZone(el){while(el&&el!==document){if(el.getAttribute&&(el.getAttribute('ondrop')||el.hasAttribute('data-mzp-zone')))return el;el=el.parentNode;}return null;}
  function makeGhost(el){
    const r=el.getBoundingClientRect();
    const g=el.cloneNode(true);
    g.style.cssText='position:fixed;left:'+r.left+'px;top:'+r.top+'px;width:'+r.width+'px;height:'+r.height+'px;pointer-events:none;opacity:.7;z-index:9999;transform:scale(1.04);box-shadow:0 8px 24px rgba(0,0,0,.25);transition:none';
    document.body.appendChild(g);
    return g;
  }
  document.addEventListener('touchstart',function(e){
    if(e.touches.length!==1)return;
    const t=e.touches[0];
    const el=findDraggable(document.elementFromPoint(t.clientX,t.clientY));
    if(!el)return;
    src=el;srcRect=el.getBoundingClientRect();
    startX=t.clientX;startY=t.clientY;activated=false;dt._data={};
    clearTimeout(holdTimer);
    holdTimer=setTimeout(()=>{
      if(!src)return;
      activated=true;
      ghost=makeGhost(src);
      dispatch(src,'dragstart',startX,startY);
      if(navigator.vibrate)navigator.vibrate(10);
    },HOLD_MS);
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!src)return;
    const t=e.touches[0];
    const dx=t.clientX-startX,dy=t.clientY-startY;
    if(!activated){
      // Wenn vor Hold-Timer schon stark bewegt → Scroll erlauben, kein Drag
      if(Math.abs(dx)>MOVE_THRESH||Math.abs(dy)>MOVE_THRESH){clearTimeout(holdTimer);src=null;}
      return;
    }
    e.preventDefault();
    if(ghost){ghost.style.left=(srcRect.left+dx)+'px';ghost.style.top=(srcRect.top+dy)+'px';}
    const under=document.elementFromPoint(t.clientX,t.clientY);
    const zone=findDropZone(under);
    if(zone!==lastZone){
      if(lastZone)dispatch(lastZone,'dragleave',t.clientX,t.clientY);
      if(zone)dispatch(zone,'dragenter',t.clientX,t.clientY);
      lastZone=zone;
    }
    if(zone)dispatch(zone,'dragover',t.clientX,t.clientY);
  },{passive:false});
  document.addEventListener('touchend',function(e){
    clearTimeout(holdTimer);
    if(!src||!activated){src=null;activated=false;return;}
    const t=(e.changedTouches&&e.changedTouches[0])||{clientX:0,clientY:0};
    const under=document.elementFromPoint(t.clientX,t.clientY);
    const zone=findDropZone(under);
    if(zone)dispatch(zone,'drop',t.clientX,t.clientY);
    if(lastZone&&lastZone!==zone)dispatch(lastZone,'dragleave',t.clientX,t.clientY);
    dispatch(src,'dragend',t.clientX,t.clientY);
    if(ghost){ghost.remove();ghost=null;}
    src=null;srcRect=null;lastZone=null;activated=false;
  });
  document.addEventListener('touchcancel',function(){
    clearTimeout(holdTimer);
    if(ghost){ghost.remove();ghost=null;}
    if(src&&activated)dispatch(src,'dragend',0,0);
    src=null;srcRect=null;lastZone=null;activated=false;
  });
})();
</script>
<script>
if('serviceWorker' in navigator){

    navigator.serviceWorker.register('./sw.js',{updateViaCache:'none'}).then(reg=>{
      // alle 60s prüfen ob neue Version deployed wurde
      setInterval(()=>reg.update().catch(()=>{}),60000);

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Halleluja OS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --text:#1a1a1a;--t2:#6b6b6b;--t3:#a0a0a0;
  --bg:#f1f0ef;--sf:#fff;--bd:#e5e5e3;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--blue-bd:#bfdbfe;
  --green:#15803d;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --red:#b91c1c;--red-bg:#fef2f2;--red-bd:#fecaca;
  --amber:#a16207;--amber-bg:#fefce8;--amber-bd:#fde68a;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-bd:#ddd6fe;
  --gray-bg:#f8f8f7;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── MOBILE ── */
@media(max-width:768px){
  .bar{padding:0 12px;height:50px}
  .logo{font-size:14px;font-weight:700;border:none;padding:0;margin:0}
  .nt:not(.mob-show){display:none}
  .nt.ai-btn,.nt.new-btn{display:none}
  .sb{display:none}
  .main{padding:14px 14px 90px}
  .modal{border-radius:20px 20px 0 0;width:100%;max-width:100%;position:fixed;bottom:0;left:0;right:0;max-height:90vh;padding:20px 18px 32px}
  .ovl{align-items:flex-end;padding:0}
  .card{padding:14px}
  .pin-key{padding:16px}
  .ph{flex-wrap:wrap;gap:10px}
  .phs{margin-left:0;width:100%;justify-content:space-between}
  .f2{grid-template-columns:1fr}
  /* Bottom Tab Bar */
  #mob-tabs{display:flex}
  /* Floating add button */
  #mob-add{display:flex}
}
@media(min-width:769px){
  #mob-tabs{display:none}
  #mob-add{display:none}
}
#mob-tabs{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--sf);border-top:1px solid var(--bd);z-index:50;align-items:center;justify-content:space-around;padding:0 8px}
.mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;font-family:inherit;padding:8px 4px;color:var(--t3);font-size:9px;font-weight:500}
.mob-tab.on{color:var(--text)}
.mob-tab svg{width:20px;height:20px}
#mob-add{position:fixed;bottom:72px;right:18px;z-index:51;width:52px;height:52px;border-radius:50%;background:var(--text);color:#fff;border:none;font-size:26px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.25);font-family:inherit}

#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.login-box{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:32px 36px;width:340px;max-width:95vw}
.login-title{font-size:17px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--t3);margin-bottom:20px}
.person-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.person-btn{padding:10px 8px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.person-btn:hover{border-color:var(--text)}
.person-btn.selected{border:2px solid var(--text);background:var(--gray-bg)}
.pin-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--bd);transition:background .15s}
.pin-dot.filled{background:var(--text)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-key{padding:14px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.pin-key:hover{background:var(--gray-bg)}
.login-err{font-size:12px;color:var(--red);text-align:center;min-height:18px;margin-top:8px}
#checkin-screen{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:150;padding:16px}
#checkin-screen.open{display:flex}
.checkin-box{background:var(--sf);border-radius:20px;padding:32px 36px;width:440px;max-width:100%;text-align:center}
.checkin-input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--bd);font-family:inherit;font-size:14px;outline:none;margin-bottom:12px;text-align:left}
.checkin-input:focus{border-color:var(--blue)}
.checkin-btn{width:100%;padding:13px;border-radius:10px;background:var(--text);color:#fff;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.checkin-skip{font-size:11px;color:var(--t3);cursor:pointer;margin-top:10px;display:inline-block}
.bar{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;height:46px;flex-shrink:0;gap:2px}
.logo{font-size:13px;font-weight:700;padding-right:12px;border-right:1px solid var(--bd);margin-right:6px;white-space:nowrap}
.nt{font-size:12px;padding:0 10px;height:46px;border:none;border-bottom:2px solid transparent;cursor:pointer;background:transparent;color:var(--t2);font-family:inherit;font-weight:400;white-space:nowrap}
.nt.on{color:var(--text);font-weight:600;border-bottom-color:var(--text)}
.nt.ai-btn{color:var(--purple);font-weight:600;border:1px solid var(--purple-bd);background:var(--purple-bg);border-radius:8px;height:30px;margin-left:4px;padding:0 10px}
.nt.new-btn{color:var(--blue);font-weight:600;border:1px solid var(--blue-bd);background:var(--blue-bg);border-radius:8px;height:30px;padding:0 10px}
.shell{display:flex;flex:1;overflow:hidden}
.sb{width:168px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);overflow-y:auto;padding:10px 8px}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.gl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:0 8px;margin:12px 0 5px}
.sbn{width:100%;text-align:left;padding:7px 8px;border-radius:9px;border:none;cursor:pointer;background:transparent;font-family:inherit;margin-bottom:2px;display:flex;align-items:center;gap:8px}
.sbn.on,.sbn:hover{background:var(--bg)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:13px 15px;margin-bottom:8px}
.card.aktiv-c{border:2px solid var(--text)}
.card.neu-c{border:1.5px solid var(--red-bd);background:var(--red-bg)}
.tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap;display:inline-block}
.btn{font-size:11px;padding:5px 12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:500}
.btn-dk{background:var(--text);color:#fff}
.btn-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.btn-gr{background:var(--gray-bg);color:var(--t2);border:1px solid var(--bd)}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--red-bd)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.lock{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.timer{background:var(--gray-bg);border-radius:9px;padding:7px 11px;text-align:center;flex-shrink:0;min-width:80px}
.tn{font-size:17px;font-weight:700;font-family:monospace;letter-spacing:-.5px}
.tbar{height:3px;border-radius:99px;background:var(--bd);margin-top:4px;overflow:hidden}
.tf{height:100%;border-radius:99px;background:var(--blue)}
.kpi-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--gray-bg);border-radius:9px;margin-bottom:6px;cursor:pointer}
.kpi-track{width:80px;height:4px;background:var(--bd);border-radius:99px;overflow:hidden;flex-shrink:0}
.kpi-fill{height:100%;border-radius:99px}
.focus-bar{background:var(--gray-bg);border-radius:9px;padding:9px 12px;margin-top:12px;display:flex;align-items:center;gap:10px}
.focus-track{flex:1;height:4px;background:var(--bd);border-radius:99px;overflow:hidden}
.focus-fill{height:100%;border-radius:99px;background:var(--blue)}
.sw{padding-left:8px;border-left:2px solid var(--blue-bd);margin:8px 0}
.sr{display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;user-select:none}
.sc{width:13px;height:13px;border-radius:3px;border:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sc.dn{background:var(--text);border-color:var(--text)}
.sl{font-size:11px}.sl.dn{text-decoration:line-through;color:var(--t3)}
.asi{flex:1;font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--text);font-family:inherit;outline:none}
.ph{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--bd)}
.phs{margin-left:auto;display:flex;gap:16px}
.phv{font-size:18px;font-weight:700;line-height:1}
.phl{font-size:10px;color:var(--t3);margin-top:1px}
.zcard{border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid}
.pbar{height:5px;border-radius:99px;background:rgba(0,0,0,.08);overflow:hidden;flex:1}
.pbar-fill{height:100%;border-radius:99px;transition:width .3s}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:100;align-items:center;justify-content:center;padding:16px}
.ovl.open{display:flex}
.modal{background:var(--sf);border-radius:16px;padding:24px;width:520px;max-width:100%;max-height:92vh;overflow-y:auto}
.mt{font-size:15px;font-weight:700;margin-bottom:16px}
.fl{margin-bottom:13px}
.fl label{display:block;font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fl input,.fl select,.fl textarea{width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(0,0,0,.12);background:var(--sf);color:var(--text);font-family:inherit;font-size:13px;outline:none}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--blue)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.tz-block{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:11px;padding:12px 14px;margin-bottom:8px}
.tz-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tz-title{font-size:13px;font-weight:600;color:var(--purple);flex:1}
.tz-done{text-decoration:line-through;opacity:.5}
.tz-add-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:9px;border:1.5px dashed var(--purple-bd);background:transparent;color:var(--purple);font-size:11px;font-family:inherit;cursor:pointer;width:100%;margin-top:6px;opacity:.7}
.tz-add-btn:hover{opacity:1;background:rgba(124,58,237,.06)}
.team-block{background:var(--sf);border:1px solid var(--bd);border-radius:14px;margin-bottom:14px;overflow:hidden}
.team-block-head{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;background:var(--gray-bg)}
.team-h-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--bd)}
.team-h-row:last-child{border:none}
.team-h-row:hover{background:var(--gray-bg)}
.empty-state{text-align:center;color:var(--t3);padding:60px 20px;font-size:13px;line-height:1.8}
.settings-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.settings-row:last-child{border:none}
.ci-banner{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:11px;padding:11px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ai-result{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:10px;padding:12px;margin:10px 0;font-size:12px;line-height:1.6}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-title">Halleluja OS</div>
    <div class="login-sub">Wer bist du heute?</div>
    <div class="person-grid" id="person-grid"></div>
    <div id="pin-section" style="display:none">
      <div class="pin-row">
        <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-pad" id="pin-pad"></div>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>
</div>

<div id="checkin-screen">
  <div class="checkin-box">
    <div style="font-size:36px;margin-bottom:12px" id="ci-emoji">☀️</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:6px" id="ci-title">Guten Morgen!</div>
    <div style="font-size:13px;color:var(--t2);margin-bottom:16px;line-height:1.5" id="ci-sub">Was ist heute deine wichtigste Priorität?</div>
    <div id="ci-suggestions" style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px;text-align:left"></div>
    <input class="checkin-input" id="ci-input" placeholder="Heute schaffe ich…"/>
    <button class="checkin-btn" onclick="saveCheckin()">Loslegen →</button>
    <div class="checkin-skip" onclick="skipCheckin()">Überspringen</div>
  </div>
</div>

<div id="app" style="display:none;flex-direction:column;flex:1;overflow:hidden">
  <div class="bar">
    <div class="logo">Halleluja OS</div>
    <button class="nt on" onclick="nav('tag',this)">Mein Tag</button>
    <button class="nt" id="nav-ziele" onclick="nav('ziele',this)">Ziele</button>
    <button class="nt" id="nav-team" onclick="nav('team',this)">Team</button>
    <div style="flex:1"></div>
    <div id="fokus-banner" style="display:none;align-items:center;gap:6px;padding:4px 12px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:8px;font-size:11px;font-weight:600;color:var(--red)">🎯 <span id="fokus-label"></span></div>
    <div id="live-clock" style="font-size:12px;font-weight:600;color:var(--t2);font-family:monospace;padding:0 8px"></div>
    <button class="nt ai-btn" onclick="openAI()">✦ mit KI</button>
    <button class="nt new-btn" onclick="openNeu()">+ Aufgabe</button>
    <div style="margin-left:8px;display:flex;align-items:center;gap:6px">
      <div id="me-badge" style="display:flex;align-items:center;gap:6px;padding:0 6px;cursor:pointer;border-radius:8px" onclick="logout()"></div>
      <button id="btn-settings" style="display:none;font-size:11px;padding:4px 10px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit" onclick="openSettings()">⚙</button>
    </div>
  </div>
  <div class="shell">
    <div class="sb" id="sb"></div>
    <div class="main" id="main"></div>
  </div>

  <!-- Mobile Bottom Tabs -->
  <div id="mob-tabs">
    <button class="mob-tab on" id="mobt-tag" onclick="nav('tag',null);updMobTabs('tag')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Mein Tag
    </button>
    <button class="mob-tab" id="mobt-ziele" onclick="nav('ziele',null);updMobTabs('ziele')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>
      Ziele
    </button>
    <div style="width:52px"></div>
    <button class="mob-tab" id="mobt-team" onclick="nav('team',null);updMobTabs('team')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="3"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.87"/></svg>
      Team
    </button>
    <button class="mob-tab" id="mobt-ich" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Ich
    </button>
  </div>

  <!-- Mobile Floating Add Button -->
  <button id="mob-add" onclick="openNeu()">+</button>
</div>

<div class="ovl" id="ovl" onclick="if(event.target===this)cm()">
  <div class="modal" id="mb"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════
const SUPA_URL='https://zkxeuphsbufdvskkuahk.supabase.co';
const SUPA_KEY='sb_publishable_41EMxtYZYsYL5KR1KS_RrA_1mV1SRAL';

async function supa(path,opts={}){
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/'+path,{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation',...(opts.headers||{})},
      method:opts.method||'GET',
      body:opts.body?JSON.stringify(opts.body):undefined
    });
    if(!r.ok){console.error('Supabase',path,await r.text());return null;}
    const t=await r.text();return t?JSON.parse(t):null;
  }catch(e){console.error('supa error',e);return null;}
}
async function dbGet(table,query=''){return await supa(table+(query?'?'+query:'?select=*'));}
async function dbPatch(table,id,body){return await supa(table+'?id=eq.'+id,{method:'PATCH',body,prefer:'return=minimal'});}
async function dbInsert(table,body){return await supa(table,{method:'POST',body});}
async function dbDelete(table,id){return await supa(table+'?id=eq.'+id,{method:'DELETE',prefer:'return=minimal'});}
async function dbUpsert(table,body,onConflict){return await supa(table,{method:'POST',body,prefer:'resolution=merge-duplicates,return=minimal',headers:{'Prefer':'resolution=merge-duplicates,return=minimal'}});}

// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const FARBEN=[
  {bg:'#f0fdf4',tc:'#15803d',bd:'#86efac'},{bg:'#eff6ff',tc:'#1d4ed8',bd:'#93c5fd'},
  {bg:'#fff7ed',tc:'#c2410c',bd:'#fed7aa'},{bg:'#faf5ff',tc:'#7c3aed',bd:'#ddd6fe'},
  {bg:'#f1f0ef',tc:'#44403c',bd:'#d4d0cb'},{bg:'#fdf2f8',tc:'#9d174d',bd:'#fbcfe8'}
];
const CL=[
  {bg:'#f0fdf4',tc:'#15803d'},{bg:'#eff6ff',tc:'#1d4ed8'},{bg:'#faf5ff',tc:'#7c3aed'},
  {bg:'#fff7ed',tc:'#c2410c'},{bg:'#f1f0ef',tc:'#44403c'},{bg:'#fdf2f8',tc:'#9d174d'}
];
const TODAY='2026-04-05';
const FREQ=['täglich','wöchentlich','monatlich'];
const SH={'0.25':'15min','0.5':'30min','0.75':'45min','1':'1h','1.5':'1h30','2':'2h','3':'3h','4':'4h','5':'5h','8':'8h'};
const TYP_INFO={
  strategisch:{label:'Strategisch',bg:'var(--blue-bg)',tc:'var(--blue)'},
  operativ:   {label:'Operativ',   bg:'var(--gray-bg)',tc:'var(--t2)'},
  random:     {label:'Random',     bg:'var(--amber-bg)',tc:'var(--amber)'}
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let S={personen:[],teams:[],ziele:[],aufgaben:[],kpiVals:{},checkins:{}};
let aP=null,realMe=null,aV='tag',timIv=null,_selPrio=null;
let _kid=Date.now();
const nid=p=>p+(++_kid);

// ═══════════════════════════════════════════════
// LOAD
// ═══════════════════════════════════════════════
async function loadData(){
  const [personen,teams,ziele,kpis,teilziele,aufgaben,kpiVals,checkins]=await Promise.all([
    dbGet('personen','select=*&order=ci'),
    dbGet('teams','select=*'),
    dbGet('ziele','select=*&order=created_at'),
    dbGet('kpis','select=*'),
    dbGet('teilziele','select=*&order=created_at'),
    dbGet('aufgaben','select=*&order=created_at'),
    dbGet('kpi_vals','select=*'),
    dbGet('checkins','select=*'),
  ]);

  S.personen=personen||[];
  S.teams=(teams||[]).map(t=>({...t,members:t.members||[]}));

  // Ziele mit KPIs und Teilzielen zusammenführen
  S.ziele=(ziele||[]).map(z=>({
    ...z,
    verantwortlichId:z.verantwortlich_id,
    kpis:(kpis||[]).filter(k=>k.ziel_id===z.id).map(k=>({...k,zielId:k.ziel_id})),
    teilziele:(teilziele||[]).filter(t=>t.ziel_id===z.id).map(t=>({
      ...t,zielId:t.ziel_id,verantwortlichId:t.verantwortlich_id,datum:t.datum||''
    }))
  }));

  // Aufgaben normalisieren
  S.aufgaben=(aufgaben||[]).map(a=>({
    ...a,
    zielId:a.ziel_id||null,
    teilzielId:a.teilziel_id||null,
    aktSeit:a.akt_seit?new Date(a.akt_seit).getTime():null,
    dl:a.dl||'',
    ua:Array.isArray(a.ua)?a.ua:(typeof a.ua==='string'?JSON.parse(a.ua||'[]'):[])
  }));

  // KPI Vals — letzter Wert pro Person+KPI
  S.kpiVals={};
  (kpiVals||[]).forEach(v=>{
    const key=v.pid+'-'+v.kpi_id;
    if(!S.kpiVals[key]||v.datum>S.kpiVals[key].datum)
      S.kpiVals[key]={val:v.val,datum:v.datum};
  });

  // Checkins — letzter pro Person
  S.checkins={};
  (checkins||[]).forEach(c=>{
    if(!S.checkins[c.pid]||c.datum>S.checkins[c.pid].date)
      S.checkins[c.pid]={date:c.datum,morgen:c.morgen,abend:c.abend};
  });
}

const person=id=>S.personen.find(p=>p.id===id);
const me=()=>person(aP);
const cl=p=>p?CL[p.ci%CL.length]:CL[0];
const isGF=()=>{const m=me();return m&&m.stufe==='gf';};
const isLead=()=>{const m=me();return m&&(m.stufe==='lead'||m.stufe==='gf');};
const zielObj=id=>S.ziele.find(z=>z.id===id);
const kpiOk=k=>{const v=kpiVal(k);return k.inv?v<=k.ziel:v>=k.ziel*0.85;};
const kpiVal=k=>{const e=S.kpiVals[aP+'-'+k.id];return e!==undefined?e.val:k.ist;};

function myTeamIds(){
  const m=me();if(!m)return[];
  const ids=[];
  S.teams.forEach(t=>{if((m.teams||[]).includes(t.id))t.members.forEach(id=>{if(!ids.includes(id))ids.push(id);});});
  return ids;
}
const canSeeTeam=()=>isLead();
const canSee=a=>!(a.vertraulich&&!isGF());
const canManageTZ=zid=>{const z=zielObj(zid);return z&&(isGF()||z.verantwortlichId===aP);};

function tzObj(zid,tzid){const z=zielObj(zid);return z?(z.teilziele||[]).find(t=>t.id===tzid):null;}
function getTZName(a){if(a.teilzielId&&a.zielId){const tz=tzObj(a.zielId,a.teilzielId);return tz?tz.name:null;}return null;}
function getZielName(a){if(a.zielId){const z=zielObj(a.zielId);return z?z.name:null;}return null;}

function typInfo(a){return TYP_INFO[a.typ]||TYP_INFO.operativ;}

// Fokus = % strategische Aufgaben von allen offenen
function fokusQ(pids){
  const as=S.aufgaben.filter(a=>pids.includes(a.pid)&&a.status!=='erledigt'&&canSee(a));
  if(!as.length)return 0;
  return Math.round(as.filter(a=>a.typ==='strategisch').length/as.length*100);
}

// Fortschritt eines Ziels aus Teilzielen berechnen
function zielPct(z){
  const tzs=z.teilziele||[];
  if(!tzs.length)return z.pct||0;
  return Math.round(tzs.filter(t=>t.erledigt).length/tzs.length*100);
}

function elapsedSec(a){
  let s=(a.gebucht||0)*3600;
  if(a.status==='aktiv'&&a.aktSeit)s+=(Date.now()-a.aktSeit)/1000;
  return s;
}
function fmt(s){
  s=Math.round(s);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  if(h>0)return h+':'+('0'+m).slice(-2)+':'+('0'+sc).slice(-2);
  return('0'+m).slice(-2)+':'+('0'+sc).slice(-2);
}
function fmtH(h){
  if(!h||h===0)return'–';if(h<1)return Math.round(h*60)+'min';
  const fh=Math.floor(h),m=Math.round((h-fh)*60);return fh+'h'+(m?' '+m+'min':'');
}
function dli(d){
  if(!d)return null;
  const df=Math.round((new Date(d)-new Date(TODAY))/86400000);
  if(df<0) return{l:Math.abs(df)+'d überfällig',bg:'var(--red-bg)',c:'var(--red)'};
  if(df===0)return{l:'Heute fällig',bg:'var(--red-bg)',c:'var(--red)'};
  if(df===1)return{l:'Morgen',bg:'#fff7ed',c:'#c2410c'};
  if(df<=4) return{l:'in '+df+' Tagen',bg:'var(--amber-bg)',c:'var(--amber)'};
  return{l:d.slice(8)+'.'+d.slice(5,7)+'.',bg:'var(--gray-bg)',c:'var(--t3)'};
}

function dlTag(dl){const d=dli(dl);if(!d)return'';return`<span class="tag" style="background:${d.bg};color:${d.c}">${d.l}</span>`;}

function shouldCheckin(){

  if(h>=17&&!ci.abend)return'abend';

function showCheckin(){
  const typ=shouldCheckin();if(!typ)return;
  const isEve=typ==='abend';
  document.getElementById('ci-emoji').textContent=isEve?'🌙':'☀️';
  document.getElementById('ci-title').textContent=isEve?'Guten Abend!':'Guten Morgen!';
  document.getElementById('ci-sub').textContent=isEve?'Was nimmst du dir für morgen vor?':'Was ist heute deine wichtigste Priorität?';
  document.getElementById('ci-input').placeholder=isEve?'Morgen fokussiere ich mich auf…':'Heute schaffe ich…';
  document.getElementById('ci-input').value='';

  // Gestern abend's Vorsatz anzeigen
  const ci=S.checkins[aP];
  const vorSatz=isEve?null:(ci&&ci.abend&&ci.date!==TODAY?ci.abend:null);

  // Top-Aufgaben vorschlagen
  const sugg=S.aufgaben.filter(a=>a.pid===aP&&(a.status==='backlog'||a.status==='neu')&&canSee(a)).sort((a,b)=>(a.prio||'P9').localeCompare(b.prio||'P9')).slice(0,3);
  const box=document.getElementById('ci-suggestions');
  let html='';
  if(vorSatz)html+=`<div style="background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:9px;padding:8px 12px;font-size:12px;color:var(--purple);margin-bottom:8px">💡 Gestern geplant: <strong>${vorSatz}</strong></div>`;
  if(sugg.length){
    html+=`<div style="font-size:11px;color:var(--t3);margin-bottom:4px">Top-Aufgaben — antippen zum Übernehmen:</div>`;
    html+=sugg.map(a=>{
      const bg=a.prio==='P1'?'var(--red-bg)':a.prio==='P2'?'#fff7ed':'var(--gray-bg)';
      const tc=a.prio==='P1'?'var(--red)':a.prio==='P2'?'#c2410c':'var(--t2)';
      return`<div onclick="document.getElementById('ci-input').value='${a.titel.replace(/'/g,"\\'")}'" style="padding:9px 12px;border-radius:10px;border:1px solid ${tc};background:${bg};color:${tc};cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px">${a.prio?`<span style="font-size:10px;font-weight:700">${a.prio}</span>`:''} ${a.titel}</div>`;
    }).join('');
  }
  box.innerHTML=html;
  document.getElementById('checkin-screen').classList.add('open');

}
async function saveCheckin(){
  const val=document.getElementById('ci-input').value.trim();
  if(!val){skipCheckin();return;}
  const ci=S.checkins[aP]||{},isEve=shouldCheckin()==='abend';
  const patch=isEve?{morgen:ci.morgen||'',abend:val}:{morgen:val,abend:null};

  await supa('checkins',{method:'POST',body:{pid:aP,datum:TODAY,...patch},prefer:'resolution=merge-duplicates,return=minimal'});
  document.getElementById('checkin-screen').classList.remove('open');
}

// ═══════════════════════════════════════════════
// ZEITSTRAHL
// ═══════════════════════════════════════════════
const START_H = 6;  // 06:00
const END_H   = 20; // 20:00
const TOTAL_H = END_H - START_H;

function timeToY(timeStr) {
  if (!timeStr) return null;
  const [h, m] = timeStr.split(':').map(Number);
  return ((h + m/60 - START_H) / TOTAL_H) * 100;
}
function durationToH(geplant) {
  return (geplant / TOTAL_H) * 100;
}

function naechsteP1(myA){
  return (myA||[]).filter(a=>a.prio==='P1'&&(a.status==='backlog'||a.status==='neu')).sort((a,b)=>(a.prio||'P9').localeCompare(b.prio||'P9'))[0]||null;
}

function rZeitstrahl(myA){
  const heute = myA.filter(a => a.status !== 'erledigt');
  const mitUhrzeit = heute.filter(a => a.uhrzeit);

  // Nächste P1 Aufgabe ohne Uhrzeit → in Fokuszeit anzeigen
  const naechsteP1 = heute.filter(a => !a.uhrzeit && a.prio === 'P1' && (a.status === 'backlog' || a.status === 'neu'))
    .sort((a,b) => (a.prio||'P9').localeCompare(b.prio||'P9'))[0] || null;

  const p = me();
  const fokusStart = p.fokus_start || '09:00';
  const fokusEnd   = p.fokus_end   || '11:00';
  const fokusStartY = timeToY(fokusStart);
  const fokusEndY   = timeToY(fokusEnd);
  const fokusH      = fokusEndY - fokusStartY;

  const now = new Date();
  const nowY = ((now.getHours() + now.getMinutes()/60 - START_H) / TOTAL_H) * 100;
  const showNow = nowY >= 0 && nowY <= 100;

  const hours = [];
  for (let h = START_H; h <= END_H; h++) hours.push(h);

  let out = `<div style="margin-bottom:24px">`;
  out += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">`;
  out += `<div style="font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px">Tagesplan</div>`;
  out += `<button onclick="editFokuszeit()" style="font-size:10px;padding:2px 8px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit">⚙ Fokuszeit: ${fokusStart}–${fokusEnd}</button>`;
  out += `</div>`;

  out += `<div style="display:flex;gap:0;position:relative">`;

  // Stunden-Labels links
  out += `<div style="width:36px;flex-shrink:0;position:relative;height:${TOTAL_H * 48}px">`;
  hours.forEach(h => {
    const y = ((h - START_H) / TOTAL_H) * 100;
    out += `<div style="position:absolute;top:calc(${y}% - 7px);right:4px;font-size:9px;color:var(--t3);font-weight:500">${h}:00</div>`;
  });
  out += `</div>`;

  // Zeitstrahl
  out += `<div style="flex:1;position:relative;height:${TOTAL_H * 48}px;background:var(--gray-bg);border-radius:10px;overflow:hidden">`;

  // Stunden-Linien
  hours.forEach(h => {
    const y = ((h - START_H) / TOTAL_H) * 100;
    out += `<div style="position:absolute;top:${y}%;left:0;right:0;height:1px;background:${h%2===0?'var(--bd)':'rgba(0,0,0,.04)'}"></div>`;
  });

  // Fokuszeit Block
  out += `<div style="position:absolute;top:${fokusStartY}%;left:0;right:0;height:${fokusH}%;background:rgba(29,78,216,.06);border-left:3px solid var(--blue);z-index:1">`;
  out += `<div style="font-size:9px;font-weight:700;color:var(--blue);padding:3px 6px;opacity:.8">🎯 Fokuszeit</div>`;

  // Nächste P1 in Fokuszeit anzeigen
  if (naechsteP1) {
    out += `<div onclick="openDetail('${naechsteP1.id}')" style="margin:2px 4px;background:var(--red-bg);border-left:3px solid var(--red);border-radius:0 6px 6px 0;padding:4px 8px;cursor:pointer">`;
    out += `<div style="font-size:10px;font-weight:600;color:var(--red);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">▶ ${naechsteP1.titel}</div>`;
    out += `<div style="font-size:9px;color:var(--t3)">Nächste P1 · ${fmtH(naechsteP1.geplant)}</div>`;
    out += `</div>`;
  }
  out += `</div>`;

  // Aufgaben mit Uhrzeit
  mitUhrzeit.forEach(a => {
    const y = timeToY(a.uhrzeit);
    if (y === null) return;
    const h = durationToH(a.geplant||1);
    const c = a.prio==='P1'?'var(--red)':a.prio==='P2'?'#c2410c':'var(--blue)';
    const bg = a.prio==='P1'?'var(--red-bg)':a.prio==='P2'?'#fff7ed':'var(--blue-bg)';
    const isAktiv = a.status === 'aktiv';
    out += `<div onclick="openDetail('${a.id}')" style="position:absolute;top:${y}%;left:4px;right:4px;height:max(${h}%,4%);background:${bg};border-left:3px solid ${c};border-radius:0 6px 6px 0;padding:3px 7px;cursor:pointer;z-index:2;overflow:hidden;${isAktiv?'box-shadow:0 0 0 1.5px '+c:''}">`;
    out += `<div style="font-size:10px;font-weight:600;color:${c};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${isAktiv?'● ':''} ${a.titel}</div>`;
    out += `<div style="font-size:9px;color:var(--t3)">${a.uhrzeit} · ${fmtH(a.geplant)}</div>`;
    out += `</div>`;
  });

  // Jetzt-Linie
  if (showNow) {
    out += `<div style="position:absolute;top:${nowY}%;left:0;right:0;height:2px;background:var(--red);z-index:10">`;
    out += `<div style="position:absolute;left:-1px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--red)"></div>`;
    out += `<div style="position:absolute;right:4px;top:-8px;font-size:9px;font-weight:700;color:var(--red)">${now.getHours()}:${('0'+now.getMinutes()).slice(-2)}</div>`;
    out += `</div>`;
  }

  out += `</div></div></div>`;
  return out;
}

    + `<div class="f2"><div class="fl"><label>Von</label><input type="time" id="fs" value="${p.fokusStart||'09:00'}"></div>`

function rSB(){
  const sorted=[...S.teams].sort((a,b)=>a.id==='gf'?-1:b.id==='gf'?1:0);
  let h='';
  sorted.forEach(t=>{
    const vis=t.members.filter(id=>{

    });
    if(!vis.length)return;
    h+=`<div class="gl">${t.name}</div>`;
    vis.forEach(id=>{
      const p=person(id);if(!p)return;
      const c=cl(p),isMe=id===aP;
      const pA=S.aufgaben.filter(x=>x.pid===id&&canSee(x));
      const nC=pA.filter(x=>x.status==='neu').length,aC=pA.filter(x=>x.status==='aktiv').length;
      h+=`<button class="sbn${isMe?' on':''}" onclick="switchPerson('${id}')">`
        +`<div class="av" style="width:22px;height:22px;font-size:8px;background:${isMe?c.tc:'#eee'};color:${isMe?'#fff':c.tc}">${p.k}</div>`
        +`<span style="flex:1;font-size:11px;font-weight:${isMe?600:400};color:${isMe?c.tc:'var(--text)'}">${p.name}</span>`

// ═══════════════════════════════════════════════
// MEIN TAG — Sam Ovens Style
// ═══════════════════════════════════════════════
function rTag(){
  const p=me(),c=cl(p);
  const myA=S.aufgaben.filter(a=>a.pid===aP&&canSee(a));
  const aktiv=myA.filter(a=>a.status==='aktiv');
  const neu=myA.filter(a=>a.status==='neu');

  const erl=myA.filter(a=>a.status==='erledigt');

  // Nächste Aufgabe — P1 zuerst, dann P2, dann P3
  const naechste=aktiv.length?null:[...neu,...bl].sort((a,b)=>{
    const po={'P1':0,'P2':1,'P3':2};
    return (po[a.prio]??3)-(po[b.prio]??3);
  })[0]||null;

  const ci=S.checkins[aP];
  let out='';

  // ── ZONE 1: JETZT — die eine Sache ──
  if(aktiv.length){
    // Läuft gerade

    const uD=a.ua.filter(u=>u.d).length;

    out+=`<div style="font-size:10px;font-weight:700;opacity:.5;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px">🔥 Läuft gerade</div>`;
    out+=`<div style="font-size:20px;font-weight:700;margin-bottom:4px;line-height:1.3">${a.titel}</div>`;
    if(a.zielId){const z=zielObj(a.zielId);out+=`<div style="font-size:12px;opacity:.6;margin-bottom:16px">${z?z.name:''}</div>`;}
    else out+=`<div style="font-size:12px;opacity:.6;margin-bottom:16px">${typInfo(a).label}</div>`;
    // Timer groß
    out+=`<div data-tid="${a.id}" style="margin-bottom:16px">`;
    out+=`<div style="display:flex;align-items:baseline;gap:6px;margin-bottom:8px">`;
    out+=`<div class="tn" style="font-size:36px;font-weight:700;font-family:monospace;color:#fff">${fmt(s)}</div>`;
    out+=`<div style="font-size:13px;opacity:.5">/ ${fmtH(a.geplant)}</div>`;
    out+=`</div>`;
    out+=`<div style="height:4px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden"><div class="tf" style="height:100%;border-radius:99px;background:#fff;width:${pct}%"></div></div>`;
    out+=`</div>`;
    // Steps
    if(a.ua.length){
      out+=`<div style="margin-bottom:16px;font-size:12px;opacity:.7">${uD}/${a.ua.length} Schritte erledigt</div>`;
    }
    // Buttons
    out+=`<div style="display:flex;gap:10px">`;
    out+=`<button onclick="fertig('${a.id}')" style="flex:1;padding:13px;border-radius:12px;background:#fff;color:var(--text);border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">✓ Erledigt</button>`;
    out+=`<button onclick="pauseA('${a.id}')" style="padding:13px 16px;border-radius:12px;background:rgba(255,255,255,.15);color:#fff;border:none;font-family:inherit;font-size:14px;cursor:pointer">⏸</button>`;
    out+=`<button onclick="openDetail('${a.id}')" style="padding:13px 16px;border-radius:12px;background:rgba(255,255,255,.15);color:#fff;border:none;font-family:inherit;font-size:14px;cursor:pointer">···</button>`;
    out+=`</div></div>`;

    // Weitere aktive
    if(aktiv.length>1){
      out+=`<div style="margin-bottom:16px">`;
      aktiv.slice(1).forEach(a2=>{
        out+=`<div onclick="openDetail('${a2.id}')" style="background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px">`;

        out+=`</div>`;

      out+=`</div>`;
    }

  } else if(naechste) {
    // Nächste Aufgabe — groß und klar
    const isP1=naechste.prio==='P1';

    if(naechste.prio)out+=`<span style="font-size:11px;background:rgba(255,255,255,.2);border-radius:99px;padding:2px 10px;font-weight:700">${naechste.prio}</span>`;
    if(zN)out+=`<span style="font-size:11px;opacity:.7">${zN}</span>`;
    if(tzN)out+=`<span style="font-size:11px;opacity:.7">· ${tzN}</span>`;
    if(naechste.dl){const d=dli(naechste.dl);if(d)out+=`<span style="font-size:11px;opacity:.7">· ${d.l}</span>`;}
    out+=`</div>`;
    out+=`<div style="display:flex;gap:10px">`;
    out+=`<button onclick="startenA('${naechste.id}')" style="flex:1;padding:14px;border-radius:12px;background:#fff;color:var(--text);border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer">▶ Jetzt starten</button>`;
    out+=`<button onclick="openDetail('${naechste.id}')" style="padding:14px 16px;border-radius:12px;background:rgba(255,255,255,.15);color:#fff;border:none;font-family:inherit;font-size:14px;cursor:pointer">···</button>`;
    out+=`</div></div>`;

  } else if(!myA.length){
    out+=`<div style="background:var(--green);border-radius:18px;padding:32px 24px;margin-bottom:16px;color:#fff;text-align:center">`;
    out+=`<div style="font-size:36px;margin-bottom:12px">🎉</div>`;
    out+=`<div style="font-size:20px;font-weight:700;margin-bottom:6px">Alles erledigt!</div>`;
    out+=`<div style="font-size:13px;opacity:.8;margin-bottom:20px">Keine offenen Aufgaben.</div>`;
    out+=`<button onclick="openNeu()" style="padding:12px 24px;border-radius:12px;background:#fff;color:var(--green);border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">+ Neue Aufgabe</button>`;
    out+=`</div>`;
  }

  // ── NEU — Priorität setzen ──
  if(neu.length){
    out+=`<div style="background:var(--red-bg);border:1.5px solid var(--red-bd);border-radius:14px;padding:14px 16px;margin-bottom:12px">`;
    out+=`<div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:10px">⚡ ${neu.length} neue Aufgabe${neu.length>1?'n':''} — Priorität setzen</div>`;
    neu.forEach(a=>{
      out+=`<div style="background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:8px">`;
      out+=`<div style="font-size:13px;font-weight:600;margin-bottom:8px">${a.titel}</div>`;
      out+=`<div style="display:flex;gap:6px">`;
      ['P1','P2','P3'].forEach(pr=>{

        out+=`<button onclick="setPrio('${a.id}','${pr}')" style="flex:1;padding:7px;border-radius:8px;background:${bg};color:#fff;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer">${pr}</button>`;
      });
      out+=`<button onclick="openDetail('${a.id}')" style="padding:7px 10px;border-radius:8px;background:var(--gray-bg);color:var(--t2);border:1px solid var(--bd);font-family:inherit;font-size:12px;cursor:pointer">···</button>`;
      out+=`</div></div>`;
    });
    out+=`</div>`;
  }

  // ── WEITERE AUFGABEN — eingeklappt ──
  const weitere=bl.filter(a=>a.id!==naechste?.id);
  if(weitere.length){
    out+=`<details style="margin-bottom:12px"><summary style="list-style:none;cursor:pointer;padding:12px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;display:flex;align-items:center;justify-content:space-between">`;
    out+=`<span style="font-size:13px;font-weight:600">Weitere Aufgaben</span>`;
    out+=`<span style="font-size:12px;color:var(--t3)">${weitere.length} · anzeigen</span></summary>`;
    out+=`<div style="margin-top:8px">`;
    weitere.forEach(a=>{
      const zN=getZielName(a);
      out+=`<div onclick="openDetail('${a.id}')" style="background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px">`;
      out+=`<div style="flex:1"><div style="font-size:12px;font-weight:500">${a.titel}</div>`;
      out+=`<div style="display:flex;gap:5px;margin-top:3px">${prioTag(a.prio)}${zN?`<span style="font-size:10px;color:var(--t3)">${zN}</span>`:''} ${dlTag(a.dl)}</div></div>`;
      out+=`<button onclick="event.stopPropagation();startenA('${a.id}')" style="font-size:11px;padding:5px 10px;border-radius:8px;background:var(--text);color:#fff;border:none;font-family:inherit;cursor:pointer">▶</button>`;
      out+=`</div>`;
    });
    out+=`</div></details>`;
  }

  // ── HEUTE ERLEDIGT — eingeklappt ──
  if(erl.length){
    out+=`<details style="margin-bottom:12px"><summary style="list-style:none;cursor:pointer;padding:12px 16px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:12px;display:flex;align-items:center;justify-content:space-between">`;
    out+=`<span style="font-size:13px;font-weight:600;color:var(--green)">✓ Heute erledigt</span>`;
    out+=`<span style="font-size:12px;color:var(--green);opacity:.7">${erl.length} Aufgabe${erl.length>1?'n':''}</span></summary>`;
    out+=`<div style="margin-top:8px">`;
    erl.forEach(a=>{
      out+=`<div style="background:var(--green-bg);border:1px solid var(--green-bd);border-radius:10px;padding:9px 14px;margin-bottom:5px;display:flex;align-items:center;gap:8px">`;
      out+=`<span style="flex:1;font-size:12px;text-decoration:line-through;color:var(--t2)">${a.titel}</span>`;
      out+=a.gebucht?`<span style="font-size:11px;color:var(--green);font-weight:600">${fmt(a.gebucht*3600)}</span>`:'';
      out+=`</div>`;
    });
    out+=`</div></details>`;
  }

  // ── TAGESPLAN + KPIs — ganz unten, eingeklappt ──
  out+=`<details style="margin-bottom:12px"><summary style="list-style:none;cursor:pointer;padding:12px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;display:flex;align-items:center;justify-content:space-between">`;
  out+=`<span style="font-size:13px;font-weight:600">📅 Tagesplan</span>`;
  out+=`<span style="font-size:12px;color:var(--t3)">anzeigen</span></summary>`;
  out+=`<div style="margin-top:8px">${rZeitstrahl(myA)}</div></details>`;

  out+=kpiBlock(aP);

  // Fokus Score

  if(myA.length)out+=`<div class="focus-bar"><span style="font-size:11px;color:var(--t2)">Fokus heute</span><div class="focus-track"><div class="focus-fill" style="width:${fq}%"></div></div><span style="font-size:11px;font-weight:600">${fq}% strategisch</span></div>`;

  document.getElementById('main').innerHTML=out;
  startTimers();
}

// ═══════════════════════════════════════════════
// KPI BLOCK
// ═══════════════════════════════════════════════
function kpiBlock(pid){
  const items=[];
  S.ziele.forEach(z=>(z.kpis||[]).forEach(k=>{if(k.pid===pid)items.push({k,z});}));
  if(!items.length)return'';
  let h=`<details style="margin-bottom:16px"><summary style="cursor:pointer;font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;list-style:none;display:flex;align-items:center;gap:6px"><span>▸</span> KPI Check <span style="font-weight:400;text-transform:none;color:var(--t3)">— 2 Minuten</span></summary><div style="margin-top:10px">`;
  items.forEach(({k})=>{
    const val=kpiVal(k);
    const ok=k.inv?val<=k.ziel:val>=k.ziel*0.85;
    const pct=k.inv?Math.max(0,100-Math.round(Math.max(0,val-k.ziel)/Math.max(k.ziel,.1)*100)):Math.round(Math.min(100,(val/(k.ziel||1))*100));
    const col=ok?'var(--green)':'#c2410c';
    h+=`<div class="kpi-row" onclick="editKpiVal('${k.id}',${val},'${k.ziel}','${k.unit||''}')">`
      +`<span style="font-size:12px;flex:1">${k.label}</span>`
      +`<div class="kpi-track"><div class="kpi-fill" style="width:${Math.max(0,Math.min(100,pct))}%;background:${col}"></div></div>`
      +`<span style="font-size:12px;font-weight:600;color:${col};min-width:64px;text-align:right">${val}${k.unit||''} / ${k.ziel}${k.unit||''}</span></div>`;
  });
  h+='</div></details>';return h;
}
function editKpiVal(kid,def,z,unit){
  document.getElementById('mb').innerHTML=`<div class="mt">KPI eintragen</div>`
    +`<div class="fl"><label>Aktueller Wert (Ziel: ${z}${unit})</label><input id="kv" type="number" value="${def}" autofocus style="font-size:22px;font-weight:700"></div>`
    +`<div class="mf"><button class="btn btn-gr" onclick="cm()">Abbrechen</button><button class="btn btn-dk" onclick="saveKpiVal('${kid}')">Speichern</button></div>`;
  document.getElementById('ovl').classList.add('open');
}
async function saveKpiVal(kid){
  const val=parseFloat(document.getElementById('kv').value)||0;

  S.kpiVals[key]={val,datum:TODAY};

  await supa('kpi_vals',{method:'POST',body:{pid:aP,kpi_id:kid,val,datum:TODAY},prefer:'resolution=merge-duplicates,return=minimal'});

// ═══════════════════════════════════════════════
// AUFGABEN ACTIONS
// ═══════════════════════════════════════════════
async function setPrio(id,pr){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.prio=pr;a.status='backlog';
  await dbPatch('aufgaben',id,{prio:pr,status:'backlog'});render();
}
async function startenA(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.status='aktiv';a.aktSeit=Date.now();
  await dbPatch('aufgaben',id,{status:'aktiv',akt_seit:new Date().toISOString()});render();
}
async function pauseA(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a||a.status!=='aktiv')return;
  const gebucht=Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100;
  a.gebucht=gebucht;a.aktSeit=null;a.status='backlog';
  await dbPatch('aufgaben',id,{gebucht,akt_seit:null,status:'backlog'});render();
}
async function fertig(id){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  const gebucht=a.status==='aktiv'?Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100:a.gebucht;
  a.gebucht=gebucht;a.aktSeit=null;a.status='erledigt';
  await dbPatch('aufgaben',id,{gebucht,akt_seit:null,status:'erledigt'});render();
}
async function toggleStep(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.ua[i].d=!a.ua[i].d;
  if(a.ua.every(u=>u.d)&&a.ua.length){a.status='erledigt';a.aktSeit=null;}
  await dbPatch('aufgaben',id,{ua:a.ua,status:a.status,akt_seit:null});render();
}
async function addStep(id){
  const inp=document.getElementById('si-'+id);if(!inp)return;
  const t=inp.value.trim();if(!t)return;
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.ua.push({t,d:false});inp.value='';
  await dbPatch('aufgaben',id,{ua:a.ua});render();
}
async function delStep(id,i){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.ua.splice(i,1);
  await dbPatch('aufgaben',id,{ua:a.ua});render();
}

async function setStatusModal(id,st){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  let patch={status:st};
  if(st==='aktiv')patch.akt_seit=new Date().toISOString();
  else if(a.status==='aktiv'){patch.gebucht=Math.round(((a.gebucht||0)+(Date.now()-(a.aktSeit||Date.now()))/3600000)*100)/100;patch.akt_seit=null;}
  Object.assign(a,{status:st,aktSeit:st==='aktiv'?Date.now():null,...(patch.gebucht!==undefined?{gebucht:patch.gebucht}:{})});
  await dbPatch('aufgaben',id,patch);openDetail(id);render();
}
async function setTeilziel(id,tzid){
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.teilzielId=tzid||null;
  await dbPatch('aufgaben',id,{teilziel_id:tzid||null});
}
async function delAufgabe(id){
  if(!confirm('Aufgabe löschen?'))return;
  S.aufgaben=S.aufgaben.filter(x=>x.id!==id);
  await dbDelete('aufgaben',id);cm();render();
}

function rZiele(){
  let out=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">`
    +`<div><div style="font-size:16px;font-weight:700">Ziele</div><div style="font-size:12px;color:var(--t3);margin-top:2px">Strategische Ziele & Teilziele</div></div>`
    +(isGF()?`<button class="btn btn-dk" onclick="addZiel()">+ Neues Ziel</button>`:'')
    +'</div>';

  S.ziele.forEach(z=>{
    const f=FARBEN[z.farbe]||FARBEN[0];
    const verantw=person(z.verantwortlichId);
    const pct=zielPct(z);
    const okK=(z.kpis||[]).filter(kpiOk).length;
    const badK=(z.kpis||[]).filter(k=>!kpiOk(k));
    const zA=S.aufgaben.filter(a=>a.zielId===z.id&&a.status!=='erledigt'&&canSee(a));

    out+=`<div class="zcard" style="background:${f.bg};border-color:${f.bd}">`;

    // Header
    out+=`<div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:14px">`
      +`<div style="flex:1">`
      +`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap">`
      +`<div style="font-size:15px;font-weight:700;color:${f.tc}">${z.name}</div>`
      +(verantw?`<span style="font-size:11px;color:${f.tc};opacity:.7">Verantw.: ${verantw.name}</span>`:'')
      +(isGF()?`<button onclick="editZiel('${z.id}')" style="font-size:10px;padding:2px 8px;border-radius:6px;border:0.5px solid ${f.bd};background:rgba(255,255,255,.5);color:${f.tc};cursor:pointer;font-family:inherit;opacity:.7">bearbeiten</button>`:'')
      +`</div>`
      +`<div style="display:flex;align-items:center;gap:10px"><div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:${pct>=70?f.tc:'#f59e0b'}"></div></div><span style="font-size:13px;font-weight:700;color:${pct>=70?f.tc:'#c2410c'};min-width:36px">${pct}%</span></div>`
      +`<div style="font-size:11px;color:${f.tc};opacity:.65;margin-top:3px">${pct>=70?'✓ Auf Kurs':'⚠ Unter Plan'}${z.kpis.length?' · '+okK+'/'+z.kpis.length+' KPIs auf Kurs':''}</div>`
      +`</div>`
      +(badK.length?`<div style="background:var(--red-bg);border:1px solid var(--red-bd);border-radius:9px;padding:8px 10px;min-width:140px;flex-shrink:0"><div style="font-size:10px;font-weight:600;color:var(--red);margin-bottom:4px">Handlungsbedarf</div>${badK.map(k=>`<div style="font-size:10px;color:var(--red)">· ${k.label}: ${k.ist}${k.unit||''} → ${k.ziel}${k.unit||''}</div>`).join('')}</div>`:'')
      +`</div>`;

    // KPIs
    if(z.kpis.length||isGF()){
      out+=`<details style="margin-bottom:14px"><summary style="cursor:pointer;font-size:10px;font-weight:700;color:${f.tc};opacity:.65;text-transform:uppercase;letter-spacing:.5px;list-style:none">▸ KPIs (${z.kpis.length})</summary>`;
      out+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px;margin-top:10px">`;
      z.kpis.forEach(k=>{
        const val=kpiVal(k),ok=kpiOk(k),p2=person(k.pid);
        const pct2=k.inv?Math.max(0,100-Math.round(Math.max(0,val-k.ziel)/Math.max(k.ziel,.1)*100)):Math.round(Math.min(100,val/(k.ziel||1)*100));
        const isMe=k.pid===aP;
        out+=`<div ${isGF()?`onclick="editKpiDef('${z.id}','${k.id}')" style="cursor:pointer;"`:''} style="background:rgba(255,255,255,.75);border:${isMe?`2px solid ${f.tc}`:`0.5px solid ${f.bd}`};border-radius:10px;padding:11px 12px;position:relative">`
          +(isMe?`<div style="position:absolute;top:6px;right:8px;font-size:9px;background:${f.tc};color:#fff;padding:1px 5px;border-radius:99px;font-weight:600">Ich</div>`:'')
          +`<div style="font-size:9px;color:var(--t3);margin-bottom:3px;text-transform:uppercase">${p2?p2.name:'–'} · ${k.freq}</div>`
          +`<div style="font-size:20px;font-weight:700;color:${ok?f.tc:'var(--red)'};line-height:1;margin-bottom:2px">${val}${k.unit||''}</div>`
          +`<div style="font-size:11px;font-weight:600;margin-bottom:1px">${k.label}</div>`
          +`<div style="font-size:9px;color:var(--t3);margin-bottom:6px">Ziel: ${k.ziel}${k.unit||''}</div>`
          +`<div style="height:3px;border-radius:99px;background:rgba(0,0,0,.07);overflow:hidden"><div style="height:100%;border-radius:99px;background:${ok?f.tc:'var(--red)'};width:${Math.max(0,Math.min(100,pct2))}%"></div></div></div>`;
      });
      if(isGF())out+=`<div onclick="addKpi('${z.id}')" style="border:1.5px dashed ${f.bd};border-radius:10px;padding:11px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:${f.tc};gap:4px;opacity:.5;min-height:90px" onmouseenter="this.style.opacity='0.9'" onmouseleave="this.style.opacity='0.5'"><span style="font-size:20px">+</span><span style="font-size:11px">KPI</span></div>`;
      out+='</div></details>';
    }

    // Teilziele
    out+=`<div style="font-size:10px;font-weight:700;color:${f.tc};opacity:.65;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Teilziele</div>`;
    (z.teilziele||[]).forEach(tz=>{
      const tzV=person(tz.verantwortlichId),tzA=zA.filter(a=>a.teilzielId===tz.id);
      out+=`<div class="tz-block" style="${tz.erledigt?'opacity:.55':''}">`
        +`<div class="tz-head">`
        +(canManageTZ(z.id)?`<input type="checkbox" ${tz.erledigt?'checked':''} onclick="toggleTZ('${z.id}','${tz.id}')" style="flex-shrink:0">`:'')
        +`<div style="flex:1"><span class="tz-title${tz.erledigt?' tz-done':''}">${tz.name}</span>`
        +`<div style="display:flex;gap:8px;margin-top:2px">`
        +(tzV?`<span style="font-size:10px;color:var(--purple);opacity:.7">${tzV.name}</span>`:'')
        +(tz.datum?`<span style="font-size:10px;color:var(--purple);opacity:.7">bis ${tz.datum.slice(8)}.${tz.datum.slice(5,7)}.</span>`:'')
        +`</div></div>`
        +`<div style="display:flex;gap:5px">`
        +(canManageTZ(z.id)?`<button onclick="editTZ('${z.id}','${tz.id}')" style="font-size:10px;padding:2px 8px;border-radius:6px;border:1px solid var(--purple-bd);background:rgba(255,255,255,.5);color:var(--purple);cursor:pointer;font-family:inherit">···</button>`:'')
        +`<button onclick="openNeu({zielId:'${z.id}',teilzielId:'${tz.id}'})" style="font-size:10px;padding:2px 8px;border-radius:6px;border:1px solid var(--purple-bd);background:rgba(255,255,255,.5);color:var(--purple);cursor:pointer;font-family:inherit">+ Aufgabe</button>`
        +`</div></div>`;
      if(tzA.length){
        out+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px">';
        tzA.forEach(a=>{
          const p2=person(a.pid);
          out+=`<div onclick="openDetail('${a.id}')" style="background:rgba(255,255,255,.6);border:0.5px solid var(--purple-bd);border-radius:7px;padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:6px;cursor:pointer" onmouseenter="this.style.background='rgba(255,255,255,.95)'" onmouseleave="this.style.background='rgba(255,255,255,.6)'">`
            +`<span style="font-size:8px;color:${a.status==='aktiv'?'var(--blue)':a.status==='erledigt'?'var(--green)':'var(--t3)'}">●</span>`
            +`<span>${a.titel}</span>`
            +(p2?`<span style="color:var(--t3);font-size:10px">· ${p2.name}</span>`:'')
            +prioTag(a.prio)
            +(a.status==='erledigt'?'<span style="font-size:9px;color:var(--green)">✓</span>':'')
            +'</div>';
        });
        out+='</div>';
      }
      out+='</div>';
    });
    if(canManageTZ(z.id))out+=`<button class="tz-add-btn" onclick="openAddTZ('${z.id}')">+ Teilziel hinzufügen</button>`;

    // + Aufgabe Button
    out+=`<div style="margin-top:10px"><button onclick="openNeu({zielId:'${z.id}'})" style="width:100%;padding:9px;border-radius:10px;border:1.5px dashed ${f.bd};background:transparent;color:${f.tc};font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;opacity:.7" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.7'">+ Aufgabe zu diesem Ziel hinzufügen</button></div>`;

    // Weitere Aufgaben ohne Teilziel
    const aOhneTZ=zA.filter(a=>!a.teilzielId);
    if(aOhneTZ.length){
      out+=`<div style="font-size:10px;font-weight:700;color:${f.tc};opacity:.65;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px">Weitere Aufgaben</div>`;
      out+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
      aOhneTZ.forEach(a=>{const p2=person(a.pid);out+=`<div style="background:rgba(255,255,255,.75);border:0.5px solid ${f.bd};border-radius:8px;padding:5px 10px;font-size:11px;display:flex;align-items:center;gap:5px"><span style="font-size:8px;color:${a.status==='aktiv'?f.tc:'var(--t3)'}">●</span>${a.titel}${p2?`<span style="color:var(--t3);font-size:10px">· ${p2.name}</span>`:''}</div>`;});
      out+='</div>';
    }
    out+='</div>';
  });
  document.getElementById('main').innerHTML=out;
}

async function toggleTZ(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const tz=(z.teilziele||[]).find(t=>t.id===tzid);if(!tz)return;
  tz.erledigt=!tz.erledigt;
  await dbPatch('teilziele',tzid,{erledigt:tz.erledigt});rZiele();
}
function openAddTZ(zid){
  document.getElementById('mb').innerHTML=`<div class="mt">Teilziel hinzufügen</div>`
    +`<div class="fl"><label>Name</label><input id="tzn" placeholder="z.B. Messe München vorbereitet" autofocus></div>`
    +`<div class="f2"><div class="fl"><label>Verantwortlich</label><select id="tzv">${S.personen.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div>`
    +`<div class="fl"><label>Bis wann</label><input type="date" id="tzd"></div></div>`
    +`<div class="mf"><button class="btn btn-gr" onclick="cm()">Abbrechen</button><button class="btn btn-dk" onclick="saveTZ('${zid}',null)">Speichern</button></div>`;
  document.getElementById('ovl').classList.add('open');
}
function editTZ(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const tz=(z.teilziele||[]).find(t=>t.id===tzid);if(!tz)return;
  document.getElementById('mb').innerHTML=`<div class="mt">Teilziel bearbeiten</div>`
    +`<div class="fl"><label>Name</label><input id="tzn" value="${tz.name}" autofocus></div>`
    +`<div class="f2"><div class="fl"><label>Verantwortlich</label><select id="tzv">${S.personen.map(p=>`<option value="${p.id}"${tz.verantwortlichId===p.id?' selected':''}>${p.name}</option>`).join('')}</select></div>`
    +`<div class="fl"><label>Bis wann</label><input type="date" id="tzd" value="${tz.datum||''}"></div></div>`
    +`<div class="mf"><button class="btn btn-red" onclick="delTZ('${zid}','${tzid}')">Löschen</button><button class="btn btn-gr" onclick="cm()">Abbrechen</button><button class="btn btn-dk" onclick="saveTZ('${zid}','${tzid}')">Speichern</button></div>`;
  document.getElementById('ovl').classList.add('open');
}
async function saveTZ(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const name=document.getElementById('tzn').value.trim();if(!name)return;
  const vid=document.getElementById('tzv').value,datum=document.getElementById('tzd').value;
  if(tzid){
    const tz=(z.teilziele||[]).find(t=>t.id===tzid);
    if(tz){tz.name=name;tz.verantwortlichId=vid;tz.datum=datum;}
    await dbPatch('teilziele',tzid,{name,verantwortlich_id:vid,datum:datum||null});
  } else {
    const id=nid('tz'),rec={id,ziel_id:zid,name,verantwortlich_id:vid,datum:datum||null,erledigt:false};
    z.teilziele=z.teilziele||[];
    z.teilziele.push({...rec,zielId:zid,verantwortlichId:vid,datum:datum||''});
    await dbInsert('teilziele',rec);
  }
  cm();rZiele();
}
async function delTZ(zid,tzid){
  if(!confirm('Teilziel löschen?'))return;
  const z=zielObj(zid);if(!z)return;
  z.teilziele=(z.teilziele||[]).filter(t=>t.id!==tzid);
  S.aufgaben.forEach(a=>{if(a.teilzielId===tzid)a.teilzielId=null;});
  await dbDelete('teilziele',tzid);cm();rZiele();
}

async function addZiel(){
  const id=nid('z'),rec={id,name:'Neues Ziel',farbe:Math.floor(Math.random()*FARBEN.length),pct:0,verantwortlich_id:null};
  S.ziele.push({...rec,verantwortlichId:null,kpis:[],teilziele:[]});

  rZiele();editZiel(id);
}
function editZiel(zid){
  const z=S.ziele.find(x=>x.id===zid);if(!z)return;
  document.getElementById('mb').innerHTML=`<div class="mt">Ziel bearbeiten</div>`
    +`<div class="fl"><label>Name</label><input id="zn" value="${z.name}" autofocus></div>`
    +`<div class="fl"><label>Verantwortlich</label><select id="zver"><option value="">— niemand —</option>${S.personen.map(p=>`<option value="${p.id}"${z.verantwortlichId===p.id?' selected':''}>${p.name}</option>`).join('')}</select></div>`
    +`<div class="fl"><label>Farbe</label><div style="display:flex;gap:8px;margin-top:4px">${FARBEN.map((f,i)=>`<div onclick="selZF(${i})" id="zfc${i}" style="width:24px;height:24px;border-radius:50%;background:${f.tc};cursor:pointer;border:${(z.farbe||0)===i?'3px':'2px'} solid ${(z.farbe||0)===i?'var(--text)':'transparent'}"></div>`).join('')}</div></div>`
    +`<input type="hidden" id="zfarbe" value="${z.farbe||0}">`
    +`<div class="mf"><button class="btn btn-red" onclick="delZiel('${zid}')">Löschen</button><button class="btn btn-gr" onclick="cm()">Abbrechen</button><button class="btn btn-dk" onclick="saveZiel('${zid}')">Speichern</button></div>`;
  document.getElementById('ovl').classList.add('open');
}
function selZF(i){
  document.getElementById('zfarbe').value=i;
  FARBEN.forEach((_,j)=>{const el=document.getElementById('zfc'+j);if(el)el.style.border=(j===i?'3px solid var(--text)':'2px solid transparent');});
}
async function saveZiel(zid){
  const z=S.ziele.find(x=>x.id===zid);if(!z)return;
  const name=document.getElementById('zn').value.trim()||z.name;
  const verantwortlichId=document.getElementById('zver').value||null;
  const farbe=parseInt(document.getElementById('zfarbe').value)||0;
  z.name=name;z.verantwortlichId=verantwortlichId;z.farbe=farbe;
  await dbPatch('ziele',zid,{name,verantwortlich_id:verantwortlichId,farbe});
  cm();rZiele();
}
async function delZiel(zid){
  if(!confirm('Ziel wirklich löschen?'))return;
  // Erst Aufgaben des Ziels entzielen
  S.aufgaben.forEach(a=>{if(a.zielId===zid){a.zielId=null;a.teilzielId=null;a.typ='operativ';}});
  await supa('aufgaben?ziel_id=eq.'+zid,{method:'PATCH',body:{ziel_id:null,teilziel_id:null,typ:'operativ'},prefer:'return=minimal'});
  // Dann KPIs löschen
  const z=zielObj(zid);
  if(z)(z.kpis||[]).forEach(k=>dbDelete('kpis',k.id));
  // Dann Teilziele löschen
  if(z)(z.teilziele||[]).forEach(t=>dbDelete('teilziele',t.id));
  // Dann Ziel löschen
  S.ziele=S.ziele.filter(x=>x.id!==zid);
  await dbDelete('ziele',zid);
  cm();rZiele();
}

// KPI CRUD
async function addKpi(zid){
  const z=zielObj(zid);if(!z)return;
  const id=nid('k'),rec={id,ziel_id:zid,label:'Neuer KPI',ist:0,ziel:10,unit:'',freq:'täglich',pid:S.personen[0]?.id||'',inv:false};
  z.kpis.push({...rec,zielId:zid});
  await dbInsert('kpis',rec);rZiele();editKpiDef(zid,id);
}
function editKpiDef(zid,kid){
  if(!isGF())return;
  const z=zielObj(zid);if(!z)return;const k=z.kpis.find(x=>x.id===kid);if(!k)return;
  document.getElementById('mb').innerHTML=`<div class="mt">KPI bearbeiten</div>`
    +`<div class="fl"><label>Name</label><input id="kl" value="${k.label}" autofocus></div>`
    +`<div class="f2"><div class="fl"><label>Ist-Wert</label><input id="ki" type="number" value="${k.ist}"></div><div class="fl"><label>Ziel-Wert</label><input id="kz" type="number" value="${k.ziel}"></div></div>`
    +`<div class="f2"><div class="fl"><label>Einheit</label><input id="ku" value="${k.unit||''}" placeholder="%, Stk…"></div><div class="fl"><label>Rhythmus</label><select id="kf">${FREQ.map(f=>`<option${k.freq===f?' selected':''}>${f}</option>`).join('')}</select></div></div>`
    +`<div class="fl"><label>Verantwortlich</label><select id="kp">${S.personen.map(p=>`<option value="${p.id}"${k.pid===p.id?' selected':''}>${p.name}</option>`).join('')}</select></div>`
    +`<div class="fl"><label style="text-transform:none;font-size:13px;font-weight:400;display:flex;align-items:center;gap:8px"><input type="checkbox" id="kinv"${k.inv?' checked':''} style="width:auto"> Niedriger ist besser</label></div>`
    +`<div class="mf"><button class="btn btn-red" onclick="delKpi('${zid}','${kid}')">Löschen</button><button class="btn btn-gr" onclick="cm()">Abbrechen</button><button class="btn btn-dk" onclick="saveKpi('${zid}','${kid}')">Speichern</button></div>`;
  document.getElementById('ovl').classList.add('open');
}
async function saveKpi(zid,kid){
  const z=zielObj(zid);if(!z)return;const k=z.kpis.find(x=>x.id===kid);if(!k)return;
  k.label=document.getElementById('kl').value.trim()||k.label;
  k.ist=parseFloat(document.getElementById('ki').value)||0;
  k.ziel=parseFloat(document.getElementById('kz').value)||0;
  k.unit=document.getElementById('ku').value;
  k.freq=document.getElementById('kf').value;
  k.pid=document.getElementById('kp').value;
  k.inv=document.getElementById('kinv').checked;
  await dbPatch('kpis',kid,{label:k.label,ist:k.ist,ziel:k.ziel,unit:k.unit,freq:k.freq,pid:k.pid,inv:k.inv});
  cm();rZiele();
}
async function delKpi(zid,kid){
  const z=zielObj(zid);if(!z)return;
  z.kpis=z.kpis.filter(x=>x.id!==kid);
  await dbDelete('kpis',kid);cm();rZiele();
}

function openNeu(pf={}){
  _selPrio=pf.prio||null;
  // Wer bekommt die Aufgabe — immer realMe als Default, nie aP wenn fremdes Profil
  const defaultPid=pf.pid||realMe||aP;

  document.getElementById('mb').innerHTML=`<div class="mt">Neue Aufgabe</div>`
    +`<div class="fl"><label>Was soll gemacht werden?</label><input id="nt" value="${pf.titel||''}" placeholder="Konkret und aktiv formulieren…" autofocus></div>`
    +`<div class="f2"><div class="fl"><label>Wer?</label><select id="np">${S.personen.map(p=>`<option value="${p.id}"${defaultPid===p.id?' selected':''}>${p.name}</option>`).join('')}</select></div>`
    +`<div class="fl"><label>Typ</label><select id="ntyp" onchange="updateNeuForm()">`
    +`<option value="strategisch"${pf.zielId?'':''}>Strategisch (hat Ziel)</option>`
    +`<option value="operativ"${!pf.zielId&&!pf.random?' selected':''}>Operativ</option>`
    +`<option value="random"${pf.random?' selected':''}>Random</option>`
    +`</select></div></div>`
    +`<div id="neu-ziel-wrap" class="fl"><label>Ziel</label><select id="nziel" onchange="updateNeuTZ()">${S.ziele.map(z=>`<option value="${z.id}"${pf.zielId===z.id?' selected':''}>${z.name}</option>`).join('')}</select></div>`

async function runAI(){
  const inp=document.getElementById('ai-inp').value.trim();if(!inp)return;
  const out=document.getElementById('ai-out');
  out.innerHTML=`<div style="padding:10px;color:var(--purple);font-size:12px">⟳ KI denkt nach…</div>`;
  const sys=`Du bist Assistent für Halleluja OS. Extrahiere eine Aufgabe und antworte NUR mit JSON:
{"titel":"...","pid":"lu|si|kr|do|fa","typ":"strategisch|operativ|random","zielId":"z1|z2|z3|null","teilzielId":"tz1|tz2|tz3|tz4|null","prio":"P1|P2|P3|null","dl":"YYYY-MM-DD|null","notiz":"..."}
Personen: lu=Ludwig,si=Simon,kr=Kristina,do=Dominic,fa=Fabian
Ziele: z1=Umsatz Q2,z2=After Sales,z3=Qualität — nur wenn typ=strategisch
Teilziele: tz1=Messe München,tz2=Pipeline KW16,tz3=Tourenoptimierung,tz4=Wartung
Heute: ${TODAY}. Freitag=2026-04-10.`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:sys,messages:[{role:'user',content:inp}]})});
    const data=await resp.json();
    const text=data.content?.map(c=>c.text||'').join('')||'';
    let parsed;
    try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim());}
    catch(e){out.innerHTML=`<div class="ai-result" style="background:var(--red-bg);border-color:var(--red-bd)">Konnte nicht verarbeiten.</div>`;return;}
    const p2=person(parsed.pid),z2=parsed.zielId?zielObj(parsed.zielId):null;
    const tzN=parsed.teilzielId&&parsed.zielId?(zielObj(parsed.zielId)?.teilziele||[]).find(t=>t.id===parsed.teilzielId)?.name:null;
    const ti=TYP_INFO[parsed.typ]||TYP_INFO.operativ;
    const safeJ=JSON.stringify(parsed).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    out.innerHTML=`<div class="ai-result">`
      +`<div style="font-size:13px;font-weight:600;margin-bottom:8px">${parsed.titel}</div>`
      +`<div style="display:flex;gap:5px;flex-wrap:wrap">`
      +(p2?`<span class="tag" style="background:var(--blue-bg);color:var(--blue)">${p2.name}</span>`:'')
      +`<span class="tag" style="background:${ti.bg};color:${ti.tc}">${ti.label}</span>`
      +(parsed.prio?prioTag(parsed.prio):'')
      +(z2?`<span class="tag" style="background:var(--green-bg);color:var(--green)">${z2.name}</span>`:'')
      +(tzN?`<span class="tag" style="background:var(--purple-bg);color:var(--purple)">${tzN}</span>`:'')
      +(parsed.dl?dlTag(parsed.dl):'')
      +`</div>${parsed.notiz?`<div style="font-size:11px;color:var(--t2);margin-top:6px;font-style:italic">${parsed.notiz}</div>`:''}</div>`
      +`<div class="mf" style="margin-top:10px"><button class="btn btn-gr" onclick="openAI()">Nochmal</button><button class="btn btn-purple" onclick="confirmAI('${safeJ}')">✓ Aufgabe anlegen</button></div>`;
  }catch(e){out.innerHTML=`<div class="ai-result" style="background:var(--red-bg);border-color:var(--red-bd)">Fehler: ${e.message}</div>`;}
}

async function saveTeam(tid){
  const name=document.getElementById('tn').value.trim();if(!name)return;
  const checked=[...document.querySelectorAll('#mb input[type=checkbox]:checked')].map(c=>c.value);

  if(tid){
    const t=S.teams.find(x=>x.id===tid);if(!t)return;
    const oldMembers=[...t.members];
    t.name=name;t.members=checked;
    // Personen-Teams aktualisieren
    S.personen.forEach(p=>{
      const wasIn=oldMembers.includes(p.id),isIn=checked.includes(p.id);
      if(wasIn&&!isIn)p.teams=(p.teams||[]).filter(x=>x!==tid);
      if(!wasIn&&isIn){p.teams=p.teams||[];if(!p.teams.includes(tid))p.teams.push(tid);}
    });
    await dbPatch('teams',tid,{name,members:checked});
  } else {
    const id=nid('t'),rec={id,name,members:checked};
    S.teams.push(rec);
    await dbInsert('teams',rec);
    // Personen zuordnen
    checked.forEach(pid=>{const p=person(pid);if(p&&!p.teams.includes(id))p.teams.push(id);});
  }
  // Personen in DB updaten
  await Promise.all(S.personen.map(p=>dbPatch('personen',p.id,{teams:p.teams})));
  openSettings();render();
}

async function delTeam(tid){
  if(!confirm('Team löschen?'))return;
  S.teams=S.teams.filter(x=>x.id!==tid);
  S.personen.forEach(p=>{p.teams=(p.teams||[]).filter(x=>x!==tid);});
  await dbDelete('teams',tid);
  await Promise.all(S.personen.map(p=>dbPatch('personen',p.id,{teams:p.teams})));
  openSettings();render();
}

    +`<div class="fl"><label>PIN (4 Ziffern)</label><input id="upin" type="password" maxlength="4" placeholder="z.B. 6789"></div>`
    +`<div class="mf"><button class="btn btn-gr" onclick="openSettings()">Zurück</button><button class="btn btn-dk" onclick="saveNutzer()">Hinzufügen</button></div>`;
  document.getElementById('ovl').classList.add('open');
}
async function saveNutzer(){
  const name=document.getElementById('un').value.trim(),k=document.getElementById('uk').value.trim().toUpperCase().slice(0,3);
  if(!name||!k)return;
  const pin=document.getElementById('upin').value.trim();
  if(!pin||pin.length!==4||!/^\d{4}$/.test(pin)){alert('4-stellige PIN erforderlich.');return;}
  const tid=document.getElementById('ut').value,id='u'+Date.now(),ci=S.personen.length%CL.length;
  const p={id,name,k,rolle:document.getElementById('ur').value.trim()||'Teammitglied',stufe:document.getElementById('ust').value,ci,teams:[tid],pin};
  S.personen.push(p);
  await dbInsert('personen',p);
  const t=S.teams.find(x=>x.id===tid);
  if(t){t.members.push(id);await dbPatch('teams',tid,{members:t.members});}
  // Login sofort aktualisieren
  initLogin();
  openSettings();render();
}

// ═══════════════════════════════════════════════
// TIMERS
// ═══════════════════════════════════════════════
function startTimers(){
  if(timIv)clearInterval(timIv);
  timIv=setInterval(()=>{
    // Aufgaben-Timer
    document.querySelectorAll('[data-tid]').forEach(el=>{
      const a=S.aufgaben.find(x=>x.id===el.dataset.tid);if(!a)return;
      const s=elapsedSec(a),pct=Math.min(100,Math.round(s/((a.geplant||1)*3600)*100));
      const n=el.querySelector('.tn'),f=el.querySelector('.tf');
      if(n)n.textContent=fmt(s);if(f)f.style.width=pct+'%';
    });
    // Live-Uhr
    const now=new Date();
    const hh=('0'+now.getHours()).slice(-2),mm=('0'+now.getMinutes()).slice(-2);
    const clock=document.getElementById('live-clock');
    if(clock)clock.textContent=hh+':'+mm;
    // Fokuszeit-Banner
    if(aP){
      const p=me();
      if(p){
        const fs=p.fokus_start||'09:00',fe=p.fokus_end||'11:00';
        const [fsh,fsm]=fs.split(':').map(Number),[feh,fem]=fe.split(':').map(Number);
        const nowMin=now.getHours()*60+now.getMinutes();
        const startMin=fsh*60+fsm,endMin=feh*60+fem;
        const inFokus=nowMin>=startMin&&nowMin<endMin;
        const banner=document.getElementById('fokus-banner'),label=document.getElementById('fokus-label');
        if(banner&&label){
          banner.style.display=inFokus?'flex':'none';
          if(inFokus)label.textContent=`Fokuszeit bis ${fe} — bitte nicht stören`;
        }
      }
    }
  },1000);
}

function cm(){document.getElementById('ovl').classList.remove('open');}
window.addEventListener('keydown',e=>{if(e.key==='Escape')cm();});

(async()=>{
  document.getElementById('login-screen').innerHTML=`<div style="font-size:13px;color:var(--t3);text-align:center;padding-top:40vh">Lädt…</div>`;
  await loadData();

  document.getElementById('login-screen').innerHTML=`<div class="login-box">
    <div class="login-title">Halleluja OS</div>
    <div class="login-sub">Wer bist du heute?</div>
    <div class="person-grid" id="person-grid"></div>
    <div id="pin-section" style="display:none">
      <div class="pin-row">
        <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-pad" id="pin-pad"></div>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>`;
  initLogin();

  // Session prüfen
  try{
    const raw=localStorage.getItem('h_session');
    if(raw){
      const s=JSON.parse(raw);
      const ttl=8*60*60*1000;
      if(Date.now()-s.ts<ttl&&person(s.pid)){
        aP=s.pid;realMe=s.pid;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').style.display='flex';
        updateBadge();render();
        if(shouldCheckin())showCheckin();
      } else {
        localStorage.removeItem('h_session');
      }
    }
  }catch(e){}

  // Auto-Logout alle 60 Sekunden prüfen
  setInterval(()=>{
    if(!aP)return;
    try{
      const raw=localStorage.getItem('h_session');
      if(!raw){logout();return;}
      const s=JSON.parse(raw);
      if(Date.now()-s.ts>8*60*60*1000){logout();alert('Du wurdest nach 8 Stunden automatisch ausgeloggt.');}
    }catch(e){}
  },60000);
})();

      out+='<button onclick="editZiel(\''+z.id+'\')" style="font-size:11px;padding:3px 9px;border-radius:7px;border:1px solid var(--bd);background:var(--gray-bg);color:var(--t2);cursor:pointer;font-family:inherit">···</button>';
      out+='</div>';
    }
    out+='</div>';

    // KPI grid (compact, always visible)
    if(visKpis.length||isGF()){
      out+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:16px">';
      visKpis.forEach(k=>{
        const val=kpiVal(k),ok=kpiOk(k),p2=person(k.pid),isMe=String(k.pid)===String(aP);
        out+='<div '+(isGF()?'onclick="editKpiDef(\''+z.id+'\',\''+k.id+'\')" style="cursor:pointer"':'')+' style="background:var(--sf);border:'+(isMe?'1.5px solid '+f.tc:'1px solid '+f.bd)+';border-radius:9px;padding:9px 11px">';
        out+='<div style="font-size:9px;color:var(--t3);margin-bottom:3px">'+(p2?p2.name:'–')+'</div>';
        out+='<div style="font-size:19px;font-weight:800;color:'+(ok?f.tc:'var(--red)')+';line-height:1;margin-bottom:1px">'+val+(k.unit||'')+'</div>';
        out+='<div style="font-size:11px;font-weight:600;color:var(--t2)">'+k.label+'</div>';
        out+='<div style="font-size:10px;color:var(--t3)">Ziel: '+k.ziel+(k.unit||'')+'</div>';
        out+='</div>';
      });
      if(isGF())out+='<div onclick="addKpi(\''+z.id+'\')" style="border:1.5px dashed var(--bd);border-radius:9px;padding:9px 11px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);font-size:22px" onmouseenter="this.style.color=\''+f.tc+'\'" onmouseleave="this.style.color=\'var(--t3)\'">+</div>';
      out+='</div>';
    }

    // Meilensteine
    const myTZ=(z.teilziele||[]).filter(tz=>(!tz.vertraulich||isGF()||tz.verantwortlichId===aP));
    if(myTZ.length||isGF()){
      out+='<div style="border-top:1px solid '+f.bd+';padding-top:12px">';
      out+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:'+f.tc+';margin-bottom:8px">Meilensteine</div>';
      myTZ.forEach(tz=>{
        const tzV=person(tz.verantwortlichId),tzA=zA.filter(a=>a.teilzielId===tz.id);
        // Each Teilziel = mini-card (Option B: weiß + Zielfarbe-Border)
        out+='<div style="border:1px solid '+f.bd+';border-radius:10px;margin-bottom:8px;overflow:hidden;'+(tz.erledigt?'opacity:.5;':'')+'background:var(--sf)">';
        // Header row — weißer Hintergrund
        out+='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--sf)">';
        if(canManageTZ(z.id))out+='<input type="checkbox" '+(tz.erledigt?'checked':'')+' onclick="toggleTZ(\''+z.id+'\',\''+tz.id+'\')" style="flex-shrink:0;margin:0;width:15px;height:15px;accent-color:'+f.tc+'">';
        out+='<div style="flex:1;min-width:0;cursor:pointer" onclick="'+(canManageTZ(z.id)?'editTZ(\''+z.id+'\',\''+tz.id+'\')':'')+'">';
        out+='<div style="font-size:13px;font-weight:600;color:var(--text);'+(tz.erledigt?'text-decoration:line-through;':'')+'white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(tz.name)+'</div>';
        const _wrT=dieseWocheReset(aP),_inB3=_wrT&&[_wrT.big3_1_tz_id,_wrT.big3_2_tz_id,_wrT.big3_3_tz_id].some(x=>x===tz.id);
        if(tzV||tz.datum||_inB3)out+='<div style="font-size:10px;color:var(--t2);margin-top:1px;display:flex;gap:5px;align-items:center">'+(_inB3?'<span style="font-size:9px;font-weight:700;color:'+f.tc+';background:'+f.bg+';border:1px solid '+f.bd+';padding:0 6px;border-radius:99px">● KW '+getKW().kw+'</span>':'')+(tzV?tzV.name:'')+(tz.datum?' · '+tz.datum.slice(8)+'.'+tz.datum.slice(5,7)+'.':'')+'</div>';
        out+='</div>';
        if(tzA.length)out+='<span style="font-size:10px;color:'+f.tc+';background:'+f.bg+';border:1px solid '+f.bd+';padding:1px 7px;border-radius:99px;flex-shrink:0;font-weight:600">'+tzA.length+'</span>';
        out+='</div>';
        // Aufgaben inside card
        if(tzA.length){
          tzA.forEach(a=>{
            const p2=person(a.pid);
            out+='<div onclick="openDetail(\''+a.id+'\')" style="display:flex;align-items:center;gap:8px;padding:8px 12px 8px '+(canManageTZ(z.id)?'37':'12')+'px;border-top:1px solid '+f.bd+';cursor:pointer;background:var(--sf)" onmouseenter="this.style.background=\''+f.bg+'\'" onmouseleave="this.style.background=\'var(--sf)\'">';
            out+='<span style="font-size:8px;color:'+(a.status==='aktiv'?'var(--blue)':'var(--t3)')+'">●</span>';
            out+='<span style="flex:1;font-size:12px;color:var(--text)">'+esc(a.titel)+'</span>';
            if(p2)out+='<span style="font-size:10px;color:var(--t2)">'+p2.name+'</span>';
            out+=prioTag(a.prio,null,false);
            out+='</div>';
          });
        }
        // + Aufgabe footer
        out+='<div style="padding:7px 12px;border-top:1px solid '+f.bd+';background:'+f.bg+'">';
        out+='<button onclick="openNeu({zielId:\''+z.id+'\',teilzielId:\''+tz.id+'\'})" style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid '+f.bd+';background:var(--sf);color:'+f.tc+';font-weight:500;cursor:pointer;font-family:inherit">+ Aufgabe</button>';
        out+='</div>';
        out+='</div>';
      });
      out+='</div>';
    }

    // Aufgaben ohne Teilziel
    const aOhneTZ=zA.filter(a=>!a.teilzielId);
    if(aOhneTZ.length){
      out+='<div style="border-top:1px solid var(--bd);padding-top:10px;margin-top:4px">';
      out+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:6px">Weitere Aufgaben</div>';
      out+='<div style="display:flex;flex-direction:column;gap:3px">';
      aOhneTZ.forEach(a=>{
        const p2=person(a.pid);
        out+='<div onclick="openDetail(\''+a.id+'\')" style="display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:7px;border:1px solid var(--bd);background:var(--gray-bg);cursor:pointer">';
        out+='<span style="font-size:8px;color:'+(a.status==='aktiv'?'var(--blue)':'var(--t3)')+'">●</span>';
        out+='<span style="flex:1;font-size:11px">'+esc(a.titel)+'</span>';
        if(p2)out+='<span style="font-size:10px;color:var(--t3)">'+p2.name+'</span>';
        out+=prioTag(a.prio,null,false);
        out+='</div>';
      });
      out+='</div></div>';
    }

    // Footer buttons
    out+='<div style="display:flex;align-items:center;gap:8px;margin-top:12px">';
    if(canManageTZ(z.id))out+='<button onclick="openAddTZ(\''+z.id+'\')" style="font-size:13px;font-weight:600;padding:8px 18px;border-radius:8px;border:none;background:'+f.tc+';color:#fff;cursor:pointer;font-family:inherit">+ Meilenstein</button>';
    out+='<button onclick="openNeu({zielId:\''+z.id+'\'})" style="font-size:11px;padding:8px 14px;border-radius:8px;border:1px solid '+f.bd+';background:transparent;color:'+f.tc+';cursor:pointer;font-family:inherit">+ Aufgabe</button>';
    out+='</div>';

    out+='</div>'; // end sektion
  });

  // Andere Ziele
  if(andereZiele.length){
    out+='<div style="margin-top:8px">';
    out+='<div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Unternehmensziele</div>';
    andereZiele.forEach(z=>{
      const f=FARBEN[z.farbe]||FARBEN[0],verantw=person(z.verantwortlichId);
      out+='<div style="border-left:3px solid '+f.tc+';padding:0 0 12px 16px;margin-bottom:4px">';
      out+='<div style="font-size:13px;font-weight:700;color:var(--text)">'+esc(z.name)+'</div>';
      if(verantw)out+='<div style="font-size:10px;color:var(--t3);margin-top:1px">'+esc(verantw.name)+'</div>';
      out+='</div>';
    });
    out+='</div>';
  }

  document.getElementById('main').innerHTML=out;
}

async function toggleTZ(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const tz=(z.teilziele||[]).find(t=>t.id===tzid);if(!tz)return;
  tz.erledigt=!tz.erledigt;
  await dbPatch('teilziele',tzid,{erledigt:tz.erledigt});
  if(tz.erledigt){celebrate('🎯','Meilenstein erreicht!');notify('meilenstein_erledigt',{meilenstein:tz.name,ziel:z.name});}
  rZiele();
}
function openAddTZ(zid){
  document.getElementById('mb').innerHTML='<div class="mt">Meilenstein hinzufügen</div>'
    +'<div class="fl"><label>Name</label><input id="tzn" placeholder="z.B. Messe München vorbereitet" autofocus></div>'
    +'<div class="f2"><div class="fl"><label>Verantwortlich</label><select id="tzv">'+S.personen.map(p=>'<option value="'+p.id+'">'+esc(p.name)+'</option>').join('')+'</select></div>'
    +'<div class="fl"><label>Bis wann</label><input type="date" id="tzd"></div></div>'
    +'<div class="mf"><button class="btn btn-gr" onclick="cm()">Abbrechen</button><button class="btn btn-dk" onclick="saveTZ(\''+zid+'\',null)">Speichern</button></div>';
  document.getElementById('ovl').classList.add('open');
}
function editTZ(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const tz=(z.teilziele||[]).find(t=>t.id===tzid);if(!tz)return;
  const zielOpts=S.ziele.map(zl=>'<option value="'+zl.id+'"'+(zl.id===zid?' selected':'')+'>'+esc(zl.name)+'</option>').join('');
  document.getElementById('mb').innerHTML='<div class="mt">Meilenstein bearbeiten</div>'
    +'<div class="fl"><label>Name</label><input id="tzn" value="'+esc(tz.name)+'" autofocus></div>'
    +'<div class="fl"><label>Gehört zu Ziel</label><select id="tzz">'+zielOpts+'</select></div>'
    +'<div class="f2"><div class="fl"><label>Verantwortlich</label><select id="tzv">'+S.personen.map(p=>'<option value="'+p.id+'"'+(tz.verantwortlichId===p.id?' selected':'')+'>'+esc(p.name)+'</option>').join('')+'</select></div>'
    +'<div class="fl"><label>Bis wann</label><input type="date" id="tzd" value="'+(tz.datum||'')+'"></div></div>'
    +(isGF()?'<div class="fl"><label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:13px;font-weight:400"><input type="checkbox" id="tzvert" '+(tz.vertraulich?'checked':'')+' style="width:auto"> 🔒 Vertraulich</label><div style="font-size:10px;color:var(--t3);margin-top:2px">Sichtbar für: Geschäftsführung &amp; Verantwortlicher</div></div>':'')
    +'<div class="mf"><button class="btn btn-red" onclick="delTZ(\''+zid+'\',\''+tzid+'\')">Löschen</button><button class="btn btn-gr" onclick="cm()">Abbrechen</button><button class="btn btn-dk" onclick="saveTZ(\''+zid+'\',\''+tzid+'\')">Speichern</button></div>';
  document.getElementById('ovl').classList.add('open');
}
async function saveTZ(zid,tzid){
  const z=zielObj(zid);if(!z)return;
  const name=document.getElementById('tzn').value.trim();if(!name)return;
  const vid=document.getElementById('tzv').value,datum=document.getElementById('tzd').value;
  const tzVertEl=document.getElementById('tzvert');
  const vertraulich=tzVertEl?tzVertEl.checked:((z.teilziele||[]).find(t=>t.id===tzid)?.vertraulich||false);
  const newZid=document.getElementById('tzz')?.value||zid;
  if(tzid){
    const tz=(z.teilziele||[]).find(t=>t.id===tzid);
    if(tz){tz.name=name;tz.verantwortlichId=vid;tz.datum=datum;tz.vertraulich=vertraulich;tz.zielId=newZid;}
    if(newZid!==zid){
      z.teilziele=(z.teilziele||[]).filter(t=>t.id!==tzid);
      const nz=zielObj(newZid);if(nz){nz.teilziele=nz.teilziele||[];nz.teilziele.push(tz);}
    }
    await dbPatch('teilziele',tzid,{name,verantwortlich_id:vid,datum:datum||null,ziel_id:newZid,vertraulich});
  } else {
    const id=nid('tz'),rec={id,ziel_id:zid,name,verantwortlich_id:vid,datum:datum||null,erledigt:false,vertraulich:false};
    z.teilziele=z.teilziele||[];z.teilziele.push({...rec,zielId:zid,verantwortlichId:vid,datum:datum||'',vertraulich:false});
    await dbInsert('teilziele',rec);
  }
  cm();rZiele();
}
async function delTZ(zid,tzid){
  if(!confirm('Meilenstein löschen?'))return;
  const z=zielObj(zid);if(!z)return;
  z.teilziele=(z.teilziele||[]).filter(t=>t.id!==tzid);
  S.aufgaben.forEach(a=>{if(a.teilzielId===tzid)a.teilzielId=null;});
  await dbDelete('teilziele',tzid);cm();rZiele();
}

async function addZiel(){
  const id=nid('z'),rec={id,name:'Neues Ziel',farbe:Math.floor(Math.random()*FARBEN.length),pct:0,verantwortlich_id:null,vertraulich:false};
  S.ziele.push({...rec,verantwortlichId:null,kpis:[],teilziele:[]});
  await dbInsert('ziele',rec);rZiele();editZiel(id);
}
function editZiel(zid){
  const z=S.ziele.find(x=>x.id===zid);if(!z)return;
  document.getElementById('mb').innerHTML='<div class="mt">Ziel bearbeiten</div>'

async function saveKpi(zid,kid){

   Welche Stufe im Funnel hat die schlechteste Conversion?

function updateQZTZ(aid){
  const zielId=document.getElementById('qz-sel')?.value;
  const wrap=document.getElementById('qz-tz-wrap');
  const sel=document.getElementById('qz-ntz');
  if(!wrap||!sel)return;
  const z=zielId?S.ziele.find(x=>x.id===zielId):null;
  const tza=z?(z.teilziele||[]).filter(t=>!t.erledigt):[];
  sel.innerHTML='<option value="">— kein Meilenstein —</option>'+tza.map(t=>'<option value="'+t.id+'">'+esc(t.name)+'</option>').join('');

async function saveQuickZiel(id){
  const zielId=document.getElementById('qz-sel')?.value||null;
  const tzSel=document.getElementById('qz-ntz');
  const teilzielId=tzSel?tzSel.value||null:null;
  const a=S.aufgaben.find(x=>x.id===id);if(!a)return;
  a.ziel_id=zielId;a.teilziel_id=teilzielId;a.typ=zielId?'strategisch':'operativ';
  await dbPatch('aufgaben',id,{ziel_id:zielId,teilziel_id:teilzielId,typ:a.typ});
  cm();render();
}

async function runAI(){
  const inp=document.getElementById('ai-inp').value.trim();if(!inp)return;
  const out=document.getElementById('ai-out');
  out.innerHTML='<div style="padding:10px;color:var(--purple);font-size:12px">⟳ KI denkt nach…</div>';
  const personList=S.personen.map(p=>p.id+'='+p.name).join(',');
  const zielList=S.ziele.map(z=>z.id+'='+z.name).join(',');
  const sys='Du bist Assistent für Halleluja OS. Extrahiere eine Aufgabe und antworte NUR mit JSON:\n{"titel":"...","pid":"person_id","typ":"strategisch|operativ|random","zielId":"ziel_id|null","prio":"P1|P2|P3|null","dl":"YYYY-MM-DD|null","notiz":"..."}\nPersonen: '+personList+'\nZiele: '+zielList+'\nHeute: '+TODAY;
  try{
    const resp=await fetch('https://halleluja-app.germanywestcentral.cloudapp.azure.com/n8n/webhook/ki-proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:sys,messages:[{role:'user',content:inp}]})});
    if(!resp.ok){out.innerHTML='<div class="ai-result" style="background:var(--red-bg);border-color:var(--red-bd)">KI-Proxy Fehler (HTTP '+resp.status+'). Bitte nochmal versuchen.</div>';return;}
    const data=await resp.json();
    const text=data.content?.map(c=>c.text||'').join('')||'';
    let parsed;
    try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim());}
    catch(e){out.innerHTML='<div class="ai-result" style="background:var(--red-bg);border-color:var(--red-bd)">Konnte nicht verarbeiten.</div>';return;}
    const p2=person(parsed.pid),z2=parsed.zielId?zielObj(parsed.zielId):null;
    const ti=TYP_INFO[parsed.typ]||TYP_INFO.operativ;
    const safeJ=JSON.stringify(parsed).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    out.innerHTML='<div class="ai-result">'
      +'<div style="font-size:13px;font-weight:600;margin-bottom:8px">'+esc(parsed.titel)+'</div>'
      +'<div style="display:flex;gap:5px;flex-wrap:wrap">'
      +(p2?'<span class="tag" style="background:var(--blue-bg);color:var(--blue)">'+esc(p2.name)+'</span>':'')
      +'<span class="tag" style="background:'+ti.bg+';color:'+ti.tc+'">'+esc(ti.label)+'</span>'
      +(parsed.prio?prioTag(parsed.prio,null,false):'')
      +(z2?'<span class="tag" style="background:var(--green-bg);color:var(--green)">'+esc(z2.name)+'</span>':'')
      +(parsed.dl?dlTag(parsed.dl):'')
      +'</div>'+(parsed.notiz?'<div style="font-size:11px;color:var(--t2);margin-top:6px;font-style:italic">'+esc(parsed.notiz)+'</div>':'')+'</div>'
      +'<div class="mf" style="margin-top:10px"><button class="btn btn-gr" onclick="openAI()">Nochmal</button><button class="btn btn-purple" onclick=\'confirmAI('+safeJ+')\'>✓ Aufgabe anlegen</button></div>';
  }catch(e){out.innerHTML='<div class="ai-result" style="background:var(--red-bg);border-color:var(--red-bd)">Fehler: '+esc(e.message)+'</div>';}
}
async function confirmAI(p){

  const id=nid('a'),rec={id,pid:p.pid||aP,titel:p.titel,typ:p.typ||'operativ',
    status:p.prio?'backlog':'neu',prio:p.prio||null,
    ziel_id:p.zielId||null,teilziel_id:null,
    geplant:1,gebucht:0,dl:p.dl||null,ua:[],notiz:p.notiz||'',akt_seit:null,vertraulich:false,
    erstellt_von:aP};

  await dbInsert('aufgaben',rec);cm();render();

async function saveIdee(typ){

  const fuer=document.getElementById('id-fuer')?.value||null;
  const vert=document.getElementById('id-vert')?.checked||false;
  const id=nid('id');
  const rec={id,pid:aP,was,typ,bereich:fuer||'',notiz:why||null,haeufig:null,vertraulich:vert,created_at:new Date().toISOString()};

function rTeam(){
  let teams=isGF()?[...S.teams].sort((a,b)=>a.id==='gf'?-1:b.id==='gf'?1:0):S.teams.filter(t=>(me()?.teams||[]).includes(t.id)||t.members.includes(aP));
  if(!teams.length)teams=[...S.teams]; // Fallback: zeige alle Teams wenn User keinem zugeordnet
  let out='<div style="margin-bottom:20px"><div style="font-size:16px;font-weight:700">Team</div><div style="font-size:12px;color:var(--t3);margin-top:2px">Wer macht was</div></div>';

  // ── Deine Übersicht: Ziele + Für dich ──
  {
    const sichtbarZ=S.ziele.filter(z=>z.status!=='vorschlag'&&(!z.vertraulich||isGF()));
    const meineZ=sichtbarZ.filter(z=>String(z.verantwortlichId)===String(aP)||(z.teilziele||[]).some(tz=>String(tz.verantwortlichId)===String(aP)));
    const myTaskZielIds=new Set(S.aufgaben.filter(a=>a.pid===aP&&a.zielId).map(a=>a.zielId));
    const beteiligt=sichtbarZ.filter(z=>myTaskZielIds.has(z.id)&&!meineZ.find(m=>m.id===z.id));
    const alleRelevant=[...meineZ.map(z=>({z,rolle:'verantwortlich'})),...beteiligt.map(z=>({z,rolle:'mitwirkend'}))];
    const meinName=me()?.name||'';
    const fuerMich=S.signale.filter(s=>(s.typ==='wolke'||s.typ==='idee')&&s.bereich===meinName&&s.pid!==aP&&(!s.vertraulich||isGF()));

    if(alleRelevant.length||fuerMich.length){
      out+='<div style="background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:16px">';
      out+='<div style="font-size:13px;font-weight:700;margin-bottom:12px">Deine Übersicht</div>';

      // Ziele
      if(alleRelevant.length){
        out+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:8px">Deine Ziele</div>';
        alleRelevant.forEach(({z,rolle})=>{
          const f=FARBEN[z.farbe||0];
          const pct=z.pct||0;
          const verantw=person(z.verantwortlichId);
          const meineTasks=S.aufgaben.filter(a=>a.pid===aP&&a.zielId===z.id&&a.status!=='erledigt').length;
          const tzOffen=(z.teilziele||[]).filter(t=>!t.erledigt).length;
          const isOwn=String(z.verantwortlichId)===String(aP);
          out+='<div onclick="nav(\'ziele\')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--bd);border-radius:10px;margin-bottom:6px;cursor:pointer;background:var(--bg);transition:transform .1s" onmousedown="this.style.transform=\'scale(.98)\'" onmouseup="this.style.transform=\'scale(1)\'">';
          out+='<div style="width:10px;height:10px;border-radius:99px;background:'+f.tc+';flex-shrink:0"></div>';
          out+='<div style="flex:1;min-width:0">';
          out+='<div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(z.name)+'</div>';
          out+='<div style="display:flex;gap:6px;margin-top:3px;flex-wrap:wrap">';
          if(!isOwn&&verantw)out+='<span style="font-size:10px;color:var(--t3)">'+esc(verantw.name)+'</span>';
          out+='<span style="font-size:10px;padding:1px 6px;border-radius:99px;background:'+(isOwn?'var(--green-bg)':'var(--blue-bg)')+';color:'+(isOwn?'var(--green)':'var(--blue)')+'">'+(isOwn?'Verantwortlich':'Mitwirkend')+'</span>';
          if(meineTasks)out+='<span style="font-size:10px;color:var(--t3)">'+meineTasks+' offene Aufgabe'+(meineTasks>1?'n':'')+'</span>';
          if(tzOffen)out+='<span style="font-size:10px;color:var(--t3)">'+tzOffen+' Meilenstein'+(tzOffen>1?'e':'')+' offen</span>';
          out+='</div></div>';
          // Progress bar
          out+='<div style="width:40px;text-align:right"><div style="font-size:11px;font-weight:700;color:'+f.tc+'">'+pct+'%</div>';
          out+='<div style="width:40px;height:4px;border-radius:99px;background:var(--bd);margin-top:2px"><div style="width:'+Math.min(pct,100)+'%;height:100%;border-radius:99px;background:'+f.tc+'"></div></div></div>';
          out+='</div>';
        });
      }

      // Für dich: Wolken & Ideen

        out+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-top:14px;margin-bottom:8px">📬 Für dich</div>';

      out+='</div>';

  }

  const rankData=S.personen.map(p=>({p,count:getPaddelCount(p.id)})).sort((a,b)=>b.count-a.count).filter(x=>x.count>0);

        const p2=person(a.pid),ti=typInfo(a);
        out+='<div class="team-h-row"><div class="dot" style="background:var(--blue);flex-shrink:0"></div>'

          +'<div style="display:flex;gap:5px;margin-top:2px">'+(p2?'<span style="font-size:10px;color:var(--t3)">'+esc(p2.name)+'</span>':'')+'<span style="font-size:10px;color:'+ti.tc+'">· '+ti.label+'</span>'+(a.zielId?'<span style="font-size:10px;color:var(--t2)">· '+esc(getZielName(a)||'')+'</span>':'')+'</div></div>'+prioTag(a.prio,null,false)+'</div>';
      });
    }
    if(pipeline.length){
      out+='<div style="padding:10px 16px 2px;font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px">Nächste Prioritäten</div>';
      pipeline.forEach(a=>{
        const p2=person(a.pid),ti=typInfo(a);
        out+='<div class="team-h-row"><div class="dot" style="background:var(--bd);flex-shrink:0"></div>'
          +'<div style="flex:1;min-width:0"><div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(a.titel)+(a.vertraulich?'<span class="lock" style="margin-left:5px">🔒</span>':'')+'</div>'
          +'<div style="display:flex;gap:5px;margin-top:2px">'+(p2?'<span style="font-size:10px;color:var(--t3)">'+esc(p2.name)+'</span>':'')+'<span style="font-size:10px;color:'+ti.tc+'">· '+ti.label+'</span>'+(a.zielId?'<span style="font-size:10px;color:var(--t2)">· '+esc(getZielName(a)||'')+'</span>':'')+'</div></div>'+prioTag(a.prio,null,false)+'</div>';
      });
    }
    if(!aktiv.length&&!pipeline.length)out+='<div style="padding:14px 16px;font-size:12px;color:var(--t3);font-style:italic">Keine aktiven Aufgaben</div>';
    // Wolken/Ideen für Team-Mitglieder
    if(teamSignale.length){
      out+='<div style="padding:8px 16px 4px;font-size:10px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.5px">Wolken & Ideen</div>';
      teamSignale.slice(0,3).forEach(s=>{
        const von=person(s.pid);
        const badge=s.typ==='idee'?'💡':'☁';
        out+='<div style="padding:4px 16px 6px;display:flex;gap:8px;align-items:flex-start">';
        out+='<span style="font-size:12px;flex-shrink:0">'+badge+'</span>';
        out+='<div style="flex:1;min-width:0"><div style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(s.was)+'</div>';
        out+='<div style="font-size:10px;color:var(--t3)">'+(von?'von '+esc(von.name):'')+(s.bereich?' → '+esc(s.bereich):'')+'</div></div></div>';
      });
      if(teamSignale.length>3)out+='<div style="padding:2px 16px 6px;font-size:10px;color:var(--t3)">+ '+(teamSignale.length-3)+' weitere</div>';
    }
    out+='<div style="height:4px"></div></div>';
  });
  out+=rIdeenPool();
  out+=rSignaleTeam();
  // ── Big 3 Team-Überblick ──
  {
    const{kw,jahr}=getKW();
    const dieseWoche=S.wochenresets.filter(r=>r.kw===kw&&r.jahr===jahr);
    const teamMids=new Set();teams.forEach(t=>t.members.forEach(m=>teamMids.add(m)));
    const sichtbarePers=isGF()?S.personen.filter(p=>p.stufe!=='gf'):S.personen.filter(p=>teamMids.has(p.id)&&p.id!==aP);
    if(sichtbarePers.length){
    out+='<div style="margin-top:28px">';
    out+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:12px">Big 3 im Team · KW '+kw+'</div>';
    sichtbarePers.forEach(p=>{
      const r=dieseWoche.find(x=>String(x.pid)===String(p.id));
      const f=FARBEN[p.ci||0];
      const done=[r?.big3_1_done,r?.big3_2_done,r?.big3_3_done].filter(Boolean).length;
      const total=[r?.big3_1,r?.big3_2,r?.big3_3].filter(Boolean).length;
      out+='<div style="border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;overflow:hidden">';
      out+='<div style="display:flex;align-items:center;gap:9px;padding:10px 14px;background:var(--gray-bg)">';
      out+=av(p,28,10);
      out+='<div style="font-size:13px;font-weight:600;flex:1">'+esc(p.name)+'</div>';
      if(r&&total>0)out+='<span style="font-size:12px;font-weight:700;color:'+(done===total?'#15803d':'#c2410c')+'">'+done+'/'+total+' ✓</span>';
      if(!r)out+='<span style="font-size:11px;color:#f59e0b;font-weight:600">⏳ Ausstehend</span>';
      out+='</div>';
      if(r){
        if(r.blockiert)out+='<div style="padding:7px 14px;font-size:12px;border-top:1px solid var(--bd);background:var(--amber-bg)"><span style="font-weight:700;color:var(--orange)">⚠ </span>'+esc(r.blockiert)+'</div>';
        [[r.big3_1,r.big3_1_done],[r.big3_2,r.big3_2_done],[r.big3_3,r.big3_3_done]].forEach(([txt,done])=>{
          if(!txt)return;
          out+='<div style="display:flex;align-items:center;gap:8px;padding:6px 14px;font-size:12px;border-top:1px solid var(--bd)">';
          out+='<div style="width:14px;height:14px;border-radius:3px;flex-shrink:0;'+(done?'background:var(--green);display:flex;align-items:center;justify-content:center':'border:1.5px solid var(--bd)')+'">'+(done?'<span style="color:#fff;font-size:8px;font-weight:800">✓</span>':'')+'</div>';
          out+='<span style="'+(done?'color:var(--t3);text-decoration:line-through':'color:var(--text)')+'">'+txt+'</span>';
          out+='</div>';
        });
      }
      out+='</div>';
    });
    out+='</div>';
  }}

  // ── Wiederkehrende Aufgaben — GF Optimierungs-Insight ──
  if(isGF()){
    const recTasks=S.aufgaben.filter(a=>a.recurring&&a.status!=='erledigt');
    if(recTasks.length){
      const FREQ={daily:'Täglich',weekly:'Wöchentlich',monthly:'Monatlich'};
      const totalH=recTasks.reduce((s,a)=>s+(a.geplant||1),0);
      out+='<div style="margin-top:24px">';
      out+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
      out+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)">🔄 Wiederkehrende Aufgaben</div>';
      out+='<div style="font-size:11px;color:var(--t3)">'+recTasks.length+' aktiv · ~'+Math.round(totalH*10)/10+'h/Zyklus</div>';
      out+='</div>';
      recTasks.forEach(a=>{
        const p=person(a.pid);
        out+='<div onclick="openDetail(\''+a.id+'\')" class="hover-lift" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--bd);border-radius:10px;margin-bottom:6px;cursor:pointer;background:var(--sf)">';
        out+='<span style="font-size:11px;color:var(--blue);font-weight:600;flex-shrink:0">'+FREQ[a.recurring]+'</span>';
        out+='<span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(a.titel)+'</span>';
        if(p)out+='<span style="font-size:10px;color:var(--t3)">'+esc(p.name)+'</span>';
        out+='<span style="font-size:10px;color:var(--t3)">'+fmtH(a.geplant)+'</span>';
        out+='</div>';
      });
      out+='<div style="font-size:10px;color:var(--t3);font-style:italic;margin-top:6px;padding:0 4px">Können diese Aufgaben automatisiert oder optimiert werden?</div>';
      out+='</div>';
    }
  }

  // ── Sales Insights Feed (GF) ──
  if(isGF()&&S.beobachtungen.length){
    const TYPEN={einwand:{icon:'⚡',color:'#c2410c'},frage:{icon:'❓',color:'#1d4ed8'},insight:{icon:'💡',color:'#15803d'},lob:{icon:'⭐',color:'#b45309'}};
    out+='<div style="margin-top:24px">';
    out+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:10px">Sales Insights</div>';
    S.beobachtungen.slice(0,25).forEach(b=>{
      const p=person(b.pid),t=TYPEN[b.typ]||TYPEN.insight;
      out+='<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)">';
      out+='<span style="font-size:15px;flex-shrink:0">'+t.icon+'</span>';
      out+='<div style="flex:1"><div style="font-size:12px;color:var(--text)">'+esc(b.text)+'</div>';
      out+='<div style="font-size:10px;color:var(--t3);margin-top:2px">'+(p?esc(p.name)+' · ':'')+b.created_at.slice(0,10)+'</div></div>';
      out+='</div>';
    });
    out+='</div>';
  }

  // ── Decision Log (nur GF) ──
  if(isGF()){
    const allDR=[...S.decisionRequests];
    if(allDR.length){
      const[filterDR,setFilterDR]=[window._drFilter||'alle',v=>{window._drFilter=v;}];
      const gefiltert=filterDR==='alle'?allDR:allDR.filter(d=>d.status===filterDR);
      out+='<div style="margin-top:28px">';
      out+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">';
      out+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)">⚖️ Decision Log</div>';
      out+='<div style="display:flex;gap:4px;margin-left:auto">';
      ['alle','offen','entschieden','zurueckgegeben'].forEach(f=>{
        const lbl={'alle':'Alle','offen':'Offen','entschieden':'Entschieden','zurueckgegeben':'Zurückgegeben'}[f];
        const active=filterDR===f;
        out+='<button onclick="window._drFilter=\''+f+'\';render()" style="font-size:10px;padding:3px 9px;border-radius:99px;border:1px solid '+(active?'var(--text)':'var(--bd)')+';background:'+(active?'var(--text)':'var(--sf)')+';color:'+(active?'var(--inv-t)':'var(--t2)')+';cursor:pointer;font-family:inherit">'+lbl+'</button>';
      });
      out+='</div></div>';
      gefiltert.forEach(d=>{
        const von=S.personen.find(p=>p.id===d.erstellt_von);
        const von2=d.beantwortet_von?S.personen.find(p=>p.id===d.beantwortet_von):null;
        const prioCol=d.prioritaet==='hoch'?'var(--red)':d.prioritaet==='mittel'?'#d97706':'var(--t3)';
        const stBg=d.status==='entschieden'?'var(--green-bg)':d.status==='zurueckgegeben'?'var(--blue-bg)':'#fffbeb';
        const stCol=d.status==='entschieden'?'var(--green)':d.status==='zurueckgegeben'?'var(--blue)':'#d97706';
        const stTxt={'offen':'Offen','entschieden':'Entschieden','zurueckgegeben':'Zurückgegeben'}[d.status]||d.status;
        const isGray=d.status!=='offen';
        out+='<div style="border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:8px;'+(isGray?'opacity:.7':'')+'">';
        out+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
        out+='<span style="font-size:10px;font-weight:700;color:'+prioCol+';padding:1px 7px;border-radius:99px;border:1px solid '+prioCol+'">'+d.prioritaet+'</span>';
        out+='<span style="font-size:14px;font-weight:700;flex:1;line-height:1.3">'+esc(d.frage)+'</span>';
        out+='<span style="font-size:10px;font-weight:600;color:'+stCol+';background:'+stBg+';padding:2px 9px;border-radius:99px">'+stTxt+'</span>';
        out+='</div>';
        if(d.kontext)out+='<div style="font-size:11px;color:var(--t2);margin-bottom:4px;line-height:1.4">'+esc(d.kontext)+'</div>';
        if(d.blockiert)out+='<div style="font-size:11px;color:var(--red);margin-bottom:4px">⛔ '+esc(d.blockiert)+'</div>';
        out+='<div style="font-size:10px;color:var(--t3);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:'+(d.beschluss?'8':'0')+'px">';
        out+=(von?'<span>von '+esc(von.name)+'</span>':'');
        out+='<span>'+d.erstellt_am.slice(0,10)+'</span>';
        if(d.deadline)out+='<span>fällig '+d.deadline+'</span>';
        if(d.sichtbarkeit==='team')out+='<span style="color:var(--blue)">Team sichtbar</span>';
        out+='</div>';
        if(d.beschluss){
          out+='<div style="border-top:1px solid var(--bd);padding-top:8px;margin-top:4px">';
          out+='<div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:3px">✓ Beschluss</div>';
          out+='<div style="font-size:12px;color:var(--text);line-height:1.5;margin-bottom:4px">'+esc(d.beschluss)+'</div>';
          if(d.warum)out+='<div style="font-size:11px;color:var(--t2);line-height:1.4"><span style="font-weight:600">Warum:</span> '+esc(d.warum)+'</div>';
          if(von2)out+='<div style="font-size:10px;color:var(--t3);margin-top:4px">entschieden von '+esc(von2.name)+' · '+d.beantwortet_am.slice(0,10)+'</div>';
          out+='</div>';
        }
        if(d.rueckgabe_begruendung){
          out+='<div style="border-top:1px solid var(--bd);padding-top:8px;margin-top:4px">';
          out+='<div style="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:3px">↩ Zurückgegeben</div>';
          out+='<div style="font-size:12px;color:var(--text);line-height:1.5">'+esc(d.rueckgabe_begruendung)+'</div>';
          if(von2)out+='<div style="font-size:10px;color:var(--t3);margin-top:4px">von '+esc(von2.name)+' · '+d.beantwortet_am.slice(0,10)+'</div>';
          out+='</div>';
        }
        out+='</div>';
      });
      if(!gefiltert.length)out+='<div style="font-size:12px;color:var(--t3);padding:8px 0">Keine Einträge</div>';
      out+='</div>';
    }
  }

  document.getElementById('main').innerHTML=out;
}

async function saveTeam(tid){
  const name=document.getElementById('tn').value.trim();if(!name)return;
  const checked=[...document.querySelectorAll('#mb input[type=checkbox]:checked')].map(c=>c.value);
  if(tid){
    const t=S.teams.find(x=>x.id===tid);if(!t)return;
    const old=[...t.members];t.name=name;t.members=checked;
    S.personen.forEach(p=>{
      const was=old.includes(p.id),is=checked.includes(p.id);
      if(was&&!is)p.teams=(p.teams||[]).filter(x=>x!==tid);
      if(!was&&is){p.teams=p.teams||[];if(!p.teams.includes(tid))p.teams.push(tid);}
    });
    await dbPatch('teams',tid,{name,members:checked});
  } else {
    const id=nid('t'),rec={id,name,members:checked};
    S.teams.push(rec);await dbInsert('teams',rec);
    checked.forEach(pid=>{const p=person(pid);if(p&&!(p.teams||[]).includes(id)){p.teams=p.teams||[];p.teams.push(id);}});
  }
  await Promise.all(S.personen.map(p=>dbPatch('personen',p.id,{teams:p.teams})));
  openSettings();render();
}

function parseProfilStruktur(p){
  const s=p._profilStruktur||{};

function buildProfilText(s){
  let parts=[];
  if(s.ketten.length){const labels=s.ketten.map(k=>{const c=KETTE_CHIPS.find(x=>x.k===k);return c?c.icon+' '+c.label:k;});parts.push('Position in der Wertschöpfungskette: '+labels.join(', '));}
  if(s.teamSize>0)parts.push('Führt ein Team von '+s.teamSize+' Personen (Multiplikator-Effekt: Verbesserungen wirken '+s.teamSize+'x)');
  if(s.kernaufgaben)parts.push('Kernaufgaben: '+s.kernaufgaben);

  if(s.extras)parts.push(s.extras);

      if(n)n.textContent=fmt(s);if(f)f.style.width=pct+'%';
    });

      const p=me();if(p){

      }
    }

}

    +'<input type="file" id="md-audio" accept="audio/*,.m4a,.mp3,.wav,.webm,.ogg,.mp4" style="display:none" onchange="mdUploadAudio(this)">'
    +'🎙 Audio-Datei hochladen → automatisch transkribieren (Whisper)'
    +'</label>'
    +'</div>'
    +'<div id="md-status"></div>'
    +'<div class="mf"><button class="btn btn-gr" onclick="cm()">Abbrechen</button><button class="btn btn-dk" id="md-extract-btn" onclick="mdExtract()">✦ Aufgaben extrahieren</button></div>';
  document.getElementById('ovl').classList.add('open');
  document.getElementById('md-text').focus();
}

async function mdUploadAudio(input){
  const file=input.files[0];if(!file)return;
  const status=document.getElementById('md-status');
  const sizeMB=(file.size/1024/1024).toFixed(1);
  status.innerHTML='<div style="padding:10px;color:var(--amber);font-size:12px;display:flex;align-items:center;gap:6px"><span style="display:inline-block;animation:spin 1s linear infinite">⟳</span> Transkribiere Audio mit Whisper… ('+sizeMB+' MB)</div>';
  const whisperUrl=localStorage.getItem('n8n_whisper');
  if(!whisperUrl){
    status.innerHTML='<div style="padding:10px;color:var(--red);font-size:12px">⚠️ Whisper-URL nicht konfiguriert. Bitte in Einstellungen (⚙) unter „n8n Whisper URL" eintragen.</div>';
    return;
  }
  try{
    const fd=new FormData();fd.append('file',file);
    const resp=await fetch(whisperUrl,{method:'POST',body:fd});
    if(!resp.ok){status.innerHTML='<div style="padding:10px;color:var(--red);font-size:12px">⚠️ Whisper-Fehler (HTTP '+resp.status+'). Prüfe den Workflow in n8n.</div>';return;}
    const data=await resp.json();
    const transcript=data.transcript||data.text||data.result||'';
    if(transcript){
      document.getElementById('md-text').value=transcript;
      status.innerHTML='<div style="padding:10px;color:var(--green);font-size:12px">✅ Transkription fertig — '+transcript.split(/\s+/).length+' Wörter. Jetzt „Aufgaben extrahieren" klicken.</div>';
    }else{
      status.innerHTML='<div style="padding:10px;color:var(--red);font-size:12px">⚠️ Keine Transkription erhalten. Prüfe den Whisper-Workflow in n8n.</div>';
    }
  }catch(e){
    status.innerHTML='<div style="padding:10px;color:var(--red);font-size:12px">⚠️ Fehler bei Transkription: '+esc(e.message)+'</div>';
  }
}

async function mdExtract(){
  const text=document.getElementById('md-text').value.trim();
  if(!text){document.getElementById('md-status').innerHTML='<div style="padding:8px;color:var(--red);font-size:12px">Bitte zuerst ein Transkript einfügen.</div>';return;}
  const btn=document.getElementById('md-extract-btn');
  btn.disabled=true;btn.textContent='⟳ KI analysiert…';
  document.getElementById('md-status').innerHTML='<div style="padding:12px;text-align:center"><div style="color:var(--purple);font-size:13px;font-weight:600;margin-bottom:4px">⟳ Claude analysiert das Transkript…</div><div style="font-size:11px;color:var(--t3)">Extrahiere Aufgaben, Zuständigkeiten und Deadlines</div></div>';
  const personList=S.personen.map(p=>p.id+'='+p.name).join(', ');
  const zielList=S.ziele.map(z=>z.id+'='+z.name).join(', ');
  const sys='Du bist ein Assistent für Halleluja OS (Team-Management-Tool für Halleluja Sauna Austria).\n\n'
    +'Analysiere das folgende Meeting-Transkript und extrahiere ALLE konkreten Aufgaben und To-Dos.\n\n'
    +'Team-Mitglieder (id=Name): '+personList+'\n'
    +(zielList?'Aktive Ziele (id=Name): '+zielList+'\n':'')
    +'Heute: '+TODAY+'\n\n'
    +'Für jede Aufgabe extrahiere:\n'
    +'- titel: Klare, aktionsorientierte Beschreibung (z.B. "Newsletter an Kundenliste versenden", nicht nur "Newsletter")\n'
    +'- pid: Die person_id der zuständigen Person (MUSS exakt eine ID aus der Team-Liste sein). Wenn unklar wer zuständig ist → null\n'
    +'- prio: "P1" (dringend/kritisch), "P2" (wichtig/bald), "P3" (nice-to-have/irgendwann) oder null wenn nicht erkennbar\n'
    +'- dl: Deadline als "YYYY-MM-DD" wenn im Gespräch genannt. Relative Angaben ("bis Freitag", "nächste Woche", "Ende April") in echtes Datum umrechnen basierend auf heute='+TODAY+'. Wenn keine Deadline → null\n'
    +'- kontext: Ein kurzer Satz, warum diese Aufgabe entstanden ist (Kontext aus dem Meeting)\n'
    +'- ziel_id: Falls die Aufgabe klar zu einem der aktiven Ziele passt, die ziel_id. Sonst null\n\n'
    +'WICHTIG:\n'
    +'- Extrahiere NUR echte Aufgaben (Dinge die jemand TUN muss), keine Diskussionspunkte oder Fragen\n'
    +'- Antworte NUR mit einem JSON-Array, keine Erklärungen, kein Markdown-Codeblock\n'
    +'- Beispiel: [{"titel":"Newsletter versenden","pid":"abc123","prio":"P1","dl":"2026-04-18","kontext":"Thomas hat Christina gebeten","ziel_id":null}]';
  try{
    const resp=await fetch('https://halleluja-app.germanywestcentral.cloudapp.azure.com/n8n/webhook/ki-proxy',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,system:sys,messages:[{role:'user',content:text}]})
    });
    if(!resp.ok){document.getElementById('md-status').innerHTML='<div style="padding:12px;color:var(--red);font-size:12px">⚠️ KI-Proxy Fehler (HTTP '+resp.status+'). Bitte nochmal versuchen.</div>';btn.disabled=false;btn.textContent='✦ Aufgaben extrahieren';return;}
    const data=await resp.json();
    const raw=data.content?.map(c=>c.text||'').join('')||'';
    let tasks;
    try{tasks=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch(e){
      document.getElementById('md-status').innerHTML='<div style="padding:12px;color:var(--red);font-size:12px">⚠️ KI-Antwort konnte nicht verarbeitet werden. Bitte nochmal versuchen.</div>';
      btn.disabled=false;btn.textContent='✦ Aufgaben extrahieren';return;
    }
    if(!Array.isArray(tasks)||!tasks.length){
      document.getElementById('md-status').innerHTML='<div style="padding:12px;color:var(--amber);font-size:12px">Keine konkreten Aufgaben gefunden. Ist das Transkript lang genug?</div>';
      btn.disabled=false;btn.textContent='✦ Aufgaben extrahieren';return;
    }
    _mdTasks=tasks;
    mdRenderPreview();
  }catch(e){
    document.getElementById('md-status').innerHTML='<div style="padding:12px;color:var(--red);font-size:12px">⚠️ Fehler: '+esc(e.message)+'</div>';
    btn.disabled=false;btn.textContent='✦ Aufgaben extrahieren';
  }
}

function mdRemoveRow(i){
  const row=document.getElementById('md-row-'+i);if(row)row.style.display='none';
  const chk=document.getElementById('md-chk-'+i);if(chk)chk.checked=false;
  mdUpdateCount();
}

function mdUpdateCount(){
  let c=0;_mdTasks.forEach((_,i)=>{const chk=document.getElementById('md-chk-'+i);if(chk&&chk.checked)c++;});
  const el=document.getElementById('md-count');if(el)el.textContent=c+' ausgewählt';
}

async function mdConfirm(){
  const toCreate=[];
  _mdTasks.forEach((t,i)=>{
    const chk=document.getElementById('md-chk-'+i);if(!chk||!chk.checked)return;
    const titel=document.getElementById('md-titel-'+i).value.trim();if(!titel)return;
    const pid=document.getElementById('md-pid-'+i).value||aP;
    const prio=document.getElementById('md-prio-'+i).value||null;
    const dl=document.getElementById('md-dl-'+i).value||null;
    const zielSel=document.getElementById('md-ziel-'+i);
    const ziel_id=(zielSel?zielSel.value:'')||t.ziel_id||null;
    toCreate.push({titel,pid,prio,dl,ziel_id,kontext:t.kontext||''});
  });
  if(!toCreate.length)return;
  const m=document.getElementById('mb');
  m.innerHTML='<div class="mt">📝 Meeting Dump</div>'
    +'<div style="text-align:center;padding:40px">'
    +'<div style="font-size:14px;color:var(--purple);font-weight:600">⟳ Erstelle '+toCreate.length+' Aufgaben…</div>'
    +'<div id="md-progress" style="margin-top:12px;font-size:12px;color:var(--t3)">0 / '+toCreate.length+'</div>'
    +'</div>';
  let created=0;
  for(const t of toCreate){
    const isOther=t.pid!==aP;
    const id=nid('a');
    const rec={id,pid:t.pid,titel:t.titel,typ:t.ziel_id?'strategisch':'operativ',
      status:isOther?'zugewiesen':(t.prio?'backlog':'neu'),
      prio:t.prio,ziel_id:t.ziel_id,teilziel_id:null,
      geplant:1,gebucht:0,dl:t.dl,dl_type:t.dl?'bis':null,
      ua:[],notiz:t.kontext?'Meeting: '+t.kontext:null,
      akt_seit:null,vertraulich:false,erstellt_von:aP};
    S.aufgaben.push(normalizeAufgabe(rec));
    await dbInsert('aufgaben',rec);
    if(isOther){
      const tp=person(t.pid);
      if(tp&&tp.slack_id)notify('aufgabe_zugewiesen',{aufgabe:t.titel,fuer:{id:t.pid,name:tp.name,slack_id:tp.slack_id},prio:t.prio,dl:t.dl});
    }
    created++;
    const prog=document.getElementById('md-progress');if(prog)prog.textContent=created+' / '+toCreate.length;
  }
  m.innerHTML='<div class="mt">📝 Meeting Dump</div>'
    +'<div style="text-align:center;padding:40px">'
    +'<div style="font-size:48px;margin-bottom:12px">✅</div>'
    +'<div style="font-size:20px;font-weight:700;margin-bottom:6px">'+created+' Aufgaben angelegt</div>'
    +'<div style="font-size:13px;color:var(--t3);margin-bottom:20px">Zugewiesene Personen werden automatisch per Slack benachrichtigt.</div>'
    +'<div style="display:flex;justify-content:center"><button class="btn btn-dk" onclick="cm();render()" style="padding:10px 24px;font-size:14px">Fertig</button></div>'
    +'</div>';
}

async function saveDecisionRequest(){
  const frage=document.getElementById('dr-frage').value.trim();
  const deadline=document.getElementById('dr-deadline').value;
  if(!frage){toast('Bitte Frage eingeben');return;}
  if(!deadline){toast('Bitte Deadline wählen');return;}
  const sicht=document.querySelector('input[name="dr-sicht"]:checked')?.value||'gf_only';
  const rec={
    id:nid('dr'),
    frage,
    kontext:document.getElementById('dr-kontext').value.trim()||null,
    blockiert:document.getElementById('dr-blockiert').value.trim()||null,
    slack_link:document.getElementById('dr-slack').value.trim()||null,
    prioritaet:document.getElementById('dr-prio').value,
    deadline,
    sichtbarkeit:sicht,
    erstellt_von:aP,
    erstellt_am:new Date().toISOString(),
    status:'offen'
  };
  S.decisionRequests.unshift(rec);
  await dbInsert('decision_requests',rec);
  // GF benachrichtigen
  const gfSlackIds=S.personen.filter(p=>p.stufe==='gf'&&p.id!==aP&&p.slack_id).map(p=>p.slack_id);
  notify('entscheidung_angefragt',{frage:rec.frage,prioritaet:rec.prioritaet,deadline:rec.deadline,blockiert:rec.blockiert,gf_slack_ids:gfSlackIds,actor_slack_id:me()?.slack_id||''});
  cm();render();
  toast('✅ Entscheidungsanfrage gesendet');
}

       +'<div class="fl"><label>Warum? <span style="color:var(--red)">*</span> <span style="font-size:10px;color:var(--t3);font-weight:400">— Dalio-Prinzip: jede Entscheidung braucht eine Begründung</span></label><textarea id="dr-warum" rows="3" placeholder="Was war der ausschlaggebende Grund?" style="resize:none"></textarea></div>'

async function saveDecisionAnswer(id){
  const d=S.decisionRequests.find(x=>x.id===id);if(!d)return;
  const beschluss=document.getElementById('dr-beschluss').value.trim();
  const warum=document.getElementById('dr-warum').value.trim();
  if(!beschluss){toast('Bitte Beschluss eingeben');return;}
  if(!warum){toast('Warum ist Pflicht — Dalio-Prinzip');return;}
  const now=new Date().toISOString();
  d.status='entschieden';d.beschluss=beschluss;d.warum=warum;d.beantwortet_am=now;d.beantwortet_von=aP;
  await dbPatch('decision_requests',id,{status:'entschieden',beschluss,warum,beantwortet_am:now,beantwortet_von:aP});
  // Ersteller benachrichtigen
  const von=S.personen.find(p=>p.id===d.erstellt_von);
  if(von?.slack_id)notify('entscheidung_getroffen',{frage:d.frage,beschluss,warum,an_slack_id:von.slack_id,actor_slack_id:me()?.slack_id||''});
  cm();render();
  toast('✅ Beschluss gespeichert');
}
async function returnDecisionRequest(id){
  const d=S.decisionRequests.find(x=>x.id===id);if(!d)return;

  d.status='zurueckgegeben';d.rueckgabe_begruendung=begruendung;d.beantwortet_am=now;d.beantwortet_von=aP;
  await dbPatch('decision_requests',id,{status:'zurueckgegeben',rueckgabe_begruendung:begruendung,beantwortet_am:now,beantwortet_von:aP});

// ─── Google Calendar Integration ───────────────────────────────
function gcalIsConnected(){
  const token=localStorage.getItem('gcal_token');
  const expiry=parseInt(localStorage.getItem('gcal_token_expiry')||'0');
  return !!(token&&Date.now()<expiry);
}
const GCAL_DEFAULT_CLIENT_ID='72621178595-l3kjb0a7u8khba1dt61lgu5gfs0daorb.apps.googleusercontent.com';
function gcalConnect(){
  const clientId=(localStorage.getItem('gcal_client_id')||GCAL_DEFAULT_CLIENT_ID).trim();
  const scope='https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events';
  const redirectUri=location.origin+location.pathname;
  location.href='https://accounts.google.com/o/oauth2/v2/auth'
    +'?client_id='+encodeURIComponent(clientId)
    +'&redirect_uri='+encodeURIComponent(redirectUri)
    +'&response_type=token'
    +'&scope='+encodeURIComponent(scope)
    +'&prompt=consent';
}
function gcalDisconnect(){
  localStorage.removeItem('gcal_token');
  localStorage.removeItem('gcal_token_expiry');
  S.kalender=[];
  if(window._gcalNotifIv)clearInterval(window._gcalNotifIv);
  toast('Google Kalender getrennt');
  render();
}
function gcalHandleCallback(){
  if(!location.hash.includes('access_token'))return;
  const params=new URLSearchParams(location.hash.replace(/^#/,''));
  const token=params.get('access_token');
  const expiresIn=parseInt(params.get('expires_in')||'3600');
  if(token){
    localStorage.setItem('gcal_token',token);
    localStorage.setItem('gcal_token_expiry',String(Date.now()+expiresIn*1000));
    history.replaceState(null,'',location.pathname);
    toast('✅ Google Kalender verbunden');
  }
}
async function gcalFetchToday(){
  const token=localStorage.getItem('gcal_token');
  const expiry=parseInt(localStorage.getItem('gcal_token_expiry')||'0');
  if(!token||Date.now()>expiry){S.kalender=[];return;}
  const d=new Date();
  const start=new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0).toISOString();
  const end=new Date(d.getFullYear(),d.getMonth(),d.getDate(),23,59,59).toISOString();
  try{
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events'
      +'?timeMin='+encodeURIComponent(start)
      +'&timeMax='+encodeURIComponent(end)
      +'&singleEvents=true&orderBy=startTime&maxResults=25',
      {headers:{Authorization:'Bearer '+token}});
    if(resp.status===401){localStorage.removeItem('gcal_token');S.kalender=[];render();return;}
    const data=await resp.json();
    window._gcalEvtMap={};
    S.kalender=(data.items||[])
      .filter(e=>e.start&&e.start.dateTime)
      .map((e,i)=>{
        const ev={id:'ge_'+i,titel:e.summary||'(Kein Titel)',beschreibung:e.description||'',ort:e.location||'',start:new Date(e.start.dateTime),end:new Date(e.end.dateTime)};
        window._gcalEvtMap[ev.id]=ev;
        return ev;
      });
    render();
    gcalStartNotifications();
  }catch(err){console.warn('gcal fetch:',err);}
}
function gcalStartNotifications(){
  if(window._gcalNotifIv)clearInterval(window._gcalNotifIv);
  window._gcalNotifIv=setInterval(()=>{
    if(!aP)return;
    const now=Date.now();
    (S.kalender||[]).forEach(ev=>{
      if(!ev.start)return;
      const diff=(ev.start.getTime()-now)/60000;
      if(diff>9&&diff<=10)toast('📅 '+ev.titel+' in 10 Min');
      else if(diff>-1&&diff<=0&&!ev._notifFired){ev._notifFired=true;toast('📅 '+ev.titel+' startet jetzt!');}
    });
  },60000);
}
function gcalShowEvent(id){
  const ev=(window._gcalEvtMap||{})[id];if(!ev)return;
  const fmt=d=>d.getHours()+':'+(''+(d.getMinutes())).padStart(2,'0');
  document.getElementById('mb').innerHTML='<div class="mt">📅 '+esc(ev.titel)+'</div>'
    +'<div style="font-size:13px;color:var(--t2);margin-bottom:14px">'+fmt(ev.start)+' – '+fmt(ev.end)+(ev.ort?' &nbsp;·&nbsp; <span style="color:var(--t3)">'+esc(ev.ort)+'</span>':'')+'</div>'
    +(ev.beschreibung?'<div style="font-size:12px;color:var(--text);line-height:1.6;white-space:pre-wrap;background:var(--gray-bg);border-radius:8px;padding:10px 12px;margin-bottom:14px;max-height:200px;overflow-y:auto">'+esc(ev.beschreibung)+'</div>':'')
    +'<div class="mf"><button class="btn btn-gr" onclick="cm()">Schließen</button></div>';
  document.getElementById('ovl').classList.add('open');
}
// ─── Google Calendar Write-Sync ─────────────────────────────────
function gcalGetEvtId(aufgabeId){return localStorage.getItem('gcal_evt_'+aufgabeId)||null;}
function gcalSetEvtId(aufgabeId,gcalId){if(gcalId)localStorage.setItem('gcal_evt_'+aufgabeId,gcalId);else localStorage.removeItem('gcal_evt_'+aufgabeId);}
function gcalNextDay(dateStr){const d=new Date(dateStr+'T12:00:00');d.setDate(d.getDate()+1);return localDate(d);}
async function gcalCreateEvent(a){
  if(!gcalIsConnected()||!a.dl||a.pid!==aP)return;
  if(gcalGetEvtId(a.id))return; // already exists
  const token=localStorage.getItem('gcal_token');
  const colorMap={'P1':'11','P2':'6','P3':'8'};
  const body={
    summary:(a.prio?'['+a.prio+'] ':'')+a.titel,
    description:'Halleluja OS',
    colorId:colorMap[a.prio||'P3']||'8',
    start:{date:a.dl},
    end:{date:gcalNextDay(a.dl)}
  };
  try{
    const resp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',
      {method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(resp.ok){const d=await resp.json();gcalSetEvtId(a.id,d.id);}
    else if(resp.status===401){localStorage.removeItem('gcal_token');}
  }catch(e){console.warn('gcalCreateEvent:',e);}
}
async function gcalUpdateEventStart(a){
  if(!gcalIsConnected()||a.pid!==aP)return;
  const evtId=gcalGetEvtId(a.id);
  if(!evtId){if(a.dl)await gcalCreateEvent(a);return;}
  const token=localStorage.getItem('gcal_token');
  const now=new Date();
  const end=new Date(now.getTime()+(a.geplant||1)*3600000);
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  try{
    await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/'+encodeURIComponent(evtId),
      {method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
       body:JSON.stringify({start:{dateTime:now.toISOString(),timeZone:tz},end:{dateTime:end.toISOString(),timeZone:tz}})});
  }catch(e){console.warn('gcalUpdateEventStart:',e);}
}
async function gcalUpdateEventEnd(a){
  if(!gcalIsConnected()||a.pid!==aP)return;
  const evtId=gcalGetEvtId(a.id);
  if(!evtId)return;
  const token=localStorage.getItem('gcal_token');
  const now=new Date();
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  try{
    const getResp=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/'+encodeURIComponent(evtId),
      {headers:{Authorization:'Bearer '+token}});
    if(!getResp.ok)return;
    const evt=await getResp.json();
    const patch={end:{dateTime:now.toISOString(),timeZone:tz}};
    if(evt.start&&evt.start.date){
      // Was still all-day → set start to beginning of today
      const d=new Date(); d.setHours(9,0,0,0);
      patch.start={dateTime:d.toISOString(),timeZone:tz};
    }
    await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/'+encodeURIComponent(evtId),
      {method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(patch)});
  }catch(e){console.warn('gcalUpdateEventEnd:',e);}
}
